epts/sssom-mapping-as-context", "source": "skill-bundles", "target": "concepts/sssom-mapping-as-context"}}, {"data": {"id": "skill-bundles__concepts/constraint-rules-as-context", "source": "skill-bundles", "target": "concepts/constraint-rules-as-context"}}, {"data": {"id": "skill-bundles__concepts/validator-explanation-pattern", "source": "skill-bundles", "target": "concepts/validator-explanation-pattern"}}, {"data": {"id": "tools/agensi-marketplace-landscape__examples/chris-ayers-plugin-ecosystem", "source": "tools/agensi-marketplace-landscape", "target": "examples/chris-ayers-plugin-ecosystem"}}, {"data": {"id": "tools/agensi-marketplace-landscape__examples/owasp-agentic-skills-top-10", "source": "tools/agensi-marketplace-landscape", "target": "examples/owasp-agentic-skills-top-10"}}, {"data": {"id": "tools/agensi-marketplace-landscape__examples/purplebox-supply-chain-security", "source": "tools/agensi-marketplace-landscape", "target": "examples/purplebox-supply-chain-security"}}], "bodies": {"concepts/bidirectional-shacl-llm-bridge": "# Bidirectional SHACL \u2194 LLM Bridge\n\n**Date Added:** 2026-06-01 (Iteration 13)\n**Confidence:** 8/10\n\n## Definition\n\nA **bidirectional SHACL \u2194 LLM bridge** is a bundle that uses LLMs to translate between natural-language requirements and SHACL shapes in both directions:\n\n- **Forward direction:** Natural-language requirements \u2192 SHACL shapes (validation rules in Turtle)\n- **Reverse direction:** Existing SHACL shapes \u2192 natural-language explanations\n\nThe catalog now has examples of both directions, which together form a complete bridge.\n\n## Forward Direction: text2shacl\n\n[text2shacl multi agent shacl](../examples/text2shacl-multi-agent-shacl.md) (added Iteration 13) demonstrates forward generation:\n\n- Input: HTML/PDF technical requirements (RINF Application Guide) + OWL ontology\n- Pipeline: 4 stages \u2014 preprocessing \u2192 RAG indexing \u2192 SHACL generation (LangGraph multi-agent) \u2192 post-processing/merging\n- Output: SHACL shapes in Turtle, validated and cleaned, optionally merged with baseline (Astrea)\n- Evaluation: 5 LLMs compared empirically, gold standard for comparison\n\nThe merge step implements explicit conflict-resolution policy:\n- `priority-llm` \u2014 favors LLM-generated shapes when sources conflict\n- `restrictive` \u2014 keeps only constraints that all sources agree on\n\n## Reverse Direction: xpSHACL\n\n[xpshacl explainable shacl](../examples/xpshacl-explainable-shacl.md) (already in catalog from Iteration 8) demonstrates reverse explanation:\n\n- Input: SHACL shapes + RDF data\n- Output: Natural-language explanations of why validation passes/fails\n- Method: Logic-based + LLM-based hybrid explanation\n\n## Why The Bridge Matters\n\nTogether, the two directions enable a **closed-loop workflow**:\n\n```\nNatural-language requirements\n        \u2193 (forward: text2shacl)\nSHACL shapes\n        \u2193 (apply to data)\nValidation results\n        \u2193 (reverse: xpSHACL)\nNatural-language explanation\n        \u2193 (back to requirements authors for review)\nNatural-language requirements (refined)\n```\n\nThis is the kind of closed loop that makes SHACL accessible to non-RDF-experts \u2014 a long-standing usability barrier for SHACL adoption.\n\n## Composition Notes\n\n- **Multi-agent architecture:** The forward direction uses LangGraph's multi-agent pattern, the reverse uses logic-based + LLM hybrid \u2014 different patterns, same goal.\n- **Ontology grounding:** Both directions are *ontology-grounded* \u2014 the SHACL shapes use ontology terms, not free-text predicates. This grounds the entire bridge in formal semantics.\n- **Gold standard requirement:** Forward direction needs a manually curated gold standard for evaluation. Reverse direction needs user studies to validate explanation quality.\n\n## Cross-References in the Catalog\n\n- [shacl 1 2 spec](../examples/shacl-1-2-spec.md) \u2014 The spec both directions target\n- [shacl data quality 69 metrics](../examples/shacl-data-quality-69-metrics.md) \u2014 Shape-quality dimensions the forward direction can optimize for\n- [xpshacl explainable shacl](../examples/xpshacl-explainable-shacl.md) \u2014 The reverse direction\n- [dspy agent skills bundle](../examples/dspy-agent-skills-bundle.md) \u2014 LLM-as-judge pattern useful for evaluating forward generation quality\n- [sc25 autonomous science workflows](../papers/sc25-autonomous-science-workflows.md) \u2014 Closed-loop autonomous pattern this resembles\n\n## Open Questions\n\n1. **Round-trip consistency:** If you generate shapes from text (forward) then explain the same shapes back to text (reverse), do you get the original text? (Probably not exactly, but should be close.)\n2. **Co-evolution:** As the underlying ontology evolves, how do generated shapes stay in sync? (Active research area.)\n3. **Partial shapes:** Forward generation often produces *partial* shapes \u2014 a constraint for some properties but not all. The reverse direction should be able to explain \"this shape doesn't constrain property X\" \u2014 does it?\n\n## Related Concepts\n- [validator explanation pattern](validator-explanation-pattern.md) \u2014 The reverse direction\n- [sssom mapping as context](sssom-mapping-as-context.md) \u2014 Mapping as a parallel bridge pattern\n- [skill bundle patterns](skill-bundle-patterns.md) \u2014 Foundation patterns", "concepts/constraint-rules-as-context": "# Constraint Rules as Skill Context\n\n## Overview\n\nSome skill bundles encode **prohibitions and constraint rules** directly into their SKILL.md files, going beyond procedural instructions to enforce behavioral boundaries. This pattern treats skills not just as \"how to do X\" but as \"what you must never do when doing X.\"\n\n## Examples\n\n### Superpowers \"Iron Laws\"\nThe [superpowers engineering discipline skills](../examples/superpowers-engineering-discipline-skills.md) framework embeds non-negotiable constraints:\n- TDD: \"NO PRODUCTION CODE WITHOUT A FAILING TEST FIRST\"\n- Verification: \"NO COMPLETION CLAIMS WITHOUT FRESH VERIFICATION EVIDENCE\"\n- Debugging: \"NO FIXES WITHOUT ROOT CAUSE INVESTIGATION FIRST\"\n\nThese are **declarative prohibitions** \u2014 the agent reads the constraint and is forbidden from violating it.\n\n### Red Flags (Negative Constraints)\nSuperpowers also documents **rationalization patterns** (Red Flags) that agents commonly use to skip discipline:\n- \"Tests passing on first run.\"\n- \"Keeping deleted code as reference.\"\n- Using words like \"should\", \"probably\", or \"seems to\"\n\nThis is a **second-order constraint**: the agent is taught to recognize its own rationalizations.\n\n### Security Constraints\n[nvidia verified agent skills](../examples/nvidia-verified-agent-skills.md) uses cryptographic signing (OpenSSF) as a constraint \u2014 unsigned skills cannot be installed. [veto agent authorization](../examples/veto-agent-authorization.md) implements a veto kernel where authorization decisions constrain what skills can execute.\n\n### SHACL Validation as Constraint\n[graphguard os guardrails](../examples/graphguard-os-guardrails.md) uses SHACL shapes + Cypher rules as deterministic guardrails \u2014 constraints that LLMs cannot bypass through prompt engineering. [xpshacl explainable shacl](../examples/xpshacl-explainable-shacl.md) adds explainability: when validation fails, the agent receives the reason.\n\n## Pattern Classification\n\n| Type | Mechanism | Examples |\n|------|-----------|----------|\n| Declarative Prohibition | Text constraint in SKILL.md | Superpowers Iron Laws |\n| Negative Constraint | Anti-pattern documentation | Superpowers Red Flags |\n| Cryptographic | Signature verification | NVIDIA OpenSSF |\n| Schema Validation | SHACL shape checking | GraphGuard OS, xpSHACL |\n| Authorization Kernel | Runtime veto decisions | Veto |\n\n## Relationship to Other Concepts\n\n- [skill bundle patterns](skill-bundle-patterns.md): Constraint rules are the most restrictive form of context element\n- [validator explanation pattern](validator-explanation-pattern.md): Constraints need explanation when violated (xpSHACL pattern)\n- Dependency constraints (Graph of Skills): Skills that require prerequisites can be viewed as constraints\n\n## Status\nStrong pattern \u2014 5+ documented examples with distinct mechanisms.", "concepts/okf-knowledge-bundle": "# OKF Knowledge Bundle \u2014 Format Rules for this Wiki\n\nThis repository's `wiki/` directory is an **Open Knowledge Format (OKF) v0.1** Knowledge Bundle.\n\n**Authoritative spec:** [OKF SPEC.md](https://github.com/GoogleCloudPlatform/knowledge-catalog/blob/main/okf/SPEC.md)\n\nThe daily research *workflow* is inspired by Karpathy-style LLM knowledge bases (compound daily notes, agent ownership of the wiki). The **document format** is OKF \u2014 not Obsidian, not bare `[[wikilink]]` markup.\n\n## Bundle root\n\n- Bundle root: `wiki/`\n- Concept ID: path under `wiki/` without `.md` (e.g. `examples/skill0-skill-internalization`)\n- Outside the bundle: `raw/`, `scripts/`, `PLAN.md`, `resources/`\n\n## Required frontmatter (every concept)\n\nEvery non-reserved `.md` file under `wiki/` must start with YAML frontmatter including:\n\n```yaml\n---\ntype: Skill Bundle Example   # required\ntitle: Human-readable title  # recommended\ndescription: One sentence    # recommended\nresource: https://...        # optional canonical URI\ntags: [optional]\ntimestamp: 2026-07-16T00:00:00Z\n# plus any producer extensions\n---\n```\n\n### Types used in this bundle\n\n| `type` | Directory / file |\n|--------|------------------|\n| `Skill Bundle Example` | `examples/` |\n| `Concept` | `concepts/` |\n| `Paper` | `papers/` |\n| `Tool` | `tools/` |\n| `Daily Digest` | `daily-digests/` |\n| `Q&A` | `qa/` |\n| `Publication` | `skill-bundles.md` |\n| `Metrics` | `metrics.md` |\n\n## Reserved filenames (OKF \u00a73.1)\n\n| File | Role |\n|------|------|\n| `index.md` | Progressive disclosure listing (no concept `type`; root may have `okf_version` only) |\n| `log.md` | Chronological update history |\n\n## Cross-linking (OKF \u00a75)\n\n**Use relative markdown links** so links work on GitHub and in OKF consumers:\n\n```markdown\n[SkillOpt](../examples/skillopt-trainable-skill-parameters.md)\n```\n\n**Do not use:**\n\n```markdown\n[[skillopt-trainable-skill-parameters]]\n```\n\nAbsolute bundle-relative paths starting with `/` are OKF-legal when the bundle is the publish root; in this monorepo they break GitHub navigation, so this project standardizes on **relative** links (\u00a75.2).\n\n## Citations (OKF \u00a78)\n\nPrefer a trailing `# Citations` section for external sources that support claims.\n\n## Conformance gate\n\n```bash\npython3 scripts/okf-lint.py\n```\n\nHard failures: missing frontmatter, missing `type`, residual `[[wikilinks]]`.\n\nUse only `okf-lint.py`. Dated `scripts/wikilink-lint-*.py` files are legacy and must not drive the daily loop.\n\n## Related\n\n- Bundle entry: [index](../index.md)\n- Primary publication: [Skill Bundles catalog](../skill-bundles.md)\n- Agent workflow contract: `PLAN.md` (repo root, outside bundle)\n\n# Citations\n\n[1] [Open Knowledge Format (OKF) SPEC v0.1](https://github.com/GoogleCloudPlatform/knowledge-catalog/blob/main/okf/SPEC.md)", "concepts/skill-bundle-patterns": "# Skill Bundle Patterns\n\n**Date:** 2026-05-24 (Updated Iteration 8)\n\n## Observed Pattern: Skills + Declarative Context\n\nThe strongest examples (NORA, agentskills.io) combine executable skills with rich declarative files:\n\n- `CLAUDE.md` / `REWATCH_PLAN.md`\n- Skill manifests\n- Launcher commands\n\nThis pattern appears more important than pure code for reusability.\n\n## Pattern: Skills + SHACL Validation + Explainability\n\n**New in Iteration 8.** The [xpshacl explainable shacl](../examples/xpshacl-explainable-shacl.md) and [shacl data quality 69 metrics](../examples/shacl-data-quality-69-metrics.md) examples demonstrate an emerging pattern: SHACL validation is paired with an explanation layer that converts technical validation results into natural language. The Violation KG caching mechanism (99.48% hit rate) shows that validation errors are highly repetitive \u2014 a signature-based cache makes explainable validation practical.\n\nKey insight: **Validation alone is insufficient** for skill bundles. The explanation layer (RAG + LLM) and caching (Violation KG) are what make validation actionable.\n\n## Pattern: SHACL + Cypher Rules + Shadow Testing\n\n**New in Iteration 8.** [graphguard os guardrails](../examples/graphguard-os-guardrails.md) introduces a sophisticated guardrails pattern: SHACL shapes for structural constraints, Cypher policies for behavioral rules, and a Shadow Policy Manager for safe rule evolution. This addresses the \"rules that almost work\" problem by testing candidate policies against production traffic.\n\n## Pattern: Distribution + Provenance Tracking\n\n**New in Iteration 8.** `gh skill` (GitHub CLI) and OpenAI Codex both implement supply chain integrity for skills: immutable releases, content-addressed detection (git tree SHA), version pinning, and portable provenance in SKILL.md frontmatter. This represents the **maturation phase** of the skill ecosystem.\n\n## Pattern: Taxonomy-Driven Skill Collections\n\n**New in Iteration 8.** The Anthropic-Cybersecurity-Skills collection (754 skills mapped to MITRE/NIST frameworks) demonstrates a large-scale taxonomy-driven bundle. Formal frameworks (MITRE ATT&CK, NIST) provide hierarchical organization and standardized naming across hundreds of skills.\n\n## Missing Elements (Gaps)\n\nCurrent examples are light on:\n- **Formal SSSOM skill implementations** \u2014 SSSOM is a specification, not yet paired with agent skills (addressed in part by adding [sssom mapping protocol](../examples/sssom-mapping-protocol.md))\n- **Explicit rule layers** beyond authorization (partially addressed by GraphGuard OS Cypher policies)\n- **Ontology/taxonomy integration** in non-security domains\n\n## Context Element Coverage (Updated)\n\n| Context Element | Examples | Trajectory |\n| SHACL Validation | 6 | Strong (was 3) |\n| Rules / Authorization | 5 | Strong (was 4) |\n| Ontology / Taxonomy | 5 | Strong |\n| Governance / Verification | 4 | Strong (was 3) |\n| YAML Configuration | 8+ | Ubiquitous |\n| MCP Dependencies | 3 | Emerging |\n| SSSOM Mapping | 2 | Emerging (was 1) |\n| Supply Chain / Provenance | 2 | Emerging |", "concepts/skill-security-governance": "# Skill Security Governance \u2014 The Emergence of Formalized Risk Management\n\n## Concept\n\nA synthesis of four converging frameworks that together form a complete governance system for skill bundle security. As the Agent Skills ecosystem has matured from early adoption (October 2025) to widespread deployment (Q1 2026), security concerns have crystalized into structured, formalized governance approaches.\n\n## The Four Pillars\n\n### 1. Risk Classification: OWASP AST10\n[owasp agentic skills top 10](../examples/owasp-agentic-skills-top-10.md) provides the **vulnerability taxonomy** \u2014 answering \"what can go wrong?\" with 10 risk categories (AST01\u2013AST10), a Lethal Trifecta model, and a proposed Universal Skill Format with permission schemas.\n\n### 2. Governance Process: Agentic Trust Framework\n[agentic trust framework csa](../examples/agentic-trust-framework-csa.md) provides the **maturity model** \u2014 answering \"how do we maintain control?\" with 4 autonomy levels, 5 promotion gates, and phased implementation (crawl-walk-run).\n\n### 3. Empirical Evidence: Mondoo + PurpleBox + arXiv Survey\n[mondoo agent skills security](../examples/mondoo-agent-skills-security.md) (25%+ vulnerable, 14 attack patterns), [purplebox supply chain security](../examples/purplebox-supply-chain-security.md) (12% infection rate, 6-vector taxonomy), and [arxiv agent skills survey](../examples/arxiv-agent-skills-survey.md) (26.1% vulnerability rate, 4-tier trust framework) provide the **data foundation** \u2014 answering \"how bad is it really?\"\n\n### 4. Implementation: NVIDIA Verified + Veto + GraphGuard\n[nvidia verified agent skills](../examples/nvidia-verified-agent-skills.md) (OpenSSF signing, SkillSpector scanning), [veto agent authorization](../examples/veto-agent-authorization.md) (least-privilege authorization), and [graphguard os guardrails](../examples/graphguard-os-guardrails.md) (SHACL + Cypher guardrails) provide the **technical countermeasures** \u2014 answering \"how do we fix it?\"\n\n## The Governance Stack\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  OWASP AST10 (Risk Taxonomy)     \u2502  \u2190 Identifies what can go wrong\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502  ATF (Maturity Model)            \u2502  \u2190 Defines how to mature safely\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502  Empirical Data (Mondoo, arXiv)  \u2502  \u2190 Quantifies actual risk\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502  Technical Controls (NVIDIA,     \u2502  \u2190 Implements countermeasures\n\u2502  Veto, GraphGuard, NemoClaw)     \u2502\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502  Distribution (Plugins,          \u2502  \u2190 Enables versioning + provenance\n\u2502  Marketplaces, Versioning)       \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n## Key Insight: The Governance Gap is Closing\n\nBetween Iteration 10 (2026-05-25) and Iteration 11 (2026-05-26), the catalog grew from having scattered security advice (Mondoo patterns, PurpleBox taxonomy, NVIDIA signing) to having **two formal governance frameworks** (OWASP AST10, ATF) and **one academic survey** validating the problem scope. This represents a step-change from empirical observation to formal governance.\n\n## Open Questions\n\n1. Will OWASP's Universal Skill Format become the de facto standard, or will multiple formats (OWASP, NVIDIA SKILLCARD, marketplace-specific) fragment the ecosystem?\n2. Can the ATF maturity model be automated \u2014 continuous trust scoring rather than manual promotion gates?\n3. Do the 26.1% / 36.8% vulnerability rates stabilize as the ecosystem matures, or do they rise as adoption grows?\n\n## Related Concepts\n- [verified skill governance](verified-skill-governance.md) \u2014 NVIDIA's cryptographic signing approach (pre-dates both AST10 and ATF)\n- [constraint rules as context](constraint-rules-as-context.md) \u2014 Rules/authorization patterns that AST10 and ATF formalize\n- [validator explanation pattern](validator-explanation-pattern.md) \u2014 SHACL validation as governance mechanism", "concepts/sssom-mapping-as-context": "# SSSOM Mapping as Skill Bundle Context\n\n## What is SSSOM?\n\nThe [sssom mapping protocol](../examples/sssom-mapping-protocol.md) (Simple Standard for Sharing Ontological Mappings) is a community standard for sharing mappings between ontology terms in a machine-readable format. It provides a standardized way to say \"Term A in Ontology X is equivalent to Term B in Ontology Y.\"\n\n## SSSOM Implementations in Our Catalog\n\nAs of 2026-05-25 (Iteration 10), we have **4 SSSOM-relevant examples**:\n\n| # | Implementation | Role | SSSOM Usage |\n|---|---|---|---|\n| 1 | [sssom mapping protocol](../examples/sssom-mapping-protocol.md) | Specification | Defines the standard itself |\n| 2 | [oxo2 sssom mapping service](../examples/oxo2-sssom-mapping-service.md) | Production Service | Downloads, converts, serves SSSOM mappings via REST |\n| 3 | [onto llm mapping](../examples/onto-llm-mapping.md) | Mapping Generator | Multi-stage LLM pipeline outputs SSSOM format |\n| 4 | [open ontologies paper](../examples/open-ontologies-paper.md) | Alignment Algorithm | Stable matching for ontology alignment (related standard) |\n\n## SSSOM as a Context Element\n\nSSSOM can serve as a **formal context element** in skill bundles in several ways:\n\n### 1. Cross-Ontology Skill Discovery\nSkills that work across multiple ontologies can use SSSOM mappings to discover equivalent concepts. Example: a skill that maps disease terminologies (SNOMED CT \u2192 ICD-10) using SSSOM as the translation layer.\n\n### 2. Mapping Validation\nSkills can validate their outputs against SSSOM-compliant mappings, ensuring that any terminology transformations are standards-compliant. This is analogous to how [shacl 1 2 spec](../examples/shacl-1-2-spec.md) validates RDF graphs.\n\n### 3. Knowledge Graph Integration\nSSSOM mappings enable skills to integrate with existing knowledge graphs (e.g., Uberon for anatomy, MeSH for medical subjects) without hardcoding term correspondences. [oxo2 sssom mapping service](../examples/oxo2-sssom-mapping-service.md) demonstrates this at production scale.\n\n### 4. LLM-Assisted Mapping Generation\n[onto llm mapping](../examples/onto-llm-mapping.md) shows that LLMs can generate SSSOM mappings through a multi-stage pipeline:\n```\nExpand \u2192 Vectorize \u2192 Retrieve \u2192 Rank \u2192 Format as SSSOM\n```\nThis pattern could be packaged as a skill bundle: a \"mapping skill\" with LLM prompts, vector search, and SSSOM output generation.\n\n## Why SSSOM Coverage Matters\n\nThe SSSOM category was previously our weakest (only 2 examples). With OxO2 and Onto-LLM-Mapping, we now have a **complete lifecycle**:\n- **Define**: SSSOM specification\n- **Generate**: Onto-LLM-Mapping pipeline\n- **Serve**: OxO2 production service\n- **Align**: Open Ontologies alignment algorithms\n\nThis positions SSSOM as a mature context element type, comparable to our stronger categories like SHACL Validation (7 examples) and Ontology/Taxonomy (8 examples).\n\n## Research Questions\n1. Can SSSOM mappings be used to automatically discover which skills should work together?\n2. Is there a pattern where SSSOM mappings define the \"vocabulary\" that a skill bundle operates on?\n3. How does SSSOM relate to the [sssom mapping protocol](../examples/sssom-mapping-protocol.md)'s own mapping justification standard?", "concepts/three-layer-validation-stack": "# Three-Layer Validation Stack for Skill Bundles\n\n**Date Added:** 2026-06-01 (Iteration 13)\n**Confidence:** 9/10\n\n## Definition\n\nA **three-layer validation stack** is the emerging pattern where skill bundles are validated at three different points in the lifecycle, by three different tools, each with a different scope and threat model:\n\n| Layer | Where | Tool (catalog) | Scope | Cost |\n|---|---|---|---|---|\n| **1. Pre-commit** | Local dev, before commit | [skill validator cli](../examples/skill-validator-cli.md) (Go binary, 13 platform hooks) | Structure + content + contamination + link rot + LLM-as-judge | Seconds to minutes |\n| **2. CI/CD** | PR pipelines, GitHub Actions | [validate skill github action](../examples/validate-skill-github-action.md) (YAML Action) | Structure + spec compliance + reference checking | < 1 second |\n| **3. Registry** | Marketplace / install time | [agentskill sh ags security scoring](../examples/agentskill-sh-ags-security-scoring.md) (12-category threat scan) | Security (12 threat categories) + content SHA versioning + quality rating | Continuous |\n\n## Why This Pattern Matters\n\nEach layer catches what the others miss:\n\n- **Pre-commit (CLI)** catches deep quality issues (LLM-as-judge scoring on clarity/actionability/novelty, contamination detection, link rot) but is opt-in and requires local install.\n- **CI/CD (Action)** catches structural regressions on every PR automatically but doesn't run LLM-as-judge and doesn't know about cross-skill threats.\n- **Registry (ags)** catches threats the skill author didn't intend (malicious payloads, supply chain attacks, social engineering) but only at install time and only for skills in the registry.\n\n## Composition With Other Catalog Bundles\n\n- **[owasp agentic skills top 10](../examples/owasp-agentic-skills-top-10.md)** \u2014 Defines *what* vulnerabilities to scan for at layer 3\n- **[agentic trust framework csa](../examples/agentic-trust-framework-csa.md)** \u2014 Defines the *maturity levels* each layer can achieve\n- **[mondoo agent skills security](../examples/mondoo-agent-skills-security.md)** \u2014 Provides skills-as-scanners that can plug into layer 1 or 2\n- **[purplebox supply chain security](../examples/purplebox-supply-chain-security.md)** \u2014 Defines the 6 supply chain attack vectors layer 3 must catch\n- **[nvidia verified agent skills](../examples/nvidia-verified-agent-skills.md)** \u2014 Provides the OpenSSF signing that supplements layer 3's hash-based provenance\n\n## Cross-Domain Analogy\n\nThis three-layer pattern is well-established in **software supply chain security**:\n\n| Software supply chain | Skill bundles |\n|---|---|\n| Pre-commit linters (eslint, golangci-lint) | skill-validator CLI |\n| CI/CD linters + scanners (CodeQL, Snyk) | Validate Skill GitHub Action |\n| Registry-level scanners (npm audit, Snyk DB) | agentskill.sh 12-category scanner |\n\nThe skill ecosystem is approximately 2-3 years behind the npm/PyPI ecosystem in terms of supply chain maturity, but the convergence on this three-layer pattern is clear.\n\n## Open Questions\n\n1. **Attestation chaining:** Can the three layers share a SLSA-style provenance attestation? (Currently they produce independent signals.)\n2. **Cross-platform consistency:** Layer 1 has 13 platform-specific hooks; do layers 2 and 3 cover the same platforms? (Layer 3 currently best-supported on Claude Code, others via CLI.)\n3. **Bundle-level validation:** All three layers validate individual skills \u2014 but skills in a bundle may interact. Bundle-level validation is an open problem.\n\n## Related Concepts\n- [skill bundle patterns](skill-bundle-patterns.md) \u2014 Foundation patterns\n- [skill security governance](skill-security-governance.md) \u2014 Why each layer exists\n- [sssom mapping as context](sssom-mapping-as-context.md) \u2014 Mappings as a form of validation\n- [constraint rules as context](constraint-rules-as-context.md) \u2014 Rules as a form of validation", "concepts/validator-explanation-pattern": "# Validator + Explanation Bundle Pattern\n\n**Date:** 2026-05-24 (Discovered Iteration 8)\n\n## Summary\n\nThe Validator + Explanation pattern addresses a fundamental problem: **validation reports alone are not actionable**. Technical validation output (e.g., SHACL violation reports) is too terse for humans to understand and act on. The pattern couples a validation engine with an explanation layer that converts failures into natural language guidance.\n\n## Core Components\n\n1. **Validation Engine** \u2014 Deterministic constraint checking (e.g., SHACL/pyshacl)\n2. **Explanation Generator** \u2014 LLM-based natural language synthesizer\n3. **Context Retriever** \u2014 RAG system that fetches relevant ontology fragments, shape documentation, similar cases\n4. **Violation Cache** \u2014 Signature-based storage (MD5 hash) of previously explained violations\n\n## Examples\n\n- **[xpshacl explainable shacl](../examples/xpshacl-explainable-shacl.md)** \u2014 Full implementation: pyshacl + justification trees + RAG + Violation KG. 99.48% cache hit rate across 868 vocabularies.\n- **[shacl data quality 69 metrics](../examples/shacl-data-quality-69-metrics.md)** \u2014 69 data quality metrics as SHACL shapes; prototype computes numerical quality scores from violations.\n\n## Why This Pattern Works\n\nThe key insight from xpSHACL is that **validation errors are highly repetitive**: only 12 unique violation signatures needed new LLM explanations for 145,910 total violations. A signature-based cache makes explainable validation practical \u2014 initial run costs ~65 seconds, subsequent runs ~20 seconds (vs. 4 seconds for raw validation).\n\n## Applicability to Skill Bundles\n\nAny skill that produces or consumes structured data can benefit from this pattern:\n1. Skill generates or modifies RDF/knowledge graph data\n2. SHACL validation runs against quality/structure shapes\n3. Violations are explained in natural language with actionable suggestions\n4. Repeated violations hit the cache, minimizing LLM API costs\n\n## Related Patterns\n\n- **[skill bundle patterns](skill-bundle-patterns.md)** \u2014 SHACL + Cypher Rules + Shadow Testing (GraphGuard OS)\n- [sssom mapping protocol](../examples/sssom-mapping-protocol.md) \u2014 SSSOM standard can be paired with explainable validation for multi-ontology scenarios", "concepts/verified-skill-governance": "# Verified Skill Governance Patterns\n\n**Date:** 2026-05-23\n**Type:** Concept article\n\n## Overview\n\nNVIDIA's Verified Agent Skills represent the most comprehensive example of formal governance in the skill bundle ecosystem. This concept article synthesizes the governance patterns found in [nvidia verified agent skills](../examples/nvidia-verified-agent-skills.md) and [nvidia skills repo](../examples/nvidia-skills-repo.md).\n\n## Governance Pyramid\n\n### Layer 1: Source Authenticity\n- OpenSSF Model Signing (OMS) creates cryptographic signatures\n- Covers every file in the skill directory\n- Verifiable locally via model_signing CLI\n- Trust anchor: nv-agent-root-cert.pem\n\n### Layer 2: Content Safety\n- **SkillSpector** scans for:\n  - Software risks: vulnerable dependencies, suspicious scripts\n  - Agent risks: hidden instructions, prompt injection, tool poisoning\n- Aligned with OWASP Top 10 for LLM/Agentic AI and MITRE ATLAS\n\n### Layer 3: Metadata Transparency\n- **SKILLCARD.yaml**: Machine-readable trust metadata\n- Includes: authorship, licensing, dependencies, limitations, data flow\n- Enables automated tooling to assess skill trustworthiness\n\n### Layer 4: Distribution Integrity\n- Automated sync pipeline (GitHub Actions)\n- Daily sync from product team repositories\n- Ensures published skills match verified sources\n\n## Comparison with Other Governance Approaches\n\n| Approach | Auth | Safety | Metadata | Distribution |\n|--|--|--|--|--|\n| NVIDIA Verified | OpenSSF signing | SkillSpector | SKILLCARD.yaml | GitHub Actions |\n| VS Code Copilot | Frontmatter schema | N/A | Frontmatter fields | Extensions |\n| OpenAI Codex | Scope hierarchy | N/A | openai.yaml config | Installer |\n| Anthropic Skills | Plugin marketplace | N/A | Frontmatter | Plugin system |\n\n## Implications for Skill Bundles\n\nThe NVIDIA governance model suggests a trajectory where skill bundles will need:\n1. **Provenance layer**: Cryptographic signatures to verify skill origin\n2. **Safety layer**: Automated scanning for agent-specific risks\n3. **Metadata layer**: Machine-readable trust information\n4. **Distribution layer**: Automated synchronization for freshness\n\nThis aligns with the broader trend toward formal context elements (SHACL, SSSOM) but applies them to skill distribution rather than semantic content.", "daily-digests/2026-05-23-iter6": "# Daily Digest \u2014 2026-05-23 (Iteration 6)\n\n## Focus of This Iteration\n- Major discovery phase with formal platform skill systems\n- NVIDIA Verified Agent Skills (governance, signing, scanning, skill cards)\n- OpenAI Codex Agent Skills (progressive disclosure, MCP dependencies)\n- VS Code Copilot Agent Skills (cross-platform standard, forked context)\n- RDF Ontologies skill (SHACL + SPARQL integration)\n- NVIDIA Skills Repository (140+ skills, 13 product areas)\n\n## New Sources Ingested (raw/2026-05-23/)\n1. **openai-codex-skills-docs.md** \u2014 Official Codex skills documentation\n2. **nvidia-verified-agent-skills.md** \u2014 NVIDIA capability governance blog post\n3. **vscode-agent-skills-docs.md** \u2014 VS Code Copilot agent skills documentation\n4. **rdf-ontologies-skill.md** \u2014 RDF/SHACL/SPARQL agent skill\n5. **nvidia-skills-repo.md** \u2014 NVIDIA public skills catalog\n\n## New Wiki Examples Added\n1. [openai codex skills](../examples/openai-codex-skills.md) \u2014 OpenAI's formal skill system with MCP dependency declarations\n2. [nvidia verified agent skills](../examples/nvidia-verified-agent-skills.md) \u2014 Gold standard for governance (signing, scanning, skill cards)\n3. [vscode copilot skills](../examples/vscode-copilot-skills.md) \u2014 Cross-platform implementation of agentskills.io\n4. [rdf ontologies skill](../examples/rdf-ontologies-skill.md) \u2014 SHACL + SPARQL integration (rare context element coverage)\n5. [nvidia skills repo](../examples/nvidia-skills-repo.md) \u2014 Large-scale multi-product catalog with governance infrastructure\n\n## New Concept Articles\n1. [verified skill governance](../concepts/verified-skill-governance.md) \u2014 Synthesized governance patterns from NVIDIA's approach\n\n## Key Observations (Iteration 6)\n- **NVIDIA's governance model is the most comprehensive** \u2014 OpenSSF signing, SkillSpector scanning, SKILLCARD.yaml metadata, automated sync pipeline\n- **Platform skill systems are maturing** \u2014 OpenAI (Codex), Microsoft (VS Code Copilot), Anthropic all implement the agentskills.io standard\n- **MCP dependency declarations** are emerging as a formal context element (skills declare external tool server requirements)\n- **SHACL appears in one new example** (RDF Ontologies skill) \u2014 still rare but present\n- **SSSOM still has zero examples** \u2014 no skill bundles use the SSSOM mapping standard\n\n## Updated Gap Analysis\n\n| Context Element | Status | Examples | Notes |\n|--|--|--|--|\n| **Rules / Authorization** | Strong | Veto, Tool-Use Firewall, NemoClaw | Best coverage; NemoClaw adds production sandboxing |\n| **Ontology / Taxonomy** | Strong | Ontologizer, RDF Ontologies, Open Ontologies MCP | RDF Ontologies adds SHACL integration |\n| **Governance / Verification** | **Strong (NEW)** | NVIDIA Verified, NVIDIA Skills Repo | OpenSSF signing, SkillSpector, SKILLCARD.yaml |\n| **YAML Configuration** | Strong | All platform skills (Codex, VS Code, Anthropic) | Standard across agentskills.io implementations |\n| **SHACL Validation** | Emerging | Schimatos, RDF Ontologies | Two examples now |\n| **MCP Dependencies** | Emerging | OpenAI Codex, NVIDIA | Skills declare external tool requirements |\n| **SSSOM Mapping** | None | 0 | Still no examples found |\n\n## Next Recommended Actions\n- Continue monitoring SSSOM + agent skills intersection\n- Investigate Open Ontologies MCP server (fabio-rovai/open-ontologies) \u2014 SHACL validation built-in\n- Explore SkillsMP marketplace for additional bundle examples\n- Consider creating a \"governance taxonomy\" concept article\n\n## Linked Examples\n\n- [Agent Skills Specification](../examples/agent-skills-spec.md)\n- [Agentic Engineering Workflow Skills](../examples/agentic-engineering-workflow-skills.md)\n- [DSPy Agent Skills Bundle: Production-Grade DSPy Optimization](../examples/dspy-agent-skills-bundle.md)\n- [NORA \u2014 Night Owl Research Agent](../examples/nora-gis-research-agent.md)\n- [Ontologizer \u2014 OpenClaw Ontology Skill](../examples/ontologizer-openclaw-ontology-skill.md)\n- [Open Ontologies \u2014 GitHub Repository (Rust MCP Server)](../examples/open-ontologies-github.md)\n- [Open Ontologies \u2014 Stable Matching Alignment Paper](../examples/open-ontologies-paper.md)\n- [OpenClaw PKB Skill](../examples/openclaw-pkb-skill.md)\n- [Schimatos \u2014 SHACL-based Knowledge Graph Editor](../examples/schimatos-shacl-knowledge-graph.md)\n- [Current State of Skill Bundles Research (May 2026)](../examples/skill-bundles-research-state.md)\n- [Tool-Use Firewall](../examples/tool-use-firewall.md)\n- [Veto \u2014 Authorization Kernel for AI Agents](../examples/veto-agent-authorization.md)", "daily-digests/2026-05-23-iter7-manual": "# Daily Digest \u2014 2026-05-23 (Manual Seed: SSSOM/Mapping)\n\n## Sources Added\n\n### 1. Open Ontologies Paper \u2014 Stable Matching Alignment\n- **URL:** https://arxiv.org/html/2605.09184v1\n- **Author:** Fabio Rovai (The Tesseract Academy, London)\n- **Type:** Peer-reviewed preprint with empirical benchmarks\n\n### 2. Open Ontologies GitHub Repository\n- **URL:** https://github.com/fabio-rovai/open-ontologies\n- **Type:** Production Rust MCP server (17,400 LOC, MIT license)\n\n## Key Findings\n\n### SSSOM/Mapping Gap \u2014 ADDRESSED\n\n**Open Ontologies** provides the first strong example in this catalog that combines agent skills with formal mapping/alignment. Key contributions:\n\n1. **Six-Signal Similarity Scoring:** Labels, properties, parents, instances, restrictions, neighborhood \u2014 closely mirrors SSSOM's approach to documenting mappings with provenance and confidence scores.\n\n2. **Stable Matching Breakthrough:** 1-to-1 assignment constraint is dominant \u2014 \"signal weights are irrelevant when stable matching is applied (F1 varies by <0.004), while removing stable matching drops F1 to 0.728.\" This is a fundamental insight for any skill bundle requiring cross-ontology mappings.\n\n3. **Tool-Access Advantage:** LLM + MCP Tools yields F1 = 0.717 (+264% vs paper best), while raw file access (Turtle syntax) degrades performance to F1 = 0.323 (-25% vs no file). This proves that mapping quality depends on access modality, not just signal weights.\n\n4. **Production Mapping Engine:** The `onto_align` tool implements the stable matching algorithm with LLM adjudication for ambiguous cases. This is a ready-made component that could be integrated into any agent skill bundle requiring SSSOM-style cross-ontology mapping.\n\n### Context Element Coverage Update\n\n| Context Element | Before | After |\n|----------------|--------|-------|\n| SSSOM Mapping | 0 | **1** (Open Ontologies) |\n| Alignment Algorithms | 0 | **1** (Stable matching) |\n| Cross-Ontology Mapping | 0 | **1** (32 standard ontologies + clinical crosswalks) |\n\n### Benchmarks\n\n- **OAEI Anatomy Track:** P=0.963, R=0.733, F1=0.832 (highest precision of any reported system)\n- **Reasoning Speed:** 15ms vs 24,490ms (HermiT) for 50,000 axioms \u2014 1,633x speedup\n- **OntoAxiom:** MCP Extraction F1 = 0.717, +264% vs paper best\n\n## Next Steps for Tomorrow's Run\n\n1. Search for additional SSSOM/mapping examples beyond Open Ontologies\n2. Investigate the formal SSSOM spec (https://mapping-commons.github.io/sssom/) for comparison\n3. Look for other ontology alignment tools (AML, LogMap, POMAP++) as supplementary mapping examples\n4. Explore whether Open Ontologies' `onto_align` could be used as a mapping skill in other bundles\n\n## Linked Examples\n\n- [Agent Skills Specification](../examples/agent-skills-spec.md)\n- [Agentic Engineering Workflow Skills](../examples/agentic-engineering-workflow-skills.md)\n- [DSPy Agent Skills Bundle: Production-Grade DSPy Optimization](../examples/dspy-agent-skills-bundle.md)\n- [NORA \u2014 Night Owl Research Agent](../examples/nora-gis-research-agent.md)\n- [NVIDIA Skills Repository \u2014 Multi-Product Catalog](../examples/nvidia-skills-repo.md)\n- [NVIDIA Verified Agent Skills \u2014 Governance & Verification](../examples/nvidia-verified-agent-skills.md)\n- [Ontologizer \u2014 OpenClaw Ontology Skill](../examples/ontologizer-openclaw-ontology-skill.md)\n- [Open Ontologies \u2014 GitHub Repository (Rust MCP Server)](../examples/open-ontologies-github.md)\n- [Open Ontologies \u2014 Stable Matching Alignment Paper](../examples/open-ontologies-paper.md)\n- [OpenAI Codex Agent Skills \u2014 Structured Skill System](../examples/openai-codex-skills.md)\n- [OpenClaw PKB Skill](../examples/openclaw-pkb-skill.md)\n- [RDF Ontologies Skill \u2014 SHACL + SPARQL Integration](../examples/rdf-ontologies-skill.md)\n- [Schimatos \u2014 SHACL-based Knowledge Graph Editor](../examples/schimatos-shacl-knowledge-graph.md)\n- [Current State of Skill Bundles Research (May 2026)](../examples/skill-bundles-research-state.md)\n- [Tool-Use Firewall](../examples/tool-use-firewall.md)\n- [Veto \u2014 Authorization Kernel for AI Agents](../examples/veto-agent-authorization.md)\n- [VS Code Copilot Agent Skills \u2014 Cross-Platform Standard](../examples/vscode-copilot-skills.md)", "daily-digests/2026-05-23": "# Daily Digest \u2014 2026-05-23 (Iteration 5)\n\n## Focus of This Iteration\n- Synthesis of findings across all previous iterations\n- Updated gap analysis\n- Creation of a \"Current State of Research\" document\n\n## Key Observations After 5 Iterations\n- Rules and governance layers are more mature than expected\n- Ontology integration is the second strongest area\n- SHACL and SSSOM remain very difficult to find in agent skill contexts\n\n## Updated Gap Analysis\n\n| Context Element       | Status     | Examples                     | Notes |\n|-----------------------|------------|------------------------------|-------|\n| Rules / Authorization | Moderate   | Veto, Tool-Use Firewall      | Best progress |\n| Ontology / Taxonomy   | Moderate   | Ontologizer, OpenClaw PKB    | Strong ecosystem signal |\n| SHACL Validation      | Low        | Schimatos (partial)          | Still limited |\n| SSSOM Mapping         | None       | 0                            | No examples found |\n| Security/Validation   | Emerging   | Agent Audit                  | Related but not core |\n\n## Phase 5 Notes\nNo new tooling scripts created in this iteration. The research suggests that future tooling should focus on detecting SHACL/SSSOM files in skill repositories.\n\n## Next Recommended Actions\n- Broaden search to academic papers on verified/safe agent tool use\n- Monitor MCP (Model Context Protocol) governance tools\n- Consider creating a dedicated skill for this research workflow\n\n## Linked Examples\n\n- [Agent Skills Specification](../examples/agent-skills-spec.md)\n- [Agentic Engineering Workflow Skills](../examples/agentic-engineering-workflow-skills.md)\n- [DSPy Agent Skills Bundle: Production-Grade DSPy Optimization](../examples/dspy-agent-skills-bundle.md)\n- [NORA \u2014 Night Owl Research Agent](../examples/nora-gis-research-agent.md)\n- [NVIDIA Skills Repository \u2014 Multi-Product Catalog](../examples/nvidia-skills-repo.md)\n- [NVIDIA Verified Agent Skills \u2014 Governance & Verification](../examples/nvidia-verified-agent-skills.md)\n- [Ontologizer \u2014 OpenClaw Ontology Skill](../examples/ontologizer-openclaw-ontology-skill.md)\n- [Open Ontologies \u2014 GitHub Repository (Rust MCP Server)](../examples/open-ontologies-github.md)\n- [Open Ontologies \u2014 Stable Matching Alignment Paper](../examples/open-ontologies-paper.md)\n- [OpenAI Codex Agent Skills \u2014 Structured Skill System](../examples/openai-codex-skills.md)\n- [OpenClaw PKB Skill](../examples/openclaw-pkb-skill.md)\n- [RDF Ontologies Skill \u2014 SHACL + SPARQL Integration](../examples/rdf-ontologies-skill.md)\n- [Schimatos \u2014 SHACL-based Knowledge Graph Editor](../examples/schimatos-shacl-knowledge-graph.md)\n- [Current State of Skill Bundles Research (May 2026)](../examples/skill-bundles-research-state.md)\n- [Tool-Use Firewall](../examples/tool-use-firewall.md)\n- [Veto \u2014 Authorization Kernel for AI Agents](../examples/veto-agent-authorization.md)\n- [VS Code Copilot Agent Skills \u2014 Cross-Platform Standard](../examples/vscode-copilot-skills.md)", "daily-digests/2026-05-24-iter9": "# Daily Digest \u2014 Skill Bundles Research\n\n**Date:** 2026-05-24 (Iteration 9)\n**Sources Ingested:** 9\n**New Wiki Examples Created:** 8\n**Concept Article Created:** 1\n**Wikilinks Verified:** 30 unique links, 1 broken link fixed\n\n---\n\n## Today's Sources\n\n| Source | Signal | Key Finding |\n|--------|--------|-------------|\n| GitHub: intertwine/dspy-agent-skills | 9/10 | DSPy 3.2.x skills bundle with 80 validation tests, committed benchmarks |\n| GitHub: ivanvza/dspy-skills | 9/10 | Python SDK integrating Agent Skills spec with DSPy ReAct, firejail sandbox |\n| GitHub: OmidZamani/dspy-skills | 8/10 | Comprehensive DSPy 3.1.2 skills across optimizers, architecture, debugging |\n| GitHub: obra/superpowers | 9/10 | Engineering discipline as skills \u2014 Iron Laws, Red Flags, methodology cycle |\n| Mondoo Blog: Security Analysis | 9/10 | 14 attack patterns, 25%+ vulnerable, ClawHavoc campaign, ransomware via skills |\n| GitHub: anthropics/skills | 10/10 | Official reference \u2014 spec, templates, production document skills (140k stars) |\n| GitHub: VoltAgent/awesome-agent-skills | 8/10 | 1000+ curated skills catalog \u2014 NVIDIA 155, Microsoft 133, security warnings |\n| GitHub: skillmatic-ai/awesome-agent-skills | 8/10 | Definitive resource \u2014 platforms, marketplaces, SkillsBench, Graph of Skills |\n| arXiv 2604.05333: Graph of Skills | 9/10 | Dependency-aware structural retrieval via DAG + PageRank for massive skill libraries |\n| arXiv 2602.12670: SkillsBench | 9/10 | First benchmark: +16.2pp avg improvement, Healthcare +51.9pp gain |\n| Claude API Skills Guide | 10/10 | Beta headers, container parameter, 8 skills/request, 30MB limit, version pinning |\n| Simon Willison: Claude Skills | 7/10 | Skills vs MCP analysis \u2014 \"bigger deal than MCP\" |\n\n## New Examples Added\n\n1. **[dspy agent skills bundle](../examples/dspy-agent-skills-bundle.md)** \u2014 Three-interoperable-repo DSPy expertise bundle with AST validation, orchestration skill, sandbox config\n2. **[superpowers engineering discipline skills](../examples/superpowers-engineering-discipline-skills.md)** \u2014 Iron Laws as constraint rules, methodology cycle, multi-host manifests\n3. **[mondoo agent skills security](../examples/mondoo-agent-skills-security.md)** \u2014 14-pattern attack taxonomy, ClawHavoc campaign docs, security posture mapping\n4. **[awesome agent skills catalogs](../examples/awesome-agent-skills-catalogs.md)** \u2014 Ecosystem mapping: 44k+ marketplace skills, platform matrix, quality standards\n5. **[graph of skills dependency retrieval](../examples/graph-of-skills-dependency-retrieval.md)** \u2014 DAG-based skill composition model, PageRank ranking, prerequisite resolution\n6. **[skillsbench agent skills benchmark](../examples/skillsbench-agent-skills-benchmark.md)** \u2014 Paired evaluation methodology, +16.2pp avg improvement, domain taxonomy\n7. **[claude api skills integration](../examples/claude-api-skills-integration.md)** \u2014 Official API contract: container param, version pinning, beta headers\n8. **[anthropic official skills repo](../examples/anthropic-official-skills-repo.md)** \u2014 Canonical reference: spec, templates, working production skills, dual licensing\n9. **[nemoclaw security scanner](../examples/nemoclaw-security-scanner.md)** \u2014 NVIDIA's LLM-assisted skill scanning (created to fix broken wikilink)\n\n## Concept Article Created\n\n- **[constraint rules as context](../concepts/constraint-rules-as-context.md)** \u2014 How skills encode prohibitions (Iron Laws, Red Flags, SHACL, crypto signing) as behavioral constraints\n\n## Patterns Discovered\n\n1. **Orchestration via Meta-Skill**: `dspy-advanced-workflow` skill activates and sequences other skills \u2014 a dependency-ordered bundle pattern that GoS formalizes theoretically.\n2. **Constraint Rules as First-Class Context**: Superpowers' Iron Laws and Red Flags show that skills can encode *prohibitions*, not just procedures. This expands the context element taxonomy beyond validation to behavioral constraints.\n3. **Dependency Graph for Bundle Composition**: Graph of Skills (GoS) provides the first formal model showing that skill dependencies form DAGs that must be resolved \u2014 this explains *why* orchestrator skills work and provides an algorithmic approach.\n4. **Paired Evaluation for Bundle Quality**: SkillsBench introduces the delta metric (with-skills vs without-skills) \u2014 the first quantitative way to assess individual bundle effectiveness.\n5. **Security Ecosystem Maturity**: Mondoo reveals 25%+ vulnerability rate + 14 attack patterns \u2014 security context elements (scanning, signing, verification) are the most critical gap.\n\n## Gap Analysis\n\n| Context Element | Before | After | Change |\n|-----------------|--------|-------|--------|\n| Validation/Testing | 6 | 7 | +1 (DSPy AST validation) |\n| Constraint Rules | 0 | 6 | **New category** (Iron Laws, Red Flags, SHACL, crypto, authorization) |\n| Dependency Graph | 0 | 2 | **New category** (GoS, GraphGuard OS) |\n| Benchmark/Scoring | 0 | 1 | **New category** (SkillsBench) |\n| Marketplace/Registry | 0 | 2 | **New category** (awesome-lists, agentskill.sh) |\n| SSSOM Mapping | 2 | 2 | Unchanged |\n\n## Wikilink Audit\n- 30 unique wikilinks across all wiki files\n- 1 broken link found: `[nemoclaw security scanner](../examples/nemoclaw-security-scanner.md)` \u2192 fixed, created `[nemoclaw security scanner](../examples/nemoclaw-security-scanner.md)`\n- All 30 links resolve after fix\n\n## Tomorrow's Priority Searches\n\n1. SSSOM mapping tools/in-use implementations (beyond spec + algorithm)\n2. MITRE ATT&CK cyber skills bundle details\n3. Skills that wrap/encapsulate MCP servers (dual-pattern bundles)\n4. Skill provenance systems beyond GitHub CLI and NVIDIA signing\n5. Ontology alignment tools beyond Open Ontologies (LogMap, AgreementMaker)\n\n## Linked Examples\n\n- [Claude Skills Ecosystem \u2014 1,116 Skills from 500+ Repos](../examples/claude-skills-ecosystem-1116.md)\n- [GitHub CLI Agent Skills Management (`gh skill`)](../examples/github-cli-skill-management.md)\n- [GraphGuard OS \u2014 Guardrails for Coordinating AI Agents via Knowledge Graph](../examples/graphguard-os-guardrails.md)\n- [SHACL 1.2 Core Specification \u2014 W3C Standard](../examples/shacl-1-2-spec.md)\n- [SHACL 1.2 Data Quality Assessment \u2014 69 Metrics as Shapes](../examples/shacl-data-quality-69-metrics.md)\n- [SSSOM Protocol \u2014 Simple Standard for Sharing Ontological Mappings](../examples/sssom-mapping-protocol.md)\n- [xpSHACL \u2014 Explainable SHACL Validation with RAG and LLMs](../examples/xpshacl-explainable-shacl.md)\n\n## Q&A\n\n- [Complex Q&A \u2014 Skill Bundles Wiki](../qa/2026-05-24-complex-qa.md)\n- [Q&A and Gap Analysis \u2014 2026-05-24 Iteration 9](../qa/2026-05-24-iter9-qa.md)", "daily-digests/2026-05-24": "# Daily Digest \u2014 Skill Bundles Research\n\n**Date:** 2026-05-24 (Iteration 8)\n**Sources Ingested:** 9\n**New Wiki Examples Created:** 6\n**Concept Article Updated:** 1\n\n---\n\n## Today's Sources\n\n| Source | Signal | Key Finding |\n|------|------|------|\n| GitHub Blog: gh skill CLI | 9/10 | Package-manager semantics for agent skills, supply chain integrity |\n| W3C SHACL 1.2 Core | 9/10 | Latest SHACL spec, foundational for validation bundles |\n| xpSHACL (arXiv 2507.08432) | 9/10 | Explainable validation + Violation KG (99.48% cache hit rate) |\n| GraphGuard OS (Medium) | 8/10 | SHACL + Cypher guardrails + Shadow Policy Manager |\n| OpenAI Codex Developer Skills | 9/10 | Progressive disclosure, MCP dependency declarations, context budget |\n| Claude Skills Ecosystem (1,116) | 8/10 | 754 cybersecurity skills mapped to MITRE/NIST taxonomy |\n| SSSOM Mapping Commons | 9/10 | The SSSOM standard for ontology mappings + Python toolkit |\n| SHACL Data Quality Paper (arXiv 2507.22305) | 9/10 | 69 data quality metrics mapped to SHACL shapes |\n| Going Meta: Agent Skills for Ontologies | 5/10 | Video source: agent skills for ontology work |\n\n## New Examples Added\n\n1. **[graphguard os guardrails](../examples/graphguard-os-guardrails.md)** \u2014 SHACL + Cypher rules + Shadow Policy Manager for agent guardrails\n2. **[xpshacl explainable shacl](../examples/xpshacl-explainable-shacl.md)** \u2014 Explainable SHACL validation with RAG and Violation KG caching\n3. **[github cli skill management](../examples/github-cli-skill-management.md)** \u2014 Supply chain security and cross-platform skill distribution\n4. **[shacl data quality 69 metrics](../examples/shacl-data-quality-69-metrics.md)** \u2014 69 data quality metrics as SHACL shapes\n5. **[sssom mapping protocol](../examples/sssom-mapping-protocol.md)** \u2014 SSSOM standard for ontology term mappings\n6. **[claude skills ecosystem 1116](../examples/claude-skills-ecosystem-1116.md)** \u2014 Comprehensive Claude skills ecosystem survey\n\n## Patterns Discovered\n\n1. **Validation + Explainability Bundle**: xpSHACL shows SHACL validation paired with RAG explanations and a Violation KG cache makes validation actionable, not just technical.\n2. **Guardrails via Interceptor**: GraphGuard OS uses SHACL + Cypher as external deterministic constraints that LLMs cannot bypass through prompt engineering.\n3. **Supply Chain Maturity**: `gh skill` introduces package-manager semantics (install, update, pin, publish) \u2014 the ecosystem is maturing.\n4. **Taxonomy at Scale**: 754 cybersecurity skills organized by MITRE/NIST frameworks \u2014 taxonomy-driven bundles beyond formal ontologies.\n\n## Gap Analysis Update\n\n| Context Element | Before | After | Change |\n| SHACL Validation | 3 | 6 | +3 (strong growth) |\n| SSSOM Mapping | 1 | 2 | +1 (SSSOM spec added) |\n| Supply Chain/Provenance | 0 | 2 | +2 (new category) |\n| Rules/Authorization | 4 | 5 | +1 (GraphGuard Cypher policies) |\n| Governance/Verification | 3 | 4 | +1 (gh skill publishing) |\n\n## Tomorrow's Priority Searches\n\n1. \"SSSOM agent skills\" OR \"SSSOM mapping tool\" MCP implementation\n2. \"MITRE ATT&CK agent skills\" OR \"NIST cybersecurity skills\" bundle details\n3. SHACL + rules engine for non-semantic domains\n4. Skill provenance tracking systems beyond GitHub CLI\n5. Ontology alignment tools beyond Open Ontologies (e.g., LogMap, AgreementMaker)\n\n## Linked Examples\n\n- [SHACL 1.2 Core Specification \u2014 W3C Standard](../examples/shacl-1-2-spec.md)\n\n## Q&A\n\n- [Complex Q&A \u2014 Skill Bundles Wiki](../qa/2026-05-24-complex-qa.md)\n- [Q&A and Gap Analysis \u2014 2026-05-24 Iteration 9](../qa/2026-05-24-iter9-qa.md)", "daily-digests/2026-05-25": "# Daily Digest \u2014 Skill Bundles Research\n\n**Date:** 2026-05-25 (Iteration 10)\n**Sources Ingested:** 7\n**New Wiki Examples Created:** 6\n**Concept Article Created:** 1\n**Wikilinks Verified:** All links resolve\n\n---\n\n## Today's Sources\n\n| Source | Signal | Key Finding |\n|--------|--------|-------------|\n| EBISPOT/OxO2 CLAUDE.md | 9/10 | SSSOM-compliant mapping service with agent context docs |\n| intertwine/dspy-agent-skills v0.2.3 | 9/10 | DSPy 3.2.x update with GEPA benchmarks |\n| PurpleBox Security Blog | 9/10 | Supply chain attack taxonomy: 12% marketplace infection rate |\n| Ylang Labs: Agent Skills Overview | 8/10 | Definitive \"recipes vs kitchen\" metaphor for Skills vs MCP |\n| cns-iu/onto-llm-mapping | 9/10 | SSSOM mapping generator via LLM+RAG pipeline |\n| VoltAgent/awesome-openclaw-skills | 8/10 | 179 CLI skills catalog with implicit security/memory bundles |\n\n## New Examples Added\n\n1. **[oxo2 sssom mapping service](../examples/oxo2-sssom-mapping-service.md)** \u2014 SSSOM-compliant ontology mapping service from EMBL-EBI with CLAUDE.md agent context\n2. **[dspy agent skills v023](../examples/dspy-agent-skills-v023.md)** \u2014 Updated DSPy 3.2.x bundle with GEPA optimization benchmarks (+19.53 pp improvement)\n3. **[purplebox supply chain security](../examples/purplebox-supply-chain-security.md)** \u2014 Supply chain risk analysis: 6-vector attack taxonomy, CVE-2026-25253 (CVSS 8.8)\n4. **[onto llm mapping](../examples/onto-llm-mapping.md)** \u2014 SSSOM mapping generator via multi-stage LLM pipeline (expand \u2192 vector \u2192 retrieve \u2192 rank \u2192 SSSOM)\n5. **[awesome openclaw skills catalog](../examples/awesome-openclaw-skills-catalog.md)** \u2014 179 CLI utilities catalog with implicit security/memory/development bundles\n6. **[ylang labs agent skills overview](../examples/ylang-labs-agent-skills-overview.md)** \u2014 Foundational Agent Skills reference with three-level progressive disclosure\n\n## Concept Article Created\n\n- **[sssom mapping as context](../concepts/sssom-mapping-as-context.md)** \u2014 SSSOM as a first-class context element, with lifecycle: Define \u2192 Generate \u2192 Serve \u2192 Align\n\n## Patterns Discovered\n\n1. **SSSOM Lifecycle Complete**: We now have all four lifecycle stages \u2014 spec (SSSOM), generator (Onto-LLM), server (OxO2), aligner (Open Ontologies). SSSOM coverage rises from 2 to 4 examples.\n2. **Security Defense Mapping**: PurpleBox's 6-vector attack taxonomy maps directly to existing catalog entries \u2014 each attack vector has a corresponding defense skill bundle (signing \u2192 NVIDIA, scanning \u2192 NemoClaw, sandboxing \u2192 GraphGuard, etc.).\n3. **Implicit Bundle Discovery**: The awesome-openclaw-skills catalog reveals that bundles can be *discovered* by grouping skills across categories (4+ security skills = implicit security bundle), not just explicitly declared.\n4. **Agent Context as Documentation**: OxO2's CLAUDE.md + CONTEXT.md + ADR pattern shows that agent instructions can be treated as living documentation \u2014 a formal context artifact that compounds with code changes.\n\n## Gap Analysis Update\n\n| Context Element | Before | After | Change |\n|-----------------|--------|-------|--------|\n| SSSOM Mapping | 2 | 4 | +2 (OxO2, Onto-LLM \u2014 lifecycle complete!) |\n| Agent Context Docs | 0 | 2 | +2 (OxO2 CLAUDE.md, Ylang Labs spec) |\n| Security Taxonomy | 3 | 5 | +2 (PurpleBox taxonomy, OpenClaw security subset) |\n| Catalog/Taxonomy | 3 | 5 | +2 (OpenClaw 179, PurpleBox 6-vector) |\n\n## Tomorrow's Priority Searches\n\n1. Agent skills marketplace implementation details (skillsmp.com, agensi.io)\n2. SSSOM + MCP server integration patterns\n3. OpenClaw skill metadata specification (formal context elements)\n4. Skill versioning and dependency resolution (beyond GoS)\n5. Agent security certification frameworks (post-ClawHavoc)", "daily-digests/2026-05-26": "# Daily Digest \u2014 Skill Bundles Research\n\n**Date:** 2026-05-26 (Iteration 11)\n**Sources Ingested:** 7\n**New Wiki Examples Created:** 6\n**Concept Article Created:** 1\n**Wikilinks Verified:** All links resolve\n\n---\n\n## Today's Sources\n\n| Source | Signal | Key Finding |\n|--------|--------|-------------|\n| OWASP Agentic Skills Top 10 (AST10) | 10/10 | First dedicated security risk framework for agent skills; 36.8% flaw rate, 10-class taxonomy, Universal Skill Format |\n| Agentic Trust Framework (CSA) | 9/10 | Zero Trust governance framework with 4-level maturity model and 5 promotion gates |\n| arXiv:2602.12430 Agent Skills Survey | 9/10 | First comprehensive academic survey; 26.1% vulnerability rate; architecture+security+acquisition+deployment |\n| Microsoft Agent Framework Skills | 9/10 | Enterprise-grade implementation: 3 types (file, inline, class), script approval, DI, multi-source |\n| Spring AI Generic Agent Skills | 8/10 | First Java ecosystem implementation; LLM-agnostic; 3-core-tool architecture |\n| Chris Ayers Plugin Ecosystem | 9/10 | 3-layer model (Skills \u2192 Plugins \u2192 Marketplaces); cross-tool compatibility matrix; SKILL.md universal |\n| Agensi Marketplace Landscape | 8/10 | 8 marketplace comparison; 6.3 issues/skill avg; 36% prompt injection rate; consolidation trends |\n\n## New Examples Added\n\n1. **[owasp agentic skills top 10](../examples/owasp-agentic-skills-top-10.md)** \u2014 First dedicated security risk framework: AST01\u2013AST10 taxonomy, Lethal Trifecta risk model, Universal Skill Format with permissions and signatures\n2. **[agentic trust framework csa](../examples/agentic-trust-framework-csa.md)** \u2014 Cloud Security Alliance's Zero Trust governance: 4-level maturity model (Intern\u2192Principal), 5 promotion gates, compliance mapping to SOC2/ISO27001/NIST/EU AI Act\n3. **[arxiv agent skills survey](../examples/arxiv-agent-skills-survey.md)** \u2014 First comprehensive academic survey (2602.12430): 4-axis analysis, 26.1% vulnerability finding, definitive Skills vs MCP formal distinction\n4. **[microsoft agent framework skills](../examples/microsoft-agent-framework-skills.md)** \u2014 Enterprise implementation: file/code/class-based skills, DI support, script approval gating, 4-stage progressive disclosure API\n5. **[spring ai agent skills](../examples/spring-ai-agent-skills.md)** \u2014 Java ecosystem implementation: 3-core-tool architecture, LLM-agnostic, Claude Code compatible\n6. **[chris ayers plugin ecosystem](../examples/chris-ayers-plugin-ecosystem.md)** \u2014 3-layer distribution model (Skills \u2192 Plugins \u2192 Marketplaces); cross-tool compatibility proving SKILL.md is the universal portable unit\n\n## Concept Article Created\n\n- **[skill security governance](../concepts/skill-security-governance.md)** \u2014 Synthesis of 4 converging frameworks (OWASP AST10, ATF, empirical evidence, technical controls) forming a complete governance stack for skill bundle security\n\n## Patterns Discovered\n\n1. **Security Governance Maturation (Step-Change):** Between Iteration 10 and 11, the catalog moved from scattered security advice to two formal governance frameworks (AST10, ATF) plus one academic survey validating scope \u2014 a qualitative shift from empiricism to formalization\n2. **SKILL.md as Universal Portable Unit:** Chris Ayers' cross-tool compatibility matrix confirms SKILL.md works identically across 5 major tools (Copilot CLI, VS Code, Claude Code, Codex CLI, Gemini CLI) \u2014 this is the strongest portability evidence yet\n3. **Enterprise Adoption Acceleration:** Microsoft and Spring AI both shipping production-grade Agent Skills implementations signals enterprise readiness \u2014 DI support, script approval, versioning, and multi-source composition are now first-class features\n4. **Marketplace Consolidation Begins:** 8 marketplaces \u2192 predicted 3-4 by Q4 2026; security scanning becoming a differentiator post-ClawHavoc; creator payments becoming table stakes\n\n## Gap Analysis Update\n\n| Context Element | Before | After | Change |\n|-----------------|--------|-------|--------|\n| Security/Governance Framework | 5 | 8 | +3 (OWASP AST10, ATF, arXiv survey \u2014 formalization!) |\n| Platform Implementation | 3 | 5 | +2 (Microsoft, Spring AI \u2014 enterprise grade!) |\n| Plugin/Distribution | 0 | 2 | +2 (Chris Ayers Plugins, Agensi Marketplace) |\n| Academic Survey | 0 | 1 | +1 (arXiv survey \u2014 first!) |\n| Universal Skill Format | 0 | 1 | +1 (OWASP proposed format) |\n\n## Tomorrow's Priority Searches\n\n1. OWASP AST10 AST01-AST06 detailed write-ups (due Q2 2026)\n2. Actual marketplace consolidation events (acquisitions, shutdowns)\n3. NVIDIA SkillSpector and OpenSSF signing implementation details\n4. A2A (Agent-to-Agent) protocol specification and skill integration\n5. Skill dependency resolution at scale (beyond Graph of Skills)\n6. Snowflake Cortex Code and Databricks Genie Code skill implementations", "daily-digests/2026-05-28": "# Daily Digest: 2026-05-28 \u2014 Skill Bundles Research\n\n## New Sources Ingested\n- Agent Skills standard (agentskills.io, Anthropic engineering post): Major discovery of open skill format with SKILL.md bundles including metadata, instructions, scripts. High alignment with skill bundle concept.\n\n## Key Patterns Surfaced\n- Progressive disclosure as a core composition pattern for efficient skill loading.\n- Cross-platform portability emerging as key requirement for bundles.\n\n## Bundles Documented\n- None new in wiki today (discovery phase focus); prepared raw for integration.\n\n## Gaps Identified\n- Still limited examples combining Agent Skills with formal context like SHACL shapes or SSSOM mappings. Next searches should target semantic web + agent skills intersections.\n\n## Metrics Update\n- Raw directories: +1 (2026-05-28)\n- Focus shift: Agent Skills ecosystem as primary bundle example source.\n\n## Next Actions\n- Ingest more from GitHub repos (anthropics/skills, agentskills org)\n- Search for ontology/SHACL integrations with skills.\n\n**Run by:** Hermes cron job (2026-05-28)", "daily-digests/2026-06-01": "# Daily Digest: 2026-06-01 \u2014 Skill Bundles Research (Iteration 13)\n\n**Run by:** Hermes cron job (autonomous)\n**Date:** Monday, 2026-06-01\n\n## New Sources Ingested (5)\n\n1. **ai4curation/curation-skills** \u2014 Chris Mungall's ontology/biocuration skill bundle (7 skills, OAK/ROBOT/DOSDP/OBO Foundry tooling, used in production by Mondo, Cell Ontology, Uberon, EFO)\n2. **agent-ecosystem/skill-validator** \u2014 Go CLI validator with 7 lifecycle-mapped commands, LLM-as-judge, contamination detection, pre-commit hooks for 13 platforms (151 stars)\n3. **agentskill-sh/ags** \u2014 `/learn` in-agent skill + CLI marketplace with 12-category threat taxonomy, 100k+ skills scanned, content-SHA versioning\n4. **Flash-Brew-Digital/validate-skill** \u2014 GitHub Action for SKILL.md spec compliance (the CI/CD layer of validation)\n5. **citiususc/text2shacl** \u2014 Multi-agent LangGraph pipeline for SHACL generation from natural-language requirements (Apache-2.0, 5 LLMs evaluated)\n\n## New Wiki Examples (5)\n\n- `wiki/examples/ai4curation-curation-skills.md` \u2014 Domain-specific skill pack for ontologies\n- `wiki/examples/skill-validator-cli.md` \u2014 Validation tooling, multi-platform\n- `wiki/examples/agentskill-sh-ags-security-scoring.md` \u2014 Security-scored marketplace\n- `wiki/examples/validate-skill-github-action.md` \u2014 CI/CD validator\n- `wiki/examples/text2shacl-multi-agent-shacl.md` \u2014 Bidirectional SHACL bridge (forward)\n\n## New Concepts (2)\n\n- `wiki/concepts/three-layer-validation-stack.md` \u2014 Pre-commit \u2192 CI/CD \u2192 Registry pattern\n- `wiki/concepts/bidirectional-shacl-llm-bridge.md` \u2014 Forward (text2shacl) + Reverse (xpSHACL) closed loop\n\n## Key Patterns Surfaced\n\n### 1. Three-Layer Validation Stack (NEW)\nThe skill ecosystem is converging on a three-layer validation architecture:\n- **Layer 1 (Pre-commit):** skill-validator CLI \u2014 deep quality + contamination + LLM-as-judge\n- **Layer 2 (CI/CD):** Validate Skill GitHub Action \u2014 structural spec compliance\n- **Layer 3 (Registry):** agentskill.sh 12-category security scanner\n\nThis mirrors the **software supply chain** three-layer pattern (linters \u2192 CI scanners \u2192 registry audits) and is approximately 2-3 years behind the npm/PyPI ecosystem in maturity. Three independent projects (skill-validator, validate-skill, ags) emerged in 2026 to fill these three layers, suggesting the pattern is now stable.\n\n### 2. Bidirectional SHACL \u2194 LLM Bridge\nWith text2shacl (forward) added, the catalog now has a complete bridge:\n- **Forward:** text2shacl turns natural-language requirements into SHACL shapes via multi-agent LangGraph pipeline with RAG\n- **Reverse:** xpSHACL turns SHACL shapes into natural-language explanations\n\nTogether they form a closed loop: requirements \u2192 shapes \u2192 validation \u2192 explanation \u2192 refined requirements. This makes SHACL accessible to non-RDF-experts.\n\n### 3. Ontology-Grounded Skill Bundles\nChris Mungall's `curation-skills` is the cleanest example in the catalog of skills operating on formal artifacts (OBO ontologies). The 7 skills (OAK, ROBOT, DOSDP, OBO editing, etc.) provide a natural-language interface to a sophisticated ontology toolkit. The OBO Foundry context (peer review, principled design, formal semantics) provides guardrails that prevent drift.\n\nThe `ai-blame` companion tool (line-level attribution for AI-assisted edits) is novel \u2014 it solves the \"what did the agent actually change?\" problem for ontology editing.\n\n### 4. Convergence on Security Threat Taxonomy\nThree independent projects ([nemoclaw security scanner](../examples/nemoclaw-security-scanner.md), [owasp agentic skills top 10](../examples/owasp-agentic-skills-top-10.md), [agentskill sh ags security scoring](../examples/agentskill-sh-ags-security-scoring.md)) all reference the same OpenClaw incident as motivation and have produced compatible threat taxonomies (10-class, 6-vector, 12-category \u2014 all cover the same core threats). The threat model is now well-defined.\n\n## Bundle Density Comparison (Top Examples)\n\n| Bundle | Skills | Context Elements | Distribution | Telemetry |\n|---|---|---|---|---|\n| agentskill-sh/ags | 3 (CLI + 2 skills) | 12-category threat model, 10-dim quality, content-SHA | npm + plugin + slash cmd | Auto-rate, 110k scans |\n| ai4curation/curation-skills | 7 skills | 5 ontologies, OAK/ROBOT/DOSDP vocab | plugin marketplace | None |\n| skill-validator | 1 CLI (7 commands) | Validation rules, content metrics, LLM-as-judge | homebrew + go + pre-commit | CLI exit codes |\n| text2shacl | 4-stage pipeline | 5 LLMs, 2 input versions, 2 merge strategies | Apache-2.0 source | results.csv + figures |\n| validate-skill | 1 Action | 12 validation rules | GitHub Marketplace | JSON output |\n\n## Gaps Identified\n\n1. **Bundle-level validation:** All three validation layers target individual skills, not bundles \u2014 bundle-level interaction effects are an open problem.\n2. **Attestation chaining:** The three validation layers produce independent signals \u2014 no SLSA-style provenance chain.\n3. **Cross-platform consistency:** Layer 1 (skill-validator) supports 13 platforms; layers 2 and 3 have narrower support.\n4. **Round-trip consistency for SHACL bridge:** No empirical test yet of \"text \u2192 shapes \u2192 text\" round-trip fidelity.\n\n## Tomorrow's Priority Searches\n\n1. **SLSA / in-toto attestation for skill bundles** \u2014 provenance chain across the three layers\n2. **Bundle-level interaction effects** \u2014 what happens when 2+ skills are installed together (any conflicts, version skew, privilege accumulation)\n3. **A2A (Agent-to-Agent) protocol skill integration** \u2014 explicitly listed in last week's priorities\n4. **SHACL round-trip evaluation studies** \u2014 empirical \"text \u2192 shapes \u2192 text\" fidelity\n5. **Mungall ai-blame** \u2014 full deep-dive (line-level attribution for AI-assisted ontology edits)\n\n## Metrics Update\n\n- **Raw sources:** 63 (was 58, +5)\n- **Wiki examples:** 45 (was 40, +5)\n- **Wiki concepts:** 8 (was 6, +2)\n- **Daily digests:** 10 (was 9, +1)\n- **New context element types:** \"Registry-level security scoring\" (NEW), \"Multi-agent SHACL generation\" (NEW)\n- **Bundle-density leader:** agentskill-sh/ags (12-category threat + 10-dim quality + content-SHA + auto-rate telemetry)\n\n## Run Statistics\n\n- **Sources discovered:** ~12 (web searches, browsed top 5)\n- **Sources ingested:** 5 (high-signal only)\n- **Wikilinks added:** ~40 (backlinks to existing catalog entries)\n- **Concepts created:** 2\n- **Quality bar:** All 5 examples have confidence scores, source attribution, and explicit cross-references to existing catalog entries\n\n## Linked Examples\n\n- [ai4curation/curation-skills \u2014 Ontology & Biocuration Skill Bundle](../examples/ai4curation-curation-skills.md)\n- [agent-ecosystem/skill-validator \u2014 CLI Validator + LLM-as-Judge](../examples/skill-validator-cli.md)\n- [citiususc/text2shacl \u2014 Multi-Agent LangGraph Pipeline for SHACL Generation](../examples/text2shacl-multi-agent-shacl.md)\n- [Flash Brew Digital \"Validate Skill\" \u2014 GitHub Action for SKILL.md Spec Compliance](../examples/validate-skill-github-action.md)\n\n## Q&A\n\n- [Complex Q&A \u2014 2026-06-01 (Iteration 13)](../qa/2026-06-01-iter13-qa.md)", "daily-digests/2026-06-02": "# Daily Digest \u2014 2026-06-02\n\n**Sources ingested:** 3 (agentskills.io overview, addyosmani/agent-skills, anthropics/skills)\n\n**Key findings:**\n- Strong momentum in Agent Skills ecosystem: official spec at agentskills.io, major repos from Anthropic (145k stars) and community leaders like addyosmani (47.7k stars).\n- Skill bundles are defined as portable folders with SKILL.md + optional scripts/references/assets.\n- Production examples: 23 engineering lifecycle skills in addyosmani/agent-skills (spec/plan/build/test/review/ship phases + personas).\n- Anthropic's skills/ provide reference implementations for document production (docx/pdf/pptx/xlsx).\n- No direct SHACL/SSSOM examples surfaced in today's searches, but ontology skills video and survey papers indicate emerging taxonomy work.\n- Composition pattern observed: progressive disclosure + auto-activation + consistent anatomy (frontmatter + verification steps).\n\n**New research questions for tomorrow:**\n- Search for SHACL shapes or SSSOM mappings applied to agent skill definitions or skill catalogs.\n- Look for skill bundles that include formal validation (SHACL), mapping (SSSOM), or ontology layers.\n\n**Wiki updates:** Created raw/2026-06-02/ with 3 sources. Daily digest generated. (Wiki/examples and concepts updates deferred to next iteration if no deeper context elements found.)\n\n**Metrics note:** Added 3 new high-signal sources today. Cumulative documented bundles remain focused on core spec + engineering bundles.", "daily-digests/2026-06-03": "# Daily Digest 2026-06-03: Agent Skills Discovery\n\n**Sources ingested:** 3 new high-signal sources in raw/2026-06-03/\n\n1. **addyosmani/agent-skills** (https://github.com/addyosmani/agent-skills)\n   - 23 production-grade e
