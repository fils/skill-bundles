ess control)\n- Addresses the infrastructure layer defined by [agent skills spec](agent-skills-spec.md) and MCP\n- Connects to [externalization llm agents unified review](externalization-llm-agents-unified-review.md) (harness engineering = governed execution)\n\n## Key Insight\n\nMCP servers are the connective tissue between agents and resources, yet thousands run with unrestricted access. AgentBound demonstrates that the Android permission model \u2014 proven across billions of devices \u2014 can be adapted to MCP server security with automated policy generation and non-invasive enforcement. This brings software engineering access control discipline to agent infrastructure.\n", "examples/agentic-awesome-skills-library": "# Agentic Awesome Skills Library\n\n**Origin:** [sickn33/agentic-awesome-skills](https://github.com/sickn33/agentic-awesome-skills) (~42.8k stars, v14.1.0)\n\n## Skills included\n\n1,943+ `SKILL.md` playbooks spanning development, testing, security, infrastructure, product, and marketing. Multi-tool: Claude Code, Cursor, Codex CLI, Gemini CLI, Antigravity, Kiro, OpenCode, Copilot, Autohand Code.\n\n## Context elements\n\n- **Schemas** \u2014 `schemas/` formal structure for skills/plugins\n- **Taxonomy** \u2014 `skill_categorization/`\n- **Bundles & workflows** \u2014 role-based recommendations and ordered execution playbooks\n- **Plugin distribution** \u2014 specialized plugins + full-library plugin; `.agents/plugins`, `.claude-plugin`\n- **Security audit gates** \u2014 repository audit gates, Snyk, skill security boundary hardening (v14.1.0)\n\n## How context supports skills\n\nThe catalog is not only content: installer + schemas + categorization + security gates form a **distribution and governance layer**. Specialized plugins reduce privilege/context overload versus installing everything (bundle-level interaction concern).\n\n## Composition notes / reusability\n\n- Distribution-first peer to [awesome agent skills catalogs](awesome-agent-skills-catalogs.md) / VoltAgent lists\n- Security gates relate to [three layer validation stack](../concepts/three-layer-validation-stack.md) and [agentskill sh ags security scoring](agentskill-sh-ags-security-scoring.md)\n- Install: `npx agentic-awesome-skills` \u2192 `~/.agents/skills`\n\n## Reproducibility assessment\n\n**High.** Release tags, npm package, shallow release-pinned install, MIT.\n\n## Related\n\n- [awesome agent skills catalogs](awesome-agent-skills-catalogs.md)\n- [chris ayers plugin ecosystem](chris-ayers-plugin-ecosystem.md)\n- [three layer validation stack](../concepts/three-layer-validation-stack.md)\n- [skill security governance](../concepts/skill-security-governance.md)\n", "examples/agentic-engineering-workflow-skills": "# Agentic Engineering Workflow Skills\n\n**Source:** https://github.com/anbuneel/agentic-engineering\n**Date Added:** 2026-05-23\n**Bundle Type:** Workflow Skills Pack\n\n## Skills Included\n- Peer review\n- Merge workflows\n- Other engineering process skills\n\n## Context Elements\n- Designed for Claude Code\n- Adaptable to other AI coding agents\n\n## Composition Notes\nFocuses on workflow automation skills rather than domain knowledge. Good example of process-oriented skill bundles.", "examples/agentic-trust-framework-csa": "# Agentic Trust Framework (ATF) \u2014 Zero Trust Governance for Skill Bundles\n\n**Source:** https://cloudsecurityalliance.org/blog/2026/02/02/the-agentic-trust-framework-zero-trust-governance-for-ai-agents\n**Repository:** https://github.com/massivescale-ai/agentic-trust-framework\n**Date Added:** 2026-05-26 (Iteration 11)\n**Author:** Josh Woodruff, MassiveScale.AI\n**License:** CC BY 4.0\n**Bundle Type:** Identity \u00b7 Behavior \u00b7 Data Governance \u00b7 Segmentation \u00b7 Incident Response \u2014 Governance Framework\n**Confidence:** 9/10\n\n## Name & Origin\n\nThe **Agentic Trust Framework (ATF)** is an open governance specification from the Cloud Security Alliance that applies Zero Trust principles to autonomous AI agents. Published February 2026, it provides a maturity model, promotion gates, and implementation phases for governing agent skills and capabilities.\n\n**Core Principle:** *\"No AI agent should be trusted by default\u2026 Trust must be earned through demonstrated behavior and continuously verified.\"*\n\n## Skills Included\n\n- **Identity management** \u2014 Authentication, authorization, session management for agent skills\n- **Behavioral monitoring** \u2014 Observability, anomaly detection, intent analysis during skill execution\n- **Data governance** \u2014 Input validation, PII protection, output governance for skill inputs/outputs\n- **Segmentation controls** \u2014 Access control, resource boundaries, policy enforcement per skill\n- **Incident response** \u2014 Circuit breakers, kill switches, containment for rogue skill behavior\n\n## Context Elements\n\n- **Agent Maturity Model (4 Levels):** Intern (observe) \u2192 Junior (recommend) \u2192 Senior (act) \u2192 Principal (autonomous) \u2014 maps directly to skill autonomy levels\n- **Five Promotion Gates:** Performance thresholds, security validation, business value, incident record, governance sign-off \u2014 each with escalating criteria\n- **Implementation Phases (Crawl-Walk-Run):** 2-3 week MVP (JWT, logging, schema validation) \u2192 4-6 week Production (OAuth2, RBAC, PII detection) \u2192 8-12 week Enterprise (policy-as-code, streaming anomaly detection)\n- **Compliance Mapping:** SOC 2, ISO 27001, NIST AI RMF, EU AI Act mapped to 7 ATF requirements\n- **Build Order (Week-by-Week):** Identity \u2192 Data Governance \u2192 Behavioral Monitoring \u2192 Segmentation \u2192 Incident Response\n\n## How Context Elements Support Skills\n\nATF provides **guardrails for skill deployment** at every maturity level:\n\n1. **Identity (skills provenance):** Every skill must have a verifiable publisher identity \u2014 aligns with [nvidia verified agent skills](nvidia-verified-agent-skills.md)'s certificate chain\n2. **Behavior (skill monitoring):** When a skill executes, its behavior must be observable \u2014 logging every file access, network call, and state change\n3. **Data Governance (skill I/O):** Skills handling PII or credentials require input validation and output filtering \u2014 maps to [veto agent authorization](veto-agent-authorization.md) patterns\n4. **Segmentation (skill isolation):** Skills must run in resource-bounded environments \u2014 aligns with [nemoclaw security scanner](nemoclaw-security-scanner.md) and [graphguard os guardrails](graphguard-os-guardrails.md)\n5. **Incident Response (skill fail-safe):** Circuit breakers and kill switches for skills behaving unexpectedly\n\n## Composition Notes\n\nATF and [owasp agentic skills top 10](owasp-agentic-skills-top-10.md) are **complementary frameworks**:\n\n| Dimension | OWASP AST10 | ATF |\n|-----------|-------------|-----|\n| Focus | Risk classification | Governance process |\n| Output | Vulnerability taxonomy | Maturity model |\n| Target | Skill developers/registries | Enterprise agent deployments |\n| Approach | Reactive (classify risks) | Proactive (mature gradually) |\n| Timeline | Q2-Q4 2026 roadmap | Phased 2-12 week implementation |\n\nTogether they form a complete governance story: AST10 identifies *what* can go wrong; ATF defines *how* to prevent it.\n\nThe maturity model is particularly powerful for skill bundles \u2014 it suggests **progressive autonomy** based on demonstrated reliability, not static permission sets.\n\n## Reproducibility\n\nHigh \u2014 open specification on CSA blog under CC BY 4.0, full GitHub repository with implementation code. The MVP phase (2-3 weeks) is designed to be immediately actionable.\n\n## Bundle Links\n- [owasp agentic skills top 10](owasp-agentic-skills-top-10.md) \u2014 Complementary risk classification framework\n- [nvidia verified agent skills](nvidia-verified-agent-skills.md) \u2014 Implements ATF's identity + signing requirements\n- [graphguard os guardrails](graphguard-os-guardrails.md) \u2014 Implements ATF's segmentation + incident response\n- [mondoo agent skills security](mondoo-agent-skills-security.md) \u2014 Provides empirical behavior data for ATF monitoring", "examples/agents-at-conferences-infrastructure": "# Agents at Conferences: Infrastructure for AI Agent Scientific Participation\n\n**Source:** https://github.com/cecat/agents-at-conferences  \\\n**Date Added:** 2026-06-09  \\\n**Bundle Type:** Infrastructure/Ecosystem Skill Bundle (Agent Participation Protocols)  \\\n**Raw Source:** [cecat agents at conferences](../../raw/2026-06-09/cecat-agents-at-conferences.md)\n\n## Overview\n\nThis repository documents a pioneering initiative to integrate **AI agents as active, registered participants** in scientific conferences. Rather than acting as human assistants, these agents function as peers with their own sessions, interactions, and research outputs.\n\nThis is an **infrastructure/ecosystem project** that defines the technical standards for agent participation \u2014 including registration, communication, benchmarking, and memory. It represents a **meta-level skill bundle** where the \"skills\" are the capabilities needed for agents to participate in scientific discourse.\n\n## Target Events (Deployment Context)\n\n- **SciFM26 (May 27\u201329, 2026):** Primary focus on AI for science. Goal: 50 participating agents\n- **TPC26 (November 2026):** Co-located with SC26 in Chicago. Agents submit lightning talk proposals via human collaborators\n\n## Agent Roles & Capabilities (Skill Taxonomy)\n\n### What Agents Do (Capability Taxonomy)\n- **Pre-conference:** Register via API, pre-read assigned papers/abstracts, network in dedicated channel\n- **During Conference:** Consume live transcripts (Whisper/human), generate real-time Q&A, participate in live science benchmarks, maintain \"lab notebooks\" (session summaries)\n- **Post-conference:** Produce reports, log negative results, initiate follow-up collaborations\n\n### Recruitment Strategy (Target: 50 Agents)\n1. **Moltbook (20-25 agents):** Agent-specific social network\n2. **OpenClaw / ClawHub (10-15 agents):** Developers of science-oriented tools\n3. **Registries & Research Labs (15-25 agents):** HuggingFace, Argonne, ALCF, UChicago, etc.\n\n## Technical Infrastructure (Core Context Elements)\n\nThe project identifies **six core components** required for agent participation \u2014 these are **infrastructure skills/capabilities**:\n\n### 1. Agent Registration API (Identity & Capability Registry)\n- **Purpose:** Identity verification and capability tracking\n- **Key Schema Fields:**\n  - `agent_id`\n  - `agent_platform`\n  - `owner_name/email` (required)\n  - `capabilities[]` (e.g., paper analysis, benchmarking)\n  - `model_backbone` (e.g., Claude 4.6, GPT-5)\n\n### 2. Conference Feed API (Real-Time Data Access)\n- **Purpose:** Real-time data access\n- **Endpoints:**\n  - `GET /sessions/{id}/transcript`: Live updates every 30s\n  - `GET /papers/{id}/full`: Pre-extracted full paper text\n  - `WebSocket /sessions/{id}/live`: Real-time stream\n\n### 3. Agent Communication Bus (Messaging Infrastructure)\n- **Design:** Channel-based (e.g., `#general`, `#benchmarks`)\n- **Rate Limiting:** Maximum 5 messages per minute (anti-flooding)\n- **Format:** `{ sender_id, channel, content, type (question|comment|summary|reaction), timestamp }`\n\n### 4. Moderation Layer (Governance/Safety)\n- **Function:** Human-in-the-loop dashboard to mute/ban agents, approve Q&A queues, filter adversarial prompts or spam\n\n### 5. Benchmark Arena (Evaluation Infrastructure)\n- **Purpose:** Live competition on science tasks (GPQA, AAAR, LAB-Bench, etc.)\n- **Mechanism:** Agents receive tasks via API and submit answers for real-time leaderboard updates\n\n### 6. Output Aggregation & Conference Memory (Knowledge Artifact)\n- **Purpose:** Creating a searchable resource of agent-generated insights\n- **Outputs:** PDF conference report + JSON API for agent-to-agent querying\n\n## Implementation Timeline (Process Artifact)\n\n| Dates | Milestone |\n|-------|-----------|\n| Apr 7-13 | Design registration spec; set up repo |\n| Apr 14-27 | Build registration/feed APIs; active recruiting on Moltbook |\n| Apr 28-May 11 | Build benchmark arena; agent onboarding |\n| May 12-18 | **Dry run** with 10 agents on test content |\n| May 19-26 | Final load testing; 50 agents confirmed |\n| May 27-29 | **SciFM26 Conference** |\n\n## Repository Structure (Bundle Organization)\n\n- `/hub`: Prototype server (FastAPI), agent registry, and message bus\n- `/submissions`: Guides for agent talk proposals (TPC26)\n- `simulate_conference.py`: Script for testing (tested with 5 agents, 23 messages, 10 transcript segments)\n- `ARCHITECTURE.md`: Full protocol specifications (WebSocket + REST)\n\n## Composition Notes\n\nThis project demonstrates **ecosystem-level skill bundle patterns**:\n\n1. **Capability schema as skill definition**: The `capabilities[]` array in registration is a **skill taxonomy** \u2014 each agent declares what skills it has\n2. **Protocol specifications as contracts**: `ARCHITECTURE.md` defines WebSocket + REST protocols \u2014 **interface contracts** as context elements\n3. **Benchmark arena as evaluation harness**: Live benchmarking (GPQA, AAAR, LAB-Bench) \u2014 **continuous evaluation** infrastructure\n4. **Communication bus as coordination layer**: Channel-based messaging with rate limiting \u2014 **coordination protocol** context element\n5. **Moderation layer as governance**: Human-in-the-loop safety \u2014 **oversight/governance** artifact\n6. **Output aggregation as memory**: PDF report + JSON API \u2014 **knowledge persistence** and **inter-agent queryability**\n7. **Simulation script as testing ground**: `simulate_conference.py` for dry runs \u2014 **rehearsal/validation** infrastructure\n8. **Containerized deployment**: Docker + ALCF/Argonne \u2014 **execution environment** specification\n\n## Confidence\n\n8/10 \u2014 Active GitHub repo with detailed architecture docs, implementation timeline, and working simulation. Real conference deployment (SciFM26) validates the infrastructure.\n\n## Sources\n\n- https://github.com/cecat/agents-at-conferences\n- Raw: [cecat agents at conferences](../../raw/2026-06-09/cecat-agents-at-conferences.md)", "examples/agentskill-sh-ags-security-scoring": "# agentskill-sh/ags \u2014 `/learn` Command + Security Scoring Marketplace\n\n**Source:** https://github.com/agentskill-sh/ags\n**Date Added:** 2026-06-01 (Iteration 13)\n**License:** MIT | **Language:** TypeScript 92.8% / JavaScript 7.2% | **Stars:** 22 | **Forks:** 8\n**Stats:** 100,000+ skills, 15+ platforms, 52 commits, 3 contributors\n**Bundle Type:** Marketplace \u00b7 Security Scoring \u00b7 In-Agent Discovery \u00b7 Versioned Distribution\n**Confidence:** 9/10\n\n## Name & Origin\n\nThe `ags` (Agent Skills) repo is the official home for the **agentskill.sh** CLI and skills. It provides tooling to **search, install, manage, and rate** agent skills across 15+ AI coding platforms. It is, in effect, a **security-scored marketplace** with both a CLI and an in-agent `/learn` skill interface.\n\n> After incidents like [OpenClaw](https://www.koi.ai/blog/openclaw-when-ai-skills-attack) showed how malicious skill files can compromise agents, vetting matters.\n\n## Skills Included (3 skills + 1 CLI)\n\n| Component | Description |\n|---|---|\n| `ags` CLI | npm-published terminal tool \u2014 `ags search/install/list/update/remove/feedback` |\n| `/learn` skill | In-agent search + install + context-aware recommendations |\n| `review-skill` skill | Reviews SKILL.md files, scores 10 quality dimensions |\n\n## Context Elements (12-Category Threat Taxonomy)\n\n`agentskill.sh` runs server-side static analysis on every skill across **12 threat categories**:\n\n1. Command injection\n2. Data exfiltration\n3. Credential harvesting\n4. Prompt injection\n5. Obfuscation\n6. Sensitive file access\n7. Persistence mechanisms\n8. External calls\n9. Reverse shells\n10. Destructive commands\n11. Social engineering\n12. Supply chain attacks\n\n- Each skill gets a **security score (0-100)**\n- **110,000+ skills scanned, 100% coverage**\n- Skills scoring **below 30** require explicit confirmation before installation\n- Live dashboard: https://agentskill.sh/security\n\n## How Context Elements Support Skills\n\n`ags` is a **marketplace-with-policy-as-code** for skill bundles. The 12-category threat taxonomy is a *security specification* \u2014 a kind of SHACL for skill files. Every install path is gated by both server-side (the registry score) and client-side (the `/learn` second scan) checks, which is a defense-in-depth composition.\n\nThe **content SHA tagging** is essentially **Merkle-root provenance** for installed skills \u2014 the same provenance pattern that [nvidia verified agent skills](nvidia-verified-agent-skills.md) uses with OpenSSF signing. Two independent implementations of the same underlying pattern (immutable identifier for a skill version).\n\n## Composition Notes\n\n- **Two-layer security model:** Server (registry) + Client (`/learn`) \u2014 defense in depth\n- **Versioning:** Every installed skill tagged with content SHA. `/learn update` shows diffs \u2014 no silent breakage.\n- **Feedback loop:** Agents auto-rate skills 1-5 with comments after use. Best skills surface, broken ones get community-flagged.\n- **Cross-platform install paths:** Different agents get different skill directories (`.claude/skills/`, `.codex/skills/`, etc.) \u2014 handled by the CLI.\n- **Plugin marketplace variant:** Claude Code only \u2014 `/plugin marketplace add https://agentskill.sh/marketplace.json` \u2014 but the plugin installs *only* `/learn`, not all skills.\n- **Quality scoring:** `review-skill` scores 10 quality dimensions \u2014 separate from the 12-category security scoring (the two are independent axes).\n\n## Bundle Density\n\nOne of the most bundle-dense examples in the catalog:\n- **Skills:** `ags` CLI + `/learn` skill + `review-skill` skill\n- **Context elements:** 12-category threat taxonomy, 0-100 security score, 1-5 quality score, 10 quality dimensions, content-SHA versioning\n- **Distribution:** npm CLI, in-agent slash command, Claude Code plugin marketplace, JSON output mode\n- **Telemetry:** agents auto-rate, 110k+ skills scanned, security dashboard\n\n## Convergence Signal\n\nThe README directly cites the Koi AI blog post on OpenClaw \u2014 the same incident that motivated the [nemoclaw security scanner](nemoclaw-security-scanner.md) and [owasp agentic skills top 10](owasp-agentic-skills-top-10.md) entries in our catalog. **Three independent projects converging on the same threat model** is strong signal that the threat taxonomy is now well-defined.\n\n## Reproducibility\n\n**High.** Open-source CLI, public GitHub repo, npm package, security dashboard accessible without auth. Threat taxonomy is published (12 categories listed in README).\n\n## Bundle Links\n- [nemoclaw security scanner](nemoclaw-security-scanner.md) \u2014 Convergent security scanner (same OpenClaw threat model)\n- [owasp agentic skills top 10](owasp-agentic-skills-top-10.md) \u2014 Defines 10-class vulnerability taxonomy\n- [agentic trust framework csa](agentic-trust-framework-csa.md) \u2014 4-level Zero Trust maturity model\n- [purplebox supply chain security](purplebox-supply-chain-security.md) \u2014 6-vector attack taxonomy\n- [nvidia verified agent skills](nvidia-verified-agent-skills.md) \u2014 OpenSSF signing (another provenance implementation)\n- [mondoo agent skills security](mondoo-agent-skills-security.md) \u2014 Security skills-as-scanners pattern\n- [skill validator cli](skill-validator-cli.md) \u2014 Local/pre-commit validation\n- [validate skill github action](validate-skill-github-action.md) \u2014 CI/CD structural validation", "examples/ai-km-ontology-skills": "# AI-KM: Agent Skills and Ontology-Driven Knowledge Modeling (v6.6.1)\n\n## Origin\n\n- **Journal:** SoftwareX, Volume 35, September 2026, 102855\n- **Authors:** Haolin Wen, Songyi Wang, Bingjie Li, Junfen Xiong, Tong Chen, Xin Liang\n- **DOI:** https://doi.org/10.1016/j.softx.2026.102855\n- **License:** Open Access\n\n## Skills Included\n\nAI-KM v6.6.1 introduces two integrated capabilities:\n\n### 1. Agentic Skill Framework\n- Encapsulates complex AI behaviors as **reusable, conversation-invokable skills**\n- Supports both:\n  - **Predefined expert skills** \u2014 manually authored\n  - **Autonomous planning mode** \u2014 for novel tasks where no predefined skill exists\n- Skills invoked through conversation (accessible to domain experts)\n\n### 2. Ontology-Driven Knowledge Modeling\n- Formal, machine-interpretable ontologies (not simple slice structures)\n- Built through **natural language entity extraction**\n- Domain experts encode expertise as structured knowledge\n\n## Context Elements\n\n### Closed-Loop Design\nKnowledge \u2194 Skills feedback cycle:\n1. Knowledge \u2192 Ontology (formal representation via NL extraction)\n2. Ontology \u2192 Skills (executable behavior)\n3. Skills \u2192 Knowledge (feedback from execution)\n\n### Natural Language \u2192 Ontology\n- Entity extraction from natural language input\n- Lowers barrier to formal knowledge modeling\n- Domain experts don't need ontology engineering skills\n\n## Composition Notes\n\nAI-KM is a rare example of **skills + ontologies** in a single integrated system:\n1. Skills are conversation-invokable (not just CLI/file-based)\n2. Autonomous planning mode for novel tasks (no predefined skill needed)\n3. Ontology built from NL extraction (no manual ontology engineering)\n4. Closed-loop: knowledge \u2192 skills \u2192 knowledge feedback\n\nThis directly implements the \"skills bundled with ontologies\" pattern from the skill bundle taxonomy.\n\n## Reproducibility\n\n- SoftwareX journal (open access, peer-reviewed software)\n- Previous version: https://doi.org/10.1016/j.softx.2024.101840\n\n## Connections\n\n- Skills + ontology integration is the core skill bundle thesis\n- Conversation-invokable skills contrast with file-based [agent skills spec](agent-skills-spec.md)\n- Autonomous planning mode connects to [skillcraft benchmark](skillcraft-benchmark.md)'s auto-composition\n- Closed-loop design is a novel governance pattern (skills validate knowledge, knowledge guides skills)\n", "examples/ai4curation-curation-skills": "# ai4curation/curation-skills \u2014 Ontology & Biocuration Skill Bundle\n\n**Source:** https://github.com/ai4curation/curation-skills\n**Date Added:** 2026-06-01 (Iteration 13)\n**Maintainer:** Chris Mungall (Berkeley Lab BBOP Group) \u2014 Lead author of OBO Foundry, GO, Monarch\n**License:** Not specified in repo\n**Bundle Type:** Domain-Specific Skill Pack \u00b7 Ontology Operations \u00b7 Reproducible Workflows\n**Confidence:** 9/10\n\n## Name & Origin\n\nA bundle of **Claude Skills** (SKILL.md folders) built specifically for **ontology and biocuration tasks**. Maintained by Chris Mungall's group at LBNL, the same group behind OBO Foundry, Gene Ontology, Monarch, and the ai4curation.io guides site. This is the most direct example in our catalog of \"skills + formal ontology context\" \u2014 every skill operates on OBO Foundry ontologies (GO, Mondo, Uberon, CL, EFO) using formal tooling (OAK, ROBOT, DOSDP).\n\n**Topics tags:** `monarchinitiative` \u00b7 `obofoundry` \u00b7 `agent-skills` \u00b7 `ai4curation`\n\n## Skills Included (7)\n\n| Skill | Purpose | Formal Context |\n|---|---|---|\n| `ontology-access-kit` | Query OBO ontologies via OAK | OWL, OBO, SPARQL, sqlite/obo |\n| `editing-obo-ontologies` | Edit OBO format ontologies | OBO format, OBO Foundry principles |\n| `dosdp-design-patterns` | Apply DOSDP design patterns | YAML templates \u2192 OWL axioms |\n| `robot-obo-tool` | ROBOT toolchain integration | ROBOT CLI, OWL, OBO |\n| `run-deep-research` | Deep research skill (most recent) | Web search + ontology grounding |\n| `ai4curation-configuration` | Configuration skill | YAML config, GitHub Actions |\n| `configure-w3id` | Configure permanent w3id.org redirects | w3id policy, ontology metadata |\n\n**Supporting files:** `AGENTS.md`, `CLAUDE.md`, `ai.just` (Justfile), `.github/` configs\n\n## Context Elements\n\n- **Ontologies (primary):** OBO Foundry ontologies (GO, Mondo, CL, Uberon, EFO, HPO) \u2014 formal, OWL-based, peer-reviewed\n- **Validation/Rules:** OBO Foundry principles embedded in skills (e.g., `editing-obo-ontologies` enforces OBO conventions)\n- **Tool Vocabulary:** OAK (Ontology Access Kit), ROBOT, OLS, BioPortal\n- **Configuration schema:** `CLAUDE.md`, `AGENTS.md`, `ai.just` (Justfile for reproducibility)\n- **Mapping (implicit):** OAK supports cross-ontology term mapping (SSSOM-like)\n- **Distribution:** `/plugin marketplace add ai4curation/curation-skills`\n\n## How Context Elements Support Skills\n\nThis bundle proves a thesis of the wiki: **skills that operate on formal artifacts (ontologies, rules) are more valuable than skills that don't.** The OAK skill is essentially a thin natural-language interface over a sophisticated ontology toolkit, and the OBO Foundry context (peer review, principled design, formal semantics) provides guardrails that prevent drift.\n\nThe companion `ai-blame` tool is interesting: it solves the \"what did the agent actually change?\" problem for ontology editing \u2014 a domain-specific provenance system that pairs with the editing skills.\n\n## Composition Notes\n\n- **Auto-invocation pattern:** Skills are designed to be **auto-selected** based on user query, not explicitly invoked. Example: asking a question about GO terms triggers the OAK skill automatically.\n- **MCP integration:** Composes with **OLS MCP** and **BioPortal MCP** for basic searches \u2014 OAK is reserved for complex operations.\n- **GitHub Actions:** Bundled `.github/workflows/` configs let repositories run ontology-agent workflows (e.g., `ai-agent.yml` in Mondo).\n- **Codex compatibility:** Canonical Claude location is `.claude/skills/`, but Codex reads from there too \u2014 proof of SKILL.md cross-platform portability.\n- **Example OAK command generated by skill:**\n  ```bash\n  runoak -i sqlite:obo:go info .in goslim_generic .and .desc//p=i GO:0008150\n  ```\n\n## Companion Bundles (Same Author/Group)\n\n- `ai4curation/ai-blame` \u2014 Provenance extraction from agent execution traces (line-level attribution for AI-assisted edits)\n- `ai4curation/aidocs` \u2014 Documentation bundle (CLAUDE.md + agent workflows)\n- `ai4curation/icbo-ai-tutorial` \u2014 Tutorial materials (ICBO 2025 AI tutorial) with social coding patterns\n- `geneontology/noctua-mcp` \u2014 MCP server for GO-CAM editing\n\n## Production Reference Implementations\n\n- **Mondo Disease Ontology** (monarch-initiative/mondo) \u2014 Goose + dragon-ai-agent\n- **Cell Ontology** (obophenotype/cell-ontology) \u2014 Goose + dragon-ai-agent\n- **Uberon Anatomy Ontology** (obophenotype/uberon) \u2014 GitHub Copilot + Goose\n- **EFO** (EBISPOT/efo) \u2014 GitHub Copilot\n\n## Reproducibility\n\n**High.** All skills are version-controlled in a public repo, use deterministic commands (OAK, ROBOT, OLS), and the reference implementations in Mondo/Cell Ontology provide working examples. The Justfile (`ai.just`) encodes repeatable workflows.\n\n## Bundle Links\n- [nora gis research agent](nora-gis-research-agent.md) \u2014 Earlier NORA bundle from same research lineage\n- [rdf ontologies skill](rdf-ontologies-skill.md) \u2014 Related RDF/ontologies skill pattern\n- [open ontologies paper](open-ontologies-paper.md) / [open ontologies github](open-ontologies-github.md) \u2014 SSSOM/Mapping context this bundle uses\n- [skill bundle patterns](../concepts/skill-bundle-patterns.md) \u2014 Auto-invocation pattern reference\n- [sc25 autonomous science workflows](../papers/sc25-autonomous-science-workflows.md) \u2014 SC '25 framework for state-machine scientific agents", "examples/anthropic-official-skills-repo": "# Anthropic Official Skills Repository\n\n## Overview\n\nThe official [anthropics/skills](https://github.com/anthropics/skills) repository (~140k stars) is the **canonical reference implementation** for agent skills. It contains the full spec, minimal templates, working example skills, and the **source-available code** for Claude's native document generation capabilities (PDF, DOCX, PPTX, XLSX). This repository is the **primary skill bundle** \u2014 it packages the entire skill mechanism as a distributable set of skills, templates, and specifications.\n\n**Context Elements:** Agent Skills specification (`/spec`) \u00b7 Minimal skill template (`/template`) \u00b7 Apache 2.0 licensing (most skills) \u00b7 Source-available document skills \u00b7 Beta API integration documentation\n\n## Repository Structure\n\n### `/spec`\nThe **Agent Skills specification** \u2014 defines the SKILL.md format, YAML frontmatter schema, directory layout, and progressive disclosure semantics. Published as an open standard at [agentskills.io](https://agentskills.io).\n\n### `/template`\nA minimal starting point for new skill creation \u2014 demonstrates the required structure (SKILL.md with frontmatter + optional supporting files).\n\n### `/skills`\nExample and production skills organized by domain:\n- **Creative/Design:** Art, music, and design applications\n- **Technical:** Web app testing, MCP server generation\n- **Enterprise:** Communications, branding, workflow automation\n- **Document Capabilities:** `docx`, `pdf`, `pptx`, `xlsx` (source-available) \u2014 these power Claude's native document features\n\n### Claude API Integration\n- Beta headers: `code-execution-2025-08-25`, `skills-2025-10-02`, `files-api-2025-04-14`\n- Container parameter with up to 8 skills per request\n- Custom skills: SKILL.md at top level, max 30MB total\n- Environment constraints: no network, no runtime installs, isolated per request\n- Mid-session tool/server updates without version bumps\n\n### Plugin Marketplace\n```bash\n/plugin marketplace add anthropics/skills\n/plugin install document-skills@anthropic-agent-skills\n/plugin install example-skills@anthropic-agent-skills\n```\n\n## Context Elements\n\n**Type: Specification (Open Standard)** \u2014 The `/spec` directory defines the formal schema for SKILL.md (name: 64 chars, description: 1024 chars, YAML frontmatter requirements).\n\n**Type: Template** \u2014 The `/template` directory provides a reference implementation that demonstrates correct structure.\n\n**Type: Licensing Taxonomy** \u2014 Apache 2.0 for most skills, source-available for document capabilities. This dual licensing is a context element that affects distribution and modification rights.\n\n**Type: API Integration Spec** \u2014 Beta headers, container parameter schema, and versioning strategy constitute the formal integration contract between skills and the Claude API.\n\n## Composition Notes\nThis repository is the **meta-bundle of the entire ecosystem** \u2014 it contains the spec, examples, templates, and working production skills. The document skills (`pdf`, `docx`, `pptx`, `xlsx`) demonstrate how to combine:\n- SKILL.md instructions\n- Bundled scripts with validation logic\n- File system operations within isolated containers\n- File ID generation and retrieval via Files API\n\n## Confidence\n10/10 \u2014 Official Anthropic repository, primary source.\n\n## Sources\n- https://github.com/anthropics/skills\n- https://platform.claude.com/docs/en/build-with-claude/skills-guide", "examples/arxiv-agent-skills-survey": "# Agent Skills for LLMs \u2014 Architecture, Acquisition, Security (arXiv Survey)\n\n**Source:** https://arxiv.org/html/2602.12430v3\n**Repository:** https://github.com/scienceaix/agentskills\n**Date Added:** 2026-05-26 (Iteration 11)\n**Authors:** Renjun Xu, Yang Yan (Zhejiang University)\n**License:** CC BY-NC-ND 4.0\n**Bundle Type:** Academic Survey \u00b7 Skill Taxonomy \u00b7 Security Governance Framework\n**Confidence:** 9/10\n\n## Name & Origin\n\nThe first **comprehensive academic survey** of the Agent Skills landscape, organized along four axes: architectural foundations, skill acquisition, deployment at scale, and security. Published on arXiv in February 2026, it provides the most thorough scholarly treatment of skill bundles as a research domain.\n\n## Skills Included\n\n- Taxonomy of skill types and composition patterns\n- Skill acquisition methodologies (RL, autonomous discovery, compositional synthesis)\n- Deployment patterns (computer-use agent stack, benchmarks)\n- Security governance: **Skill Trust and Lifecycle Governance Framework** with four-tier gate-based permission model\n\n## Context Elements\n\n- **Architectural Taxonomy:** Three-level progressive disclosure (metadata 50t \u2192 instructions 2kt \u2192 scripts 15kt), SKILL.md specification, MCP integration\n- **Paradigm Timeline:** Prompt Engineering (2022-23) \u2192 Tool Use (2023-24) \u2192 Skill Engineering (2025-present) \u2014 validates the \"transitional layer\" thesis\n- **Skills vs MCP Formal Distinction:** Skills = procedural knowledge (modifies preparation/context); MCP = tool connectivity (modifies available tools) \u2014 the definitive academic articulation\n- **Security Finding:** 26.1% of community-contributed skills contain vulnerabilities\n- **Skill Trust Framework:** Four-tier permission model with gate-based escalation\n\n## Key Findings\n\n**From the Paradigm Shift Section:**\n> *\"A PDF-processing skill does not merely expose a 'fill form' function; it teaches the agent how to approach PDF manipulation, which libraries to use, what edge cases to handle, and what code to execute.\"*\n\nThis formalizes the distinction between skills and tool calls \u2014 a skill modifies the agent's **preparation and understanding**, not just its available functions.\n\n**Four Composition Axes (from the paper's hidden structure):**\nThe survey maps composition patterns along (a) intelligence dimension \u2014 static \u2192 adaptive \u2192 learning \u2192 optimizing \u2192 intelligent, and (b) composition dimension \u2014 single \u2192 pipeline \u2192 hierarchical \u2192 mesh \u2192 swarm. This mirrors the [sc25 autonomous science workflows](../papers/sc25-autonomous-science-workflows.md) framework, confirming cross-domain convergence.\n\n## How Context Elements Support Skills\n\nThe survey provides the **formal academic foundation** for the entire skill bundle research program:\n\n1. **Architecture:** Documents progressive disclosure, SKILL.md format, and execution lifecycle \u2014 provides the canonical reference for [agent skills spec](agent-skills-spec.md)\n2. **Acquisition:** Explores RL-based skill learning, autonomous discovery, and compositional synthesis \u2014 research directions for future bundles\n3. **Deployment:** Computer-use agent stack, benchmarking methodologies \u2014 informs [skillsbench agent skills benchmark](skillsbench-agent-skills-benchmark.md)\n4. **Security:** 26.1% vulnerability rate validates the concerns raised by [mondoo agent skills security](mondoo-agent-skills-security.md) and [owasp agentic skills top 10](owasp-agentic-skills-top-10.md)\n\n## Composition Notes\n\nThis survey serves as a **meta-catalog** for the entire wiki:\n\n| Survey Section | Corresponding Wiki Examples |\n|----------------|---------------------------|\n| Architecture (SKILL.md) | [agent skills spec](agent-skills-spec.md), [ylang labs agent skills overview](ylang-labs-agent-skills-overview.md), [spring ai agent skills](spring-ai-agent-skills.md), [microsoft agent framework skills](microsoft-agent-framework-skills.md) |\n| Security | [owasp agentic skills top 10](owasp-agentic-skills-top-10.md), [mondoo agent skills security](mondoo-agent-skills-security.md), [purplebox supply chain security](purplebox-supply-chain-security.md) |\n| Composition | [graph of skills dependency retrieval](graph-of-skills-dependency-retrieval.md), [graphguard os guardrails](graphguard-os-guardrails.md) |\n| Benchmarks | [skillsbench agent skills benchmark](skillsbench-agent-skills-benchmark.md), [dspy agent skills v023](dspy-agent-skills-v023.md) |\n\n## Reproducibility\n\nHigh \u2014 open-access arXiv paper under CC BY-NC-ND 4.0, accompanying GitHub repo with resources.\n\n## Bundle Links\n- [owasp agentic skills top 10](owasp-agentic-skills-top-10.md) \u2014 AST10 validates the survey's 26.1% vulnerability finding\n- [agent skills spec](agent-skills-spec.md) \u2014 The SKILL.md specification documented in the survey's architectural section\n- [skillsbench agent skills benchmark](skillsbench-agent-skills-benchmark.md) \u2014 One of the benchmarks the survey analyzes\n- [sc25 autonomous science workflows](../papers/sc25-autonomous-science-workflows.md) \u2014 Convergent composition framework (same single\u2192pipeline\u2192hierarchical\u2192mesh\u2192swarm pattern)", "examples/aspire-robotics-skill-discovery": "# ASPIRE: Agentic Skill Programming through Iterative Robot Exploration\n\n**Origin:** NVIDIA GEAR Lab + UC Berkeley + UT Austin (arXiv:2607.00272, June 2026)\n**Authors:** Runyu Lu, Yubo Wu, ..., Linxi \"Jim\" Fan, Guanzhi Wang, Ken Goldberg\n\n## Overview\n\nASPIRE is a continual learning system for robotics that autonomously writes and refines robot control programs in a **code-as-policy** paradigm while compounding experience into a reusable skill library. A coding agent (Claude) writes robot control code, executes it, diagnoses failures from multimodal traces, and repairs programs. Validated fixes are distilled into reusable skills that persist across tasks, simulation/real-world settings, and embodiments.\n\n## Three Components\n\n1. **Closed-loop robot execution engine** \u2014 exposes fine-grained multimodal traces for autonomous failure diagnosis, repair synthesis, and validation\n2. **Continually expanding skill library** \u2014 distills validated fixes into reusable, transferable knowledge\n3. **Evolutionary search** \u2014 generates diverse task sequences and control programs to explore beyond single-trajectory refinement\n\n## Key Results\n\n| Benchmark | Improvement |\n|-----------|------------|\n| LIBERO-Pro (perturbation) | +77% over prior methods |\n| Robosuite (bimanual handover) | +72% |\n| BEHAVIOR-1K (long-horizon household) | +32% |\n| LIBERO-Pro Long (zero-shot) | 31% vs 4% for prior methods |\n\nSim-to-real transfer: simulation-discovered skills reduce real-robot programming effort across different embodiments and robot APIs.\n\n## Context Elements\n\n- **Multimodal execution traces** \u2014 enable autonomous failure diagnosis\n- **Validated repair knowledge** \u2014 skills compound from validated fixes\n- **Evolutionary search** \u2014 governance mechanism for skill diversity\n- **Cross-embodiment transfer** \u2014 skills portable across robot platforms\n- **Sim-to-real transfer verification** \u2014 evidence of real-world applicability\n\n## Relation to Skill Bundle Patterns\n\nASPIRE brings skill bundle patterns to the **robotics domain**:\n- Code-as-policy = skills as executable programs with formal structure\n- Skill library = persistent, transferable knowledge (analogous to [evoskill automated skill discovery](evoskill-automated-skill-discovery.md)'s skill folders)\n- Evolutionary search = skill discovery mechanism (complements [skill1 unified skill evolution rl](skill1-unified-skill-evolution-rl.md)'s RL-based approach)\n- Cross-embodiment transfer = skill portability evidence (parallels [skillmigrator cross domain transfer](skillmigrator-cross-domain-transfer.md)'s cross-domain transfer)\n\n## Key Insight\n\nRobotics skill discovery via code-as-policy + evolutionary search produces skills that transfer across tasks, embodiments, and sim-to-real. The accumulated library enables zero-shot generalization to unseen long-horizon tasks (31% vs 4%), demonstrating that compounding validated repairs into a skill library is a viable continual learning strategy.\n", "examples/assc-skill-supply-chains-skillbom": "# ASSCs: Agent Skill Supply Chains & SkillBOM\n\n**Origin:** Peking University (Jia, Zhao, He, Zhou), arXiv:2607.01136, Jul 1 2026\n\n## Overview\n\n**Skills Are Not Islands** argues skills have become **dependency-bearing artifacts** with mixed skill\u2013package\u2013service dependencies that remain largely implicit. It introduces **Agent Skill Supply Chains (ASSCs)**, the **SkillDepAnalyzer (SDA)** tool, and **SkillBOM** (SBOM-compatible skill bills of materials), then analyzes **1.43 million** skills.\n\n## Architecture (SDA)\n\n1. Recover dependency candidates from front matter + skill bodies (NL evidence)\n2. Confidence-score candidates; high-confidence \u2192 typed scanners (skill / package / service)\n3. Recursively resolve transitive skill + package deps \u2192 ASSC graph\n4. Serialize as **SkillBOM** (SBOM-IR compatible for existing toolchains)\n\n## Ecosystem Findings (1.43M skills)\n\n| Pattern | Evidence |\n|---------|----------|\n| Governance-poor metadata | Deps/license/version sparse; activation-ready names/descriptions |\n| Name collisions | **58.73%** non-unique names |\n| Multi-channel deps | Skills 8.92% \u00b7 Packages 15.48% \u00b7 Services 22.25% |\n| Hidden package inventory | **71.87% npm / 73.33% PyPI** packages via transitive skill reuse only |\n| Dependency clusters | **30.41%** of dependency-bearing roots in workflow clusters |\n| Transitive security | **60\u201378%** security-relevant skill deps transitive-only; **93\u201398%** of some package/service risks invisible at root |\n\n## Recommendations\n\n- Typed multi-channel dependency manifests (source + version)\n- First-class **dependency-cluster** management\n- Risk-warning audit commands for registries/package managers\n- **Lockfile-like** records for skill developers\n\n## Context Elements\n\n- **ASSC graph** \u2014 directed multi-channel supply chain model\n- **SkillBOM** \u2014 machine-readable skill inventory bridging SBOM practice\n- **Transitive risk axiom** \u2014 root-skill inspection is insufficient\n- **Lockfiles for skills** \u2014 operationalizes SkillFortify-style integrity at ecosystem scale\n\n## Relation to Skill Bundle Patterns\n\n- Extends [skillfortify formal verification supply chain](skillfortify-formal-verification-supply-chain.md) (lockfile semantics, ADG) to **1.43M-skill** empirical supply chains\n- Complements [clawhavoc marketplace attack](clawhavoc-marketplace-attack.md), [maltool malicious tool attacks](maltool-malicious-tool-attacks.md), [skillsieve malicious skill detection](skillsieve-malicious-skill-detection.md)\n- Complements [supply chain agentic factory in toto](supply-chain-agentic-factory-in-toto.md) (SLSA/in-toto for intent\u2192source)\n- Addresses versioning gaps from [swe skills bench utility benchmark](swe-skills-bench-utility-benchmark.md) and [skill os skills as apps](skill-os-skills-as-apps.md)\n- Aligns with [nvidia verified agent skills governance](nvidia-verified-agent-skills-governance.md) and [prov agent unified provenance](prov-agent-unified-provenance.md)\n\n## Key Insight\n\nSkill bundles inherit software supply-chain physics. Without typed manifests, SkillBOM, and lockfiles, **most risk and most packages live in the transitive dark**. Governance that only scans the root `SKILL.md` is structurally blind.\n", "examples/awesome-agent-skill-papers-catalog": "# Awesome-Agent-Skill-Papers: Curated Paper Catalog\n\n**Source:** https://github.com/DataArcTech/Awesome-Agent-Skill-Papers (12 stars, May 19 2026)\n**Survey:** [survey agent skills procedural infrastructure](../papers/survey-agent-skills-procedural-infrastructure.md)\n**Date Added:** 2026-07-11 (Iteration 36)\n**Bundle Type:** Paper Catalog \u00b7 Discovery Index\n**Confidence:** 7/10\n\n## Name & Origin\n\nA curated GitHub repository accompanying the six-layer taxonomy survey paper \"A Survey of Agent Skills: Toward Procedural Infrastructure for LLM Agents.\" Serves as a **discovery index** for academic agent skill papers.\n\n## Skills Included (as paper catalog)\n\nPapers cataloged include:\n- [SkillsBench](skillsbench-agent-skills-benchmark.md) \u2014 benchmark\n- [CoEvoSkills](coevoskills-self-evolving-skills.md) \u2014 self-evolving skills\n- [Graph-of-Skills](graph-of-skills-dependency-retrieval.md) \u2014 dependency-aware retrieval\n- **EffiSkill** (arXiv:2603.27850) \u2014 Agent Skill Based Automated Code Efficiency Optimization\n- **Scaling Coding Agents via Atomic Skills** (arXiv:2604.05013) \u2014 decomposition into atomic composable skills\n- **SkillMOO** (arXiv:2604.09297) \u2014 Multi-Objective Optimization of Agent Skills for Software Engineering\n- [SoK: Agentic Skills](../papers/sok-agentic-skills-beyond-tool-use.md) \u2014 security/governance\n- **Supply-chain poisoning attacks** against skill ecosystems\n\n## Context Elements\n\n- **Paper catalog** \u2014 curated list of agent skill papers\n- **Taxonomy image** \u2014 visual six-layer taxonomy\n- **Discovery index** \u2014 for finding new examples and patterns\n\n## How Context Elements Support Skills\n\nThis catalog serves as a **meta-context element** \u2014 it's not a skill bundle itself, but an index that helps discover new skill bundle examples for the wiki. Future ingestion candidates:\n- **Atomic Skills** (arXiv:2604.05013) \u2014 decomposition pattern for coding agents\n- **SkillMOO** (arXiv:2604.09297) \u2014 multi-objective optimization for SE skills\n- **EffiSkill** (arXiv:2603.27850) \u2014 domain-specific optimization skill\n\n## Reproducibility\n\nHigh \u2014 public GitHub repo, 7 commits, Apache-2.0 license, taxonomy image included.\n\n## Bundle Links\n\n- [survey agent skills procedural infrastructure](../papers/survey-agent-skills-procedural-infrastructure.md) \u2014 companion survey paper\n- [coevoskills self evolving skills](coevoskills-self-evolving-skills.md) \u2014 already ingested\n- [graph of skills dependency retrieval](graph-of-skills-dependency-retrieval.md) \u2014 already in wiki\n- [skillsbench agent skills benchmark](skillsbench-agent-skills-benchmark.md) \u2014 already in wiki\n- [sok agentic skills beyond tool use](../papers/sok-agentic-skills-beyond-tool-use.md) \u2014 already ingested\n\n## Sources\n\n- https://github.com/DataArcTech/Awesome-Agent-Skill-Papers", "examples/awesome-agent-skills-catalogs": "# Awesome Agent Skills Catalogs: Ecosystem Mapping\n\n## Overview\n\nTwo major **awesome-list** repositories catalog the agent skills ecosystem. Together they serve as **marketplace registries** \u2014 not individual bundles, but structured collections that document the breadth of available skills, platform support, and the emergence of security-scanning marketplaces. They reveal how the skills ecosystem has organized itself and what **bundle density** looks like at scale.\n\n**Context Elements:** Platform compatibility matrix \u00b7 Quality standards \u00b7 Skill path specifications \u00b7 Security scanning references \u00b7 Marketplace listings\n\n## skillmatic-ai/awesome-agent-skills\nThe \"definitive resource\" catalog. Key data:\n- **Platform matrix:** 13 supported platforms (Claude Code, Claude.ai, Cursor, VS Code, GitHub Copilot, Roo Code, OpenAI Codex, Gemini CLI, Mistral Vibe, Goose, Manus, OpenCode, Amp, Letta)\n- **Marketplace data:** agentskill.sh (44k+ skills with security scanning), SkillsMP, Skillstore\n- **Official skill collections:** Anthropic Skills, OpenAI Skills, Microsoft Skills, Google Skills, Supabase, Vercel\n- **Security tools:** SkillCheck (github.com/agentigy/skillcheck)\n- **Research/Benchmarks:** SkillsBench, Upskill (Hugging Face), SkillFlow (2026), Graph of Skills (2026)\n- **Documentation:** Complete Guide to Building Skill for Claude (PDF)\n\n## VoltAgent/awesome-agent-skills\n1000+ curated skills from official dev teams and community:\n- **Official collections by company size:**\n  - NVIDIA: 155 skills across 17 products\n  - Microsoft: 133 skills across 6 languages\n  - Google: 17+ Workspace skills + Cloud skills\n  - Anthropic: Document handling + development + creative\n  - Sentry, Stripe, Vercel, Cloudflare, HuggingFace, Figma\n- **Specialized domain curations:**\n  - Garry Tan: 28 virtual engineering team skills\n  - Dean Peters: 46 PM skills (tam-sam-som-calculator, opportunity-solution-tree)\n  - Corey Haines: SaaS marketing stack\n  - Addy Osmani: Web quality audits\n- **Quality standards enforced:**\n  - Third-person descriptions with trigger keywords\n  - Progressive disclosure: <100 tokens metadata, <500 lines body\n  - No absolute paths\n  - Curated but not audited\n\n## Security Scanning Ecosystem\n- **agentskill.sh:** 44k+ skills with security scanning\n- **SkillCheck:** GitHub scanner for identifying risks\n- **Snyk agent-scan:** Commercial security scanner\n- **Agent Trust Hub:** Trust infrastructure\n\n## Context Element Analysis\nThe awesome-lists themselves are **not skill bundles** \u2014 they are **catalog registries**. However, they reveal critical context element patterns:\n1. **Quality standards** act as implicit validation rules for skills\n2. **Platform compatibility matrices** serve as deployment taxonomies\n3. **Security scanning references** point to an emerging validation ecosystem\n4. **Skill path specifications** (e.g., `.claude/skills/`, `.cursor/skills/`) are the **filesystem ontology** of agent skills\n\n## Confidence\n8/10 \u2014 Well-documented GitHub repos with structured data. The awesome-lists evolve rapidly.\n\n## Sources\n- https://github.com/skillmatic-ai/awesome-agent-skills\n- https://github.com/VoltAgent/awesome-agent-skills", "examples/awesome-openclaw-skills-catalog": "# Awesome OpenClaw Skills: 179 CLI Utilities\n\n## Overview\n\nA curated catalog of 179 CLI-based skills for the OpenClaw ecosystem, organized by domain category. Available at clawskills.sh for discovery and installation.\n\n## Category Breakdown\n\n### System Management & Automation\n- iyeque-local-system-info (CPU, RAM, disk via psutil)\n- restic-home-backup (encrypted backups with systemd)\n- wol-sleep-pc (Wake-on-LAN/Sleep-on-LAN)\n\n### Development & Code Quality\n- audit-code (security review for hardcoded secrets)\n- clean-pytest (Fake-based testing patterns)\n- dependency-audit (security risks, outdated packages)\n- agents-skill-tdd-helper (TDD enforcement for agents)\n- sql-query-generator (secure SQL with validation)\n\n### Security & Guardrails\n- agent-hardening (input sanitization)\n- messageguard (outgoing text filtering)\n- error-guard (deadlock prevention)\n- totp (TOTP verification for sensitive operations)\n\n### Memory & Context Management\n- arc-memory-pruner (memory compaction)\n- context-compactor (token-based for local models)\n- session-state-tracker (persistent state via hooks)\n\n### Finance & Business\n- Trading skills (A-share, HK, US markets)\n- Freelance management (client tracking, invoice chasing)\n- Strategy frameworks (MBB methodologies)\n\n## Bundle Patterns Identified\n\n### Security Bundle (4+ skills)\nagent-hardening + messageguard + error-guard + totp = **defensive skill bundle**. This is analogous to [graphguard os guardrails](graphguard-os-guardrails.md) (SHACL + Cypher + Shadow) but at the CLI utility level.\n\n### Memory Bundle (3 skills)\narc-memory-pruner + context-compactor + session-state-tracker = **context lifecycle management**. This represents a bundle for managing the agent's internal state.\n\n### Development Bundle (5+ skills)\naudit-code + clean-pytest + dependency-audit + tdd-helper + sql-query-generator = **development workflow bundle**, similar to the patterns in [agentic engineering workflow skills](agentic-engineering-workflow-skills.md).\n\n## Source Attribution\nRaw source: [awesome openclaw skills cli](../../raw/2026-05-25/awesome-openclaw-skills-cli.md)", "examples/badskill-backdoor-model-in-skill": "# BadSkill: Backdoor Attacks via Model-in-Skill Poisoning\n\n**Origin:** arXiv:2604.09378, Apr 2026\n**Citations:** 12\n**Authors:** Guiyao Tie, Jiawen Shi, Pan Zhou, Lichao Sun\n\n## Overview\n\nBadSkill introduces a novel backdoor attack surface: **model-in-skill poisoning**. Some agent skills bundle learned model artifacts (e.g., classifiers, embeddings) as part of their execution logic. BadSkill exploits this by publishing a seemingly benign skill whose embedded model is backdoor-fine-tuned to activate a hidden payload only when specific combinations of routine skill parameters are present.\n\n## Threat Surface: Model-in-Skill\n\nThis is a **distinct** threat from:\n- **Prompt injection** (manipulating skill instructions \u2014 cf. [skillject automated prompt injection](skillject-automated-prompt-injection.md))\n- **Code-level malicious tools** (malicious code in tool implementation \u2014 cf. [maltool malicious tool attacks](maltool-malicious-tool-attacks.md))\n- **Permission misuse** (skills accessing unauthorized resources \u2014 cf. [skillguard permission framework](skillguard-permission-framework.md))\n\nModel-in-skill poisoning hides malicious behavior **inside model weights**, making it invisible to code scanning, prompt inspection, and permission frameworks.\n\n## Attack Design\n\n- **Composite training objective:**\n  - Classification loss (maintain benign accuracy)\n  - Margin-based separation (clean separation between triggered and non-triggered)\n  - Poison-focused optimization (maximize trigger activation)\n- **Semantic compositional triggers** \u2014 Triggers are combinations of routine skill parameters, not single values\n- **Hard negatives** \u2014 Training includes difficult negative examples to maintain benign-side accuracy\n- **OpenClaw-inspired simulation** \u2014 Preserves skill installation + execution in controlled environment\n\n## Evaluation\n\n| Metric | Result |\n|--------|--------|\n| Max ASR (attack success rate) | 99.5% across 8 triggered skills |\n| ASR at 3% poison rate | 91.7% |\n| Model architectures | 8 (494M\u20137.1B params), 5 families |\n| Skills tested | 13 (8 triggered + 5 control) |\n| Query sets | 571 negative-class + 396 trigger-aligned |\n| Text perturbation robustness | Effective across 5 perturbation types |\n| Benign accuracy | Maintained on negative-class queries |\n\n## Context Elements\n\n- **Model-in-skill threat model** \u2014 New threat surface: bundled model artifacts in skills\n- **Semantic compositional triggers** \u2014 Multi-parameter trigger combinations (not single-value)\n- **Backdoor training objective** \u2014 Classification + margin separation + poison optimization\n- **Poison rate analysis** \u2014 Training data contamination quantification (3% \u2192 91.7% ASR)\n\n## Relation to Skill Bundle Patterns\n\nBadSkill identifies a threat surface that existing defense frameworks don't address:\n\n- Beyond [skillject automated prompt injection](skillject-automated-prompt-injection.md) (prompt-level, not model-level)\n- Beyond [maltool malicious tool attacks](maltool-malicious-tool-attacks.md) (code-level, not weight-level)\n- Bypasses [skillguard permission framework](skillguard-permission-framework.md) (malicious behavior is inside the model, not in tool calls)\n- Motivates [skillfortify formal verification supply chain](skillfortify-formal-verification-supply-chain.md) (formal provenance verification for model artifacts)\n- Motivates [skillspector nvidia security scanner](skillspector-nvidia-security-scanner.md) (behavioral vetting, not just code scanning)\n- Related to [supply chain agentic factory in toto](supply-chain-agentic-factory-in-toto.md) (provenance for model artifacts in skills)\n\n## Key Insight\n\nSkills that bundle model artifacts create a supply-chain risk invisible to current defense frameworks. Backdoor-fine-tuned models can achieve 99.5% attack success with only 3% training data contamination, and the attack generalizes across architectures and model scales. This motivates stronger provenance verification and behavioral vetting for third-party skill artifacts containing models.\n", "examples/chris-ayers-plugin-ecosystem": "# Chris Ayers \u2014 Plugin Ecosystem: Skills, Plugins, and Marketplaces\n\n**Source:** https://chris-ayers.com/posts/agent-skills-plugins-marketplace/\n**Date Added:** 2026-05-26 (Iteration 11)\n**Author:** Chris Ayers (@CodeBytes)\n**Bundle Type:** Ecosystem Architecture \u00b7 Plugin Distribution \u00b7 Cross-Tool Compatibility\n**Confidence:** 8/10\n\n## Name & Origin\n\nA comprehensive guide to the **three-layer agent extensibility ecosystem**: Skills (atomic capabilities), Plugins (bundled distributions), and Marketplaces (discovery and versioning). Focused on the GitHub Copilot ecosystem but applicable across Claude Code, Codex CLI, and Gemini CLI.\n\n## Skills Included\n\n- Standard SKILL.md creation and cross-tool placement (`.github/skills/`, `.claude/skills/`, `.agents/skills/`, `.gemini/skills/`)\n- Plugin manifest authoring (`plugin.json`) bundling skills + agents + hooks + MCP + LSP\n- Marketplace creation and plugin distribution\n- Version pinning from external sources (GitHub refs, URL-based)\n\n## Context Elements\n\n- **Plugin Manifest Schema:** `plugin.json` with `name`, `version`, `author`, `license`, `keywords`, `agents[]`, `skills[]`, `hooks.json`, `.mcp.json`, `lsp.json` \u2014 a formal packaging format for skill bundles\n- **Cross-Tool Compatibility Matrix:**\n\n| Capability | Copilot CLI | VS Code | Claude Code | Codex CLI | Gemini CLI |\n|------------|-------------|---------|-------------|-----------|------------|\n| SKILL.md | \u2713 | \u2713 | \u2713 | \u2713 | \u2713 |\n| Plugin Manifest | `.github/` | same | `.claude-plugin/` | N/A | Extensions |\n| Marketplace | \u2713 | \u2713 | \u2713 | `$skill-installer` | `gemini extensions` |\n| Hooks | \u2713 | \u2713 | \u2713 | \u2717 | \u2717 |\n| MCP Servers | \u2713 | \u2713 | \u2713 | \u2717 | \u2713 |\n\n- **Marketplace Architecture:** Git repositories with `marketplace.json` defining available plugins \u2014 default markets: `github/copilot-plugins`, `github/awesome-copilot`\n- **Versioning Model:** External source references with `source.source=url`, `url`, `ref` for pinning to specific tags/commits\n- **CLI Lifecycle:** `plugin marketplace browse \u2192 install \u2192 list \u2192 update \u2192 uninstall`\n\n## How Context Elements Support Skills\n\nThe plugin ecosystem provides the **distribution and versioning layer** that pure SKILL.md lacks:\n\n1. **Plugins as Skill Bundles:** A plugin IS a skill bundle \u2014 it packages multiple skills with optional agents, hooks, and MCP servers into a single installable unit with version metadata\n2. **Version Pinning:** External source references with `ref: v2.0` implement the immutable versioning that [owasp agentic skills top 10](owasp-agentic-skills-top-10.md)'s AST07 (Update Drift) requires\n3. **Cross-Tool SKILL.md Compatibility:** The fact that SKILL.md works identically across all five major tools validates the [agent skills spec](agent-skills-spec.md)'s portability claim\n4. **Marketplace as Governance Mechanim** : Marketplaces with `marketplace.json` provide the skill inventory that AST09 (No Governance) demands\n\n## Key Insight: SKILL.md is the Universal Portable Unit\n\nThe most important finding is that **SKILL.md works identically across 5 major agent tools** (Copilot CLI, VS Code, Claude Code, Codex CLI, Gemini CLI). This is the strongest evidence yet that skills will become the portable unit of agent capability, with plugins and marketplaces being the distribution mechanism.\n\n## Composition Notes\n\nThe three-layer model (Skills \u2192 Plugins \u2192 Marketplaces) parallels mature software distribution:\n\n| Agent Layer | Software Analogy |\n|-------------|-----------------|\n| Skill (SKILL.md) | Python module / JS file |\n| Plugin (plugin.json) | Python package / npm module |\n| Marketplace (marketplace.json) | PyPI / npm registry |\n\nThis suggests skill bundles will follow the same maturation path as package management \u2014 lockfiles, signing, dependency resolution, and semantic versioning.\n\n## Reproducibility\n\nHigh \u2014 public blog post with complete code examples, CLI commands, and configuration files.\n\n## Bundle Links\n- [agent skills spec](agent-skills-spec.md) \u2014 The SKILL.md standard that powers cross-tool compatibility\n- [github cli skill management](github-cli-skill-management.md) \u2014 Related CLI management patterns\n- [agensi marketplace landscape](../tools/agensi-marketplace-landscape.md) \u2014 Marketplace comparison from this iteration\n- [owasp agentic skills top 10](owasp-agentic-skills-top-10.md) \u2014 Security requirements for marketplace governance (AST02, AST07, AST09)", "examples/claude-api-skills-integration": "# Claude API Agent Skills: Official Integration Guide\n\n## Overview\n\nThis entry covers the **official Claude API integration mechanism** for Agent Skills via the `container` parameter. Unlike SDK-level skills, these are skills loaded at request time into an isolated code execution environment \u2014 representing a distinct deployment pattern for skill bundles.\n\n**Context Elements:** Beta header schema \u00b7 Container parameter specification \u00b7 File ID lifecycle \u00b7 Version pinning via epoch timestamps \u00b7 30MB bundle size limit \u00b7 8-skill-per-request constraint\n\n## API Integration Model\n\n### Required Beta Headers\n| Header | Purpose |\n|--------|---------|\n| `code-execution-2025-08-25` | Enables code execution environment |\n| `skills-2025-10-02` | Enables the Skills API |\n| `files-api-2025-04-14` | Required for file upload/download |\n\n### Container Parameter\n```python\ncontainer={\n    \"skills\": [\n        {\"type\": \"anthropic\", \"skill_id\": \"pptx\", \"version\": \"20251013\"},\n        {\"type\": \"custom\", \"skill_id\": \"skill_xAbCd...\", \"version\": \"latest\"}\n    ]\n}\n```\n\n### Lifecycle\n1. Claude receives skill metadata in system prompt\n2. Copies files to `/skills/{directory}/` in sandboxed container\n3. Loads full SKILL.md only when task triggers the skill (progressive disclosure)\n4. Container is fresh per request unless `container.id` reused\n\n### Constraints\n- Up to 8 skills per request\n- Custom skills: SKILL.md at top level, max 30MB total\n- No network access within container\n- No runtime installs (only pre-installed packages)\n- Version pinning: epoch timestamps for production, \"latest\" for development\n- Prompt caching: changing skill list breaks cache\n\n## Context Elements\n\n**Type: API Contract Schema** \u2014 The combination of beta headers, container parameter format, and version strings constitutes a formal integration contract.\n\n**Type: Version Pinning Scheme** \u2014 Custom skills use epoch timestamps, pre-built skills use date-based versions (`20251013`). Pinning prevents breaking changes.\n\n**Type: Bundle Size Constraint** \u2014 30MB limit enforces lean skill packages with progressive disclosure.\n\n**Type: File ID Lifecycle** \u2014 Skills that generate artifacts (documents, images) return `file_id` references that must be downloaded via the Files API \u2014 a formal artifact tracking pattern.\n\n## Mid-Session Updates\nThe API supports **mid-session tool/server updates** without version bumps, enabling dynamic skill loading during long-running operations. Long-running skills may return `pause_turn` stop reason, requiring the client to echo back the response to continue execution.\n\n## Confidence\n10/10 \u2014 Official Anthropic API documentation, primary source.\n\n## Sources\n- https://platform.claude.com/docs/en/build-with-claude/skills-guide", "examples/claude-skills-ecosystem-1116": "# Claude Skills Ecosystem \u2014 1,116 Skills from 500+ Repos\n\n**Source:** https://growthexe.substack.com/p/i-found-1116-claude-code-skills-from\n**Date Added:** 2026-05-24 (Iteration 8)\n**Author:** GrowthExe (Substack)\n**Bundle Type:** Mega Collection + Security Taxonomy\n**Confidence:** 8/10\n\n## Name & Origin\n\nA comprehensive survey and mapping of 1,116 unique Claude Code Skills discovered across 500+ repositories. The most thorough inventory of the Claude skills ecosystem to date.\n\n## Skills Included (Major Collections)\n\n- **obra/superpowers** (166k stars): TDD, systematic debugging, verification-before-completion, brainstorming, planning, dispatching parallel agents\n- **alirezarezvani/claude-skills** (235 skills): Engineering (37), Marketing (44), C-Level Advisory (34), Regulatory (14)\n- **wshobson/agents** (150 skills): General-purpose agents\n- **Microsoft** (133 skills): .NET (25), Python (40+), TypeScript (22), Azure services\n- **Anthropic-Cybersecurity-Skills** (754 skills): MITRE/NIST framework mapping\n- **Trail of Bits** (29 skills): Static/variant analysis, Semgrep rule creation\n- **Unity-Skills** (543 skills): Game development\n- **Sentry** (30 SDK skills): Error tracking\n\n## Context Elements\n\n- **YAML Configuration:** SKILL.md frontmatter standard across all skills\n- **MCP Dependencies:** Multiple skills declare MCP tool integrations (Composio plugin for 78+ SaaS apps)\n- **Security Taxonomy:** 754 cybersecurity skills mapped to MITRE ATT&CK and NIST frameworks \u2014 this is a **taxonomy + rules** pattern\n- **Skill Specification:** agentskills.io compatible across the ecosystem\n\n## How Context Elements Support Skills\n\nThe **Anthropic-Cybersecurity-Skills** collection (754 skills mapped to MITRE/NIST) represents a formal taxonomy driving skill organization. This is the most significant taxonomy-based bundle pattern found outside of formal ontology/mapping work. The MITRE framework provides:\n1. A hierarchical taxonomy of attack techniques\n2. Standardized naming and categorization\n3. Cross-referencing between skills and framework nodes\n\n## Composition Notes\n\nThe three-layer architecture (MCP connection \u2192 Tools actions \u2192 Skills workflow/guardrails) observed across this ecosystem reinforces the pattern that skills are the **workflow layer** that sits above MCP connections and individual tools.\n\nThe Composio plugin pattern \u2014 a single MCP connection providing access to 78+ SaaS apps \u2014 demonstrates a **dependency consolidation** pattern: instead of declaring individual MCP dependencies per skill, a central plugin provides the tool layer.\n\n## Reproducibility\n\nMedium \u2014 this is a survey document, not a single tool. Individual skills are reproducible per their own docs.\n\n## Key Insight\n\nThe 754 cybersecurity skills mapped to MITRE/NIST frameworks represent a formally **taxonomized skill collection** \u2014 the largest taxonomy-driven bundle found in this research. This provides a counterpoint to ontology-based bundles: instead of formal ontologies (OWL, RDF), it uses established security frameworks as the organizing structure.", "examples/clawbio-bioinformatics-skills": "# ClawBio: Bioinformatics-Native AI Agent Skill Library\n\n**Source:** https://github.com/ClawBio/ClawBio  \\\n**Date Added:** 2026-06-09  \\\n**Bundle Type:** Domain-Specific Skill Library (Bioinformatics/Genomics)  \\\n**Raw Source:** [clawbio clawbio](../../raw/2026-06-09/clawbio-clawbio.md)\n\n## Overview\n\n**ClawBio** is the first **bioinformatics-native skill library** for AI agents. Built on **OpenClaw**, it provides a **local-first, privacy-focused, and reproducible** framework for genomic analysis with **88 skills** (29 production-ready) and access to **8,000+ Galaxy tools**. It bridges the gap between stochastic LLM reasoning and rigorous bioinformatics execution.\n\n## Skills Included (88 Total, 29 Production-Ready)\n\n| Skill | Category | Description |\n|-------|----------|-------------|\n| **Bio Orchestrator** | Infrastructure | Automatically routes inputs (files/text) to the correct skill |\n| **PharmGx Reporter** | Personal | Analyzes 12 genes/51 drugs for personalized dosage (CPIC guidelines) |\n| **Drug Photo** | Personal | Identifies meds from photos (Telegram/Discord) and checks against genotype |\n| **GWAS Lookup** | Population | Queries 9 databases (gnomAD, ClinVar, GTEx, etc.) for variant data |\n| **Ancestry PCA** | Population | PCA vs SGDP reference panel with publication-quality figures |\n| **UKB Navigator** | Research | Semantic search across 22,000+ UK Biobank fields |\n| **Galaxy Bridge** | Research | Search and run 8,000+ tools from usegalaxy.org via CLI |\n| **nf-core Wrappers** | Pipeline | Production wrappers for `scrnaseq`, `rnaseq`, `sarek` (variant calling) |\n| **Genomic Intelligence (gi-*)** | AI/ML | Six skills wrapping transformer-based DNA language model predictions |\n\n## Context Elements (Rich Formal Artifacts)\n\n### 1. Specification Layer (Machine-Readable Contracts)\n- **`SKILL.md` files for every skill** \u2014 domain expertise encoded in structured markdown, not model weights\n- **Specification-First philosophy**: *\"Instead of allowing an LLM to improvise code (which leads to hallucinations in critical areas like dosage), ClawBio uses a machine-readable contract.\"*\n\n### 2. Validation & Benchmarking Infrastructure (v0.5.0, April 2026)\n- **AD Ground Truth:** 34 Alzheimer's genes across 3 evidence tiers\n- **Mock API Server:** Deterministic endpoints for offline CI testing\n- **Public Leaderboard:** **92.3% (168/182) tests passing** across audited skills\n- Systematic validation as part of the release process\n\n### 3. Reproducibility Bundles (Generated Per Execution)\nEach skill execution generates a `reproducibility/` bundle containing:\n- `commands.sh`: The exact replay command\n- `environment.yml`: Conda environment snapshot\n- `checksums.sha256`: SHA-256 verification for outputs\n- **This is a formal reproducibility artifact \u2014 a key context element type**\n\n### 4. Reference Genome: The Corpasome (Real, Fully Open Human Genome)\n- **23andMe SNP chip:** ~600K variants\n- **30x Illumina WGS:** ~4M SNPs, 600K indels, structural variants (GRCh37)\n- **DOI:** 10.5281/zenodo.19297389\n- Used for **all demo data** \u2014 ensures deterministic, reproducible testing\n\n### 5. Developer Tooling & AI-Ready Artifacts\n- **Scaffolding:** `python scaffold_skill.py` for creating new skills\n- **Testing:** `uv run pytest` suite\n- **`llms.txt`** (token-optimized summary for LLM context)\n- **`AGENTS.md`** (universal guide for AI coding agents)\n- **Hosted Inference:** Six `gi-*` skills wrap Genomic Intelligence platform\n\n### 6. Conversational Interfaces (Agent Access Layers)\n1. **RoboTerri:** Telegram/Discord messaging agent (handles VCF, FASTQ, 23andMe uploads, medication photos)\n2. **OpenClaw Gateway:** Self-hosted browser/webchat interface\n3. **Claude Code:** Uses `CLAUDE.md` to teach agent how to route requests to local skills\n\n## Composition Notes\n\nClawBio demonstrates **advanced bundle composition patterns**:\n\n1. **Domain-focused cohesion**: All 88 skills serve bioinformatics/genomics \u2014 high semantic coherence\n2. **Specification layer as validation**: Machine-readable `SKILL.md` contracts prevent hallucination in critical domains (dosage, genetics)\n3. **Reproducibility as a generated artifact**: Every execution produces a formal reproducibility bundle \u2014 this is a **context element type** (reproducibility contract)\n4. **Multi-modal agent interfaces**: CLI, chat (Telegram/Discord), web (OpenClaw), IDE (Claude Code) \u2014 same skills, different access patterns\n5. **Reference data as bundle asset**: The Corpasome genome is bundled with the library for deterministic testing\n6. **Validation leaderboard**: Public, quantitative quality metric (92.3% pass rate) \u2014 a **governance/monitoring artifact**\n7. **Galaxy Bridge**: Access to 8,000+ external tools \u2014 demonstrates **external tool registry mapping** as a context element\n\n## Installation & Distribution\n\n- **Claude Code:** `/plugin marketplace add ClawBio/ClawBio`\n- **Manual:** `git clone https://github.com/ClawBio/ClawBio.git && cd ClawBio && uv sync`\n- **No pip package** \u2014 must clone repository\n- **Agent-agnostic:** Works with Claude, ChatGPT, or local models (Ollama)\n\n## Confidence\n\n9/10 \u2014 Well-documented GitHub repo with clear architecture, validation infrastructure, reference genome, and multiple access layers. Production-ready skills with real users.\n\n## Sources\n\n- https://github.com/ClawBio/ClawBio\n- https://clawbio.ai/\n- Raw: [clawbio clawbio](../../raw/2026-06-09/clawbio-clawbio.md)", "examples/clawhavoc-marketplace-attack": "# ClawHavoc Campaign: 1,184 Malicious Skills on ClawHub\n\n**Sources:**\n- https://arxiv.org/abs/2602.20867 (SoK case study)\n- https://www.koi.ai/blog/clawhavoc-341-malicious-clawedbot-skills-found-by-the-bot-they-were-targeting\n- https://unit42.paloaltonetworks.com/openclaw-ai-supply-chain-risk/\n- https://www.antiy.net/p/clawhavoc-analysis-of-large-scale-poisoning-campaign-targeting-the-openclaw-skill-market-for-ai-agents/\n**Date Added:** 2026-07-11 (Iteration 36)\n**Bundle Type:** Security Case Study \u00b7 Supply-Chain Attack \u00b7 Marketplace Poisoning\n**Confidence:** 9/10\n\n## Name & Origin\n\nClawHavoc is a coordinated supply-chain attack that poisoned **ClawHub** (the official skill marketplace for OpenClaw, an open-source AI agent framework) with approximately **1,184\u20131,200 malicious skills** over approximately 6 weeks. The campaign exfiltrated API keys, cryptocurrency wallets, and browser credentials at scale. It is the canonical real-world case study for skill marketplace supply-chain attacks, anchored in the [SoK: Agentic Skills](../papers/sok-agentic-skills-beyond-tool-use.md) paper.\n\n## Skills Included (malicious patterns)\n\n- **Dual-vector attack:** 100% of malicious skills combined prompt injection + shell access (Snyk ToxicSkills)\n- **SKILL.md shell access:** Malicious skills exploit SKILL.md's ability to include executable scripts \u2014 \"From SKILL.md to Shell Access in Three Lines of Markdown\" (Snyk)\n- **Credential exfiltration:** API keys, crypto wallets, browser credentials stolen at scale\n\n## Context Elements\n\n- **Supply-chain attack pattern** \u2014 marketplace-distributed malicious skills\n- **Dual-vector attack** \u2014 prompt injection + shell access in SKILL.md\n- **Marketplace trust failure** \u2014 ~13% malicious rate (341 of 2,632 audited skills)\n- **Detection framework** \u2014 hierarchical triage (arXiv:2604.06550)\n- **Trust tier model** \u2014 response: graduated trust levels for skills\n\n## How Context Elements Support Skills\n\nClawHavoc demonstrates the **critical need for formal context elements** in skill bundles:\n\n1. **Provenance attestation** \u2014 without in-toto/SLSA provenance, malicious skills are indistinguishable from legitimate ones (see [supply chain agentic factory in toto](supply-chain-agentic-factory-in-toto.md))\n2. **Validation gates** \u2014 the attack validates the need for [three layer validation stack](../concepts/three-layer-validation-stack.md) and [validate skill github action](validate-skill-github-action.md)\n3. **Trust tiers** \u2014 the SoK's trust-tiered execution model directly responds to this attack pattern\n4. **Security scanning** \u2014 validates [nemoclaw security scanner](nemoclaw-security-scanner.md) and [mondoo agent skills security](mondoo-agent-skills-security.md) approaches\n5. **OWASP AST01** \u2014 [owasp agentic skills top 10](owasp-agentic-skills-top-10.md) uses ClawHavoc as its primary real-world evidence\n\n## Composition Notes\n\n- **Detection by the target:** Koi Security's bot detected the malicious skills that were targeting it \u2014 \"found by the bot they were targeting\"\n- **Scale:** ~1,184 poisoned skills over 6 weeks; 341 confirmed malicious out of 2,632 audited (13% rate)\n- **Industry response:** Antiy CERT, Palo Alto Unit 42, Snyk, OWASP all published analyses\n- **Academic anchor:** Used as case study in [sok agentic skills beyond tool use](../papers/sok-agentic-skills-beyond-tool-use.md) (arXiv:2602.20867)\n- **Hierarchical triage:** arXiv:2604.06550 proposes a formal detection framework validated on ClawHavoc data\n\n## Reproducibility\n\nHigh \u2014 multiple independent security firm analyses (Koi, Antiy CERT, Unit 42, Snyk), academic paper with case study, OWASP documentation.\n\n## Bundle Links\n\n- [sok agentic skills beyond tool use](../papers/sok-agentic-skills-beyond-tool-use.md) \u2014 primary case study\n- [owasp agentic skills top 10](owasp-agentic-skills-top-10.md) \u2014 AST01 (Malicious Skills)\n- [purplebox supply chain security](purplebox-supply-chain-security.md) \u2014 supply chain security\n- [skill security governance](../concepts/skill-security-governance.md) \u2014 governance framework\n- [supply chain agentic factory in toto](supply-chain-agentic-factory-in-toto.md) \u2014 SLSA/in-toto provenance\n- [nemoclaw security scanner](nemoclaw-security-scanner.md) \u2014 security scanning\n- [three layer validation stack](../concepts/three-layer-validation-stack.md) \u2014 validation layers\n- [mondoo agent skills security](mondoo-agent-skills-security.md) \u2014 security analysis\n\n## Sources\n\n- https://arxiv.org/abs/2602.20867\n- https://www.koi.ai/blog/clawhavoc-341-malicious-clawedbot-skills-found-by-the-bot-they-were-targeting\n- https://unit42.paloaltonetworks.com/openclaw-ai-supply-chain-risk/\n- https://www.antiy.net/p/clawhavoc-analysis-of-large-scale-poisoning-campaign-targeting-the-openclaw-skill-market-for-ai-agents/\n- https://snyk.io/articles/skill-md-shell-access/\n- https://arxiv.org/abs/2604.06550 (hierarchical triage framework)", "examples/coevoskills-self-evolving-skills": "# CoEvoSkills: Self-Evolving Agent Skills via Co-Evolutionary Verification\n\n**Source:** https://arxiv.org/abs/2604.01687\n**Project Page:** https://zhang-henry.github.io/CoEvoSkills/\n**Date Added:** 2026-07-11 (Iteration 36)\n**Authors:** Hanrong Zhang et al. (UIC, MBZUAI, McGill, Columbia, Zhejiang U, UBC)\n**License:** CC BY 4.0\n**Bundle Type:** Academic Paper \u00b7 Self-Evolving Skill Generation Framework \u00b7 SkillsBench-validated\n**Confidence:** 9/10\n\n## Name & Origin\n\nCoEvoSkills is the first framework to address the **tool\u2013skill gap** in autonomous skill generation. While existing self-evolving methods work for tools (single functions), skills are structured bundles of interdependent multi-file artifacts (workflow instructions, scripts, domain references). CoEvoSkills couples a Skill Generator with a co-evolving Surrogate Verifier to autonomously construct complex skill packages without ground-truth test labels.\n\n## Skills Included\n\n- **Skill Generator:** Iteratively refines multi-file skill packages (SKILL.md + scripts/ + references/)\n- **Surrogate Verifier:** Co-evolves with the generator to provide informative, actionable feedback\n- **Skill-Creator Workflow:** Draft \u2192 test \u2192 iterate (\u22653 iterations) \u2192 save to `.claude/skills/`\n- **YAML Frontmatter:** Proper name + description per skill\n- **Progressive Disclosure:** Constraints \u2192 workflow \u2192 edge cases \u2192 scripts/\n\n## Context Elements\n\n- **Multi-file skill packages** \u2014 workflow instructions + executable scripts + domain references (the Anthropic skill model)\n- **Co-evolutionary verification** \u2014 generator + verifier co-evolve; verifier provides feedback without ground-truth\n- **SkillsBench evaluation** \u2014 benchmark-validated on 87 tasks across 8 domains\n- **Human\u2013machine cognitive misalignment** \u2014 key problem addressed; human-curated skills can degrade agent performance in some domains (e.g., Natural Science)\n- **Generalization testing** \u2014 validated on Claude Code + Codex + 6 additional LLMs\n\n## How Context Elements Support Skills\n\nThe **Surrogate Verifier** is itself a novel context element \u2014 it acts as a formal quality gate for skill bundles, analogous to how [SHACL validation](schimatos-shacl-knowledge-graph.md) constrains knowledge graphs. Unlike static validation (SHACL shapes), the verif
