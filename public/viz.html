atforms, LLMs, and categories)\n\n## Context Elements\n\n- **Two-channel attack model** \u2014 Artifact (helper script) + instruction (SKILL.md) separation\n- **SKILL.md rewriting** \u2014 Manipulation of the skill definition file (cf. [agent skills spec](agent-skills-spec.md))\n- **Front-loaded inducement** \u2014 Exploiting positional bias in LLM instruction following\n- **Closed-loop multi-agent** \u2014 Attack\u2192Victim\u2192Evaluate feedback cycle\n- **Trace-driven refinement** \u2014 Execution trace analysis for iterative improvement\n\n## Relation to Skill Bundle Patterns\n\nSkillJect demonstrates that the SKILL.md specification itself is an attack surface. The skill bundle structure (instructions + scripts + resources) can be weaponized.\n\n- Attack vector distinct from [badskill backdoor model in skill](badskill-backdoor-model-in-skill.md) (prompt injection vs. model poisoning)\n- Related to [maltool malicious tool attacks](maltool-malicious-tool-attacks.md) (code-level attacks \u2014 SkillJect targets the skill definition layer)\n- Defense counterpart: [skillspector nvidia security scanner](skillspector-nvidia-security-scanner.md) (must scan helper scripts, not just SKILL.md)\n- Related to [skillguard permission framework](skillguard-permission-framework.md) (must govern auxiliary scripts, not just main skill)\n- Exploits the [agent skills spec](agent-skills-spec.md) SKILL.md format\n\n## Key Insight\n\nPoisoned skills are a persistent (not one-shot) threat: they are loaded repeatedly as trusted guidance. The two-channel attack (payload in helper script + inducement in SKILL.md) and closed-loop multi-agent refinement make automated generation of stealthy, effective poisoned skills feasible. This elevates skill-based prompt injection from manual, brittle attacks to automated, adaptive threats.\n", "examples/skillmigrator-cross-domain-transfer": "# SkillMigrator: Beyond Domains \u2014 Reusing Web Skills via Transferable Interaction Patterns\n\n**Origin:** Shiqi He, Yue Cui et al. (arXiv:2606.17645, June 2026)\n\n## Overview\n\nWeb agents that use LLM skills typically can only reuse them within the same website/domain. SkillMigrator enables **cross-domain skill reuse** by matching structural layout patterns instead of specific element references. The core abstraction is the **Transferable Interaction Pattern (TIP)**.\n\n## Transferable Interaction Pattern (TIP)\n\nEach skill is stored as a 4-tuple: **k = \u27e8\u03b9_k, \u03c3_k, \u03a6_k, \u03c4_k\u27e9**\n\n| Component | Description |\n|-----------|-------------|\n| \u03b9_k | Natural-language intent |\n| \u03c3_k | Operation template (e.g., fill-and-submit) |\n| \u03a6_k | Slot schema: {\u03be_1, ..., \u03be_m} each with key, descriptor d_\u03be, synonym set T_\u03be |\n| \u03c4_k | Cleaned accessibility-tree skeleton of page at skill induction time |\n\n**Key design choice:** TIPs do NOT store element references (e.g., `ref=eN`) \u2014 these are dynamic to live pages. Instead, they store **structural layout skeletons** that persist across redesigns and domains.\n\n## Inference Pipeline\n\n1. **Skill Retrieval:** Score = \u03b1 \u00b7 text_sim (Sentence-BERT) + (1-\u03b1) \u00b7 layout_sim (1 - TED/max_size)\n2. **Gate:** Enter skill mode only if top-1 score > \u03b2; else fall back to ReAct\n3. **Slot Binding (Stage A):** Parse slot values from instruction \u2192 Hungarian algorithm for one-to-one assignment\n4. **Slot Binding (Stage B):** Bind slots to live page controls (role+name descriptors) \u2192 Hungarian matching\n5. **Execute:** Fixed plan with bound values; live page determines action count (variable-arity)\n\n## Key Results\n\n| Metric | SkillMigrator | Baselines |\n|--------|---------------|-----------|\n| LLM call reduction (WebArena) | 8.5% vs PolySkill | 16.9% vs ReAct |\n| Cross-domain reuse rate (Mind2Web) | 35.4% | 31% (PolySkill) |\n| LLM call reduction (avg) | 8-10% | vs PolySkill, ASI, SkillWeaver |\n\nAblation confirms layout signal + slot-synonym pools are critical for cross-domain transfer.\n\n## Context Elements\n\n- **TIP (Transferable Interaction Pattern)** \u2014 4-tuple skill representation\n- **Accessibility-tree skeleton** \u2014 structural layout for cross-domain matching\n- **Tree Edit Distance (APTED)** \u2014 layout similarity metric\n- **Slot schema with synonym pools** \u2014 co-clustered training trajectories\n- **Gate mechanism** \u2014 threshold-based ReAct fallback\n- **Hungarian algorithm** \u2014 optimal one-to-one slot assignment\n\n## Relation to Skill Bundle Patterns\n\nSkillMigrator represents **cross-domain skill transfer** in web automation:\n- Complements [skillcraft benchmark](skillcraft-benchmark.md) (composition) \u2014 Migrator transfers, Craft composes\n- Relates to [skillreducer token efficiency](skillreducer-token-efficiency.md) \u2014 both reduce LLM calls (Migrator by reuse, Reducer by content reduction)\n- Extends progressive disclosure pattern \u2014 skills loaded on-demand via structural matching\n\n## Key Insight\n\nCross-domain skill reuse requires **structural layout matching** (accessibility-tree skeletons), not element references. The TIP abstraction (intent + template + slots + layout skeleton) is portable across domains because layout structure is more stable than DOM element IDs. This enables skills learned on one website to be reused on completely different websites.\n", "examples/skillmoo-multi-objective-optimization": "# SkillMOO: Multi-Objective Optimization of Agent Skills for Software Engineering\n\n## Origin\n\n- **arXiv:** 2604.09297 (submitted 10 Apr 2026, v2 17 May 2026)\n- **Authors:** Jingzhi Gong, Ruizhen Gu, Zhiwei Fei, Yazhuo Cao, Lukas Twist, Alina Geiger, Shuo Han, Dominik Sobania, Federica Sarro, Jie M. Zhang\n- **Benchmark:** SkillsBench (16 SE tasks)\n\n## Skills Included\n\nSkillMOO is not a skill bundle itself \u2014 it is a **skill bundle optimization framework** that evolves existing skill bundles through LLM-proposed edits.\n\n## Context Elements\n\n### Multi-Objective Optimization\n- Treats skill bundles as **multi-objective search objects**\n- Uses **NSGA-II Pareto selection** on two objectives: pass rate and inference cost\n- LLM proposes edits; NSGA-II selects the Pareto frontier\n\n### Skill Edit Taxonomy\nAnalysis of 38 skill edits reveals two dominant successful operations:\n- **Pruning** \u2014 removing unnecessary skill content\n- **Substitution** \u2014 replacing one skill approach with another\n\n## Composition Notes\n\nSkillMOO introduces the first **cost-aware, search-based skill engineering** paradigm:\n1. Current practice: static, hand-crafted bundles or evolution on pass rate alone\n2. Problem: a skill can improve task success while raising token cost or introducing misleading guidance\n3. Solution: multi-objective Pareto optimization that balances pass rate AND cost\n\n### Key Results\n- Top pass rate rank on **11/12** non-zero-pass tasks\n- Cost reductions up to **31.7%** over static bundles\n- Pass rate gains up to **21 percentage points**\n- Up to **131%** pass rate improvement while reducing cost up to 32%\n\n## Reproducibility\n\n- Evaluated on SkillsBench (shared benchmark with [skillsbench agent skills benchmark](skillsbench-agent-skills-benchmark.md))\n- 16 SE tasks, 38 skill edits analyzed\n- CC-BY 4.0 license\n\n## Connections\n\n- Complements [coevoskills self evolving skills](coevoskills-self-evolving-skills.md) (co-evolutionary verification) \u2014 SkillMOO optimizes structure, CoEvoSkills optimizes content+verifier\n- Complements [skillreducer token efficiency](skillreducer-token-efficiency.md) \u2014 SkillReducer reduces content, SkillMOO searches configuration space\n- Uses [skillsbench agent skills benchmark](skillsbench-agent-skills-benchmark.md) as evaluation platform\n- Same research group as [effiskill code efficiency optimization](effiskill-code-efficiency-optimization.md) (Jie M. Zhang)\n", "examples/skillopt-trainable-skill-parameters": "# SkillOpt: Agent Skills as Trainable Parameters\n\n**Origin:** Microsoft Research Asia (Bei Liu, Kai Qiu, Dongdong Chen, Chong Luo), June 2026\n**Paper:** \"SkillOpt: Executive Strategy for Self-Evolving Agent Skills\"\n\n## Overview\n\nSkillOpt reframes the question from \"how do we write a better prompt?\" to \"how do we train the skill?\" It treats the skill file as a **trainable parameter** living outside a frozen target model \u2014 like LoRA for prompts instead of weights. The result is a training-style optimization loop with consistent gains, compact readable skill files, and transferable workflow knowledge.\n\n## Forward-Backward-Update Cycle\n\n1. **Forward pass:** Frozen target model executes a batch of training tasks with the current skill\n2. **Backward pass:** Separate optimizer model reads trajectories in reflection minibatches \u2014 distills patterns to preserve (success) and patterns to correct (failures)\n3. **Update step:** Optimizer proposes small add/delete/replace edits \u2192 merged, deduplicated, ranked, clipped by **textual learning rate** (per-step edit budget)\n\n### Validation Gating\n- Candidate skill adopted **only if** it scores strictly higher than current skill on held-out validation\n- Rejected edits \u2192 **rejected-edit buffer** (negative feedback for later optimizer calls)\n- **Slow/meta updates** on slower cadence consolidate longer-horizon lessons\n\n## Key Results\n\n| Configuration | Baseline | SkillOpt | Improvement |\n|---------------|----------|----------|-------------|\n| GPT-5.5 (6-benchmark avg) | 58.8 | 82.3 | +23.5 |\n| GPT-5.5 in Codex | \u2014 | \u2014 | +24.8 |\n| GPT-5.5 in Claude Code | \u2014 | \u2014 | +19.1 |\n| SpreadsheetBench | 41.8 | 80.7 | +38.9 |\n| OfficeQA | 33.1 | 72.1 | +39.0 |\n| LiveMathematicianBench | 37.6 | 66.9 | +29.3 |\n\n**52/52 evaluation cells:** Best or tied-best against human-written skills, one-shot LLM skills, Trace2Skill, TextGrad, GEPA, and EvoSkill.\n\n## Small Model + Skill File\n\n- GPT-5.4-mini + skill (64.3) > GPT-5.4 no-skill (59.7)\n- GPT-5.4-nano + skill (57.4) > GPT-5.2 no-skill (51.3)\n- Qwen3.5-4B + skill > GPT-5.2 no-skill baseline\n- **\"Gains that once required a larger model can now be approximated by one optimized skill file\"**\n\n## Skill Transfer\n\n| Transfer Type | Example | Result |\n|---------------|---------|--------|\n| Cross-model-scale | GPT-5.4 \u2192 Qwen3.5-4B | Skills continue to deliver gains |\n| Cross-harness | Codex \u2192 Claude Code | 22.1 \u2192 81.8 (+59.7, above direct training 80.4) |\n| Cross-task | Math skill \u2192 Math benchmark | Gains maintained |\n\nCross-harness transfer suggests SkillOpt learns **general workflow logic**, not harness-specific recipes.\n\n## Relation to Skill Bundle Patterns\n\nSkillOpt represents the **training-based optimization** paradigm, complementing:\n- [evoskill automated skill discovery](evoskill-automated-skill-discovery.md) (discovery-based) \u2014 SkillOpt outperforms EvoSkill on all cells\n- [skillmoo multi objective optimization](skillmoo-multi-objective-optimization.md) (search-based) \u2014 SkillOpt uses gradient-like text optimization\n- [coevoskills self evolving skills](coevoskills-self-evolving-skills.md) (evolution-based) \u2014 SkillOpt adds validation gating + bounded edits\n- [skillreducer token efficiency](skillreducer-token-efficiency.md) (content reduction) \u2014 SkillOpt grows skills purposefully; SkillReducer reduces them\n\n## Key Insight\n\nTreating skill files as trainable parameters with a proper optimization loop (forward-backward-update, validation gating, learning rate, rejected-edit buffer) produces skills that are compact, auditable, and transferable across models, harnesses, and tasks \u2014 without changing model weights. This is the closest analogue to deep learning optimization applied to the skill layer.\n", "examples/skillreducer-token-efficiency": "# SkillReducer: Optimizing LLM Agent Skills for Token Efficiency\n\n## Origin\n\n- **arXiv:** 2603.29919 (submitted 31 Mar 2026, v2 24 Jun 2026)\n- **Authors:** Yudong Gao, Zongjie Li, Yuanyuan Yuan, Zimo Ji, Pingchuan Ma, Shuai Wang\n- **Study scale:** 55,315 publicly available skills\n\n## Skills Included\n\nSkillReducer is a **skill optimization framework** that reduces token waste in agent skills while preserving or improving functional quality.\n\n## Context Elements\n\n### Empirical Study (55,315 skills)\nSystemic inefficiencies:\n- **26.4%** lack routing descriptions entirely\n- Over **60%** of body content is non-actionable\n- Reference files inject **tens of thousands of tokens** per invocation\n\n### Two-Stage Optimization\n\n**Stage 1 \u2014 Routing Layer:**\n- Compresses verbose descriptions\n- Generates missing descriptions via **adversarial delta debugging**\n\n**Stage 2 \u2014 Body Restructuring:**\n- **Taxonomy-driven classification** of content\n- **Progressive disclosure** \u2014 separates actionable core rules from supplementary content loaded on demand\n- **Faithfulness checks** + **self-correcting feedback loop**\n\n## Composition Notes\n\nSkillReducer reveals the **bloat problem** in the skill bundle ecosystem and demonstrates a **less-is-more effect**:\n\n1. Removing non-essential content reduces distraction in the context window\n2. Functional quality actually **improves by 2.8%** when content is optimized\n3. Progressive disclosure pattern: load supplementary content on demand, not always\n4. Taxonomy-driven classification: structured approach to identifying actionable vs supplementary content\n\n### Key Results (600 skills + SkillsBench)\n- **48%** description compression\n- **39%** body compression\n- Functional quality **+2.8%** (less-is-more)\n- Cross-model transfer: **5 models, 4 families**, mean retention 0.965\n- Generalizes to independent agent framework\n\n## Reproducibility\n\n- 55,315 skills studied + 600 skills optimized + SkillsBench benchmark\n- CC-BY license\n\n## Connections\n\n- **Skill optimization triad:**\n  - [skillmoo multi objective optimization](skillmoo-multi-objective-optimization.md): search-based (NSGA-II Pareto)\n  - [coevoskills self evolving skills](coevoskills-self-evolving-skills.md): evolution-based (co-evolutionary verification)\n  - SkillReducer: content reduction (delta debugging + taxonomy)\n- 26.4% missing routing + 60% non-actionable \u2192 quantifies the problem [skillsbench agent skills benchmark](skillsbench-agent-skills-benchmark.md) tests\n- Progressive disclosure pattern connects to [orca cognitive runtime](orca-cognitive-runtime.md)'s DAG-based lazy loading\n", "examples/skillsbench-agent-skills-benchmark": "# SkillsBench: First Benchmark for Agent Skills Effectiveness\n\n## Overview\n\nSkillsBench is the **first systematic benchmark** designed to measure how well agent skills improve AI agent performance across diverse tasks. Rather than measuring fixed agent capabilities, SkillsBench uses **paired evaluation** \u2014 it measures the delta between agent performance with and without skills to isolate augmentation efficacy.\n\n**Context Elements:** Paired evaluation methodology \u00b7 Task taxonomy across domains \u00b7 Procedural knowledge evaluation framework \u00b7 Score normalization for cross-domain comparison\n\n## Key Findings\n\n### Overall Results\n- Curated agent skills raise AI performance by **+16.2 percentage points** on average\n- Healthcare domain sees gains of **+51.9pp** \u2014 the largest single-domain improvement\n- Procedural knowledge (what to do, how to do it) is the primary driver of skill effectiveness\n\n### Methodology\nSkillsBench introduces **paired evaluation**:\n1. Agent completes task WITHOUT skills \u2192 baseline score\n2. Agent completes task WITH skills \u2192 augmented score\n3. Delta = augmentation efficacy\n\nThis contrasts with traditional benchmarks that measure absolute performance on fixed tasks. The paired approach isolates the **incremental value of skills**.\n\n### Task Coverage\nSkills evaluated across diverse domains:\n- Healthcare (largest gains)\n- Engineering / Development\n- Research / Analysis\n- Business / Marketing\n- Legal / Compliance\n\n## Context Element Coverage\n\n**Type: Benchmark Methodology** \u2014 The paired evaluation framework provides a formal **scoring function** that can be applied to any skill bundle to measure its empirical effectiveness.\n\n**Type: Task Taxonomy** \u2014 SkillsBench's categorized task set serves as a **benchmark taxonomy** that can be used to evaluate skill bundle coverage and identify gaps.\n\n**Type: Augmentation Efficacy Metric** \u2014 The delta metric (with-skills score minus without-skills score) provides a standardized way to compare skill bundles across tools and domains.\n\n## Impact for Skill Bundles\nSkillsBench provides the **measurement foundation** for skill bundle quality claims. Until now, bundle effectiveness was assessed qualitatively. SkillsBench enables:\n- Quantified claims: \"Bundle X improves task completion by +Y%\"\n- Cross-platform comparison: Same skills tested on Claude Code vs Codex vs Gemini CLI\n- Domain optimization: Identify which skill categories matter most per domain\n\n## v1.1 Update (2026-07-11)\n\nSkillsBench v1.1 now has **87 tasks across 8 domains** with a live leaderboard of **24 model-harness configurations**:\n\n| Rank | Agent | Without | With Skills | \u0394 | Gain (g) |\n|------|-------|---------|-------------|---|----------|\n| 1 | GPT-5.5 OpenHands | 51.5% | 67.3% | +15.8 | 32.6% |\n| 2 | GPT-5.5 Codex | 46.8% | 66.5% | +19.7 | 37.0% |\n| 3 | Opus 4.7 Claude Code | 43.0% | 61.2% | +18.2 | 31.9% |\n| 4 | Gemini 3.1 Pro Gemini CLI | 36.0% | 60.8% | +24.8 | 38.7% |\n| 5 | GLM 5.1 OpenHands | 32.7% | 58.4% | +25.7 | 38.1% |\n\n- **Normalized gain (g)** measures skill effectiveness relative to room for improvement\n- **Three abstraction layers:** Skills (applications) \u2192 Agent Harness (OS) \u2192 Models (CPUs)\n- **8 professional domains:** SE, Industrial & Physical Systems, Natural Science, Office & White Collar, Finance & Economics, Mathematics & OR, Cybersecurity, Media & Content Production\n- **Fleet trend:** Resolution rate improving +2.2 pts/month across model releases\n\n## Confidence\n9/10 \u2014 Published on arXiv, live website at skillsbench.ai with leaderboard, 24-config evaluation.\n\n## Sources\n- https://arxiv.org/abs/2602.12670\n- https://www.skillsbench.ai\n- https://www.skillsbench.ai/blogs/introducing-skillsbench\n- https://github.com/benchflow-ai/skillsbench (v1.1)", "examples/skillsieve-malicious-skill-detection": "# SkillSieve: A Hierarchical Triage Framework for Detecting Malicious AI Agent Skills\n\n## Origin\n\n- **arXiv:** 2604.06550 (submitted 8 Apr 2026, v2 26 May 2026)\n- **Authors:** Yinghan Hou, Zongyou Yang, Zaihu Pang, Xiujun Ma\n- **Cited by:** 17\n- **Data:** 49,592 ClawHub skills (2026-04-04 snapshot) + adversarial samples\n\n## Skills Included\n\nSkillSieve is a **skill security validation framework** \u2014 a three-layer detection pipeline for identifying malicious agent skills.\n\n## Context Elements\n\n### Three-Layer Detection Pipeline\n\n**Layer 1 \u2014 Heuristic Filter (recall-tuned):**\n- Regex, AST, and metadata checks\n- Filters **86%** of volume at near-zero cost\n- Runs on $440 ARM single-board computer\n\n**Layer 2 \u2014 LLM Analysis:**\n- Routes suspicious skills to an LLM\n- Splits analysis into **4 parallel sub-tasks** with structured outputs\n- Corrects Layer 1 false positives from domain-specific idioms\n\n**Layer 3 \u2014 LLM Jury:**\n- High-risk skills go before a **jury of 3 LLMs**\n- Independent voting + debate when they disagree\n- Optional XGBoost fast-path cuts 32% of Layer-2/3 calls (1.6-point F1 reduction)\n\n## Composition Notes\n\nSkillSieve is the most sophisticated skill security validation framework to date:\n\n1. **Multi-modal detection** \u2014 combines static analysis (regex/AST) with semantic analysis (LLM) for both code and natural-language threats\n2. **Hierarchical triage** \u2014 cost-efficient pipeline applying expensive analysis only where needed\n3. **LLM jury mechanism** \u2014 3-LLM voting + debate, a novel governance pattern for high-stakes decisions\n4. **Cross-ecosystem portability** \u2014 adapted from ClawHub to Feishu/Lark (52 packages scanned)\n5. **Deployed** as Feishu chat bot for real-time skill vetting\n\n### Key Results\n- **F1 = 0.920** (precision 0.912, recall 0.929) on 390-skill labeled benchmark\n- Cost: **$0.006 per skill**\n- Malicious skills average **4.03 vulnerabilities** across median **3 kill chain phases**\n- Two ecosystem archetypes: Data Exfiltration vs System Compromise\n- Open-sourced (code, data, benchmark)\n\n## Reproducibility\n\n- 49,592 real ClawHub skills + adversarial samples across 5 evasion techniques\n- Cross-validated on Feishu/Lark (52 real packages)\n- Open-sourced\n\n## Connections\n\n- Extends [three layer validation stack](../concepts/three-layer-validation-stack.md) with security-specific hierarchy\n- Complements [clawhavoc marketplace attack](clawhavoc-marketplace-attack.md) (the threat being detected)\n- Complements [supply chain agentic factory in toto](supply-chain-agentic-factory-in-toto.md) (provenance approach to similar problem)\n- Validates marketplace risk data from [sok agentic skills beyond tool use](../papers/sok-agentic-skills-beyond-tool-use.md) (13-26% vulnerability rate)\n", "examples/skillspector-nvidia-security-scanner": "# SkillSpector: NVIDIA Security Scanner for AI Agent Skills\n\n**Origin:** NVIDIA (GitHub: nvidia/skillspector)\n**Stars:** 13.2k | Forks: 1.1k | Contributors: 38\n**License:** Apache 2.0\n**Version:** 2.3.13 (Jul 14, 2026)\n\n## Overview\n\nSkillSpector is NVIDIA's open-source security scanner for AI agent skills. It detects vulnerabilities, malicious patterns, and security risks before installing agent skills. It is the scanning component of the NVIDIA-Verified Agent Skills ecosystem \u2014 the operational implementation of the \"scan\" step in the governance pipeline: catalog \u2192 **scan** \u2192 sign \u2192 document \u2192 distribute.\n\n## Detection Capabilities\n\n1. **YARA-based pattern matching** \u2014 Uses YARA rules (1.1% of codebase) for known malicious code patterns\n2. **OWASP + MITRE alignment** \u2014 Scanning coverage grounded in recognized AI security governance frameworks\n3. **LLM semantic analysis** \u2014 Multi-provider support (Anthropic direct + Vertex proxy, Bedrock) for semantic threat analysis\n4. **MCP least-privilege analysis** \u2014 Analyzes MCP server permissions for over-privilege\n5. **Batch scanning** \u2014 `contrib/batch_scan` module for scanning multiple skills at once\n6. **CI/CD integration** \u2014 GitHub Actions workflows for automated scanning in pipelines\n\n## Architecture\n\n- `src/skillspector/` \u2014 Core scanner logic\n- `extensions/` \u2014 Plugin system (includes CI scan tool)\n- `contrib/batch_scan/` \u2014 Batch scanning utilities\n- `tests/` \u2014 Comprehensive test suite (1312 unit tests passing)\n- `.github/workflows/` \u2014 CI/CD (lint, unit tests, Docker smoke, OSS release sync)\n- Internal-to-OSS release pipeline (`scripts/create-oss-release.sh`)\n\n## Context Elements\n\n- **YARA rules** \u2014 Pattern-based malicious code detection (formal rule definitions)\n- **OWASP LLM guidance** \u2014 Security framework alignment\n- **MITRE frameworks** \u2014 Threat modeling alignment\n- **Skill cards** \u2014 Trust metadata (from NVIDIA-verified ecosystem)\n- **Cryptographic signing** \u2014 skill.oms.sig (from NVIDIA-verified ecosystem)\n- **CI/CD integration** \u2014 Automated scanning as deployment gate\n\n## Relation to Skill Bundle Patterns\n\nSkillSpector operationalizes the scanning step of the [nvidia verified agent skills governance](nvidia-verified-agent-skills-governance.md) pipeline. It is the industry-grade, productionized counterpart to academic detection frameworks.\n\n- Operationalizes [nvidia verified agent skills governance](nvidia-verified-agent-skills-governance.md) (scanning step)\n- Complements [skillsieve malicious skill detection](skillsieve-malicious-skill-detection.md) (three-layer LLM-based triage \u2014 SkillSpector adds YARA + CI integration)\n- Related to [skillfortify formal verification supply chain](skillfortify-formal-verification-supply-chain.md) (formal supply chain analysis \u2014 SkillSpector is the practical scanner)\n- Related to [skillguard permission framework](skillguard-permission-framework.md) (runtime governance \u2014 SkillSpector is pre-installation)\n- Defense counterpart to [maltool malicious tool attacks](maltool-malicious-tool-attacks.md), [badskill backdoor model in skill](badskill-backdoor-model-in-skill.md), [skillject automated prompt injection](skillject-automated-prompt-injection.md)\n- Related to [nemoclaw security scanner](nemoclaw-security-scanner.md) (earlier NVIDIA scanner, SkillSpector is the successor)\n\n## Key Insight\n\nProduction-grade skill security scanning requires both pattern-based detection (YARA) and semantic analysis (LLM). SkillSpector combines both with industry-standard frameworks (OWASP, MITRE) and integrates directly into CI/CD pipelines, making pre-installation scanning a first-class deployment gate rather than an afterthought.\n", "examples/spring-ai-agent-skills": "# Spring AI \u2014 Generic Agent Skills for the Java Ecosystem\n\n**Source:** https://spring.io/blog/2026/01/13/spring-ai-generic-agent-skills\n**Date Added:** 2026-05-26 (Iteration 11)\n**Dependency:** Spring AI 2.0.0-M2+, spring-ai-agent-utils v0.4.2\n**Bundle Type:** Java Framework \u00b7 LLM-Agnostic Platform \u00b7 Generic Skill Implementation\n**Confidence:** 8/10\n\n## Name & Origin\n\nSpring AI's **Generic Agent Skills** implementation brings the Agent Skills open specification to the Java/Spring ecosystem. Published January 2026 as the first in a five-part series on agentic patterns, it makes skills available to any Spring AI application regardless of LLM provider (OpenAI, Anthropic, Google Gemini, etc.).\n\n## Skills Included\n\n- Standard SKILL.md-based skill discovery and loading (Claude Code compatible)\n- File system access tools for skill reference files\n- Shell script execution for skill helper scripts\n- Dynamic Tool Discovery integration for large skill inventories\n\n## Context Elements\n\n- **Three Core Tools Architecture:**\n  1. `SkillsTool` (Required) \u2014 discovery + loading of SKILL.md, handles progressive disclosure\n  2. `FileSystemTools` (Optional) \u2014 LLM reads reference files on demand\n  3. `ShellTools` (Optional) \u2014 LLM executes helper scripts via local Bash\n- **Progressive Disclosure (3-stage):** Discovery (name+description) \u2192 Activation (full SKILL.md) \u2192 Execution (scripts + references)\n- **LSM Agnostic:** Skills work with OpenAI, Anthropic, Google Gemini, and any LLM supported by Spring AI\n- **Integration:** Works with Dynamic Tool Discovery (tool search reduces token overhead by up to 85%) and Tool Argument Augmentation\n\n## How Context Elements Support Skills\n\nSpring AI's architecture formalizes the **three core capabilities** any skill runtime needs:\n\n1. **SkillsTool = Discovery + Loading:** Handles progressive disclosure, separating metadata browsing from full instruction loading\n2. **FileSystemTools = Reference Access:** Skills can reference documentation, templates, and data files without embedding them in SKILL.md\n3. **ShellTools = Execution:** Scripts run locally, only output is added to context \u2014 saving tokens on long-running operations\n\n**Example:** A YouTube transcript skill has SKILL.md instructing the LLM to run `uv run scripts/get_youtube_transcript.py <url>`. The script executes via ShellTools, only the resulting transcript enters context.\n\n## Comparison: Generic vs Anthropic Native\n\n| Dimension | Spring AI Generic | Anthropic Native |\n|-----------|------------------|-----------------|\n| Environment | Your infrastructure | Anthropic cloud sandbox |\n| Model Support | Any LLM | Claude only |\n| Resource Access | Local filesystem, network | Restricted sandbox |\n| Security | No built-in sandboxing | Cloud sandbox |\n| Portability | Portable across runtimes | Claude-specific |\n\n## Critical Considerations\n\n- **No sandboxing:** Scripts execute on host machine \u2014 containers (Docker/Kubernetes) recommended\n- **No approval mechanism:** Custom ToolCallback wrappers needed for sensitive operations\n- **Series roadmap:** Part 2 covers AskUserQuestionTool, Part 3 TodoWriteTool, Part 4 Subagent Orchestration, Part 5 A2A Integration\n\n## Reproducibility\n\nHigh - public Spring blog post with complete code examples, Maven/Gradle dependency available, open-source spring-ai-agent-utils library.\n\n## Bundle Links\n- [microsoft agent framework skills](microsoft-agent-framework-skills.md) \u2014 .NET/Python counterpart\n- [agent skills spec](agent-skills-spec.md) \u2014 The open standard Spring AI implements\n- [claude api skills integration](claude-api-skills-integration.md) \u2014 Anthropic's native implementation (Generic vs Native comparison)\n- [ylang labs agent skills overview](ylang-labs-agent-skills-overview.md) \u2014 Defines the \"recipes vs kitchen\" metaphor for Skills vs MCP", "examples/sssom-mapping-protocol": "# SSSOM Protocol \u2014 Simple Standard for Sharing Ontological Mappings\n\n**Source:** https://github.com/mapping-commons/sssom/, https://mapping-commons.github.io/sssom/dev/\n**Python Toolkit:** https://github.com/mapping-commons/sssom-py\n**Date Added:** 2026-05-24 (Iteration 8)\n**Author:** Mapping Commons\n**Bundle Type:** SSSOM Mapping + Ontology Interoperability\n**Confidence:** 9/10\n\n## Name & Origin\n\nSSSOM (Simple Standard for Sharing Ontological Mappings) provides a TSV-based representation for ontology term mappings with a comprehensive metadata model for provenance. It is designed for interoperability between different systems and organizations that need to map terms across ontologies.\n\n## Skills Included\n\n- Reading and writing SSSOM mapping files (TSV format)\n- Mapping provenance documentation\n- Converting mappings between formats\n- Integrating SSSOM mappings into agent workflows for cross-ontology translation\n\n## Context Elements\n\n- **SSSOM Mapping:** Core specification \u2014 standardized TSV format for ontology-to-ontology mappings with fields for:\n  - Subject/concept identifiers\n  - Mapping predicates (exactMatch, closeMatch, relatedMatch, etc.)\n  - Confidence scores\n  - Provenance metadata (who created the mapping, when, using what method)\n  - Justification and evidence\n- **Python Toolkit (sssom-py):** CLI and library for programmatic SSSOM manipulation\n- **Metadata Model:** Rich provenance tracking built into the format itself\n\n## How Context Elements Support Skills\n\nSSSOM provides the **mapping layer** that agents need when they work with data from multiple ontologies or schema systems. A skill that uses SSSOM can:\n1. Read pre-existing mappings between ontologies\n2. Create new mappings with full provenance tracking\n3. Use mappings to translate queries across schema boundaries\n4. Report confidence scores on mapping relationships\n\nThis directly addresses the \"SSSOM Mapping\" category in our bundle taxonomy. Combined with [open ontologies paper](open-ontologies-paper.md) (which implements stable matching for ontology alignment), SSSOM provides the standard format for expressing those mapping results.\n\n## Composition Notes\n\nSSSOM is a **context element first** \u2014 it's not a skill itself but a standard that skills can use. The pattern is:\n- Agent has a skill that needs to work across multiple ontologies\n- SSSOM files provide the mapping definitions\n- The skill reads SSSOM to translate between schemas\n- All mappings carry provenance and confidence scores\n\nThis is analogous to how SHACL provides validation shapes: SSSOM provides mapping definitions. Both are declarative artifacts that skills consume.\n\n## Reproducibility\n\nHigh \u2014 open standard with Python implementation. TSV format is human-readable. sssom-py provides programmatic access.\n\n## Relationship to Other Examples\n\n- **[open ontologies paper](open-ontologies-paper.md)** implements ontology alignment (stable matching); SSSOM is the format for expressing those alignment results\n- **[open ontologies github](open-ontologies-github.md)** provides 32 standard ontologies in its marketplace; SSSOM mappings could be added to define relationships between these ontologies\n- **[xpshacl explainable shacl](xpshacl-explainable-shacl.md)** validates RDF graphs; SSSOM mappings enable multi-ontology validation scenarios", "examples/superpowers-engineering-discipline-skills": "# Superpowers: Engineering Discipline as Skills\n\n## Overview\n\n[Superpowers](https://github.com/obra/superpowers) by Jesse Vincent is a **multi-host skills framework** that encodes software engineering best practices as 14 SKILL.md files. It addresses a specific failure mode: AI coding agents know best practices but skip them for shortcuts. The framework bundles **Iron Laws** (non-negotiable constraints), **Red Flags** (common rationalizations to avoid), and a **Methodology Cycle** (linear workflow enforced by skill activation).\n\n**Context Elements:** YAML frontmatter \u00b7 Iron Laws (constraint rules) \u00b7 Red Flag lists (negative constraints) \u00b7 Multi-host manifests \u00b7 Session-start bootstrap hook\n\n## Core Architecture\n\n### 14 Skills\nSix central skills drive the methodology:\n1. **brainstorming** \u2014 Force design approval before any code\n2. **writing-plans** \u2014 Break features into 2-5 minute tasks with file paths\n3. **test-driven-development** \u2014 Enforce red/green/refactor; delete code if no tests written first\n4. **systematic-debugging** \u2014 Four-phase process forbidding guess-and-check\n5. **subagent-driven-development** \u2014 Dispatch implementation to fresh agent, second agent for review\n6. **verification-before-completion** \u2014 Require reading and verifying actual command output\n\n### Iron Laws\nEach skill has a non-negotiable constraint:\n- TDD: \"NO PRODUCTION CODE WITHOUT A FAILING TEST FIRST\"\n- Verification: \"NO COMPLETION CLAIMS WITHOUT FRESH VERIFICATION EVIDENCE\"\n- Debugging: \"NO FIXES WITHOUT ROOT CAUSE INVESTIGATION FIRST\"\n\n### Multi-Host Manifests\nSmall files (`.claude-plugin/`, `.cursor-plugin/`) enable discovery across:\n- Claude Code, Cursor, OpenAI Codex, GitHub Copilot CLI, Gemini CLI, OpenCode\n\n## Context Elements\n\n**Type: Constraint Rules (Iron Laws)** \u2014 The Iron Laws are **declarative constraints** embedded in each skill's SKILL.md that the agent must not violate. This is a novel pattern: skills that encode *prohibitions* rather than just procedures.\n\n**Type: Negative Constraints (Red Flags)** \u2014 Lists of rationalizations the agent commonly uses to skip discipline, explicitly documented so the agent can self-detect when it's rationalizing.\n\n**Type: Session Hook Bootstrap** \u2014 A <2,000 token document loaded at session start that forces the agent to invoke relevant skills before acting.\n\n**Type: Multi-host Discovery Manifests** \u2014 Platform-specific manifest files that enable the same markdown skills to be discovered by different AI coding tools without modification.\n\n## Methodology Cycle\nBrainstorming \u2192 Git Worktree \u2192 Written Plan \u2192 Subagent Implementation \u2192 Code Review \u2192 Finishing\n\nThis linear workflow is the **composition rule** \u2014 skills are activated in order, not randomly.\n\n## Reproducibility\nHigh \u2014 Clone repo, copy to `~/.claude/skills/` or equivalent, restart agent session. No dependencies beyond the markdown files.\n\n## Confidence\n9/10 \u2014 Well-documented framework with clear philosophy and testable methodology.\n\n## Sources\n- https://blog.marcnuri.com/superpowers-claude-code-skills-framework\n- https://github.com/obra/superpowers", "examples/supply-chain-agentic-factory-in-toto": "# Supply Chain Security Meets the Agentic Factory (SLSA/in-toto for Skills)\n\n**Source:** https://medium.com/@rbean_3467/supply-chain-security-meets-the-agentic-factory-5a770c34369b (19 Mar 2026)\n**GitHub:** https://github.com/konflux-ci/fullsend\n**Date Added:** 2026-07-11 (Iteration 36)\n**Author:** ralphbean (Red Hat / Konflux team)\n**Bundle Type:** Supply Chain Framework \u00b7 Provenance Model \u00b7 Threat Analysis\n**Confidence:** 8/10\n\n## Name & Origin\n\nThe first concrete proposal to extend **SLSA/in-toto provenance** to the agentic code generation pipeline. Written by a Red Hat engineer on the Konflux team, it identifies the \"intent \u2192 source\" gap in existing supply chain security frameworks and proposes the \"fullsend\" project for fully autonomous agentic engineering with security-grade attestation.\n\n## Skills Included\n\nThis is a framework/infrastructure entry, not a skill bundle per se. However, it directly informs how **skill packages** should be provenance-attested:\n\n- **in-toto attestations** \u2014 cryptographic provenance for build processes\n- **SLSA Build provenance** \u2014 structured claims about how software is produced\n- **Hermeto** \u2014 hermetic build tool (pre-fetch dependencies, disable network)\n- **Tekton Chains** \u2014 neutral observer that signs attestations from outside the build\n- **Conforma** \u2014 policy engine that evaluates attestations against rules\n\n## Context Elements\n\n- **in-toto attestation framework** \u2014 specification for verifiable claims about software production\n- **SLSA framework** \u2014 Supply-chain Levels for Software Artifacts (Build Level 3 achieved via neutral observer)\n- **Neutral observer pattern** \u2014 signing key isolated from build process (SLSA L3)\n- **Hermetic builds** \u2014 complete ingredient manifest; network disabled during build\n- **Contextual SBOMs** \u2014 hierarchical relationships (DESCENDANT_OF, BUILD_TOOL_OF)\n- **Policy gates** \u2014 Conforma engine evaluates attestations before release\n- **Threat model** for agentic development:\n  1. External prompt injection\n  2. Insider threats / compromised credentials\n  3. Agent drift\n  4. Supply chain attacks on the agent itself\n\n## How Context Elements Support Skills\n\nThis framework identifies a critical gap: **the supply chain is now `intent \u2192 source \u2192 binary`**, but we only have provenance for `source \u2192 binary`. For skill bundles specifically:\n\n1. **Skill provenance:** Skills distributed via marketplaces need attestations (who created them, how, with what model)\n2. **Intent verification:** The \"intent \u2192 source\" gap applies to skill authoring \u2014 a compromised model could generate malicious skills\n3. **Neutral observer for skills:** The pattern could verify skill quality from outside the generation process (analogous to [CoEvoSkills](coevoskills-self-evolving-skills.md)' Surrogate Verifier)\n4. **Policy gates for skills:** Map to [validate skill github action](validate-skill-github-action.md) and [three layer validation stack](../concepts/three-layer-validation-stack.md)\n5. **Hermetic skill builds:** Pre-fetch all skill dependencies, verify no smuggling\n\n## Composition Notes\n\nThe \"fullsend\" project (Konflux community) is exploring:\n- Formal intent verification\n- Zero-trust inter-agent review\n- Autonomous merge with security-grade attestation\n- Agent governance frameworks\n- Provenance for the code generation step itself\n\nThis is the **infrastructure-level complement** to the academic security analysis in [sok agentic skills beyond tool use](../papers/sok-agentic-skills-beyond-tool-use.md) and [owasp agentic skills top 10](owasp-agentic-skills-top-10.md).\n\n## Reproducibility\n\nMedium-High \u2014 blog post with detailed technical content, GitHub project (konflux-ci/fullsend) with open problem domain documents and active PRs.\n\n## Bundle Links\n\n- [purplebox supply chain security](purplebox-supply-chain-security.md) \u2014 existing supply chain entry\n- [skill security governance](../concepts/skill-security-governance.md) \u2014 governance framework\n- [sok agentic skills beyond tool use](../papers/sok-agentic-skills-beyond-tool-use.md) \u2014 ClawHavoc case study\n- [three layer validation stack](../concepts/three-layer-validation-stack.md) \u2014 validation layers\n- [validate skill github action](validate-skill-github-action.md) \u2014 policy gate equivalent\n- [clawhavoc marketplace attack](clawhavoc-marketplace-attack.md) \u2014 real-world supply chain attack\n- [coevoskills self evolving skills](coevoskills-self-evolving-skills.md) \u2014 verifier as neutral observer analog\n\n## Sources\n\n- https://medium.com/@rbean_3467/supply-chain-security-meets-the-agentic-factory-5a770c34369b\n- https://github.com/konflux-ci/fullsend\n- https://in-toto.io/\n- https://slsa.dev/", "examples/swe-skills-bench-utility-benchmark": "# SWE-Skills-Bench: Do Agent Skills Actually Help in Software Engineering?\n\n**Origin:** Nanjing University (arXiv:2603.15401, Mar 2026)\n**Citations:** 34\n**GitHub:** https://github.com/GeniusHTX/SWE-Skills-Bench\n**Authors:** Tingxu Han, Yi Zhang, Wei Song, Chunrong Fang, Zhenyu Chen, Youcheng Sun, Lijie Hu\n\n## Overview\n\nSWE-Skills-Bench is the first **requirement-driven** benchmark that isolates the **marginal utility** of agent skills in real-world software engineering. It asks the critical question: do agent skills actually help? The answer is more sobering than the rapid adoption of skills suggests.\n\n## Benchmark Design\n\n- **49 public SWE skills** \u2014 Real skills from the wild, not synthetic\n- **Authentic GitHub repositories** \u2014 Pinned at fixed commits for reproducibility\n- **Requirement documents** \u2014 With explicit, verifiable acceptance criteria\n- **~565 task instances** \u2014 Across 6 SWE subdomains\n- **Deterministic verification** \u2014 Each task's acceptance criteria mapped to execution-based tests\n- **Paired evaluation** \u2014 Same task evaluated with and without the skill (controlled comparison)\n\n## Results: The Sobering Reality\n\n| Metric | Value |\n|--------|-------|\n| Skills yielding zero pass-rate improvement | 39 of 49 (80%) |\n| Average gain from skill injection | +1.2% |\n| Token overhead range | modest savings to **+451%** |\n| Skills with meaningful gains | 7 (up to +30%) |\n| Skills that **degrade** performance | 3 (up to -10%) |\n\n## Key Findings\n\n1. **80% of skills provide zero benefit** \u2014 39 of 49 SWE skills yield zero pass-rate improvement. This is the first large-scale empirical challenge to the \"more skills = better\" assumption.\n\n2. **Token overhead without benefit** \u2014 Some skills increase token usage by 451% while pass rates remain unchanged. Skills can be actively wasteful, not just neutral.\n\n3. **Version-mismatch harm** \u2014 3 skills degrade performance (up to -10%) due to version-mismatched guidance conflicting with project context. This is a real-world skill bundle failure mode.\n\n4. **Skills are a narrow intervention** \u2014 Utility depends strongly on:\n   - **Domain fit** \u2014 Does the skill match the task domain?\n   - **Abstraction level** \u2014 Is the skill at the right level of abstraction?\n   - **Contextual compatibility** \u2014 Does the skill's guidance align with the project's actual state?\n\n5. **Only 7 specialized skills help** \u2014 Meaningful gains (up to +30%) come from highly specialized, well-matched skills.\n\n## Context Elements\n\n- **Requirement-driven benchmark** \u2014 Skills evaluated against real requirements (not synthetic tasks)\n- **Execution-based acceptance criteria** \u2014 Deterministic test mapping (no subjective evaluation)\n- **Paired evaluation methodology** \u2014 With/without skill on same task instance (isolates marginal utility)\n- **6 SWE subdomains** \u2014 Domain coverage for utility analysis\n- **Version pinning** \u2014 GitHub repos at fixed commits (reproducibility)\n\n## Relation to Skill Bundle Patterns\n\nSWE-Skills-Bench provides the first rigorous empirical evaluation of skill utility. Its findings challenge the field's assumptions.\n\n- Critical counterpoint to skill adoption enthusiasm (80% zero improvement)\n- Complements [skillreducer token efficiency](skillreducer-token-efficiency.md) (less-is-more effect \u2014 SWE-Skills-Bench quantifies the waste)\n- Related to [skillsbench agent skills benchmark](skillsbench-agent-skills-benchmark.md) (general skills benchmark \u2014 SWE-Skills-Bench is SWE-specific)\n- Related to [skillgenbench skill generation benchmark](skillgenbench-skill-generation-benchmark.md) (generation evaluation \u2014 SWE-Skills-Bench is deployment evaluation)\n- Provides evaluation methodology missing from [agent skills spec](agent-skills-spec.md) (specification without utility measurement)\n- Validates [externalization llm agents unified review](externalization-llm-agents-unified-review.md) theory (skills as externalized procedural expertise can fail when expertise doesn't match context)\n- Version-mismatch finding connects to [skillmigrator cross domain transfer](skillmigrator-cross-domain-transfer.md) (contextual compatibility matters)\n\n## Key Insight\n\nAgent skills are not a universal performance booster. In real-world software engineering, 80% of skills provide zero benefit, and some are actively harmful (both in wasted tokens and degraded performance). Skill utility is a narrow, context-dependent intervention \u2014 the field needs rigorous evaluation, not just enthusiastic adoption.\n", "examples/text2shacl-multi-agent-shacl": "# citiususc/text2shacl \u2014 Multi-Agent LangGraph Pipeline for SHACL Generation\n\n**Source:** https://github.com/citiususc/text2shacl\n**Date Added:** 2026-06-01 (Iteration 13)\n**License:** Apache-2.0 | **Stars:** 8 | **Forks:** 0 | **Latest Release:** v1.0 (May 8, 2026)\n**Topics:** `shacl` \u00b7 `knowledge-graphs` \u00b7 `llm`\n**Language:** HTML 96.3% / Python 3.1% / Other 0.6%\n**Bundle Type:** Multi-Agent SHACL Generation \u00b7 RAG \u00b7 LLM Evaluation\n**Confidence:** 9/10\n\n## Name & Origin\n\n`text2shacl` is an **ontology-driven multi-agent system for extracting SHACL shapes from text**, focused on the ERA (European Union Agency for Railways) ontology and RINF Application Guide. It uses a LangGraph multi-agent pipeline with RAG over the ontology + technical docs to generate SHACL constraints in Turtle format.\n\nThis is the **inverse** of the typical SHACL workflow: instead of **validating** RDF against existing shapes, it **generates** shapes from natural-language requirements docs.\n\n## Skills Included (4-Stage Pipeline)\n\n1. **HTML preprocessing** \u2014 RINF Application Guide cleaned, split into semantic chunks. Text + tables + images extracted.\n2. **RAG indexing** \u2014 Text/table chunks summarized by LLM; images described by vision model. Summaries stored in **Chroma** (vector index). Original chunks in **Redis** (document store).\n3. **SHACL generation** \u2014 For each ontology property, a **LangGraph multi-agent workflow** gathers evidence from ontology, optional Astrea baseline, RAG context. Outputs SHACL shapes in Turtle.\n4. **Post-processing & merging** \u2014 Shapes validated, cleaned, optionally merged with Astrea baseline using `priority-llm` or `restrictive` strategies.\n\n## Context Elements\n\n- **Input Ontologies:** ERA OWL ontology (`ontology.ttl`)\n- **Baseline Shapes:** Astrea (`astrea-shapes.ttl`) \u2014 published reference shapes\n- **Gold Standard:** `era-shapes.ttl` \u2014 manually curated shapes\n- **RAG Stores:** Chroma (vector index for summaries) + Redis (document store for original chunks)\n- **Evaluation Framework:** 5 LLMs \u00d7 2 input versions \u00d7 2 merge strategies\n\n## Models Evaluated\n\n- Gemma 3 12B\n- GPT-OSS 120B\n- Llama 3.3 70B\n- Mixtral 8x7B\n- Qwen3-Next 80B-A3B\n\n## How Context Elements Support Skills\n\nThis is a **bidirectional SHACL\u2194LLM bridge**:\n- **Forward:** Natural-language requirements \u2192 SHACL shapes\n- **Reverse:** Existing SHACL shapes \u2192 natural-language explanations (covered by [xpshacl explainable shacl](xpshacl-explainable-shacl.md))\n\nIt also demonstrates a **multi-agent composition pattern** where the agents operate over different knowledge sources (ontology vs. docs vs. RAG summaries) \u2014 a composition that resembles the SC '25 paper's pipeline\u2192hierarchical pattern ([sc25 autonomous science workflows](../papers/sc25-autonomous-science-workflows.md)).\n\nThe two merge strategies (`priority-llm` favors LLM-generated shapes when conflict; `restrictive` keeps only constraints that all sources agree on) are an example of **explicit conflict-resolution policy** \u2014 a pattern we have not seen elsewhere in the catalog.\n\n## Composition Notes\n\n- **Multi-source grounding:** The agents use ontology, RAG over technical docs, and a published baseline (Astrea) \u2014 three independent evidence sources.\n- **Multi-model evaluation:** Same pipeline runs across 5 different LLMs to compare quality, enabling empirical model selection for this task.\n- **Post-processing pipeline:** SHACL shapes are *validated, cleaned, and merged* before being declared usable \u2014 exactly the kind of post-validation pattern that [graphguard os guardrails](graphguard-os-guardrails.md) uses for runtime guardrails.\n- **Reproducible evaluation:** Results in `results.csv`, bar+line charts and heatmaps comparing models, gold standard for comparison.\n\n## Reproducibility\n\n**Very High.** Apache-2.0 license, conda environment file, full source code, public evaluation results (results.csv, figures), gold standard published, two input guide versions compared.\n\n## Bundle Links\n- [xpshacl explainable shacl](xpshacl-explainable-shacl.md) \u2014 Reverse direction (SHACL \u2192 natural language)\n- [shacl 1 2 spec](shacl-1-2-spec.md) \u2014 The spec these shapes conform to\n- [shacl data quality 69 metrics](shacl-data-quality-69-metrics.md) \u2014 Shape-quality dimensions\n- [graphguard os guardrails](graphguard-os-guardrails.md) \u2014 Policy-as-code pattern reference\n- [dspy agent skills bundle](dspy-agent-skills-bundle.md) \u2014 Another multi-agent + validation bundle\n- [sc25 autonomous science workflows](../papers/sc25-autonomous-science-workflows.md) \u2014 Autonomous science framework this resembles\n- [onto llm mapping](onto-llm-mapping.md) \u2014 LLM-based ontology mapping (related LLM-for-ontologies work)", "examples/tool-use-firewall": "# Tool-Use Firewall\n\n**Source:** https://github.com/reaatech/tool-use-firewall\n**Date Added:** 2026-05-23 (Iteration 4)\n**Bundle Type:** Validation / Policy Enforcement\n\n## Skills / Capabilities\n- Policy enforcement proxy between agents and MCP tools\n- Cost caps, rate limits, safety policies\n\n## Context Elements\n- **Validation & Rules** for tool access\n- MCP (Model Context Protocol) integration\n\n## Composition Notes\nExplicitly built as a protective layer around agent tool use. Demonstrates how validation and rule enforcement can be inserted between skills and external tools.\n\n## Relevance\nVery high for both Validation and Rules categories. One of the best matches found so far for governance layers in agent systems.", "examples/validate-skill-github-action": "# Flash Brew Digital \"Validate Skill\" \u2014 GitHub Action for SKILL.md Spec Compliance\n\n**Source:** https://github.com/marketplace/actions/validate-skill\n**Source repo:** https://github.com/Flash-Brew-Digital/validate-skill\n**Date Added:** 2026-06-01 (Iteration 13)\n**Publisher:** Flash Brew Digital | **Author:** Ben Sabic\n**License:** MIT | **Version:** v1.0.0\n**Tags:** `code-quality` \u00b7 `ai-assisted` | **Not certified by GitHub** (third-party action)\n**Bundle Type:** CI/CD Validation \u00b7 Spec Compliance \u00b7 Lightweight Linter\n**Confidence:** 9/10\n\n## Name & Origin\n\nA **GitHub Action that validates SKILL.md files against the Agent Skills specification** (https://agentskills.io/specification). It is the **CI/CD complement** to the [skill validator cli](skill-validator-cli.md) CLI \u2014 where the Go CLI runs locally with pre-commit hooks, this Action runs in PR pipelines.\n\n## Skills Included (1 Action)\n\n- **`validate-skill`** \u2014 Validates `SKILL.md` against the Agent Skills spec. Cross-agent compatible, CLI-compatible (Vercel Skills CLI), CI-friendly JSON outputs.\n\n## Context Elements (Validation Rules)\n\n### Required Fields\n- **`name`:** 1\u201364 chars, lowercase alphanumeric with hyphens, no leading/trailing/consecutive hyphens, **must match directory name**\n- **`description`:** 1\u20131024 chars, non-empty\n\n### Optional Fields (with constraints)\n- **`license`:** Must be string\n- **`compatibility`:** 1\u2013500 chars\n- **`metadata`:** Key-value mapping with string values\n- **`allowed-tools`:** Space-delimited string\n\n### Structure\n- YAML frontmatter must be present between `---` markers\n- Frontmatter must be valid YAML\n\n### Warnings\n- Very short descriptions (< 50 chars)\n- Empty body content\n- Body exceeding 500 lines\n- Unknown frontmatter fields\n\n## How Context Elements Support Skills\n\n`validate-skill` is the **lightest-weight** validator in the catalog \u2014 pure CI/CD integration, no LLM dependency, fast YAML structural checks. It is what you put in `.github/workflows/` to guard a skill repo's PR quality.\n\nThe action's design is a **minimal viable validator** \u2014 it implements *just* the structural and frontmatter rules from the Agent Skills spec. Heavier checks (content quality, contamination, LLM-as-judge, link rot) live in [skill validator cli](skill-validator-cli.md). Security threat scanning lives in [agentskill sh ags security scoring](agentskill-sh-ags-security-scoring.md). This is a clean **separation of concerns** across the validation stack.\n\n## Composition Notes\n\n### Inputs\n\n| Input | Default | Description |\n|---|---|---|\n| `path` | `.` | Path to skill directory containing SKILL.md |\n| `fail-on-warning` | `false` | Treat warnings as errors |\n| `ignore-rules` | `\"\"` | Comma-separated rule IDs to ignore (e.g., `name-match-directory`) |\n| `enforce-directories` | `\"\"` | Comma-separated dirs the skill must include (e.g., `scripts`) |\n| `validate-references` | `false` | Check that file references in SKILL.md exist |\n\n### Outputs (CI-friendly JSON)\n\n| Output | Description |\n|---|---|\n| `valid` | Whether SKILL.md is valid (true/false) |\n| `errors` | JSON array of validation errors |\n| `warnings` | JSON array of validation warnings |\n\n### Example Workflow (Advanced)\n```yaml\n- name: Validate SKILL.md\n  uses: Flash-Brew-Digital/validate-skill@v1\n  with:\n    path: ./my-skill\n    fail-on-warning: \"true\"\n    validate-references: \"true\"\n```\n\n## Reproducibility\n\n**High.** Open source, GitHub Marketplace listing, documented inputs/outputs, example workflows in repo (simple + advanced).\n\n## Bundle Links\n- [skill validator cli](skill-validator-cli.md) \u2014 Local/pre-commit complement (heavier checks)\n- [agentskill sh ags security scoring](agentskill-sh-ags-security-scoring.md) \u2014 Registry-level security scanner\n- [agent skills spec](agent-skills-spec.md) \u2014 The specification being enforced\n- [graphguard os guardrails](graphguard-os-guardrails.md) \u2014 Policy-as-code precedent\n- [owasp agentic skills top 10](owasp-agentic-skills-top-10.md) \u2014 Security specification that complements structural validation", "examples/vercel-labs-agent-skills": "# Vercel Labs Agent Skills\n\n**Origin:** [vercel-labs/agent-skills](https://github.com/vercel-labs/agent-skills) (~28.9k stars)\n\n## Skills included\n\n- `vercel-optimize` \u2014 cost/performance/reliability audit of Vercel projects\n- `react-best-practices` \u2014 40+ rules, 8 impact-ranked categories\n- `web-design-guidelines` \u2014 100+ UI/a11y/UX rules\n- `writing-guidelines` \u2014 80+ writing handbook rules (remote-fetch source repo)\n- `react-native-guidelines`\n\n## Context elements\n\n- **Constraint rules as skill body** \u2014 large rule catalogs (see [constraint rules as context](../concepts/constraint-rules-as-context.md))\n- **Progressive disclosure** \u2014 thin SKILL.md + on-demand references / remote handbook\n- **Vendor platform implementation** \u2014 official Vercel skills\n- **Distribution** \u2014 skills.sh registry badge; `AGENTS.md` + CLAUDE.md symlink for universal agents\n\n## How context supports skills\n\nRules are the primary context artifact: skills activate dense, versioned engineering policy rather than free-form advice. Remote-fetch handbooks keep constraints current without bloating skill install size.\n\n## Composition notes / reusability\n\n- Pattern peers: [addyosmani engineering skills](addyosmani-engineering-skills.md), [superpowers engineering discipline skills](superpowers-engineering-discipline-skills.md)\n- Official vendor pattern peers: [anthropic official skills repo](anthropic-official-skills-repo.md), [nvidia verified agent skills](nvidia-verified-agent-skills.md) / NVIDIA skills repo\n\n## Reproducibility assessment\n\n**High.** MIT, agentskills.io structure, public monorepo.\n\n## Related\n\n- [constraint rules as context](../concepts/constraint-rules-as-context.md)\n- [addyosmani engineering skills](addyosmani-engineering-skills.md)\n- [vscode copilot skills](vscode-copilot-skills.md)\n", "examples/veto-agent-authorization": "# Veto \u2014 Authorization Kernel for AI Agents\n\n**Source:** https://github.com/PlawIO/veto\n**Date Added:** 2026-05-23 (Iteration 4)\n**Bundle Type:** Rules / Authorization Layer\n\n## Skills / Capabilities\n- Authorization kernel for agent tool calls\n- Block, allow, or escalate decisions\n\n## Context Elements\n- **Rules layer** for tool-use governance\n- Policy enforcement\n\n## Composition Notes\nThis is one of the clearest examples of a **rules-based validation layer** for agent tool use. It directly addresses the \"Rules\" category in skill bundles. While not a full skill bundle itself, it is designed to be composed with agent skills/tool-use systems.\n\n## Relevance\nHigh for the \"Rules\" context element. Strong candidate for future composition with skill bundles.", "examples/vscode-copilot-skills": "# VS Code Copilot Agent Skills \u2014 Cross-Platform Standard\n\n**Date:** 2026-05-23\n**Source:** https://code.visualstudio.com/docs/copilot/customization/agent-skills\n**Confidence:** 5/5 (Official Microsoft documentation)\n\n## Name & Origin\nVS Code Copilot Agent Skills \u2014 Microsoft's implementation of the agentskills.io open standard for GitHub Copilot in VS Code, Copilot CLI, and Copilot cloud agent.\n\n## Skills Included\nAgent Skills implemented as portable folders with:\n- Mandatory SKILL.md with YAML frontmatter\n- Optional scripts, resources, and linked files\n- Extension contribution via package.json\n- Forked context mode for subagent execution\n\n## Context Elements\n- **YAML frontmatter schema**: Strict field types including name (must match directory), description (max 1024 chars), argument-hint, user-invocable, disable-model-invocation, and context mode\n- **Multi-storage locations**: Project-level (.github/skills/, .claude/skills/, .agents/skills/) and user-level (~/.copilot/skills/, ~/.claude/skills/, ~/.agents/skills/) with scope resolution\n- **Progressive loading**: Three-tier disclosure (Discovery \u2192 Instructions \u2192 Resource Access)\n- **Extension contribution**: Declarative skill bundling via VS Code extension package.json\n- **Linked file resolution**: Markdown relative paths control which files the agent can see\n\n## How Context Elements Support Skills\nThe frontmatter schema provides declarative control over skill behavior (invocation policy, context isolation). The progressive loading pattern manages context budgets. Extension contribution enables skill distribution as part of VS Code extensions.\n\n## Composition Notes\nThis demonstrates skill portability across agents (Claude Code, Codex, Cursor) through the open standard. The forked context mode represents an emerging pattern for resource isolation within skill bundles.\n\n## Reproducibility\nHigh \u2014 official VS Code documentation with clear creation methods (manual, AI-generated, conversation extraction).", "examples/wildclawbench-native-runtime-evaluation": "# WildClawBench: Native-Runtime Long-Horizon Agent Evaluation\n\n**Origin:** InternLM / Shanghai AI Lab et al., arXiv:2605.10912, May 2026\n**GitHub:** https://github.com/InternLM/WildClawBench (~477\u2605)\n**Leaderboard:** https://internlm.github.io/WildClawBench/\n\n## Overview\n\nWildClawBench is a **native-runtime** benchmark for AI agents: 60 human-authored bilingual multimodal tasks run inside Docker containers hosting the **actual** CLI harnesses used in deployment (OpenClaw, Claude Code, Codex, Hermes Agent), with real tools rather than mock service APIs.\n\n## Architecture\n\n1. **Task specs** \u2014 Markdown + YAML metadata (id, category, time budget), agent-facing prompt, rubrics, optional skills/env vars\n2. **Runtime** \u2014 Isolated Docker workspace; ground-truth and grading assets mounted only after agent exit (anti-leakage)\n3. **Harnesses** \u2014 OpenClaw, Claude Code, Codex CLI, Hermes Agent under unified OpenRouter access\n4. **Grading** \u2014 Hybrid: deterministic rule checks + environment-state auditing + LLM/VLM judge for semantic criteria\n5. **Skill ablation** \u2014 Category-relevant skill sets added to measure marginal skill impact\n\n## Key Findings\n\n- Best model (Claude Opus 4.7) reaches only **62.2%** overall under OpenClaw; all others <60%\n- **Harness switch alone** can shift a single model by up to **18 percentage points**\n- Skill augmentation: **mixed**, baseline-dependent; GPT-5.4 gains most (+5.2 overall, **+22.4** Code Intelligence)\n- Code Intelligence and Creative Synthesis improve with skills **without exception** across tested models\n- Tasks average ~8 min wall-clock and **20+ tool calls**; budgets 300\u20131200s\n\n## Context Elements\n\n- **Native-runtime protocol** \u2014 Evaluates skills/agents in production harnesses, not synthetic sandboxes\n- **Hybrid grading** \u2014 Deterministic + side-effect audit + semantic judge\n- **Skill-set ablation** \u2014 Isolates skill contribution on long-horizon real work (complements SkillsBench paired delta and SWE-Skills-Bench utility)\n- **ClawHub-aligned categories** \u2014 Productivity, code intelligence, social, search/retrieval, creative, safety\n\n## Relation to Skill Bundle Patterns\n\n- Complements [skillsbench agent skills benchmark](skillsbench-agent-skills-benchmark.md) (paired +16.2pp curated delta across domains) with **in-the-wild multi-harness** reality\n- Complements [swe skills bench utility benchmark](swe-skills-bench-utility-benchmark.md) (SWE-only, 80% zero gain) with non-SWE long-horizon categories\n- Evaluation substrate used by [skillclaw collective skill evolution](skillclaw-collective-skill-evolution.md)\n- Multi-harness sensitivity reinforces [skill os skills as apps](skill-os-skills-as-apps.md) and harness-as-infrastructure themes from [externalization llm agents unified review](externalization-llm-agents-unified-review.md)\n\n## Key Insight\n\nSkill utility and model quality are **not harness-invariant**. Measuring skill bundles requires native runtimes, multi-harness comparison, and skill-set ablations \u2014 synthetic sandboxes understate both difficulty and configuration sensitivity.\n", "examples/xpshacl-explainable-shacl": "# xpSHACL \u2014 Explainable SHACL Validation with RAG and LLMs\n\n**Source:** https://arxiv.org/abs/2507.08432\n**Date Added:** 2026-05-24 (Iteration 8)\n**Authors:** Gustavo Correa Publio (University of Leipzig), Jos\u00e9 Emilio Labra Gayo (University of Oviedo)\n**Bundle Type:** SHACL Validation + RAG + Violation Knowledge Graph\n**Confidence:** 9/10\n\n## Name & Origin\n\nxpSHACL is an open-source system that solves the \"interpretability gap\" in RDF data validation. While traditional SHACL engines provide terse, technical reports, xpSHACL combines rule-based justification trees, Retrieval-Augmented Generation (RAG), and LLMs to generate human-readable explanations and actionable correction suggestions.\n\n## Skills Included\n\n- Extended SHACL validation (built on pyshacl)\n- Justification tree construction for violations\n- Context retrieval via RAG (ontology fragments, shape documentation, similar cases, domain rules)\n- Natural language explanation generation (multi-language)\n- Violation signature caching for cost efficiency\n\n## Context Elements\n\n- **SHACL Validation:** Core validation via pyshacl, extended to extract granular violation details (focus node, property path, constraint component, actual value)\n- **Violation Knowledge Graph:** Persistent cache that stores \"violation signatures\" (MD5 hashes of constraint type + property path + violation type). 99.48% cache hit rate on 868 Linked Open Vocabularies (LOV) vocabularies.\n- **RAG Context Retrieval:** SPARQL queries to retrieve ontology fragments, shape documentation (`rdfs:comment`), similar violation cases, and domain business rules linked via custom properties (`xsh:appliesToProperty`)\n- **Justification Trees:** Logic trace connecting SHACL shape definitions \u2192 data graph facts \u2192 violation inference\n\n## How Context Elements Support Skills\n\nThe system demonstrates a sophisticated skill bundle pattern where:\n1. **SHACL** provides the validation engine and constraint definitions\n2. **Violation KG** acts as a reusable cache (dramatically reducing LLM API costs)\n3. **RAG** enriches validation context with domain knowledge\n4. **LLM** synthesizes explanations and suggestions\n\nThis is a prime example of how validation (SHACL) can be augmented with a knowledge layer (RAG + Violation KG) to produce actionable outputs rather than technical error reports.\n\n## Composition Notes\n\nxpSHACL exemplifies a \"validation + explanation\" bundle pattern. The key insight is that **validation alone is insufficient** \u2014 the Violation KG that caches explanations makes repeated validation runs cost-effective. This caching pattern is generalizable: any skill that performs expensive LLM-based analysis of structured data could benefit from a signature-based cache.\n\n**Performance:** Initial run ~65 seconds (LLM calls + KG population); cached run ~20 seconds; baseline pyshacl ~4 seconds. The caching amortizes the explanation cost over time.\n\n## Reproducibility\n\nHigh \u2014 built on pyshacl, supports OpenAI/Gemini/Claude/Ollama. Open source with published evaluation on 868 vocabularies. The Violation KG caching mechanism is described in detail and could be adapted for other validation contexts.\n\n## Key Insight\n\n> \"Only 12 unique signatures required new LLM generation for 145,910 violations.\"\n\nThis demonstrates that in practice, most validation violations fall into a small number of patterns \u2014 making signature caching extremely effective.\n\n## Limitations\n\n- Computational overhead vs. raw validation (4\u00d7 slower for initial run)\n- 49.7% parsing success rate on LOV vocabularies (failures due to dead links/parsing errors in source data)\n- Future work: integrating high-performance query engines (QLever) to reduce overhead", "examples/ylang-labs-agent-skills-overview": "# Ylang Labs: Agent Skills Portable Format Overview\n\n## Overview\n\nYlang Labs published a comprehensive overview of the Agent Skills open standard, explaining how it provides a portable format for teaching AI agents procedural knowledge. The article provides the clearest metaphor we've found: **MCP provides the kitchen (tools/data), Skills provide the recipes (procedural knowledge)**.\n\n## Three-Level Progressive Disclosure\n\n| Level | Content | When Loaded | Token Cost |\n|---|---|---|---|\n| 1. Metadata | Name & Description | At startup | ~100 tokens |\n| 2. Instructions | SKILL.md body | When triggered | <5,000 tokens |\n| 3. Resources | Scripts & References | Only as needed | Variable |\n\nThis pattern is used by [dspy agent skills bundle](dspy-agent-skills-bundle.md), [anthropic official skills repo](anthropic-official-skills-repo.md), and the updated [dspy agent skills v023](dspy-agent-skills-v023.md).\n\n## Skills vs Alternatives\n\n| Feature | Skills | System Prompts | MCP Servers |\n|---|---|---|---|\n| Provides | Procedural how-to | Momentary instructions | Tool/data access |\n| Persistence | Cross-conversation | Single session | Continuous |\n| Portability | High (open standard) | Low (product-specific) | High (open standard) |\n| Idle Cost | ~100 tokens | High (full prompt) | Minimal |\n\n## SKILL.md Schema\nThe minimal formal context element:\n```yaml\n---\nname: skill-name\ndescription: >\n  What the skill does and when to trigger it.\n---\n```\n\n## Distribution Models\n1. **Direct**: `.claude/skills/`, `.cursor/skills/`, `.agents/skills/`\n2. **Plugin Marketplaces**: Git-based with version pinning\n3. **Community**: `skills.sh` by Vercel Labs (`npx skills add owner/repo`)\n\n## Limitations Documented\n- **Fragmentation**: Different hidden folders across products\n- **Security**: Malicious skills could misuse tools\n- **Runtime**: Script execution depends on agent environment\n- **Interoperability**: Depth of integration varies (30+ products support)\n\n## Connection to Pattern Catalog\nThis article provides the **foundational reference** for why progressive disclosure matters across all bundles. The three-level loading pattern explains the architecture of [dspy agent skills bundle](dspy-agent-skills-bundle.md)'s SKILL.md + reference.md pair, and why [awesome agent skills catalogs](awesome-agent-skills-catalogs.md) catalogs skills by their metadata descriptions.\n\n## Source Attribution\nRaw source: [ylang labs agent skills](../../raw/2026-05-25/ylang | LLM Jury Voting | Stable (SkillSieve) |\n| Pareto Frontier Governance | New (EvoSkill K=3 git-backed selection) |\n| Textual Learning Rate | New (SkillOpt per-step edit budget) |\n| Validation Gating + Rejected-Edit Buffer | New (SkillOpt training-style skill optimization) |\n| Transferable Interaction Pattern (TIP) | New (SkillMigrator 4-tuple \u27e8intent,template,slots,layout\u27e9) |\n| Accessibility-Tree Skeleton Matching | New (SkillMigrator TED on structural layout) |\n| W3C PROV + MCP Provenance | New (PROV-AGENT agent-centric provenance) |\n| Skill OS Abstraction | New (100K skill analysis \u2192 5 OS demands) |\n| Generator-Executor Decoupling | New (SkillGenBench skill generation evaluation) |\n| Negative Transfer Detection | New (SkillGenBench auto-skill risk) |\n| Dual-Plane Governance (Context + Action) | New (SkillGuard dual-plane permission model) |\n| Skill Manifests (Capability Declaration) | New (SkillGuard pre-execution permission surface) |\n| Deny-by-Default Enforcement | New (SkillGuard runtime access control) |\n| DY-Skill Attacker Model | New (SkillFortify Dolev-Yao for 5-phase skill lifecycle) |\n| Agent Dependency Graph + Lockfile | New (SkillFortify SAT resolution, SHA-256 integrity) |\n| Trust Score Algebra | New (SkillFortify formal monotonicity) |\n| Capability-Based Sandboxing | New (SkillFortify confinement proof) |\n| Frequency Decomposition Credit | New (Skill1 low-freq=selection, high-freq=distillation) |\n| Skill Cards (Trust Metadata) | New (NVIDIA-verified ownership, deps, limitations, status) |\n| Cryptographic Skill Signing | New (NVIDIA-verified detached skill.oms.sig) |\n| Skills as Persistent Evolving Memory | New (Memento-Skills markdown files as memory) |\n| Read-Write Reflective Learning | New (Memento-Skills skill lifecycle cycle) |\n| Code-as-Policy Skill Library | New (ASPIRE robot control programs as reusable skills) |\n| Evolutionary Skill Search | New (ASPIRE diverse task/program generation) |\n| Collective Skil 9 refresh)\n\n| Rank | Example | Density signal |\n|------|---------|----------------|\n| 1 | OpenMontage | 500+ skills \u00d7 12 pipelines \u00d7 hard gates \u00d7 tools \u00d7 audit trail |\n| 2 | Agentic Awesome Skills | 1,943 skills \u00d7 schemas \u00d7 plugins \u00d7 workflows \u00d7 audit gates |\n| 3 | Scientific Agent Skills | 148 skills \u00d7 100+ DBs \u00d7 packages \u00d7 security CI |\n| 4 | ClawBio | 88 skills \u00d7 Galaxy tools \u00d7 reproducibility \u00d7 validation rate |\n| 5 | SoK: Agentic Skills | S=(C,\u03c0,T,R) \u00d7 7 patterns \u00d7 7-stage lifecycle \u00d7 ClawHavoc case study \u00d7 73 citations |\n| 6 | Skill OS | ~100K skills analyzed \u00d7 6 properties \u00d7 5 OS demands \u00d7 4 problems |\n| 7 | SkillOpt | 6 benchmarks \u00d7 7 models \u00d7 3 modes \u00d7 52/52 cells \u00d7 validation gating \u00d7 textual LR |\n| 8 | Vercel Labs | Few skills \u00d7 very high rule density (40\u2013100+/skill) |\n| 9 | CoEvoSkills | Multi-file packages \u00d7 co-evolutionary verification \u00d7 8-LLM generalization \u00d7 SkillsBench-validated |\n| 10 | EvoSkill | 3-agent architecture \u00d7 Pareto frontier K=3 \u00d7 git-backed \u00d7 zero-shot transfer \u00d7 2 benchmarks |\n| 11 | SkillSieve | 3-layer triage \u00d7 LLM jury \u00d7 49K skills evaluated \u00d7 F1=0.920 \u00d7 $0.006/skill |\n| 12 | ORCA | 122 capabilities \u00d7 36 DAG skills \u00d7 policy gates \u00d7 provenance \u00d7 184/184 taxonomy |\n| 13 | SkillReducer | 55K skills studied \u00d7 delta debugging \u00d7 taxonomy \u00d7 progressive disclosure \u00d7 less-is-more |\n| 14 | SkillGenBench | 187 tasks \u00d7 8 domains \u00d7 2 source types \u00d7 generator-executor decoupling \u00d7 pass@3 |\n| 15 | SkillMigrator | TIP 4-tuple \u00d7 TED layout matching \u00d7 Hungarian slot binding \u00d7 35.4% cross-domain reuse |\n| 16 | PROV-AGENT | W3C PROV + MCP \u00d7 edge/cloud/HPC \u00d7 near real-time \u00d7 agent-centric provenance |", "papers/agentskills-workshop-2026": "# Agent Skills '26 (ACM CAIS Workshop)\n\n**When/Where:** May 26, 2026 \u00b7 San Jose, CA \u00b7 Full day\n**Scope:** First workshop dedicated to design, evaluation, and optimization of Agent Skills / procedural knowledge for LLM agents\n\n## Scale\n\n- 103 submissions \u2192 45 posters + 6 orals (non-archival)\n- OpenReview: ACM.org/CAIS/2026/Workshop/AgentSkills\n\n## Field statistics highlighted\n\n- 8 focused Skills papers Feb\u2013Mar 2026\n- 3,984-skill audit: **37% security flaws**\n- SkillsBench: curated skills **+16.2 pass-rate points**; self-generated skills hurt ~1/3 of tasks\n\n## Lifecycle topics (maps to our catalog)\n\n1. Applications & composition\n2. Evaluation & benchmarking (Skills as first-class artifacts)\n3. Safety & supply chain (formal verification, malicious skills)\n4. Improvement & learning (generation, RL, trajectory mining)\n\n## Why it matters\n\nAcademic institutionalization of the skill-bundle research object. SkillsBench 1.0 launch party (DeepMind/BenchFlow/Kaggle) the next day signals evaluation becoming productized. Sponsors include K-Dense (see [scientific agent skills kdense](../examples/scientific-agent-skills-kdense.md)).\n\n## Related\n\n- [skillsbench agent skills benchmark](../examples/skillsbench-agent-skills-benchmark.md)\n- [arxiv 2602 08004 agent skills analysis](arxiv-2602-08004-agent-skills-analysis.md)\n- [skill security governance](../concepts/skill-security-governance.md)\n", "papers/arxiv-2602-08004-agent-skills-analysis": "# Agent Skills: A Data-Driven Analysis of Claude Skills (arXiv:2602.08004)\n\n**Authors:** George Ling, Shanshan Zhong, Richard Huang\n**Submitted:** 8 Feb 2026 \u00b7 cs.SE / cs.SI\n\n## Core claim\n\nSkills are an emerging infrastructure layer. Analysis of **40,285** marketplace skills shows bursty publication, SE content concentration, supply\u2013demand imbalance, heavy-tailed lengths (most still within prompt budgets), intent-level redundancy (homogeneity), and non-trivial safety risks (state-changing / system-level actions).\n\n## Relevance to skill bundles\n\n1. Scale of public skills >> curated catalogs \u2192 **governance and validation mandatory**\n2. Homogeneity / intent redundancy \u2192 need **mapping and taxonomies** across catalogs (SSSOM-like thinking for skills)\n3. Safety findings align with Agent Skills '26 workshop (37% flaw rate on 3,984 skills) and catalog security work ([owasp agentic skills top 10](../examples/owasp-agentic-skills-top-10.md), [purplebox supply chain security](../examples/purplebox-supply-chain-security.md))\n\n## Links\n\n- PDF: https://arxiv.org/pdf/2602.08004\n- Workshop context: [agentskills workshop 2026](agentskills-workshop-2026.md)\n", "papers/sc25-autonomous-science-workflows": "# Paper: The (R)evolution of Scientific Workflows in the Agentic AI Era \u2014 Towards Autonomous Science\n\n> **Source:** ACM SC '25 Workshops \u2014 https://dl.acm.org/doi/full/10.1145/3731599.3767580\n> **Added:** 2026-05-25 (manual seed for initial research)\n> **Raw:** [autonomous science workflows acm](../../raw/2026-05-25/autonomous-science-workflows-acm.md)\n\n## Summary\n\nThis paper presents a framework for the evolution of scientific workflows from traditional orchestrated pipelines to fully autonomous, distributed scientific laboratories. The authors propose that the transition is an **evolution (not revolution)** using a **State Machine Abstraction** where both traditional workflows and AI agents are modeled as state machines M = (S, \u03a3, \u03b4, s\u2080, F). The evolution occurs along two dimensions:\n\n### Intelligence Dimension (sophistication of transition function \u03b4):\n- **Static** \u2192 **Adaptive** \u2192 **Learning** \u2192 **Optimizing** \u2192 **Intelligent** (meta-optimization)\n\n### Composition Dimension (coordination patterns):\n- **Single** \u2192 **Pipeline** \u2192 **Hierarchical** \u2192 **Mesh** \u2192 **Swarm** (emergent behavior)\n\n### Key Architectural Layers:\n- Human Interface Layer (Science IDEs)\n- Intelligence Service Layer (Hypothesis, Design, Analysis, Knowledge agents)\n- Workflow Orchestration Layer (with Facility Agents)\n- Resource & Data Management (Knowledge Graphs, Data Fabrics)\n- Infrastructure Abstraction (TPUs, robotics, quantum)\n\n## Relevance to Skill Bundles\n\nThis paper provides a **formal framework for skill composition**:\n- The composition dimension (Single\u2192Pipeline\u2192Hierarchical\u2192Mesh\u2192Swarm) maps directly to **skill bundle orchestration patterns**\n- The intelligence dimension provides a **taxonomy for skill sophistication levels**\n- Knowledge Graphs & Data Fabrics align with **SSSOM mappings** and semantic layers\n- The state machine abstraction could formalize **skill execution and composition**\n\n## Strategic Bets for the Community:\n1. AI Research \u2014 invest in scientific foundation models\n2. Workflow Research \u2014 move beyond DAGs to stateful AI services\n3. Workforce Investment \u2014 blend domain science with AI fluency\n\n## Actionable Insights:\n- Build on top of existing WMS (Pegasus, Parsl, FireWorks) with intelligence-aware components\n- Adopt standards: AMQP 1.0 for event-driven workflows, Globus Auth for inter-agent security\n- Focus on meta-optimization \u2014 the goal is Intelligent Swarm\n- Join AISLE (Autonomous Interconnected Science Lab Ecosystem)\n\n## Tags\n#autonomous-science #workflow-evolution #state-machine #agentic-ai #swarm-intelligence #skill-composition #knowledge-graphs", "papers/scaince-ai-lab-automation": "# Paper: AI, Agentic Models and Lab Automation for Scientific Discovery \u2014 The Beginning of scAInce\n\n> **Source:** Frontiers in Artificial Intelligence (PMC) \u2014 https://pmc.ncbi.nlm.nih.gov/articles/PMC12426084/\n> **Added:** 2026-05-25 (manual seed for initial research)\n> **Raw:** [scaince ai lab automation pmc](../../raw/2026-05-25/scaince-ai-lab-automation-pmc.md)\n> **Author:** Thomas Hartung\n> **DOI:** 10.3389/frai.2025.1649155\n> **PMCID:** PMC12426084\n
