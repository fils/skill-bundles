harness (CLAUDE.md flags), scoring loop (5 dims with floors), MCP servers, telemetry as formal context elements (rules + validation).\n- **Catalogs as Taxonomies**: VoltAgent awesome list + agentskills.io clients showcase act as living vocabularies/taxonomies of skills across 30+ tools.\n- **Domain + Workflow Bundles**: NORA demonstrates complete mesh of 23 skills + domain knowledge + scoring (validation) + human checkpoints (rules) for end-to-end autonomous research.\n\n**New Examples Added**:\n- [agent skills spec](../examples/agent-skills-spec.md) \u2014 Foundational open standard (Anthropic-originated) enabling portable bundles.\n- [awesome agent skills catalogs](../examples/awesome-agent-skills-catalogs.md) \u2014 High-signal curated catalog with quality standards.\n- [addyosmani engineering skills](../examples/addyosmani-engineering-skills.md) \u2014 23 lifecycle skills with personas, checklists, verification gates.\n- [nora gis research agent](../examples/nora-gis-research-agent.md) \u2014 Exemplar of skills-first autonomous research agent with harness, scoring, journal templates.\n\n**Wiki Updates**:\n- 4 new raw sources \u2192 4 new wiki/examples entries (or expanded).\n- Index updated with Iteration 14 entry.\n- Total documented bundles now ~50.\n\n**Gaps & Tomorrow Queries**:\n- Strengthen SHACL/SSSOM ties to agent skills (search \"SHACL agent skills\" deeper).\n- Explore more domain-specific bundles (beyond geoscience).\n- Track adoption metrics of agentskills.io across tools.\n\n**Signal Rating**: 9/10 \u2014 Strong coverage of standard, catalog, engineering, and research agent bundles. Excellent for composition patterns (progressive disclosure + harness + scoring).\n\n*Run by scheduled cron on 2026-06-04. Pre-flight: clean master, no prior raw today.*", "daily-digests/2026-06-05": "# Daily Digest \u2014 2026-06-05\n\n**Sources ingested:** 1 (agentskills/agentskills spec repo)\n\n**New bundle patterns noted:**\n- Official spec confirms SKILL.md + folder structure as core of any bundle.\n- Progressive disclosure model enables large catalogs without context bloat.\n\n**Key source:** [agent skills spec](../examples/agent-skills-spec.md) (raw/2026-06-05/agentskills-spec.md)\n\n**Maintenance note:** Low-signal day; focused on foundational spec. Next run to target ecosystem repos (vercel-labs, anthropics/skills) for concrete bundle examples.\n\n**Wiki updates:** None (1-source maintenance pass)\n\n*Run by autonomous cron \u2014 Phase 1-5 complete*", "daily-digests/2026-06-09": "# Daily Digest: 2026-06-09 (Iteration 14)\n\n**Date:** 2026-06-09  \\\n**Iteration:** 14  \\\n**Sources Ingested:** 8 major skill bundles + 2 seeded foundational papers  \\\n**New Examples Added:** 4 (ClawBio, Addy Osmani, Agents at Conferences, DSPy v0.2.3 update)  \\\n**Wiki Updates:** 4 new example files, 1 updated example, main publication refresh\n\n---\n\n## Summary\n\nIteration 14 delivers a **major expansion of domain-specific and infrastructure skill bundles**, adding **bioinformatics (ClawBio)**, **production-grade engineering workflows (Addy Osmani)**, **conference participation infrastructure (Agents at Conferences)**, and an **updated DSPy optimization bundle (v0.2.3)**. Two foundational papers on autonomous scientific workflows (SC25) and the scAInce paradigm were also ingested as seeded references.\n\n**Key convergence signals:**\n1. **Domain specialization is maturing** \u2014 ClawBio shows how 88 skills cohere around a single domain (genomics) with formal specification layers, reproducibility bundles, and a reference genome\n2. **Process-as-skill bundles are emerging** \u2014 Addy Osmani's 23 skills encode the entire SDLC with anti-rationalization design, verification gates, and Google engineering culture\n3. **Infrastructure-as-skills** \u2014 Agents at Conferences defines 6 core infrastructure components (registration, feeds, communication, moderation, benchmarking, memory) as agent capabilities\n4. **Framework-specific bundles deepen** \u2014 DSPy v0.2.3 adds exact version pinning, 34+ validators, GEPA gotcha documentation, and committed performance benchmarks\n\n---\n\n## New Examples Added\n\n### 1. ClawBio: Bioinformatics-Native Skill Library ([clawbio bioinformatics skills](../examples/clawbio-bioinformatics-skills.md))\n- **88 skills** (29 production-ready) + **8,000+ Galaxy tools** via Galaxy Bridge\n- **Specification-First**: Machine-readable `SKILL.md` contracts prevent hallucination in critical domains (dosage, genetics)\n- **Reproducibility bundles**: Every execution generates `commands.sh` + `environment.yml` + `checksums.sha256`\n- **Reference genome (Corpasome)**: Real human genome (DOI: 10.5281/zenodo.19297389) for deterministic testing\n- **Validation leaderboard**: 92.3% (168/182) tests passing \u2014 public quantitative quality metric\n- **Multi-modal interfaces**: CLI, Telegram/Discord (RoboTerri), web (OpenClaw), Claude Code\n\n### 2. Addy Osmani Agent Skills ([addyosmani engineering skills](../examples/addyosmani-engineering-skills.md))\n- **23 skills** spanning full SDLC: Define \u2192 Plan \u2192 Build \u2192 Verify \u2192 Ship \u2192 Maintain\n- **Anti-rationalization design**: Explicit tables of agent excuses + required rebuttals\n- **Verification-first**: Non-negotiable evidence (tests, logs, runtime data) \u2014 \"Seems right\" never accepted\n- **7 slash commands** mapping 1:1 to phases (/spec, /plan, /build, /test, /review, /code-simplify, /ship)\n- **3 specialist personas**: code-reviewer, test-engineer, security-auditor\n- **Reference checklists**: Testing, Security, Performance, Accessibility\n- **Google engineering culture**: Hyrum's Law, Chesterton's Fence, Trunk-based development as normative artifacts\n\n### 3. Agents at Conferences Infrastructure ([agents at conferences infrastructure](../examples/agents-at-conferences-infrastructure.md))\n- **6 core infrastructure components** as agent capabilities:\n  1. **Registration API** \u2014 Identity + capability schema (`capabilities[]`, `model_backbone`)\n  2. **Conference Feed API** \u2014 Real-time transcripts (30s updates), WebSocket live stream\n  3. **Communication Bus** \u2014 Channel-based, 5 msg/min rate limit, structured format\n  4. **Moderation Layer** \u2014 Human-in-the-loop dashboard, Q&A approval, spam filtering\n  5. **Benchmark Arena** \u2014 Live GPQA/AAAR/LAB-Bench competition, real-time leaderboard\n  6. **Output Aggregation** \u2014 PDF report + JSON API for inter-agent querying\n- **Capability schema as skill taxonomy**: `capabilities[]` array defines what skills an agent has\n- **Protocol contracts**: WebSocket + REST specs in `ARCHITECTURE.md`\n- **Target**: 50 agents at SciFM26 (May 27-29, 2026), TPC26 at SC26\n\n### 4. DSPy Agent Skills v0.2.3 Update ([dspy agent skills bundle](../examples/dspy-agent-skills-bundle.md))\n- **Exact DSPy 3.2.1 pinning** via `check_dspy_surface.py` \u2014 prevents API drift\n- **34+ pytest validators** for SKILL.md frontmatter, JSON schemas, Python AST\n- **GEPA gotchas documented**: `reflection_lm` at construction time, Pydantic cloudpickle, minibatch sizing\n- **Committed performance benchmarks**: +19.53pp RAG, +8.33pp math, +0.098 invoice extraction\n- **Offline validation**: `example_*.py --dry-run` smoke tests\n- **Dual platform**: Claude Code + Codex CLI via marketplace and `npx skills`\n\n---\n\n## Seeded Foundational Papers (Re-ingested with Full Extraction)\n\n### The (R)evolution of Scientific Workflows (SC '25) ([sc25 autonomous science workflows](../papers/sc25-autonomous-science-workflows.md))\n- **Two-dimensional evolution matrix**: Intelligence (Static\u2192Adaptive\u2192Learning\u2192Optimizing\u2192Intelligent) \u00d7 Composition (Single\u2192Pipeline\u2192Hierarchical\u2192Mesh\u2192Swarm)\n- **State machine abstraction** as common ground for workflows + agents\n- **100x discovery potential** by reducing human bottlenecks\n- **Intelligence Service Layer** architecture for hypothesis, design, analysis agents\n\n### The Beginning of scAInce ([scaince ai lab automation](../papers/scaince-ai-lab-automation.md))\n- **Co-pilot \u2192 Lab-pilot transition**: AI acts on knowledge via self-driving laboratories (SDLs)\n- **SDLs as ultimate skill bundles**: ChemCrow (LLM + chemistry tools + robots), autonomous synthesis of 29 compounds\n- **Information-gain scoring** for experiment prioritization (Bayesian optimization)\n- **Governance frameworks**: EU AI Act, ISO 42001, PRISMA-AI, STARD-AI checklists\n- **Machine-readable publications + FAIR data + Megasets** as infrastructure requirements\n\n---\n\n## Emerging Patterns Reinforced\n\n| Pattern | Evidence (Iteration 14) |\n|---------|------------------------|\n| **Skills + Specification Layer** | ClawBio (contracts prevent hallucination), DSPy (frontmatter validation), Addy Osmani (Iron Laws) |\n| **Skills + Reproducibility Artifacts** | ClawBio (per-execution bundles), DSPy (pinned deps + benchmarks), NORA (state persistence) |\n| **Skills + Domain Cohesion** | ClawBio (88 genomics skills), Addy Osmani (23 SDLC skills), NORA (21 GIS skills) |\n| **Skills + Validation Leaderboards** | ClawBio (92.3% pass), DSPy (benchmark deltas), agentskill.sh (100k+ scanned) |\n| **Skills + Reference Data Assets** | ClawBio (Corpasome genome), DSPy (benchmark datasets), SC25 (Knowledge Graphs) |\n| **Skills + Infrastructure/Protocol** | Agents at Conferences (6-component protocol), SSSOM mapping, MCP dependencies |\n| **Skills + Orchestrator Pattern** | DSPy (dspy-advanced-workflow), NORA (full-pipeline), Addy Osmani (methodology cycle) |\n| **Skills + Multi-Modal Access** | ClawBio (CLI/Telegram/Web/Claude), Agents at Conferences (API/WebSocket/JSON) |\n\n---\n\n## Context Element Coverage Update\n\n| Context Element | Count | Status |\n|-----------------|-------|--------|\n| SHACL Validation | 7 | Strong |\n| Constraint Rules | 7 | **Strong (+1: Iron Laws/Red Flags)** |\n| Rules / Authorization | 5 | Strong |\n| Ontology / Taxonomy | 10 | **Strong (+1: bioinformatics ontology)** |\n| Governance / Verification | 9 | **Strong (+1: conf moderation layer)** |\n| Security Framework / Certification | 4 | Growing |\n| Platform Implementation | 6 | **Growing (+1: Addy Osmani cross-platform)** |\n| Plugin / Distribution | 3 | Emerging |\n| Academic Survey | 1 | Emerging |\n| Universal Skill Format | 1 | Emerging |\n| Dependency Graphs | 2 | Stable |\n| YAML Configuration | 9+ | Ubiquitous |\n| MCP Dependencies | 4 | **Emerging (+1: conf feed API)** |\n| SSSOM Mapping | 4 | Mature |\n| Supply Chain / Provenance | 5 | **Growing (+1: content-SHA + reproducibility bundles)** |\n| Benchmarking | 2 | **Emerging (+1: DSPy GEPA benchmarks)** |\n| LLM-as-Judge Quality Scoring | 1 | NEW |\n| Multi-Agent SHACL Generation | 1 | NEW |\n| Content-Addressed Versioning | 1 | NEW |\n| Pre-commit Multi-Platform Hooks | 1 | NEW |\n| **Reproducibility Bundles** | **2** | **NEW (ClawBio, DSPy)** |\n| **Reference Data Assets** | **2** | **NEW (Corpasome, DSPy benchmark datasets)** |\n| **Infrastructure Protocols** | **1** | **NEW (Agents at Conferences)** |\n| **Specification Layer Contracts** | **2** | **NEW (ClawBio SKILL.md, Addy Osmani Iron Laws)** |\n\n---\n\n## Tomorrow Priority Searches\n\n1. **SLSA / in-toto attestation for skill bundles** (provenance chain across validation layers)\n2. **Bundle-level interaction effects** (2+ skills installed together \u2014 privilege accumulation, version skew)\n3. **A2A (Agent-to-Agent) protocol skill integration** (carried from last week)\n4. **SHACL round-trip evaluation studies** (empirical text \u2192 shapes \u2192 text fidelity)\n5. **ai-blame deep-dive** (Mungall's line-level attribution for AI-assisted ontology edits)\n6. **Monorepo SKILL.md / Claude Plugin Marketplace consolidation events**\n7. **Self-driving lab skill bundles** (ChemCrow, autonomous synthesis \u2192 skill decomposition)\n8. **Bioinformatics skill taxonomy** (ClawBio categories \u2192 formal ontology)\n\n---\n\n## Files Changed\n\n### New Examples\n- `wiki/examples/clawbio-bioinformatics-skills.md`\n- `wiki/examples/addyosmani-engineering-skills.md`\n- `wiki/examples/agents-at-conferences-infrastructure.md`\n\n### Updated Examples\n- `wiki/examples/dspy-agent-skills-bundle.md` (v0.2.3 refresh)\n\n### Daily Digest\n- `wiki/daily-digests/2026-06-09.md` (this file)\n\n### Raw Sources (8 new files)\n- `raw/2026-06-09/intertwine-dspy-agent-skills.md`\n- `raw/2026-06-09/clawbio-clawbio.md`\n- `raw/2026-06-09/agentskills-io-specification.md`\n- `raw/2026-06-09/voltagent-awesome-agent-skills.md`\n- `raw/2026-06-09/addyosmani-agent-skills.md`\n- `raw/2026-06-09/nora-arxiv-2605.02092.md`\n- `raw/2026-06-09/cecat-agents-at-conferences.md`\n- `raw/2026-06-09/sc25-revolution-scientific-workflows.md`\n- `raw/2026-06-09/scaience-beginning-pmc12426084.md`\n- `raw/metadata.json` (updated)\n\n### Publication Updates\n- `wiki/skill-bundles.md` (to be updated in Phase 3)\n- `wiki/index.md` (to be updated)", "daily-digests/2026-06-11": "# Daily Digest \u2014 2026-06-11\n\n**Sources ingested**: 3 new high-signal skill bundle repositories\n**Focus**: Agent Skills ecosystem growth (official Anthropic + community engineering + curated directories)\n\n## New Bundles Documented\n- **addyosmani/agent-skills**: 24 production engineering skills (DEFINE\u2192SHIP lifecycle) with personas, checklists, and verification gates. Strong context engineering example.\n- **anthropics/skills**: Official reference implementation (149k stars). Document skills (docx/pdf/pptx/xlsx) + minimal SKILL.md template + direct link to agentskills.io spec.\n- **heilcheng/awesome-agent-skills**: Curated catalog (agent-skill.co) aggregating hundreds of skills across providers with quality standards and discovery tools.\n\n## Emerging Patterns\n- Rapid standardization around `SKILL.md` + YAML frontmatter (name, description)\n- Plugin marketplace distribution model (Claude Code, Copilot, etc.)\n- Emphasis on verifiable, r "validation + mapping\" bundle pattern.\n\n## Tomorrow Priorities\n1. Monitor W3C data-shapes #725 for SHACL 1.2 LLM property adoption.\n2. Search for bundles combining new GitHub skill CLI with SHACL validation.\n3. Track SSSOM integration in agent curation tools (OxO2, SemRA).\n\n**No new full bundle examples documented today** (ecosystem + spec updates only). Metadata + digest updated. Schedule preserved.", "daily-digests/2026-06-28": "# Daily Digest \u2014 2026-06-28 (Iteration 28)\n\n**Sources ingested:** 5 (SkillFortify formal verification, AgentVerify LTL model checking, SSL structured skill representation, comprehensive agent skills survey, agent skills ecosystem 2026 report)\n\n## Key Signals\n\n### 1. SkillFortify: Formal Verification for Agent Skills (arXiv:2603.00195)\n- **First formal analysis framework** for the agentic AI skill supply chain.\n- Adapts the **Dolev-Yao attacker model** to the 5-phase skill lifecycle (Install\u2192Load\u2192Configure\u2192Execute\u2192Persist).\n- Uses **abstract interpretation** over a 4-element capability lattice: `{NONE \u2291 READ \u2291 WRITE \u2291 ADMIN}`.\n- **Soundness guarantee:** If analysis reports safe, concrete execution *cannot* exceed declared capabilities.\n- **Performance:** 96.95% F1, 100% precision (zero false positives), 2.55ms/skill scan, 1k-node dependency resolution in 92.4ms.\n- **Artifacts:** Generates `skill-lock.json` (deterministic lockfile with hashes + trust scores) and **ASBOM** (CycloneDX 1.6-compatible Agent Skill Bill of Materials).\n- **SAT-based dependency resolution** via Glucose3 solver: ensures version constraints met, no conflicts, security bounds enforced across skill chains.\n- **Trust Score Algebra:** Multi-signal (Provenance, Behavioral, Community, Historical) with monotonicity property and ~139-day half-life exponential decay.\n- Supports Claude Code Skills (MD+YAML), MCP (JSON-RPC), and OpenClaw Skills (YAML manifests).\n\n### 2. AgentVerify: Compositional Formal Verification via LTL (Preprints.org, April 2026)\n- Treats LLM as **non-deterministic oracle** within a verifiable **Finite-State Machine (FSM)**.\n- **Two-tier hybrid architecture:** (1) O(1) runtime monitor with \"obligation tokens\" for immediate intervention; (2) Offline post-hoc analyzer using **B\u00fcchi automaton** construction and product model checking.\n- **23 LTL specification templates** across 4 domains: Memory Integrity, Tool Call Safety, MCP/Skill Invocation, Human Interaction Boundaries.\n- **Results:** 86.67% accuracy, 100% catastrophic failure detection rate, only 0.04% latency overhead per step.\n- **NL-to-LTL generator:** Translates natural language safety requirements into formal logic with 87% accuracy.\n- Regulatory readiness: Structured reports with counterexample traces for **EU AI Act** and **NIST AI RMF** compliance.\n- Neural verification fails (BERT-based: 13.33%); temporal logic essential for multi-step violation patterns.\n\n### 3. SSL Representation: From Skill Text to Skill Structure (arXiv:2604.24026, Peking University)\n- **First structured representation** for agent skills: Scheduling-Structural-Logical (SSL) three-layer JSON graph.\n- Draws on **Schank & Abelson** classical linguistic knowledge representation.\n- **Three layers:** (1) Scheduling (when to invoke: goals, intent signatures, control-flow); (2) Structural (how work is organized: scenes like Prepare, Acquire, Act, Verify); (3) Logical (what resources: atomic actions READ/CALL_TOOL with resource scopes CREDENTIALS/NETWORK).\n- **Restricted vocabularies (enums):** Scene Types (PREPARE, ACQUIRE, REASON, ACT, VERIFY, RECOVER, FINALIZE), Logical Primitives (READ, SELECT, COMPARE, VALIDATE, INFER, WRITE, CALL_TOOL, REQUEST), Resource Scopes (MEMORY, LOCAL_FS, CODEBASE, PROCESS, USER_DATA, CREDENTIALS, NETWORK).\n- **Normalizer:** LLM-based 4-pass pipeline (Skill Record Extraction \u2192 Scene Decomposition \u2192 Logic-Step Expansion \u2192 Verification).\n- **Evaluation I (Skill Discovery):** 403 queries vs 6,184 candidates. Baseline 0.573 MRR \u2192 SSL-Rich **0.707 MRR** (+23.4%).\n- **Evaluation II (Risk Assessment):** 500 skills. Baseline 0.744 Macro F1 \u2192 +SSL **0.787 Macro F1** (+5.8%).\n- Key insight: \"Don't Replace, Augment\" \u2014 SSL is an evidence interface; keep original SKILL.md for nuanced interpretation.\n\n### 4. Comprehensive Survey on Agent Skills (SSRN 6656500, CUHK, April 2026)\n- Defines agent skills as **\"reusable procedural artifacts that coordinate tools, memory, and runtime context under task-specific constraints.\"**\n- **4-stage lifecycle:** (I) Representation \u2192 (II) Acquisition \u2192 (III) Retrieval \u2192 (IV) Evolution.\n- Agents handle high-level reasoning; skills serve as the **operational layer** for reliable, reusable, composable execution.\n- Key challenges: Quality control (validating synthesized skills), Interoperability (cross-architecture sharing), Safe updating (managing breaking changes), Long-term capability management (organizing vast skill libraries).\n- Impact: Roadmap from \"one-off\" agent prompts toward **persistent agentic systems**.\n\n### 5. Agent Skills Ecosystem Report 2026 (Agentman, June 2026)\n- **Scale:** SkillsMP indexes **1.9 million** public skills scraped from GitHub.\n- **Adoption:** ~40 compatible products (OpenAI Codex, GitHub Copilot, Cursor, Gemini CLI, VS Code).\n- **Quality gap:** Average public skill quality score is **6.2/12** (SkillsBench).\n- **Performance:** Curated skills increase agent pass rates by **+16.2pp** (up to +51.9pp in healthcare).\n- **Security risk:** 36% of skills tested by Snyk contained **prompt injections**; audit of 22k skills found ~141k total issues.\n- **Bloat vs. Focus:** 2-3 targeted skills improved performance by **+18.6pp**; monolithic \"all-in-one\" skills *reduced* performance by **-2.9pp**.\n- **Category distribution:** Development & Engineering (288,811), Product Management (86,948), Marketing (74,510), Healthcare & Life Sciences (6,354).\n- **H2 2026 outlook:** Trust infrastructure mandatory, governance scrutiny on `agentskills.io` standard, vertical depth (Legal, Finance, Healthcare), enterprise management tools.\n\n## Patterns Observed\n\n### Pattern 1: Formal Verification is the New Validation Layer\nSkillFortify (abstract interpretation + SAT-based dependency resolution) and AgentVerify (LTL model checking) represent a **paradigm shift from heuristic scanning to formal mathematical guarantees**. This parallels the SHACL validation pattern but goes further: instead of validating data shapes, these frameworks formally verify that agent skills cannot exceed their declared capabilities. The capability lattice `{NONE \u2291 READ \u2291 WRITE \u2291 ADMIN}` is the skill-level equivalent of SHACL's constraint shapes.\n\n### Pattern 2: Structured Skill Representations Enable Scale\nThe SSL representation (Peking University) demonstrates that converting unstructured SKILL.md text into a typed three-layer graph improves both skill discovery (+23.4% MRR) and risk assessment (+5.8% F1). This is evidence that the **representation layer** of the agent skill lifecycle (as identified in the CUHK survey) is a critical bottleneck. The restricted vocabularies (Scene Types, Logical Primitives, Resource Scopes) function like controlled vocabularies in ontology work \u2014 a direct parallel to the SSSOM mapping pattern.\n\n### Pattern 3: The Quality-Security Dual Threat\nThe ecosystem report quantifies what was previously qualitative: 1.9M public skills with an average quality score of 6.2/12, and 36% containing prompt injections. The **quality gap** (6.2/12 average) and the **security gap** (36% prompt injection rate) are two sides of the same coin: the lack of formal context artifacts (validation, mapping, rules) bundled with skills. This is the strongest evidence yet that skill bundles \u2014 skills packaged with formal context elements \u2014 are not just an academic curiosity but a practical necessity.\n\n## Tomorrow Priorities\n1. Track SkillFortify adoption (github.com/varun369/skillfortify) \u2014 is the formal verification framework being integrated into any skill marketplaces?\n2. Investigate the ASBOM (Agent Skill Bill of Materials) standard \u2014 how does it compare to SLSA provenance and CycloneDX SBOMs?\n3. Monitor the SSL representation for adoption \u2014 are any skill registries or marketplaces using structured representations beyond raw SKILL.md?\n4. Search for the NL-to-LTL generator from AgentVerify \u2014 could natural language safety requirements become a standard part of skill bundle definitions?", "daily-digests/2026-06-29": "# Daily Digest \u2014 2026-06-29\n\n**Iteration:** 15 (post-14)\n**Sources Ingested:** 4\n**New Examples / Updates:** 0 new full examples (focus on ecosystem refresh + context element signals)\n**Patterns Noted:** Continued maturation of Agent Skills standard + SHACL 1.2 agent-instruction primitives + SSSOM agent curation metadata.\n\n## Sources\n1. **addyosmani/agent-skills** (https://github.com/addyosmani/agent-skills) \u2014 24-skill production engineering lifecycle bundle (23 SDLC skills + meta-skill). Strong process-as-skill example.\n2. **SHACL 1.2 + Agent Integration** \u2014 W3C SHACL 1.2 (sh:agentInstruction etc.), Kurt Cagle on SHACL as rules engine for agents, data-shapes#725 LLM/agent input property.\n3. **SSSOM + Agent Mappings** \u2014 mapping-commons/sssom, curation_rule metadata explicitly designed for agent execution, sssom-py toolkit.\n4. **agentskills.io Ecosystem** \u2014 Official standard site, GitHub topics, VS Code/Copilot/Claude support, awesome-agent-skills collections, gh skill CLI.\n\n## Key Signals\n- Agent Skills ecosystem is exploding (multiple high-star repos, official CLI support, cross-tool compatibility).\n- SHACL 1.2 is explicitly adding agent/LLM instruction primitives \u2014 direct bridge to skill bundles.\n- SSSOM now documents agent-driven curation rules in metadata \u2014 formal cont hapes.\n- **Use Agent Skills in VS Code** \u2014 Official docs showing .github/skills/, .claude/skills/, .agents/skills/ locations, SKILL.md frontmatter, resource linking, portability across Copilot hosts. Explicit contrast with custom instructions.\n- **SSSOM** (mapping-commons) \u2014 TSV mapping format with agent-executable `curation_rule`, 38 metadata fields, Python/CLI toolkit. Provides the mapping layer that frequently accompanies ontology/taxonomy skills.\n\n## Emerging Patterns\n1. **Standard + Reference Implementations Convergence** \u2014 agentskills.io spec is now the single source of truth; addyosmani and anthropics are the two largest, actively maintained bundles demonstrating it at scale (68k + 158k stars).\n2. **SHACL 1.2 Agent Primitives** \u2014 The W3C update directly embeds agent instructions (`sh:agentInstruction`) inside validation shapes \u2014 the strongest formal context element yet for skill bundles.\n3. **IDE/Host Integration** \u2014 VS Code + Copilot documentation makes the portable, on-demand loading model concrete and shows how bundles are discovered and activated.\n4. **Mapping Layer Maturity** \u2014 SSSOM's curation_rule field explicitly contemplates agent-driven mapping, closing the loop between skills and ontology alignment.\n\n## Bundle Density Notes\n- High-density examples today: addyosmani (lifecycle + validation + multi-host manifests), anthropics (official + template + spec link), SHACL 1.2 (validation + agentInstruction + codeIdentifier).\n- Context element coverage strengthened: SHACL (validation + instruction), SSSOM (mapping + curation rules), directory conventions + resource discovery rules.\n\n## Tomorrow Priority\n- Deep-dive on sh:agentInstruction usage patterns in real bundles.\n- SLSA/in-toto provenance for skill bundles (supply-chain attestation).\n- Bundle interaction effects when multiple high-density skills are co-installed.\n- Continue monitoring agentskills/agentskills GitHub for spec evolution.\n\n**Status:** t between validation shapes and agent skills.\n\n**New Context Element Signal:** sh:agentInstruction (SHACL 1.2) \u2014 direct support for shapes as agent instructions.\n\n**Next Priorities (carried forward):**\n- SLSA/in-toto provenance for skill bundles\n- Bundle interaction effects\n- A2A protocol integration\n- Empirical SHACL round-trip studies\n\n**Status:** 5 new raw sources. Daily digest created. Full synthesis and wiki updates deferred to next high-signal day or weekly lint. Schedule preserved.", "daily-digests/2026-07-08": "# Daily Digest: 2026-07-08 \u2014 Skill Bundles Research\n\n**Sources ingested (6):** agentskills.io specification & home, SHACL 1.2 Core (W3C), SSSOM ontology mappings, VS Code Agent Skills docs, addyosmani/agent-skills (72.5k stars), anthropics/skills (159k stars).\n\n**Key discoveries & patterns:**\n- **Agent Skills standard (agentskills.io)**: Core packaging format (SKILL.md + optional scripts/references/assets). Progressive disclosure for efficiency. Open standard adopted across Claude, Codex, Copilot, Gemini, etc. Direct support in VS Code for project/personal skills.\n- **SHACL 1.2**: Formal validation + new agent-specific primitives (sh:agentInstruction, sh:intent). Used for guardrails, policy compliance, ontology generation for agents. Strong complementarity with skills (validation layer).\n- **SSSOM**: Semantic mapping standard for ontology alignment, with rich metadata (confidence, justification, curation rules, provenance). Enables interoperable skill bundles across domains.\n- **Large catalogs**: addyosmani (engineering focus, evals, multi-agent support) and anthropics (Claude demos, API skills) show real-world bundle scale. Often include or can be extended with SHACL/SSSOM context.\n\n**Emerging patterns:**\n- Bundles frequently combine skills with validation (SHACL) and semantic layers (SSSOM) for reliable agent composition.\n- Cross-platform portability emphasized; skills as reusable \"context artifacts\" + formal specs.\n\n**New research questions:** How many documented bundles explicitly pair SKILL.md with SHACL shapes or SSSOM mappings? Gap in ontology/taxonomy coverage for agent skills.\n\n**Wikilinks added:** [agent skills spec](../examples/agent-skills-spec.md), [shacl 1 2 spec](../examples/shacl-1-2-spec.md), [sssom mapping protocol](../examples/sssom-mapping-protocol.md), [awesome agent skills catalogs](../examples/awesome-agent-skills-catalogs.md)\n\n**Next:** Update main publication and concepts with these integrations.", "daily-digests/2026-07-09": "# Daily Digest \u2014 2026-07-09 (Skill Bundles)\n\n**Sources Ingested:** 6\n\n- NVIDIA/skills (2.4k stars, ecosystem-wide NVIDIA agent skills + plugins)\n- agentskills.io/specification (updated frontmatter, progressive disclosure, allowed-tools, validation)\n- SHACL 1.2 Core (WD 2026-06-30) \u2014 new sh:agentInstruction, sh:intent, sh:codeIdentifier\n- SSSOM (curation_rule, agent creator metadata)\n- addyosmani/agent-skills (75.2k stars, Codex support)\n- anthropics/skills (reference implementation)\n\n**Emerging Patterns:**\n- SHACL 1.2 now explicitly designed for agent instruction bundles.\n- Vendor + community bundles converging on .agents/plugins + formal manifests.\n- Progressive disclosure + allowed-tools as new context layer.\n\n**Wiki Updates:** raw/ metadata + daily digest created. New concept note on sh:agentInstruction recommended for next run.\n\n**Counts:** 6 sources today. Cumulative raw days: 47.", "daily-digests/2026-07-10": "# Daily Digest \u2014 2026-07-10 (Skill Bundles)\n\n**Iteration:** 35\n**Sources ingested:** 6\n\n## Sources\n\n1. **Agent Skills '26 workshop** (agentskills-workshop.org) \u2014 first CAIS workshop; 103 submissions; 37% security flaw rate; SkillsBench +16.2pp\n2. **arXiv:2602.08004** \u2014 data-driven analysis of **40,285** marketplace skills (homogeneity, safety, SE concentration)\n3. **sickn33/agentic-awesome-skills** (~42.8k\u2605, v14.1.0) \u2014 1,943+ skills, installable CLI, plugins, schemas, security gates\n4. **K-Dense-AI/scientific-agent-skills** (~30.6k\u2605, 148 skills) \u2014 AI Scientist domain mega-bundle + security CI + 100+ DBs\n5. **vercel-labs/agent-skills** (~28.9k\u2605) \u2014 official vendor constraint-rule skills (React/design/writing)\n6. **calesthio/OpenMontage** (~36.3k\u2605) \u2014 500+ skills, 12 pipelines, human approval gates + checkpoint audit trail\n\n## Emerging patterns\n\n1. **Academic institutionalization** \u2014 dedicated workshop + large empirical paper move skills from packaging meme to research object with evaluation + supply-chain tracks.\n2. **Domain mega-bundles scale** \u2014 science (K-Dense 148), video (OpenMontage 500+), and mega-catalogs (1,943 installable) all treat skills + context (DBs, gates, schemas, handbooks) as co-equal.\n3. **Hard gates as context** \u2014 OpenMontage human_approved checkpoints parallel CSA trust framework promotion gates and engineering Iron Laws.\n4. **Constraint-rule density** \u2014 Vercel encodes 40\u2013100+ rule handbooks as skills (continues addyosmani/Superpowers pattern).\n5. **Marketplace risk quant** \u2014 40k-skill analysis + 37% flaw audit reinforce need for three-layer validation stack.\n\n## Wiki updates today\n\n- New examples: [scientific agent skills kdense](../examples/scientific-agent-skills-kdense.md), [agentic awesome skills library](../examples/agentic-awesome-skills-library.md), [vercel labs agent skills](../examples/vercel-labs-agent-skills.md), [openmontage video production skills](../examples/openmontage-video-production-skills.md)\n- New papers: [arxiv 2602 08004 agent skills analysis](../papers/arxiv-2602-08004-agent-skills-analysis.md), [agentskills workshop 2026](../papers/agentskills-workshop-2026.md)\n- Metrics + index + primary publication refresh\n- Q&A + lint pass\n\n## Tomorrow priority searches\n\n1. SkillsBench 1.0 / BenchFlow SDK details post-launch materials\n2. OpenReview oral titles from Agent Skills '26\n3. Map agentic-awesome-skills `schemas/` to agentskills.io frontmatter + SHACL shapes\n4. SLSA / in-toto for skill package provenance (carryover)\n5. aoa-skills formal \"skill bundles\" topic (schemas/manifests/evals) deep dive\n\n**Counts:** 6 sources today \u00b7 4 new examples \u00b7 2 paper notes\n\n## Linked Examples\n\n- [SkillsBench: First Benchmark for Agent Skills Effectiveness](../examples/skillsbench-agent-skills-benchmark.md)\n\n## Q&A\n\n- [Q&A \u2014 2026-07-10](../qa/2026-07-10-qa.md)", "daily-digests/2026-07-11": "# Daily Digest \u2014 2026-07-11 (Skill Bundles)\n\n**Iteration:** 36\n**Sources ingested:** 6\n\n## Sources\n\n1. **CoEvoSkills** (arXiv:2604.01687) \u2014 first framework for self-evolving multi-file skill packages via co-evolutionary verification; surpasses human-curated skills within 5 iterations on SkillsBench\n2. **SoK: Agentic Skills \u2014 Beyond Tool Use** (arXiv:2602.20867) \u2014 formal skill definition S=(C,\u03c0,T,R); 7-stage lifecycle; 7 design patterns; ClawHavoc case study (~1,200 malicious skills); 73 citations\n3. **A Survey of Agent Skills: Toward Procedural Infrastructure** (Preprints 202605.1276) \u2014 six-layer taxonomy (ontology\u2192governance\u2192applications); marketplace scale data (800K+ total skills); Awesome-Agent-Skill-Papers catalog\n4. **Supply Chain Security Meets the Agentic Factory** (Medium/Konflux) \u2014 first proposal to extend SLSA/in-toto provenance to agentic code generation; \"intent \u2192 source \u2192 binary\" trust gap; fullsend project\n5. **ClawHavoc Campaign** (Koi Security, Antiy CERT, Unit 42) \u2014 ~1,184 malicious skills on ClawHub; 13% malicious rate; dual-vector attack (prompt injection + shell access); canonical supply-chain case study\n6. **Graph-of-Skills v3 + SkillsBench v1.1** \u2014 GoS +25.55% reward / -56.72% tokens on SkillsBench; SkillsBench v1.1 leaderboard (24 configs, GPT-5.5 leads at 67.3%)\n\n## Emerging patterns\n\n1. **Academic convergence on skill formalization** \u2014 three simultaneous surveys (SoK, 4-axis, 6-layer) all converge on: skills = multi-file packages \u2260 tools; lifecycle model needed; security is critical. The S=(C,\u03c0,T,R) definition from SoK is becoming the canonical formal vocabulary.\n2. **Self-evolution + co-evolutionary verification** \u2014 CoEvoSkills introduces the verifier as a co-evolving context element, not just a static gate. This generalizes the [three layer validation stack](../concepts/three-layer-validation-stack.md) pattern from static to dynamic verification.\n3. **Supply-chain provenance for skills** \u2014 the SLSA/in-toto extension to agentic code generation (Konflux/fullsend) directly applies to skill marketplace provenance. The \"intent \u2192 source\" gap maps to skill authoring provenance.\n4. **Marketplace risk quantified** \u2014 ClawHavoc's 13% malicious rate + SoK's 26.1% vulnerability rate + arXiv:2602.08004's 37% flaw rate all converge: **roughly 1 in 4\u20138 marketplace skills is malicious or vulnerable**.\n5. **Dependency-aware retrieval validated** \u2014 GoS v3 provides concrete benchmark evidence that dependency-aware skill bundle retrieval outperforms flat retrieval in both quality (+25.55%) and efficiency (-56.72% tokens).\n\n## Wiki updates today\n\n- New examples: [coevoskills self evolving skills](../examples/coevoskills-self-evolving-skills.md), [supply chain agentic factory in toto](../examples/supply-chain-agentic-factory-in-toto.md), [clawhavoc marketplace attack](../examples/clawhavoc-marketplace-attack.md), [awesome agent skill papers catalog](../examples/awesome-agent-skill-papers-catalog.md)\n- New papers: [sok agentic skills beyond tool use](../papers/sok-agentic-skills-beyond-tool-use.md), [survey agent skills procedural infrastructure](../papers/survey-agent-skills-procedural-infrastructure.md)\n- Updated: [graph of skills dependency retrieval](../examples/graph-of-skills-dependency-retrieval.md) (v3 results), [skillsbench agent skills benchmark](../examples/skillsbench-agent-skills-benchmark.md) (v1.1 leaderboard)\n- Metrics + index + primary publication refresh\n- Q&A + lint pass\n\n## Tomorrow priority searches\n\n1. **Atomic Skills** (arXiv:2604.05013) \u2014 Scaling Coding Agents via Atomic Skills decomposition pattern\n2. **SkillMOO** (arXiv:2604.09297) \u2014 Multi-Objective Optimization for SE skills\n3. **EffiSkill** (arXiv:2603.27850) \u2014 Agent Skill Based Code Efficiency Optimization\n4. **arXiv:2604.06550** \u2014 Hierarchical Triage Framework for detecting malicious skills (ClawHavoc-validated)\n5. **SkillsMP / LobeHub marketplace** \u2014 largest skill marketplaces (425K / 170K skills) \u2014 governance models\n6. **SkillCraft** \u2014 Can LLM agents learn to use tools skillfully? (cited by CoEvoSkills)\n\n**Counts:** 6 sources today \u00b7 4 new examples \u00b7 2 new papers \u00b7 2 updated examples\n\n## Linked Examples\n\n- [EvoSkill: Automated Skill Discovery for Multi-Agent Systems](../examples/evoskill-automated-skill-discovery.md)\n\n## Q&A\n\n- [Q&A \u2014 2026-07-11 (Iteration 36)](../qa/2026-07-11-qa.md)", "daily-digests/2026-07-12": "# Daily Digest \u2014 2026-07-12 (Skill Bundles)\n\n**Iteration:** 37\n**Sources ingested:** 8\n\n## Sources\n\n1. **SkillMOO** (arXiv:2604.09297) \u2014 first framework to treat skill bundles as multi-objective search objects; NSGA-II Pareto selection on pass rate + cost; pruning and substitution dominate successful edits; top rank on 11/12 SkillsBench tasks\n2. **EffiSkill** (arXiv:2603.27850) \u2014 two-tier skill hierarchy (Operator Skills + Meta Skills) for code efficiency optimization; execution-free diagnosis + retrieval + plan composition; +3.69\u201312.52pp improvement\n3. **SkillSieve** (arXiv:2604.06550) \u2014 three-layer triage for detecting malicious skills (regex/AST \u2192 LLM analysis \u2192 LLM jury); F1=0.920 at $0.006/skill; deployed as Feishu bot; open-sourced\n4. **SkillCraft** (arXiv:2603.00718) \u2014 benchmark for skill composition and reuse; agents auto-compose atomic tools into executable Skills; 80% token savings from skill caching; cited by 20\n5. **SkillReducer** (arXiv:2603.29919) \u2014 empirical study of 55,315 skills: 26.4% lack routing, 60%+ content non-actionable; two-stage optimization (delta debugging + taxonomy + progressive disclosure); 48%+39% compression with +2.8% quality improvement (less-is-more effect)\n6. **ORCA** (GitHub: gfernandf/agent-skills) \u2014 Open Runtime for Capable Agents; 122 capabilities as YAML contracts + 36 DAG-composed skills + policy gates + provenance; 184/184 canonical taxonomy coverage; MCP support\n7. **AI-KM** (SoftwareX, Sept 2026) \u2014 agent skills + ontology-driven knowledge modeling in a closed loop; NL entity extraction builds formal ontologies; conversation-invokable skills + autonomous planning mode\n8. **Marketplace Landscape 2026** (Agensi.io) \u2014 8 major skill marketplaces compared; SkillsMP 800K+, LobeHub 169K+, Agensi 200+; 6.3 issues/skill, 36% prompt injection; MCP-based access predicted as default\n\n## Emerging patterns\n\n1. **Skill optimization triad converging** \u2014 three distinct approaches to optimizing skill bundles now exist: SkillMOO (search-based/NSGA-II), CoEvoSkills (evolution-based), SkillReducer (content reduction/delta debugging). Each addresses a different axis \u2014 configuration, content+verifier, and token efficiency \u2014 and could compose.\n2. **Less-is-more effect quantified** \u2014 SkillReducer shows that removing non-essential skill content actually *improves* functional quality by 2.8%, not just preserves it. This challenges the \"more context = better\" assumption. Progressive disclosure (load on demand) is the architectural pattern.\n3. **Skill composition as core capability** \u2014 SkillCraft validates that agents composing tools into reusable skills is a *core capability* that strongly correlates with success. 80% token savings from skill caching/reuse. This generalizes the skill bundle thesis from human-authored to agent-authored.\n4. **Hierarchical security validation maturing** \u2014 SkillSieve's three-layer triage (heuristic\u2192LLM\u2192LLM jury) with $0.006/skill cost and F1=0.920 is production-ready. Cross-ecosystem portability (ClawHub\u2192Feishu) proven. The LLM jury (3-LLM voting + debate) is a novel governance pattern.\n5. **Skills + ontologies integrated** \u2014 AI-KM closes the loop: knowledge \u2192 ontology \u2192 skills \u2192 knowledge feedback. NL extraction lowers the barrier. Conversation-invokable skills + autonomous planning mode for novel tasks. First concrete implementation of the skill bundle thesis with ontology as the context element.\n6. **Marketplace consolidation predicted** \u2014 8 marketplaces \u2192 3-4 within a year. Security scanning and creator payments becoming table stakes. MCP-based access replacing download-based distribution.\n\n## Wiki updates today\n\n- New examples: [skillmoo multi objective optimization](../examples/skillmoo-multi-objective-optimization.md), [effiskill code efficiency optimization](../examples/effiskill-code-efficiency-optimization.md), [skillsieve malicious skill detection](../examples/skillsieve-malicious-skill-detection.md), [skillcraft benchmark](../examples/skillcraft-benchmark.md), [skillreducer token efficiency](../examples/skillreducer-token-efficiency.md), [orca cognitive runtime](../examples/orca-cognitive-runtime.md), [ai km ontology skills](../examples/ai-km-ontology-skills.md), [marketplace landscape 2026](../examples/marketplace-landscape-2026.md)\n- Metrics + index + primary publication refresh\n- Q&A + lint pass\n\n## Tomorrow priority searches\n\n1. **SkillVerifier** / **SkillGuard** \u2014 runtime verification frameworks for skill execution safety\n2. **Skill transfer learning** \u2014 cross-domain skill reuse patterns (can skills from SE transfer to data analysis?)\n3. **Auto-skill discovery** \u2014 agents autonomously discovering new skills from task patterns\n4. **SkillsBench v2** \u2014 latest developments in the benchmark (v1.1 was 87 tasks, 24 configs)\n5. **Skill provenance standards** \u2014 W3C or other standards bodies working on skill provenance\n6. **OpenClaw / ClawHub ecosystem** \u2014 latest governance changes post-ClawHavoc\n\n**Counts:** 8 sources today \u00b7 8 new examples \u00b7 0 new papers \u00b7 0 updated \u00b7 6 new patterns\n\n## Linked Examples\n\n- [SkillsBench: First Benchmark for Agent Skills Effectiveness](../examples/skillsbench-agent-skills-benchmark.md)\n\n## Q&A\n\n- [Q&A \u2014 2026-07-12 (Iteration 37)](../qa/2026-07-12-qa.md)", "daily-digests/2026-07-13": "# Daily Digest \u2014 2026-07-13 (Skill Bundles)\n\n**Iteration:** 38\n**Sources ingested:** 6\n\n## Sources\n\n1. **EvoSkill** (arXiv:2603.02766, GitHub: sentient-agi/EvoSkill 1k\u2605) \u2014 self-evolving framework that automatically discovers and refines agent skills through iterative failure analysis; three-agent architecture (Executor \u2192 Proposer \u2192 Skill-Builder); Pareto frontier selection (K=3, git-backed); +7.3% OfficeQA, +12.1% SealQA; zero-shot transfer to BrowseComp (+5.3%)\n2. **SkillOpt** (Microsoft Research, June 2026) \u2014 treats agent skill files as trainable parameters; forward-backward-update cycle in text space; frozen model + optimizer model; textual learning rate + validation gating + rejected-edit buffer; best/tied-best on all 52 evaluation cells (6 benchmarks \u00d7 7 models \u00d7 3 modes); +23.5 points on GPT-5.5; skills transfer across model scales, harnesses, and tasks\n3. **PROV-AGENT** (arXiv:2508.02866, Oak Ridge + Argonne) \u2014 provenance model extending W3C PROV + MCP for tracking AI agent interactions in agentic workflows; agent decisions/prompts/responses as first-class provenance; near real-time capture system; cross-facility (edge/cloud/HPC) evaluation\n4. **SkillMigrator** (arXiv:2606.17645) \u2014 cross-domain web skill reuse via Transferable Interaction Patterns (TIP); 4-tuple \u27e8intent, template, slots, layout-skeleton\u27e9 without element references; Tree Edit Distance on accessibility-tree skeletons; 8-10% LLM call reduction; 35.4% cross-domain reuse rate\n5. **Skill OS** (AgenticOS 2026 Workshop) \u2014 \"Skills are the new Apps\"; surveys ~100K public skills; identifies 6 properties (phased procedures, semi-deterministic blocks, semantic equivalence, safety without enforcement, dependency fragility, no global management); argues for Skill OS abstraction (caching, env construction, global management, failure handling, security)\n6. **SkillGenBench** (Zhou et al., 2026) \u2014 benchmark for skill generation pipelines; 187 tasks \u00d7 8 domains; generator-executor decoupling; repository-grounded pass@3: 7-16% (extremely hard), document-grounded: 23-27%; auto-generated skills risk negative transfer\n\n## Emerging patterns\n\n1. **Skill optimization taxonomy completing** \u2014 Four distinct approaches now mapped: SkillMOO (search/NSGA-II), CoEvoSkills (evolution), SkillReducer (content reduction), and now SkillOpt (training/gradient-like text optimization) + EvoSkill (failure-driven discovery). Each addresses a different axis. SkillOpt outperforms all others on 52/52 cells.\n2. **Skill transfer is real and quantified** \u2014 EvoSkill (zero-shot task\u2192task transfer +5.3%), SkillOpt (cross-harness Codex\u2192Claude Code +59.7, cross-model-scale), SkillMigrator (cross-domain 35.4% reuse). Skills capture reusable workflow knowledge, not benchmark-specific instructions. Transfer is the key evidence for the skill bundle thesis.\n3. **Skill generation is the bottleneck** \u2014 SkillGenBench proves generating skills (7-27% pass@3) is 2-3x harder than using them. SkillsBench shows curated skills help; SkillGenBench shows auto-generating them fails often. Negative transfer is a real risk. This shifts the research frontier from skill use to skill creation.\n4. **Skills need OS-level management** \u2014 Skill OS paper argues skills are applications requiring OS abstractions (caching, env construction, global management, failure handling, security). The 100K skill analysis provides the evidence base. ORCA is an early implementation; Skill OS is the theoretical framework.\n5. **Provenance standards converging** \u2014 PROV-AGENT extends W3C PROV + MCP for agent provenance; W3C Agent Protocol Community Group active; SLSA/in-toto for supply chain. Provenance is becoming a standard context element for skill bundles.\n6. **Cross-domain via structural layout** \u2014 SkillMigrator's TIP abstraction (accessibility-tree skeleton + slot schema) enables cross-domain skill transfer by matching layout structure, not element IDs. This is a novel architectural pattern for skill bundles.\n\n## Wiki updates today\n\n- New examples: [evoskill automated skill discovery](../examples/evoskill-automated-skill-discovery.md), [skillopt trainable skill parameters](../examples/skillopt-trainable-skill-parameters.md), [prov agent unified provenance](../examples/prov-agent-unified-provenance.md), [skillmigrator cross domain transfer](../examples/skillmigrator-cross-domain-transfer.md), [skill os skills as apps](../examples/skill-os-skills-as-apps.md), [skillgenbench skill generation benchmark](../examples/skillgenbench-skill-generation-benchmark.md)\n- Metrics + index + primary publication refresh\n- Q&A + lint pass\n\n## Tomorrow priority searches\n\n1. **SkillVerifier / SkillGuard** \u2014 runtime verification frameworks for skill execution safety (still not found)\n2. **OpenClaw / ClawHub ecosystem** \u2014 latest governance changes post-ClawHavoc (still not found)\n3. **Memento-Skills** \u2014 RL-based skill self-evolution; \"Complete Autopsy\" article suggests analysis available\n4. **ASPIRE** (NVIDIA) \u2014 agentic skill programming through iterative robot exploration; robotics-focused skill discovery\n5. **EXIF** \u2014 Automated Skill Discovery for Language Agents through Exploration\n6. **JayLZhou/Awesome-Agent-Skills** \u2014 curated paper list + \"Comprehensive Survey on Agent Skills\" \u2014 check for new papers\n7. **Skill OS implementations** \u2014 any systems implementing the Skill OS abstraction demands?\n\n**Counts:** 6 sources today \u00b7 6 new examples \u00b7 0 new papers \u00b7 0 updated \u00b7 6 new patterns \u00b7 6 new context elements\n\n## Q&A\n\n- [Q&A \u2014 2026-07-13 (Skill Bundles, Iteration 38)](../qa/2026-07-13-qa.md)", "daily-digests/2026-07-14": "# Daily Digest \u2014 2026-07-14 (Skill Bundles)\n\n**Iteration:** 39\n**Sources ingested:** 7\n\n## Sources\n\n1. **ASPIRE** (arXiv:2607.00272, NVIDIA GEAR Lab, Jun 2026) \u2014 Agentic Skill Programming through Iterative Robot Exploration; continual learning system for robotics in code-as-policy paradigm; three components: closed-loop execution engine with multimodal traces, continually expanding skill library, evolutionary search; +77% LIBERO-Pro, +72% Robosuite, +32% BEHAVIOR-1K; 31% zero-shot vs 4% on LIBERO-Pro Long; sim-to-real transfer evidence; authors include Linxi \"Jim\" Fan, Ken Goldberg\n2. **Memento-Skills** (arXiv:2603.18743, 27 citations, Mar 2026) \u2014 agent-designing agent; memory-based RL with stateful prompts; skills as structured markdown files = persistent evolving memory; Read-Write Reflective Learning (read = skill router selects, write = updates/expands library); continual learning without LLM parameter updates; +26.2% General AI Assistants, +116.2% Humanity's Last Exam; 80% task success; GitHub: Memento-Teams/Memento-Skills; mentions SkillClaw for collective evolution\n3. **SkillGuard** (arXiv:2606.03024, CSIRO+ANU, Jun 2026) \u2014 permission framework for agent skills; dual-plane governance (context + action); five components: skill manifests, runtime access control, user-mediated authorization, deny-by-default, capability inference + behavior monitoring; 315 skills; 99.76% taxonomy coverage; 91% F1 manifest generation; attack success 32.37%\u219223.02% (contextual), 25.56%\u219216.67% (obvious); GitHub: Dianshu-Liao/SkilLGuard\n4. **SkillFortify** (arXiv:2603.00195, Feb 2026) \u2014 first formal analysis framework for agent skill supply chains; six contributions: DY-Skill attacker model (Dolev-Yao for 5-phase lifecycle), sound static analysis (abstract interpretation), capability-based sandboxing with confinement proof, Agent Dependency Graph with SAT resolution + lockfile semantics, trust score algebra with monotonicity, SkillFortifyBench (540 skills); 96.95% F1, 100% precision, 0% FP; 22 frameworks; 6,487 malicious tools catalogued; SHA-256 lockfile integrity\n5. **Skill1** (arXiv:2605.06130, 18 citations, May 2026) \u2014 unified evolution of skill-augmented agents via RL; single policy co-evolves skill selection, utilization, distillation; single task-outcome signal with frequency decomposition (low-freq = selection, high-freq = distillation); ALFWorld + WebShop; outperforms baselines; GitHub: AlphaLab-USTC/Skill1\n6. **NVIDIA-Verified Agent Skills** (NVIDIA Developer Blog, May 2026) \u2014 capability governance for AI agents; verified skills = cataloged, scanned (SkillSpector), signed (cryptographic skill.oms.sig), documented (skill cards); built on agentskills.io spec; cross-platform (Claude Code, Codex, Cursor); daily catalog sync; evaluation layer planned (trigger accuracy, task completion, token efficiency); GitHub: NVIDIA/skills\n7. **EXIF** (arXiv:2506.04287, 11 citations, Jun 2025) \u2014 automated skill discovery for language agents; Alice-Bob dual-agent framework; exploration-first strategy; retrospective skill dataset generation from environment interaction; iterative feedback loop; self-play (Alice=Bob) enables self-evolution; Webshop + Crafter; precursor to 2026 skill discovery wave\n\n## Emerging Patterns\n\n1. **Skill discovery taxonomy now spans domains** \u2014 ASPIRE (robotics, code-as-policy + evolutionary search), Memento-Skills (general agents, Read-Write Reflective Learning), Skill1 (RL-based co-evolution), EXIF (Alice-Bob self-play). Each applies a different discovery mechanism to a different domain. The taxonomy of skill discovery approaches is now multi-domain.\n2. **Dual-plane security governance** \u2014 SkillGuard's dual-plane model (context plane + action plane) is the first to recognize that skills operate across two coupled surfaces. This extends skill bundle security from single-plane (tool-level OR context-level) to dual-plane governance. Combined with SkillFortify (formal supply chain) and NVIDIA-verified (publication), security now covers: publication \u2192 supply chain \u2192 runtime \u2192 behavior.\n3. **Formal verification arrives for skills** \u2014 SkillFortify brings mathematical proofs (Dolev-Yao attacker model, abstract interpretation, capability confinement) to skill supply chains. This is the first formal (not heuristic) defense framework. The lockfile semantics (deterministic, SHA-256 integrity, trust scores) adapt package management patterns to skills.\n4. **Agent-designing agents** \u2014 Memento-Skills demonstrates agents autonomously constructing, adapting, and improving task-specific agents through skill evolution. Skills as structured markdown files serve as the sole adaptation mechanism (no LLM parameter updates). The Read-Write cycle is a complete skill lifecycle.\n5. **Industry productionization of skill governance** \u2014 NVIDIA-verified skills represent the commercial/enterprise layer: catalog \u2192 scan \u2192 sign \u2192 document \u2192 distribute. Skill cards centralize trust metadata. Cross-platform SKILL.md ensures portability. This is the publication/distribution counterpart to academic security frameworks.\n6. **Frequency decomposition for skill credit assignment** \u2014 Skill1's insight that a single task-outcome signal naturally decomposes into low-frequency (selection quality) and high-frequency (distillation) components is a novel governance pattern for unified skill lifecycle management.\n\n## Wiki Updates Today\n\n- New examples: [aspire robotics skill discovery](../examples/aspire-robotics-skill-discovery.md), [memento skills agent designing agent](../examples/memento-skills-agent-designing-agent.md), [skillguard permission framework](../examples/skillguard-permission-framework.md), [skillfortify formal verification supply chain](../examples/skillfortify-formal-verification-supply-chain.md), [skill1 unified skill evolution rl](../examples/skill1-unified-skill-evolution-rl.md), [nvidia verified agent skills governance](../examples/nvidia-verified-agent-skills-governance.md), [exif automated skill discovery](../examples/exif-automated-skill-discovery.md)\n- Metrics + index + primary publication refresh\n- Q&A + lint pass\n\n## Tomorrow Priority Searches\n\n1. **SkillClaw** \u2014 collective skill evolution framework mentioned in Memento-Skills; multi-agent skill sharing\n2. **SkillSpector** \u2014 NVIDIA's security scanning tool for agent skills; details on detection methods\n3. **MalTool benchmark** \u2014 6,487 malicious tools targeting LLM agents; detailed analysis\n4. **Badskill** \u2014 backdoor attacks on agent skills via model-in-skill poisoning (arXiv:2604.09378)\n5. **Skillject** \u2014 automating stealthy skill-based prompt injection for coding agents\n6. **AgentBound** \u2014 declarative access-control framework for MCP servers (sandbox-based)\n7. **SWE-Skills-Bench** \u2014 do agent skills actually help in real-world software engineering?\n8. **Externalization in LLM Agents** \u2014 unified review of memory, skills, protocols, harness engineering (arXiv:2604.08224)\n\n**Counts:** 7 sources today \u00b7 7 new examples \u00b7 0 new papers \u00b7 0 updated \u00b7 6 new patterns \u00b7 7 new context elements\n\n## Linked Examples\n\n- [NVIDIA Verified Agent Skills \u2014 Governance & Verification](../examples/nvidia-verified-agent-skills.md)\n- [SkillClaw: Collective Skill Evolution with Agentic Evolver](../examples/skillclaw-collective-skill-evolution.md)\n- [SkillSpector: NVIDIA Security Scanner for AI Agent Skills](../examples/skillspector-nvidia-security-scanner.md)\n\n## Q&A\n\n- [Q&A \u2014 2026-07-14 (Iteration 39)](../qa/2026-07-14-qa.md)", "daily-digests/2026-07-15": "# Daily Digest \u2014 2026-07-15 (Skill Bundles)\n\n**Iteration:** 40\n**Sources ingested:** 8\n\n## Sources\n\n1. **SkillClaw** (arXiv:2604.08377, 42 citations, Apr 2026) \u2014 Collective skill evolution in multi-user agent ecosystems; treats cross-user and over-time interactions as primary signal for improving skills; autonomous evolver identifies recurring behavioral patterns \u2192 translates into skill updates (refine/extend); shared repository synchronized across users; supports OpenClaw + Hermes; WildClawBench + Qwen3-Max; GitHub: AMAP-ML/SkillClaw (2.1k\u2605)\n2. **SkillSpector** (NVIDIA/SkillSpector, GitHub, 13.2k\u2605, 1.1k forks) \u2014 Security scanner for AI agent skills; YARA rules + LLM semantic analysis; OWASP/MITRE alignment; batch scanning; CI/CD integration; Docker; MCP least-privilege; 1312 unit tests; v2.3.13; Apache 2.0; 38 contributors; scanning step of NVIDIA-Verified ecosystem\n3. **MalTool** (arXiv:2602.12194, 10 citations, Feb 2026) \u2014 First systematic study of malicious tool code implementations; CIA triad taxonomy for agent tools; coding-LLM-based synthesis of malicious tools (standalone + embedded); automated verifier (functional correctness + structural diversity); 1,300 standalone + 5,727 embedded malicious tools; existing detection insufficient; UC Berkeley (Dawn Song) + Duke (Neil Gong)\n4. **BadSkill** (arXiv:2604.09378, 12 citations, Apr 2026) \u2014 Backdoor attacks via model-in-skill poisoning; third-party skill bundles backdoor-fine-tuned model; semantic compositional triggers; composite training objective (classification + margin + poison); 99.5% ASR; 3% poison rate \u2192 91.7% ASR; 8 architectures (494M\u20137.1B), 5 model families; 13 skills (8 triggered + 5 control); OpenClaw-inspired simulation\n5. **SkillJect** (arXiv:2602.14211, 7 citations, Feb 2026) \u2014 First automated framework for generating poisoned skills; two-channel attack (artifact: payload in helper script + instruction: front-loaded inducement in SKILL.md); closed-loop multi-agent (Attack\u2192Victim\u2192Evaluate\u2192refine); supports Claude Code + OpenClaw; trace-driven refinement; GitHub: jiaxiaojunQAQ/SkillJect; authors include Philip Torr (Oxford)\n6. **AgentBound** (arXiv:2510.21236, FSE 2026) \u2014 First access control framework for MCP servers; Android permission model inspired; declarative policy + enforcement engine; 296 most popular MCP servers; 80.9% automated policy generation; blocks majority of threats; negligible overhead; no server modifications; GitHub: dortort/agent-bound; USI Lugano\n7. **SWE-Skills-Bench** (arXiv:2603.15401, 34 citations, Mar 2026) \u2014 First requirement-driven benchmark isolating marginal utility of agent skills in SWE; 49 skills \u00d7 GitHub repos \u00d7 requirement docs; ~565 task instances, 6 subdomains; deterministic verification; **39/49 skills yield zero improvement**; avg gain +1.2%; token overhead up to +451%; only 7 skills help (up to +30%), 3 degrade (up to -10%); GitHub: GeniusHTX/SWE-Skills-Bench; Nanjing University\n8. **Externalization in LLM Agents** (arXiv:2604.08224, 35 citations, Apr 2026) \u2014 Unified review of memory, skills, protocols, harness engineering; cognitive artifacts lens; four-form taxonomy (memory=state, skills=procedural expertise, protocols=interaction, harness=unification); historical progression (weights\u2192context\u2192harness); parametric/externalized trade-off; self-evolving harnesses + shared infrastructure as emerging directions; 54 pages; 21 authors including Jun Wang (UCL), Weinan Zhang (SJTU)\n\n## Emerging Patterns\n\n1. **Complete attack taxonomy now spans four threat surfaces** \u2014 The skill supply chain has four distinct attack vectors now formally studied: (a) code-level malicious tools (MalTool), (b) model-in-skill backdoors (BadSkill), (c) prompt injection via SKILL.md (SkillJect), (d) marketplace-level campaigns (ClawHavoc). Each requires a different defense layer.\n\n2. **Defense stack achieving full lifecycle coverage** \u2014 SkillSpector (pre-installation scanning) + SkillGuard (runtime permission) + AgentBound (MCP server access control) + SkillFortify (formal verification) now cover: pre-installation \u2192 supply chain \u2192 runtime \u2192 MCP infrastructure. The defense stack mirrors the attack taxonomy.\n\n3. **MCP as critical infrastructure layer** \u2014 AgentBound's focus on MCP servers (296 most popular, unrestricted access) recognizes MCP as the connective tissue requiring its own security model. This extends skill bundle security beyond skills to the protocol layer.\n\n4. **Empirical reality check on skill utility** \u2014 SWE-Skills-Bench's finding that 80% of skills provide zero benefit is the first large-scale empirical challenge to the \"more skills = better\" assumption. Combined with SkillReducer's less-is-more effect, the field needs rigorous evaluation, not just adoption.\n\n5. **Theoretical foundation arrives** \u2014 Externalization in LLM Agents provides the systems-level framework: skills = externalized procedural expertise, one of four coupled forms. The weights\u2192context\u2192harness progression model explains why infrastructure matters increasingly. Self-evolving and shared infrastructure are the frontier.\n\n6. **Collective evolution as paradigm shift** \u2014 SkillClaw's multi-user skill evolution (cross-user + over-time trajectory aggregation) transforms skills from static artifacts to living, self-improving infrastructure. This connects to the Externalization paper's \"self-evolving harnesses\" and \"shared agent infrastructure\" emerging directions.\n\n## Wiki Updates Today\n\n- New examples: [skillclaw collective skill evolution](../examples/skillclaw-collective-skill-evolution.md), [skillspector nvidia security scanner](../examples/skillspector-nvidia-security-scanner.md), [maltool malicious tool attacks](../examples/maltool-malicious-tool-attacks.md), [badskill backdoor model in skill](../examples/badskill-backdoor-model-in-skill.md), [skillject automated prompt injection](../examples/skillject-automated-prompt-injection.md), [agentbound mcp access control](../examples/agentbound-mcp-access-control.md), [swe skills bench utility benchmark](../examples/swe-skills-bench-utility-benchmark.md), [externalization llm agents unified review](../examples/externalization-llm-agents-unified-review.md)\n- Metrics + index + primary publication refresh\n- Q&A + lint pass\n\n## Tomorrow Priority Searches\n\n1. **WildClawBench** \u2014 SkillClaw's benchmark for real-world agent scenarios; methodology and task design\n2. **Skill provenance for model artifacts** \u2014 How to verify model weights embedded in skills (motivated by BadSkill)\n3. **MCP server security landscape** \u2014 Beyond AgentBound: what other MCP security frameworks exist?\n4. **Skill utility in non-SWE domains** \u2014 SWE-Skills-Bench showed 80% zero improvement in SWE; is this domain-specific?\n5. **Skill versioning and compatibility** \u2014 SWE-Skills-Bench's version-mismatch finding; how should skills declare version compatibility?\n6. **Cognitive artifacts in agent design** \u2014 Further theoretical work on the externalization framework\n7. **Automated policy generation** \u2014 AgentBound's 80.9% accuracy; can this be improved?\n8. **MalTool defense gap** \u2014 MalTool shows existing detection insufficient; what new approaches are needed?\n\n**Counts:** 8 sources today \u00b7 8 new examples \u00b7 1 new paper (Externalization) \u00b7 0 updated \u00b7 6 new patterns \u00b7 8 new context elements\n\n## Linked Examples\n\n- [WildClawBench: Native-Runtime Long-Horizon Agent Evaluation](../examples/wildclawbench-native-runtime-evaluation.md)\n\n## Q&A\n\n- [Q&A \u2014 2026-07-15 (Iteration 40)](../qa/2026-07-15-qa.md)", "daily-digests/2026-07-16": "# Daily Digest \u2014 2026-07-16 (Skill Bundles)\n\n**Iteration:** 41\n**Sources ingested:** 7\n\n## Sources\n\n1. **WildClawBench** (arXiv:2605.10912, InternLM, May 2026) \u2014 Native-runtime long-horizon benchmark: 60 bilingual multimodal tasks in real CLI harnesses (OpenClaw, Claude Code, Codex, Hermes); hybrid grading; 19 models, best 62.2% (Opus 4.7); harness switch shifts scores up to 18pp; skill ablation mixed but Code Intelligence +22.4 for strongest model; GitHub InternLM/WildClawBench (~477\u2605)\n2. **SKILL0** (arXiv:2604.02268, ZJU+Meituan+Tsinghua) \u2014 First RL framework for skill internalization (\"skills at training, zero at inference\"); Dynamic Curriculum anneals skill scaffolding by on-policy helpfulness; +9.7% ALFWorld, +6.6% Search-QA, +10.1% WebShop; <0.5k tokens/step; GitHub ZJU-REAL/SkillZero\n3. **OpenClaw-Skill / CSTS** (arXiv:2606.16774) \u2014 Collective Skill Tree Search: multi-model CSN-Gen + CSN-Assess (quality + transferability scoring); builds structured transferable skill trees; Collective Skill RL multi-skill selection; addresses fragmentation, single-model bias, poor transfer\n4. **R3-Skill** (arXiv:2606.03565 v4, Tencent) \u2014 Query-conditional skill routing with **skill compatibility**; Reject-as-Resource uses LLM rejections as co-retrieval supervision; 10,246 skills, 41k queries, 32k rejections; Hit@1=0.7521; HF R3-embedding/rerank 0.6b; GitHub Tencent/R3-Skill\n5. **ASSCs / Skills Are Not Islands** (arXiv:2607.01136, PKU, Jul 1) \u2014 Agent Skill Supply Chains; SDA recovers multi-channel deps (skill/package/service); SkillBOM; **1.43M skills**; 58.73% name collisions; 71\u201373% packages transitive-only; 60\u201378% security skill deps transitive; recommends typed manifests + lockfiles\n6. **From Registry to Repository** (arXiv:2607.00911, Jul 1) \u2014 First empirical skill-as-artefact study; 18,463 registry + 23,199 personal skills; 3,709 reuse links; 6 content themes + 6 maintenance themes; reuse = one-time copy; 53% never modified; behavioral contracts stable\n7. **Inside the Skill Market** (arXiv:2607.09065, Jul 10) \u2014 First activity-centric SE skills study; 11,497 SE skills; SDLC coverage skewed to construction; versioning immature (most single-version); five-component skill model; evaluation gap for reuse effectiveness\n\n## Emerging Patterns\n\n1. **Internalization vs externalization spectrum completes** \u2014 SKILL0 (weights absorb skills) + Externalization review (skills as cognitive artifacts) + Memento/SkillOpt (external editable) now form a clear design triangle: train-away skills \u00b7 keep skills as memory \u00b7 optimize skills as text parameters.\n2. **Composition-aware retrieval is mandatory infrastructure** \u2014 R3-Skill proves independent relevance fails; SkillsBench/SWE-Skills-Bench negative deltas are partly a routing/compatibility problem, not only content quality.\n3. **Supply chain moves from incident to inventory science** \u2014 ASSCs/SkillBOM on 1.43M skills operationalizes SBOM+lockfile for skills; transitive dark matter (packages + risks) is the dominant surface.\n4. **Native multi-harness evaluation standard** \u2014 WildClawBench shows harness choice can matter as much as model choice (\u00b118pp); skill utility must be measured in production runtimes (OpenClaw/Claude Code/Codex/Hermes).\n5. **Maintenance science arrives** \u2014 Registry\u2192Repository + Inside the Skill Market: skills are copy-fork artefacts with additive local evolution, stable behavioral contracts, and weak version maturity signals.\n6. **Collective construction \u2260 collective evolution** \u2014 CSTS (multi-model tree construction + transfer gates) is orthogonal to SkillClaw (multi-user runtime trajectory aggregation); both \u201ccollective\u201d but different lifecycle phases.\n\n## Wiki Updates Today\n\n- New examples: [wildclawbench native runtime evaluation](../examples/wildclawbench-native-runtime-evaluation.md), [skill0 skill internalization](../examples/skill0-skill-internalization.md), [openclaw skill csts tree search](../examples/openclaw-skill-csts-tree-search.md), [r3 skill compatibility routing](../examples/r3-skill-compatibility-routing.md), [assc skill supply chains skillbom](../examples/assc-skill-supply-chains-skillbom.md), [registry to repository skill maintenance](../examples/registry-to-repository-skill-maintenance.md), [inside skill market se activities](../examples/inside-skill-market-se-activities.md)\n- Metrics + index + primary publication refresh\n- Q&A + lint pass\n\n## Tomorrow Priority Searches\n\n1. **SkillBOM / SDA tooling releases** \u2014 any open-source SkillDepAnalyzer or SkillBOM exporters\n2. **SDAR / Skill-GRPO skill absorption** \u2014 follow-on internalization papers beyond SKILL0\n3. **SkillRouter** (cited by R3; ~80K skill pool body-ablation)\n4. **AgentSkillOS** (280K+ skills; ecosystem orchestration)\n5. **SkillOps** (arXiv:2605.13716 skill libraries as self-maintaining ecosystems)\n6. **ToxicSkills full remediation frameworks** \u2014 beyond scan to automated quarantine\n7. **Hermes Agent skill governance** \u2014 multi-harness WildClawBench implications for this stack\n8. **SE requirements/design skills** \u2014 marketplace gap from Inside the Skill Market\n\n**Counts:** 7 sources today \u00b7 7 new examples \u00b7 0 new paper notes \u00b7 0 updated \u00b7 6 new patterns \u00b7 7 new context elements\n\n## Q&A\n\n- [Q&A \u2014 2026-07-16 (Iteration 41)](../qa/2026-07-16-qa.md)", "examples/addyosmani-engineering-skills": "# Addy Osmani Agent Skills: Production-Grade Engineering Workflows\n\n**Source:** https://github.com/addyosmani/agent-skills  \\\n**Date Added:** 2026-06-09  \\\n**Bundle Type:** Process-Oriented Engineering Discipline Skill Bundle  \\\n**Raw Source:** [addyosmani agent skills](../../raw/2026-06-09/addyosmani-agent-skills.md)\n\n## Overview\n\n**Agent Skills** by Addy Osmani is a collection of **workflows, quality gates, and best practices** designed to force AI coding agents to follow **senior-level engineering discipline** across the entire development lifecycle. It contains **23 core skills** organized by development phase, plus **specialist personas** and **reference checklists**.\n\nThis is a **process-oriented skill bundle** \u2014 each skill encodes a workflow with verification gates, anti-rationalization tables, and non-negotiable evidence requirements.\n\n## Core Philosophy\n\n> **Process, not prose.** Skills are workflows agents follow, not reference docs they read.\n\n### Key Design Principles\n- **Rationalizations:** Table of common excuses agents use (e.g., \"I'll add tests later\") and required rebuttals\n- **Red Flags:** Signs that the process is failing\n- **Verification:** Non-negotiable evidence requirements (tests, build logs, runtime data) \u2014 \"Seems right\" is never accepted\n- **Google Engineering Culture:** Incorporates Hyrum's Law, Chesterton's Fence, Trunk-based development\n\n## Skills by Development Phase (23 Total)\n\n### 1. Define & Plan (4 Skills)\n| Skill | Purpose |\n|-------|---------|\n| `interview-me` | One-question-at-a-time interview to extract true requirements until ~95% confidence |\n| `idea-refine` | Divergent/convergent thinking for vague concepts |\n| `spec-driven-development` | Writing PRDs covering style, testing, and boundaries before coding |\n| `planning-and-task-breakdown` | Decomposing specs into verifiable units with dependency ordering |\n\n### 2. Build / Implementation (9 Skills)\n| Skill | Purpose |\n|-------|---------|\n| `incremental-implementation` | Thin vertical slices; implement, test, verify, commit |\n| `test-driven-development` | Red-Green-Refactor; follows the **Beyonce Rule** (\"If you liked it, you shoulda put a test on it\") |\n| `source-driven-development` | Grounding decisions in official documentation with citations |\n| `doubt-driven-development` | Adversarial review: CLAIM \u2192 EXTRACT \u2192 DOUBT \u2192 RECONCILE |\n| `context-engineering` | Feeding agents the right info via rules files and MCP integrations |\n| `frontend-ui-engineering` | WCAG 2.1 AA compliance, specialized design |\n| `api-and-interface-design` | Hyrum's Law awareness, contract stability |\n| *(2 more specialized build skills)* | |\n\n### 3. Verify & Review (4 Skills)\n| Skill | Purpose |\n|-------|---------|\n| `browser-testing-with-devtools` | Live runtime data via Chrome DevTools MCP |\n| `debugging-and-error-recovery` | 5-step triage: reproduce, localize, reduce, fix, guard |\n| `code-review-and-quality` | 5-axis review with severity labels (Nit/Optional/FYI) |\n| `security-and-hardening` | OWASP Top 10 prevention and threat modeling |\n\n### 4. Ship & Maintain (3 Skills)\n| Skill | Purpose |\n|-------|---------|\n| `git-workflow-and-versioning` | Trunk-based development and atomic commits (~100 lines) |\n| `deprecation-and-migration` | Treating code as a liability; removing \"zombie code\" |\n| `documentation-and-adrs` | Recording the *why* via Architecture Decision Records |\n\n## Specialist Personas (Context Element: Role Definitions)\n\nPre-configured personas for targeted agent behavior:\n- **code-reviewer:** Senior Staff Engineer perspective\n- **test-engineer:** QA Specialist focusing on the \"Prove-It\" pattern\n- **security-auditor:** Security Engineer focusing on threat modeling and OWASP assessment\n\n## Slash Commands (7 Commands Mapping to Phases)\n\n| Command | Phase | Key Principle |\n|---------|-------|---------------|\n| `/spec` | Define | Spec before code |\n| `/plan` | Plan | Small, atomic tasks |\n| `/build` | Build | One slice at a time |\n| `/test` | Verify | Tests are proof |\n| `/review` | Review | Improve code health |\n| `/code-simplify` | Refactor | Clarity over cleverness |\n| `/ship` | Deploy | Faster is safer |\n\n## Cross-Platform Installation Support\n\n- **Claude Code** (Recommended): `/plugin marketplace add addyosmani/agent-skills`\n- **Cursor:** Copy `SKILL.md` files into `.cursor/rules/`\n- **Gemini CLI:** `gemini skills install https://github.com/addyosmani/agent-skills.git --path skills`\n- **GitHub Copilot:** Use agent definitions from `agents/` as personas and skill content in `.github/copilot-instructions.md`\n- **Windsurf/Kiro/OpenCode:** Add skill contents to respective rules configurations\n\n## Project Structure (Bundle Organization)\n\n```\n/skills          # The 23 core Markdown workflows\n/agents          # Specialist persona definitions\n/references      # Checklists for Testing, Security, Performance, Accessibility\n/hooks           # Session lifecycle hooks (e.g., citation caching for source-driven development)\n/.claude/commands # Slash command definitions\n```\n\n## Composition Notes\n\nThis bundle demonstrates **process-as-skill** composition patterns:\n\n1. **Lifecycle coverage**: Skills span the entire SDLC (Define \u2192 Plan \u2192 Build \u2192 Verify \u2192 Ship \u2192 Maintain)\n2. **Anti-rationalization design**: Explicit tables of agent failure modes + required corrections\n3. **Verification-first**: Every skill demands concrete evidence (tests, logs, runtime data)\n4. **Persona layering**: Specialist personas activate relevant skill subsets\n5. **Slash command interface**: 7 commands map 1:1 to phases \u2014 a **command taxonomy** context element\n6. **Reference checklists**: Separate `references/` directory with Testing, Security, Performance, Accessibility checklists \u2014 **standards/compliance artifacts**\n7. **Session hooks**: Lifecycle hooks for cross-cutting concerns (citation caching) \u2014 **execution context management**\n8. **Google engineering culture**: Formalized best practices (Hyrum's Law, Chesterton's Fence, Trunk-based) as **cultural/normative artifacts**\n\n## Confidence\n\n9/10 \u2014 Well-documented repository with clear philosophy, 23 structured skills, personas, checklists, and cross-platform installation. Actively maintained by a recognized engineering leader (Addy Osmani, Google Chrome).\n\n## Sources\n\n- https://github.com/addyosmani/agent-skills\n- Raw: [addyosmani agent skills](../../raw/2026-06-09/addyosmani-agent-skills.md)", "examples/agent-skills-spec": "# Agent Skills Specification\n\n**Source:** https://agentskills.io/\n**Date Added:** 2026-05-23\n**Bundle Type:** Specification + Reference Implementation\n\n## Skills Included\n- Standardized skill definition format\n- Capability declaration patterns\n\n## Context Elements\n- Formal specification for how skills declare capabilities\n- Emphasis on reusability and client interoperability\n\n## Composition Notes\nThis is the canonical reference for what constitutes a well-formed \"skill\". It provides the foundation for creating bundles that can be consumed by multiple agent runtimes.\n\n## Reproducibility\nHigh \u2014 the site itself serves as living documentation.", "examples/agentbound-mcp-access-control": "# AgentBound: Declarative Access Control for MCP Servers\n\n**Origin:** USI Lugano, Switzerland (arXiv:2510.21236)\n**Venue:** ACM Joint European Software Engineering Conference and Symposium on the Foundations of Software Engineering (FSE 2026)\n**GitHub:** https://github.com/dortort/agent-bound\n\n## Overview\n\nAgentBound is the first access control framework for **MCP servers**. As the Model Context Protocol has become the de facto standard for connecting AI agents with external resources, thousands of MCP servers execute with unrestricted access to host systems, creating a broad attack surface. AgentBound addresses this by adapting the proven Android permission model to MCP server security.\n\n## Two-Component Architecture\n\n1. **Declarative policy mechanism** \u2014 Inspired by the Android permission model:\n   - MCP servers declare required permissions (file access, network, process execution, etc.)\n   - Permissions are granted at runtime (user-mediated or policy-mediated)\n   - Least-privilege by design\n\n2. **Policy enforcement engine** \u2014 Contains malicious behavior without requiring MCP server modifications:\n   - Wraps MCP servers in a policy enforcement layer\n   - Blocks unauthorized resource access at runtime\n   - Negligible performance overhead\n\n## Key Results\n\n| Metric | Result |\n|--------|--------|\n| MCP servers analyzed | 296 (most popular) |\n| Automated policy generation accuracy | 80.9% from source code |\n| Threat blocking | Majority of security threats blocked |\n| Performance overhead | Negligible |\n| Server modifications required | None |\n\n## Key Innovations\n\n- **Android permission model for MCP** \u2014 Adapts the proven, widely-deployed Android permission system to MCP servers\n- **Automated policy generation** \u2014 Source code \u2192 declarative policies with 80.9% accuracy, reducing manual effort\n- **Non-invasive enforcement** \u2014 Wraps MCP servers without requiring changes to the servers themselves\n- **Software engineering rigor** \u2014 Published at FSE 2026, bringing SE access control discipline to agent infrastructure\n\n## Context Elements\n\n- **Declarative access control policies** \u2014 Permission declarations (Android-inspired formal model)\n- **Policy enforcement engine** \u2014 Runtime sandboxing/containment layer\n- **Source code analysis** \u2014 Automated policy generation from MCP server code\n- **MCP server dataset** \u2014 296 most popular servers (benchmark for policy generation)\n\n## Relation to Skill Bundle Patterns\n\nAgentBound extends skill bundle security to the **MCP protocol layer** \u2014 the infrastructure that connects skills to resources.\n\n- Complements [skillguard permission framework](skillguard-permission-framework.md) (skill-level permissions vs. MCP-server-level permissions)\n- Related to [skillfortify formal verification supply chain](skillfortify-formal-verification-supply-chain.md) (formal supply chain \u2014 AgentBound is runtime infrastructure)\n- Different layer from [skillspector nvidia security scanner](skillspector-nvidia-security-scanner.md) (static scanning vs. runtime acc
