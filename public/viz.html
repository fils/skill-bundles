irrors the SSSOM framework's approach to documenting mappings with provenance and confidence scores.\n  - Similarity formula: `score(c_s, c_t) = \u03a3(w_i \u00d7 s_i(c_s, c_t))` for six weighted signals\n- **Stable matching algorithm:** 1-to-1 assignment constraint \u2014 sorts candidates by confidence, retains only top-scoring unique pairs. Proven dominant: \"signal weights are irrelevant when stable matching is applied (F1 varies by <0.004), while removing stable matching drops F1 to 0.728.\"\n- **SHACL (Shapes Constraint Language):** Formal validation of RDF data via `shacl` tool\n- **32 standard ontologies in marketplace:** Schema.org, BFO, FOAF, SKOS, etc. \u2014 cross-ontology vocabulary mappings\n- **Clinical crosswalks:** ICD-10, SNOMED, MeSH \u2014 domain-specific ontology mappings\n- **OWL2-DL tableaux reasoner:** Native Rust implementation for consistency checking\n- **MCP tool interface:** 43 `onto_*` tools exposing ontology operations to LLM agents\n\n## How Context Elements Support Skills\n\nThe paper's central finding directly addresses the mapping gap: structured tool access (MCP/SPARQL) yields a **+264% improvement** in LLM ontology interaction (F1 0.717) over baseline (F1 0.431), while raw file access (Turtle syntax) actually *degrades* performance to F1 0.323. This demonstrates that **mapping quality depends on access modality, not just signal weights**.\n\nThe stable matching breakthrough shows that for skill bundles involving ontology alignment or SSSOM-style mappings, the **assignment constraint** (1-to-1) matters more than the similarity function itself. This is a fundamental insight for how skills should be bundled with mapping artifacts.\n\n## Composition Notes\n\nThis is one of the strongest examples in the catalog because it combines:\n1. **Agent skills** (MCP tools for LLM ontology engineering)\n2. **Mapping/alignment** (six-signal similarity + stable matching)\n3. **Validation** (SHACL shapes)\n4. **Vocabularies** (32 standard ontologies in marketplace)\n5. **Taxonomies** (clinical crosswalks: ICD-10, SNOMED, MeSH)\n6. **Rules** (OWL-RL forward-chaining)\n\nThe \"Infrastructure-as-Code\" lifecycle (Plan, Enforce, Apply, Monitor, Drift) with append-only lineage provides governance for the entire skill bundle.\n\n## Reproducibility\n\nHigh \u2014 single Rust binary, no JVM/Python dependencies. Installation via curl, Cargo, or Docker. MCP server integrates with Claude Desktop, Cursor, and any MCP-compatible client.\n\n## Key Benchmarks\n\n- **OAEI Anatomy Track:** P=0.963, R=0.733, F1=0.832 (highest precision of any reported system)\n- **Reasoning Speed:** 15ms vs 24,490ms (HermiT) for 50,000 axioms \u2014 **1,633\u00d7 speedup**\n- **OntoAxiom (LLM + MCP Tools):** F1 = 0.717, **+264% vs paper best**\n- **Construction:** 91-class Pizza ontology in <5 minutes with 96% coverage\n\n## Limitations\n\n- Recall gap needs domain-specific background knowledge (e.g., UMLS) for matches with low label similarity\n- Results measured against reference alignments but not yet independently evaluated by external benchmarks", "examples/openai-codex-skills": "# OpenAI Codex Agent Skills \u2014 Structured Skill System\n\n**Date:** 2026-05-23\n**Source:** https://developers.openai.com/codex/skills\n**Confidence:** 5/5 (Official documentation)\n\n## Name & Origin\nOpenAI Agent Skills for Codex \u2014 the official skill system for OpenAI's Codex CLI agent. Based on the open agent skills standard (agentskills.io).\n\n## Skills Included\nCodex implements the skill specification with progressive disclosure:\n- Skill manifests (SKILL.md) with YAML frontmatter\n- Supporting directories: scripts/, references/, assets/\n- Agent-specific configuration (agents/openai.yaml)\n\n## Context Elements\n- **YAML configuration**: agents/openai.yaml defines UI display_name, brand_color, invocation policy (allow_implicit_invocation), and tool dependencies\n- **MCP dependency declarations**: Skills declare external tool server requirements in YAML\n  ```yaml\n  dependencies:\n    tools:\n      - type: \"mcp\"\n        value: \"serverName\"\n  ```\n- **Context budget management**: Progressive disclosure formalized \u2014 2% of context window for skill discovery (~8,000 chars)\n- **Multi-scope hierarchy**: REPO \u2192 USER \u2192 ADMIN \u2192 SYSTEM scope resolution\n- **Config-driven enable/disable**: TOML-based skill configuration in ~/.codex/config.toml\n\n## How Context Elements Support Skills\nThe progressive disclosure pattern is a form of resource management that ensures skills don't overwhelm the context window. The YAML configuration (openai.yaml) provides a declarative way to constrain skill behavior (e.g., require explicit invocation) and declare external dependencies (MCP servers).\n\n## Composition Notes\nThis represents a mature, production-grade skill system with:\n- Formal specification compliance (agentskills.io)\n- Context budget awareness\n- Dependency declarations for external tools\n- Scope hierarchy for skill resolution\n\n## Reproducibility\nHigh \u2014 official documentation with clear installation steps via `$skill-installer`. The skill format is standardized across OpenAI's agent ecosystem.", "examples/openclaw-pkb-skill": "# OpenClaw PKB Skill\n\n**Source:** https://github.com/hyjkimbot/openclaw-pkb\n**Date Added:** 2026-05-23\n**Bundle Type:** Knowledge Base + Ontology Skill\n\n## Skills Included\n- Standardized PKB (Personal Knowledge Base) skill\n- Zettelkasten + Git + Ontology integration\n\n## Context Elements\n- Ontology\n- Git-based storage\n- Zettelkasten methodology\n\n## Composition Notes\nExcellent example of bundling skills with ontology + established knowledge management practices. One of the closest matches so far to \"skills + ontology/taxonomy\".\n\n## Reproducibility\nHigh within OpenClaw ecosystem.", "examples/openclaw-skill-csts-tree-search": "# OpenClaw-Skill: Collective Skill Tree Search (CSTS)\n\n**Origin:** PolyU / NTU / Tsinghua / RMIT / BUAA (Lin et al.), arXiv:2606.16774, Jun 2026\n\n## Overview\n\nOpenClaw-Skill proposes **Collective Skill Tree Search (CSTS)** to automatically construct structured, diverse, and **cross-model transferable** skill trees for OpenClaw-like agents \u2014 addressing handcrafted skill cost and three failure modes of prior auto-construction: fragmentation, single-model bias, and poor transferability.\n\n## Architecture\n\n### CSN-Gen (Collective Skill Node Generation)\n- Multiple heterogeneous models propose candidate skills per subtask\n- Expands coverage beyond one backbone's problem-solving bias\n\n### CSN-Assess (Collective Skill Node Assessment)\n1. **Collective quality scoring** \u2014 Independent multi-judge aggregation \u2192 robust effectiveness estimate\n2. **Collective transferability scoring** \u2014 Skill from model A must help models B/C \u2192 select generalizable nodes\n\n### Collective Skill RL\n- At training/inference, **actively selects multiple** tree skills to broaden solution-space exploration\n- Avoids single-skill trap \u2192 homogeneous/suboptimal trajectories\n\n## Problems Solved\n\n| Failure mode | CSTS fix |\n|--------------|----------|\n| Skill fragmentation | Tree paths = multi-step orchestration |\n| Limited diversity | Multi-model candidate generation |\n| Poor transferability | Explicit cross-model transfer scoring |\n\n## Context Elements\n\n- **Tree-of-skills** as first-class composition structure (nodes + dependency paths)\n- **Transferability as a gate** \u2014 not just quality \u2014 before skill inclusion\n- **Collective intelligence** for construction (multi-model gen + multi-model judge)\n- **Multi-skill RL selection** \u2014 composition at policy time, not only package time\n\n## Relation to Skill Bundle Patterns\n\n- Distinct from [skillclaw collective skill evolution](skillclaw-collective-skill-evolution.md) (runtime multi-user trajectory aggregation) \u2014 CSTS is **construction-time** collective search\n- Complements [coevoskills self evolving skills](coevoskills-self-evolving-skills.md) (generator+verifier co-evolution)\n- Complements [evoskill automated skill discovery](evoskill-automated-skill-discovery.md) (failure-driven Pareto discovery)\n- Transfer gates relate to [skillmigrator cross domain transfer](skillmigrator-cross-domain-transfer.md) and [skillsbench agent skills benchmark](skillsbench-agent-skills-benchmark.md) transfer findings\n- Tree structure extends [graph of skills dependency retrieval](graph-of-skills-dependency-retrieval.md) / [skillcraft benchmark](skillcraft-benchmark.md) composition themes\n\n## Key Insight\n\nAutomatic skill construction needs **collective generation + collective transfer gates**, not single-model trajectory distillation. Packaging skills as trees (not flat lists) is the structural antidote to fragmentation for long-horizon OpenClaw-class work.\n", "examples/openmontage-video-production-skills": "# OpenMontage Video Production Skills\n\n**Origin:** [calesthio/OpenMontage](https://github.com/calesthio/OpenMontage) (~36.3k stars)\n\n## Skills included\n\n500+ agent skills across 12 video production pipelines and 52 tools. Layer-3 provider skills (e.g. Gemini Omni Flash conversational video edit). Multi-platform packaging for Claude, Codex, Cursor, Copilot, `.agents/skills`.\n\n## Context elements\n\n- **Pipeline manifests** \u2014 stage ordering and gate defaults\n- **Human approval gates** \u2014 completed gated stages require `human_approved=True` (GATE VIOLATION otherwise)\n- **Checkpoint / audit trail** \u2014 stage versioning, history archive, `events.jsonl` (cost, scene_id, start/finish/error)\n- **Provider capability map** \u2014 quality_score + fallback lists as soft model ontology\n- **Tools registry** \u2014 52 tools instrumented via BaseTool\n\n## How context supports skills\n\nGates and checkpoints are **hard constraints** on skill execution (authorization + provenance), not soft guidance. Analogous to promotion gates in [agentic trust framework csa](agentic-trust-framework-csa.md) and Iron Laws in engineering discipline bundles.\n\n## Composition notes / reusability\n\n- Infrastructure-as-skills for **media production** (extends conference-infra pattern from [agents at conferences infrastructure](agents-at-conferences-infrastructure.md))\n- Strong human-in-the-loop formalization rarely this explicit in software-only skill repos\n\n## Reproducibility assessment\n\n**Medium-High.** Open source and documented protocols; full reproduction needs multi-provider API keys and media toolchain.\n\n## Related\n\n- [agentic trust framework csa](agentic-trust-framework-csa.md)\n- [constraint rules as context](../concepts/constraint-rules-as-context.md)\n- [skill bundle patterns](../concepts/skill-bundle-patterns.md)\n", "examples/orca-cognitive-runtime": "# ORCA: Open Runtime for Capable Agents\n\n## Origin\n\n- **GitHub:** https://github.com/gfernandf/agent-skills (43 stars, 407 commits)\n- **Author:** Guillermo Fernandez (gfernandf)\n- **License:** Apache-2.0\n- **Language:** Python (99.3%)\n\n## Skills Included\n\nORCA is a complete **skill bundle runtime**:\n- **122 capabilities** with deterministic Python baselines (no API keys needed)\n- **36 ready-to-use skills** composed from those capabilities\n- Skills are multi-step workflows defined as DAGs\n\n## Context Elements\n\n### Capability Registry (122 capabilities)\nDeclarative YAML contracts:\n```yaml\nid: doc.content.chunk\ndescription: Split a document into semantic chunks\ninput:\n  content: { type: string }\n  max_tokens: { type: integer, default: 512 }\noutput:\n  chunks: { type: array, items: { type: string } }\n```\n\n### DAG Scheduler\n- Resolves dependencies, runs steps in parallel\n- **Policy gates** at each step\n- Cognitive state tracking\n\n### Canonical Taxonomy\n- **184/184 capabilities covered** by guardrails\n- Canonical taxonomy alignment (agent.*, eval.*, model.*, text.*, ops.*, provenance.*, task.*)\n- Strict verification: no aliases, deprecated-selection guard\n\n### Provenance Tracking\n- Versioning and provenance checks\n- Production-readiness controls\n- PR gate enforcement\n\n### MCP Integration\n- MCP server support\n- Auto-bindings for OpenAI and PythonCall\n\n## Composition Notes\n\nORCA is a reference implementation for [three layer validation stack](../concepts/three-layer-validation-stack.md):\n1. **Capabilities** (base layer) \u2014 122 standardized, deterministic baselines\n2. **Skills** (composition layer) \u2014 DAG-based workflows with dependency resolution\n3. **Policy gates** (governance layer) \u2014 runtime enforcement at each step\n\n### Key Differentiators\n| Dimension | Traditional Frameworks | ORCA |\n|---|---|---|\n| Actions | Code functions | Declarative YAML capabilities |\n| Composition | Imperative chains | DAG-based skills |\n| Execution | LLM-dependent | Deterministic baselines + LLM fallback |\n| Portability | Framework-locked | Bind to any backend |\n\n### Adapters\n- LangChain, CrewAI, Semantic Kernel\n- MCP server support\n\n## Reproducibility\n\n- `pip install agent-skills`\n- Open-source, Apache-2.0\n- 407 commits, active development (last commit Jul 1, 2026)\n- Paper run artifacts published for external reproducibility\n\n## Connections\n\n- Complete runtime implementation of capability\u2192skill\u2192governance stack\n- Canonical taxonomy maps to [agent skills spec](agent-skills-spec.md) naming conventions\n- Provenance tracking connects to [supply chain agentic factory in toto](supply-chain-agentic-factory-in-toto.md)'s SLSA/in-toto approach\n- DAG composition is a formalization of [skillcraft benchmark](skillcraft-benchmark.md)'s auto-composition pattern\n", "examples/owasp-agentic-skills-top-10": "# OWASP Agentic Skills Top 10 (AST10) \u2014 Security Risk Framework for Skill Bundles\n\n**Source:** https://owasp.org/www-project-agentic-skills-top-10/\n**Date Added:** 2026-05-26 (Iteration 11)\n**Project Lead:** Ken Huang (OWASP AIVSS Lead)\n**License:** CC-BY-SA-4.0\n**Bundle Type:** Security Risk Taxonomy \u00b7 Universal Skill Format \u00b7 Governance Framework\n**Confidence:** 9/10\n\n## Name & Origin\n\nThe **OWASP Agentic Skills Top 10 (AST10)** is the first dedicated security risk framework for the agent skill ecosystem, analogous to OWASP's Top 10 for web applications and LLM applications. Published in Q1 2026, it identifies the 10 most critical security risks in the skill execution layer of AI agents.\n\n**Mental Model:** *\"MCP = how the model talks to tools; AST10 = what those tools actually do.\"*\n\n## Skills Included\n\n- Risk classification and assessment methodology for skill inventory\n- **Universal Skill Format** with permissions, risk tiers, and cryptographic signatures\n- Scanning pipeline recommendations (semantic + behavioral multi-tool)\n- Governance controls (immutable pinning, hash verification, least-privilege manifests)\n\n## Context Elements\n\n- **Risk Taxonomy (10-class):** AST01\u2013AST10 covering malicious skills, supply chain compromise, over-privileged skills, insecure metadata, unsafe deserialization, weak isolation, update drift, poor scanning, no governance, cross-platform reuse\n- **Lethal Trifecta:** Formal risk model combining (private data access) \u00d7 (untrusted content exposure) \u00d7 (external communication) = high-risk classification\n- **Universal Skill Format (YAML):** Proposed standard with `permissions.files`, `permissions.network`, `risk_tier`, `signature`, `content_hash`\n- **Security Checklist:** 12-item checklist for users/security teams and developers\n\n## How Context Elements Support Skills\n\nAST10 provides the **security specification** that skill bundle validation tools should enforce:\n\n1. **Malicious Skills (AST01):** Merkle root signing + registry scanning \u2014 directly complements [nvidia verified agent skills](nvidia-verified-agent-skills.md)'s OpenSSF signing\n2. **Supply Chain (AST02):** Registry transparency + provenance tracking \u2014 maps to [purplebox supply chain security](purplebox-supply-chain-security.md)'s 6-vector taxonomy\n3. **Over-Privileged (AST03):** Least-privilege manifests + schema validation \u2014 reinforces [veto agent authorization](veto-agent-authorization.md) pattern\n4. **Weak Isolation (AST06):** Containerization + Docker sandboxing \u2014 aligns with [graphguard os guardrails](graphguard-os-guardrails.md) and [nemoclaw security scanner](nemoclaw-security-scanner.md)\n\nThe **Lethal Trifecta** formalizes what [mondoo agent skills security](mondoo-agent-skills-security.md) found empirically: skills with data access + untrusted content + network egress are the highest risk.\n\n## Composition Notes\n\nThis is a **meta-governance bundle** \u2014 it defines the rules by which other skill bundles should be evaluated:\n\n1. **Specification Layer:** The Universal Skill Format provides a machine-readable standard for permissions, risk tiers, and signatures\n2. **Scanning Layer:** AST08 (Poor Scanning) defines requirements for multi-tool scanning pipelines\n3. **Governance Layer:** AST09 (No Governance) mandates skill inventories and agentic identity controls\n4. **Compliance Layer:** The framework maps to existing security standards (OWASP LLM Top 10, MITRE ATLAS)\n\nThe framework is uniquely **evidence-based** \u2014 built on real incident data:\n- 36.8% of 3,984 scanned skills contain flaws\n- 1,184 malicious skills in ClawHavoc campaign\n- 135,000+ exposed OpenClaw instances\n- CVE-2026-28363 (ClawJacked) CVSS 9.9\n\n## Reproducibility\n\nHigh \u2014 published on OWASP's official website as an open project under CC-BY-SA-4.0. Full write-ups for AST01\u2013AST06 expected Q2 2026.\n\n## Bundle Links\n- [mondoo agent skills security](mondoo-agent-skills-security.md) \u2014 Empirical basis for many AST10 risk categories\n- [nvidia verified agent skills](nvidia-verified-agent-skills.md) \u2014 Provides the signing/certificate chain AST10 recommends\n- [purplebox supply chain security](purplebox-supply-chain-security.md) \u2014 Supply chain attack taxonomy maps to AST02\n- [nemoclaw security scanner](nemoclaw-security-scanner.md) \u2014 Fills the scanning pipeline gap (AST08)", "examples/oxo2-sssom-mapping-service": "# OxO2: SSSOM-Compliant Ontology Mapping Service\n\n## Overview\n\nOxO2 is a production SSSOM-compliant ontology mapping service from EMBL-EBI's EBISPOT team. It downloads SSSOM mappings, converts them to JSON, and serves them via REST API for ontology term alignment and cross-referencing.\n\n## Context Artifacts\n\n### CLAUDE.md Agent Context\nThe project includes a `CLAUDE.md` file at the repository root \u2014 a structured instruction document specifically designed for AI coding assistants. This is a concrete example of **agent context as formal documentation**.\n\nThe pattern includes:\n- `CLAUDE.md` (root) \u2014 canonical project overview, build commands, environment setup\n- `CONTEXT.md` per module \u2014 specific module details\n- `docs/adr/` \u2014 Architectural Decision Records\n- `README.md` \u2014 operational instructions\n\n### SSSOM Compliance\nOxO2 implements the [sssom mapping protocol](sssom-mapping-protocol.md) standard:\n- Downloads SSSOM-format mappings\n- Converts to JSON for REST API serving\n- Integrates with OLS (Ontology Lookup Service) and O\u00d7O (Ontology Xref Ontology)\n- Uses Nemo v0.9.1 inference engine for rules and explanations\n\n## Architecture\n| Layer | Technology |\n|---|---|\n| Backend | Java 25, Maven, Spring Boot 3.4.1 |\n| Frontend | React 19, TypeScript, Vite, Tailwind CSS |\n| Data Store | Apache Solr 9.9.0 |\n| Inference | Nemo v0.9.1 |\n| Pipeline | Nextflow |\n| CI/CD | GitHub Actions \u2192 ghcr.io |\n| Orchestration | Kubernetes (Helm), SLURM (HPC) |\n\n## Issue Management\nUses `gh` CLI with triage labels: `needs-triage`, `needs-info`, `ready-for-agent`, `ready-for-human`, `wontfix` \u2014 another example of formal workflow context.\n\n## Composition Pattern\nThis project is the **third SSSOM implementation** in our catalog (after [sssom mapping protocol](sssom-mapping-protocol.md) spec and [onto llm mapping](onto-llm-mapping.md) mapping generator), but the **first to combine SSSOM with agent context documentation** (CLAUDE.md). It represents a mature production system where the ontology mapping standard and the AI assistant context pattern coexist.\n\n## Source Attribution\nRaw source: [oxo2 claude](../../raw/2026-05-25/oxo2-claude.md)", "examples/prov-agent-unified-provenance": "# PROV-AGENT: Unified Provenance for Tracking AI Agent Interactions in Agentic Workflows\n\n**Origin:** Oak Ridge National Lab + Argonne National Lab (arXiv:2508.02866, Aug 2025)\n**Authors:** Renan Souza, Amal Gueroudji, Stephen DeWitt, Daniel Rosendo, Tirthankar Ghosal, Robert Ross, Prasanna Balaprakash, Rafael Ferreira da Silva\n\n## Overview\n\nIn agentic workflows, autonomous agents plan tasks, interact with humans and peers, and shape scientific outcomes. When agent outputs feed into other agents' inputs, errors can propagate and compound. PROV-AGENT extends the W3C PROV standard and leverages MCP (Model Context Protocol) to capture agent interactions \u2014 prompts, responses, and decisions \u2014 as first-class provenance components in end-to-end workflow graphs.\n\n## Problem\n\nTraditional provenance approaches capture data flow and task execution but fail to represent:\n- **Reasoning processes** behind agent decisions\n- **Model invocations** and their parameters\n- **Contextual information** driving agent choices\n\nWithout this, root cause analysis is impossible when unexpected behavior occurs in multi-agent workflows.\n\n## Three Contributions\n\n1. **Provenance model** \u2014 extends W3C PROV + incorporates MCP concepts for agent actions\n2. **Near real-time system** \u2014 open-source, captures agentic provenance during execution\n3. **Cross-facility evaluation** \u2014 edge devices, cloud services, HPC systems\n\n## Critical Provenance Queries\n\n1. What specific input data led an agent to make a particular decision?\n2. How did an agent's decision influence control/data flow within the workflow?\n3. Which downstream outputs were affected by a specific agent interaction?\n4. Where did erroneous data originate, and through which agents' decisions did it propagate?\n\n## Context Elements\n\n- **W3C PROV extension** \u2014 standards-based provenance model\n- **MCP integration** \u2014 Model Context Protocol concepts for agent-tool interactions\n- **Agent-centric metadata** \u2014 prompts, responses, decisions as first-class provenance\n- **Cross-facility** \u2014 edge + cloud + HPC provenance capture\n- **Near real-time** \u2014 open-source capture system\n- **Provenance graph** \u2014 unified graph with agent actions as first-class components\n\n## Relation to Skill Bundle Patterns\n\nPROV-AGENT addresses the **provenance and traceability** dimension of skill bundles:\n- Complements [supply chain agentic factory in toto](supply-chain-agentic-factory-in-toto.md) (SLSA/in-toto for supply chain) \u2014 PROV-AGENT captures runtime provenance\n- Extends [ai km ontology skills](ai-km-ontology-skills.md) pattern \u2014 both connect skills to formal knowledge artifacts\n- Relates to W3C Agent Protocol Community Group efforts for interoperable agent standards\n\n## Key Insight\n\nAgent decisions, prompts, and responses must be first-class provenance components \u2014 not just data flow. The W3C PROV + MCP combination provides a standards-based foundation for agent workflow traceability, enabling root cause analysis when agents hallucinate or reason incorrectly in multi-step workflows.\n", "examples/purplebox-supply-chain-security": "# PurpleBox Security: AI Agent Skills Supply Chain Risk\n\n## Overview\n\nPurpleBox Security published a comprehensive analysis of the security risks in the Agent Skills marketplace ecosystem. Within 7 weeks of the [agent skills spec](agent-skills-spec.md) open standard release, researchers identified a **12% infection rate** in public marketplaces \u2014 341 malicious skills on ClawHub alone, ~900 total identified globally.\n\n## The ClawHavoc Campaign\n\nA coordinated attack responsible for 335/341 malicious skills:\n- **Crypto Tools**: 111 malicious skills (Solana/Phantom wallet utilities)\n- **YouTube/Polymarket**: 91 malicious skills (summarizers, trading bots)\n- **Typosquats**: 29 near-misspellings of official CLI tools\n\n## Attack Taxonomy (Context Element Gap Mapping)\n\n| # | Attack Vector | What It Exploits |\n|---|---|---|\n| 1 | Supply Chain Poisoning | Open marketplace with no code signing |\n| 2 | Prompt Injection via SKILL.md | No prompt sanitization layer |\n| 3 | Unsigned Executable Code | Scripts run at agent privilege level |\n| 4 | Social Engineering (ClickFix) | Users paste base64 commands |\n| 5 | Discoverability Hijacking | No metadata integrity checks |\n| 6 | Credential Exfiltration | Access to ~/.clawdbot/.env |\n\n## Critical Vulnerability\nCVE-2026-25253 (CVSS 8.8): 1-click RCE via query parameter `gatewayUrl` accepting WebSocket auto-connect with credentials.\n\n## Security Gaps in the Standard\n1. **No code signing** \u2014 no way to verify author or integrity\n2. **No sandboxing guidance** \u2014 no execution isolation\n3. **No permission models** \u2014 no enforcement layer\n4. **No integrity checks** \u2014 no hash verification or path boundary enforcement\n\n## Relation to Skill Bundle Security\nThis article directly maps to context elements needed in skill bundles:\n\n| Gap | Existing Counterexample in Catalog |\n|---|---|\n| Code signing | [nvidia verified agent skills](nvidia-verified-agent-skills.md) (OpenSSF) |\n| Sandboxing | [nemoclaw security scanner](nemoclaw-security-scanner.md) |\n| Authorization | [veto agent authorization](veto-agent-authorization.md) |\n| Supply chain | [github cli skill management](github-cli-skill-management.md) |\n| Scanning | [mondoo agent skills security](mondoo-agent-skills-security.md) (14 attack patterns) |\n\n## Why This Matters for Bundles\nPurpleBox shows that skill bundles are an **active attack surface**. Any skill bundle design that doesn't include security as a context element (validation, signing, authorization, scanning) is vulnerable to the attack vectors documented here. This article provides the **theoretical foundation** for why bundles like [graphguard os guardrails](graphguard-os-guardrails.md), [tool use firewall](tool-use-firewall.md), and [veto agent authorization](veto-agent-authorization.md) exist \u2014 they are the defense against these attacks.\n\n## Source Attribution\nRaw source: [purplebox supply chain risk](../../raw/2026-05-25/purplebox-supply-chain-risk.md)", "examples/r3-skill-compatibility-routing": "# R3-Skill: Query-Conditional Skill Routing with Compatibility\n\n**Origin:** Tencent IMA Product Center + Youtu Lab (Wang, Wen et al.), arXiv:2606.03565 (v4 Jul 2026)\n**Code/Data:** https://github.com/Tencent/R3-Skill\n**Models:** https://huggingface.co/tencent/R3-embedding-0.6b , R3-rerank-0.6b\n\n## Overview\n\nR3-Skill formalizes that **skill retrieval is not document retrieval**: top-K success depends on whether retrieved skills **work together under a query** (skill compatibility), not independent relevance alone. **Reject-as-Resource (R3)** reuses LLM rejection decisions \u2014 normally discarded \u2014 as compatibility supervision.\n\n## Benchmark (R3-Skill)\n\n| Asset | Scale |\n|-------|-------|\n| Skills | 10,246 (8 super-domains) |\n| Accepted queries | 41,592 |\n| Rejected annotations | 32,828 |\n| Languages | Bilingual CN/EN, 4 directions |\n| Rejection taxonomy | 8 classes |\n| Test ground truth | Multi-expert verified |\n\nToken reality: mean skill body ~2,073 tokens; full library \u2248 **21.2M** tokens \u2014 all-prompt is impossible.\n\n## Architecture\n\n1. **R3-Embedding** \u2014 bi-encoder recall stage\n2. **R3-Reranker** \u2014 cross-encoder with graded compatibility supervision\n3. Gradient analysis: compatibility signal is diluted in bi-encoder bilateral balancing; **cross-encoder** can use it as ranking supervision without loss\n\n## Key Metrics\n\n- Hit@1 = **0.7521**\n- NDCG@10 = **0.8173**\n- Set-Compat = **0.3188**\n\n## Context Elements\n\n- **Skill compatibility** \u2014 joint set quality under query as first-class retrieval objective\n- **Reject-as-Resource** \u2014 negative composition labels from LLM synthesis pipelines\n- **Body-sensitive routing** \u2014 descriptions alone fail; body carries 31\u201344pp of routing signal (cited SkillRouter)\n- **Sandbox provisioning** \u2014 K-skill install only for cold-start latency\n\n## Relation to Skill Bundle Patterns\n\n- Explains negative deltas in [skillsbench agent skills benchmark](skillsbench-agent-skills-benchmark.md) and zero-gain skills in [swe skills bench utility benchmark](swe-skills-bench-utility-benchmark.md): wrong co-retrieval hurts\n- Complements [graph of skills dependency retrieval](graph-of-skills-dependency-retrieval.md) (GoS dependency-aware retrieval)\n- Complements [skillcraft benchmark](skillcraft-benchmark.md) (composition/reuse)\n- Complements [skillreducer token efficiency](skillreducer-token-efficiency.md) (less-is-more compression)\n- Production counterpart to [skill os skills as apps](skill-os-skills-as-apps.md) management demands (caching, env construction)\n\n## Key Insight\n\nA skill bundle is not a bag of independently relevant packages. **Compatibility under the query** is a formal context element: retrieval systems must train on co-suitability (including rejections), not just relevance.\n", "examples/rdf-ontologies-skill": "# RDF Ontologies Skill \u2014 SHACL + SPARQL Integration\n\n**Date:** 2026-05-23\n**Source:** https://eliteai.tools/agent-skills/rdf-ontologies-1\n**Installed via:** npx add-skill https://github.com/majiayu000/claude-skill-registry/tree/main/skills/other/rdf-ontologies\n**Confidence:** 4/5 (Third-party catalog extraction)\n\n## Name & Origin\nRDF Ontologies \u2014 an agent skill that teaches LLMs to use Resource Description Framework (RDF) and Turtle (TTL) syntax for managing software specifications, ontologies, and knowledge graphs.\n\n## Skills Included\n- RDF triple modeling (Subject \u2192 Predicate \u2192 Object)\n- Turtle (TTL) syntax for human-readable RDF\n- SHACL validation of RDF data against constraint shapes\n- SPARQL query construction for RDF data retrieval\n- .specify/ directory workflow for specification management\n\n## Context Elements\n- **SHACL (Shapes Constraint Language)**: Formal validation of RDF data\n  - Example: UserStory must have exactly one title (string), priority P1/P2/P3, and at least one acceptance criterion\n- **Turtle vocabulary**: Domain-specific prefixes and namespaces (spec:, rdf:, rdfs:, xsd:)\n- **SPARQL queries**: Standard query language for structured data retrieval\n- **Oxigraph triple store**: High-performance RDF storage and SPARQL processing\n- **Validation commands**: cargo make speckit-validate for SHACL constraint checking\n- **Rendering pipeline**: ggen render converts .ttl to .md (single-direction workflow)\n\n## How Context Elements Support Skills\nThe SHACL shapes provide formal validation that ensures RDF data conforms to expected structures. The Turtle vocabulary gives the agent a controlled vocabulary for specification management. The Oxigraph integration provides executable tooling for storing and querying the RDF data.\n\n## Composition Notes\nThis is a rare example of a skill bundle that combines skills with formal semantic web standards (SHACL, SPARQL, RDF/TTL). The workflow enforces a clear separation: .ttl is the source of truth, .md is derived output only.\n\n## Reproducibility\nMedium \u2014 third-party skill installable via npx add-skill, but depends on external tooling (Oxigraph, ggen).", "examples/registry-to-repository-skill-maintenance": "# From Registry to Repository: Skill Authorship, Reuse & Maintenance\n\n**Origin:** Gao, Lulla, Lin, Baltes, Treude, Zahedi, arXiv:2607.00911, Jul 1 2026\n\n## Overview\n\nFirst empirical study treating AI agent skills as **engineered software artefacts** \u2014 authored, reused, customized, and maintained \u2014 rather than only as agent capabilities. Spans the **registry channel** (skills.sh) and the **personal-use repository channel** (GitHub).\n\n## Corpus\n\n| Channel | Count |\n|---------|-------|\n| skills.sh registry | 18,463 |\n| Personal-use (5,876 repos) | 23,199 |\n| Reuse links recovered | 3,709 |\n| SE skills (SWEBOK-classified) | 29,450 |\n\n## Content Taxonomy (6 themes)\n\n1. Scoping and orchestrating\n2. Running the execution lifecycle\n3. Ensuring output quality\n4. Governing agent conduct\n5. Grounding domain knowledge\n6. User/agent coordination\n\nSoftware Construction dominates SWEBOK KAs with a long specialized tail.\n\n## Maintenance Findings\n\n- Reuse is largely a **one-time copy** (near-verbatim); **53% never modified** after adoption\n- Subsequent local maintenance is overwhelmingly **additive**\n- Primary change targets: reworking operational specifications; adapting knowledge/resources\n- **Behavioral contracts** (how skill interacts with users, monitors state, recovers from failure) remain almost untouched\n- Registry updates rarely flow back into forks (copy-fork drift)\n\n## Edit Taxonomy (6)\n\nmetadata \u00b7 operational specs \u00b7 behavioral constraints \u00b7 knowledge/resources \u00b7 compatibility \u00b7 polishing\n\n## Context Elements\n\n- **Dual-channel lifecycle** \u2014 publish vs local infrastructure skills\n- **Copy-fork reuse model** \u2014 not package-manager-style updates\n- **Stable behavioral contract** \u2014 soft interface that resists churn\n- **Additive evolution** \u2014 accretes domain knowledge rather than refactoring structure\n\n## Relation to Skill Bundle Patterns\n\n- Maintenance science for [agent skills spec](agent-skills-spec.md) and marketplace catalogs\n- Explains versioning immaturity seen in [inside skill market se activities](inside-skill-market-se-activities.md) (companion 2026-07-16)\n- Motivates lockfiles/manifests from [assc skill supply chains skillbom](assc-skill-supply-chains-skillbom.md)\n- Complements [skillopt trainable skill parameters](skillopt-trainable-skill-parameters.md) (systematic skill improvement vs ad-hoc edits)\n- Complements [skillreducer token efficiency](skillreducer-token-efficiency.md) (many skills bloated/non-actionable)\n\n## Key Insight\n\nSkill bundles behave like **editable documentation dependencies**, not immutable packages: copy once, rarely pull updates, add local knowledge, leave behavioral contracts alone. Registries and tools should optimize for consolidating re-authored domain knowledge and project-specific bindings \u2014 not assume npm-style update streams.\n", "examples/schimatos-shacl-knowledge-graph": "# Schimatos \u2014 SHACL-based Knowledge Graph Editor\n\n**Source:** https://github.com/schimatos/schimatos.org\n**Date Added:** 2026-05-23 (Iteration 3)\n**Bundle Type:** Validation + Knowledge Graph Tool\n\n## Skills / Capabilities\n- SHACL-based web form generation\n- Knowledge Graph editing with validation\n\n## Context Elements\n- **Strong SHACL usage** for validation\n- Designed for Knowledge Graph editing\n\n## Composition Notes\nThis is currently the strongest example found that combines **SHACL validation** with knowledge work. However, it is not yet packaged as an \"agent skill bundle\" in the style of NORA or OpenClaw. It represents a potential building block rather than a complete skill bundle.\n\n## Gap Status\nClosest match so far for the **Validation (SHACL)** category, but integration with agent skills remains an open question.", "examples/scientific-agent-skills-kdense": "# Scientific Agent Skills (K-Dense)\n\n**Origin:** [K-Dense-AI/scientific-agent-skills](https://github.com/K-Dense-AI/scientific-agent-skills) (~30.6k stars, 2026-07-10)\n\n## Skills included\n\n148 ready-to-use scientific/research skills across bioinformatics, cheminformatics, proteomics, clinical research, medical imaging, materials, geospatial, lab automation, scientific communication, multi-omics, protein engineering, and research methodology.\n\n## Context elements\n\n- **Domain taxonomy** \u2014 multi-category science skill taxonomy\n- **Scientific databases** \u2014 unified lookup over PubChem, ChEMBL, UniProt, COSMIC, ClinicalTrials.gov, etc. (100+); BioServices / BioPython / gget packages\n- **Package skills** \u2014 70+ curated Python package skills (RDKit, Scanpy, OpenMM, \u2026)\n- **Platform integrations** \u2014 Benchling, DNAnexus, LatchBio, OMERO, Ginkgo Cloud Lab, Opentrons, etc.\n- **Security CI** \u2014 `security-scan.yml`, `scan_skills.py`, `scan_pr_skills.py`, SECURITY.md\n- **Standard compliance** \u2014 agentskills.io badge and multi-host install (Cursor, Claude Code, Codex, Antigravity, Pi)\n\n## How context supports skills\n\nScientific databases and package documentation act as a **living semantic layer**: skills are not free-floating prompts but grounded in curated tools and data sources. Security scanning enforces supply-chain hygiene at PR and repo level (see [three layer validation stack](../concepts/three-layer-validation-stack.md)).\n\n## Composition notes / reusability\n\n- Parallel to [clawbio bioinformatics skills](clawbio-bioinformatics-skills.md) but broader \"AI Scientist\" scope\n- Sponsors [agentskills workshop 2026](../papers/agentskills-workshop-2026.md) (Agent Skills '26) \u2014 research community alignment\n- Companion product: K-Dense BYOK desktop co-scientist\n\n## Reproducibility assessment\n\n**High.** Versioned releases, MIT, explicit standard, CI scanners, documented install paths.\n\n## Related\n\n- [clawbio bioinformatics skills](clawbio-bioinformatics-skills.md)\n- [three layer validation stack](../concepts/three-layer-validation-stack.md)\n- [skill bundle patterns](../concepts/skill-bundle-patterns.md)\n- [agentskills workshop 2026](../papers/agentskills-workshop-2026.md)\n", "examples/shacl-1-2-spec": "# SHACL 1.2 Core Specification \u2014 W3C Standard\n\n**Source:** https://www.w3.org/TR/shacl12-core/\n**Date Added:** 2026-05-24 (Iteration 8)\n**Author:** W3C\n**Bundle Type:** SHACL Validation (Core Specification)\n**Confidence:** 9/10\n\n## Name & Origin\n\nSHACL 1.2 (Shapes Constraint Language) is the latest evolution of the W3C standard for describing conditions that a dataset must meet. It is the foundational specification that all SHACL-based skill bundles depend on.\n\n## Skills Included\n\n- Shape definition and validation\n- Constraint components (datatype, pattern, min/max count, value range, etc.)\n- Target declarations (nodes to validate)\n- Validation report generation\n\n## Context Elements\n\n- **SHACL Validation:** Core W3C standard. Defines shapes that constrain RDF graph structure\n- **Shape Graphs:** Collections of constraints that define expected data structure\n- **Validation Reports:** Standardized output format for validation results\n\n## How Context Elements Support Skills\n\nSHACL 1.2 is the foundational specification for SHACL-based validation in skill bundles. Every example that uses SHACL (Schimatos, RDF Ontologies, Open Ontologies, GraphGuard OS, xpSHACL, SHACL Data Quality paper) ultimately depends on this specification.\n\nKey capabilities useful for skill bundles:\n- Validate skill input/output contracts\n- Ensure knowledge graphs conform to expected schemas\n- Provide structural constraints that agents cannot bypass through prompt engineering\n\n## Composition Notes\n\nThis entry serves as a **reference node** in the wiki \u2014 all SHACL-based skill bundles link back to this specification. It is not a bundle example itself but the standard that enables SHACL-based bundles.\n\nSHACL 1.2 vs 1.0: The 1.2 version adds improved constraint components and better integration with SPARQL-based constraints, making it more suitable for complex skill bundle validation scenarios.\n\n## Reproducibility\n\nN/A \u2014 this is a W3C specification, not software.\n\n## Related Examples\n\n- [schimatos shacl knowledge graph](schimatos-shacl-knowledge-graph.md)\n- [rdf ontologies skill](rdf-ontologies-skill.md)\n- [open ontologies paper](open-ontologies-paper.md)\n- [open ontologies github](open-ontologies-github.md)\n- [graphguard os guardrails](graphguard-os-guardrails.md)\n- [xpshacl explainable shacl](xpshacl-explainable-shacl.md)\n- [shacl data quality 69 metrics](shacl-data-quality-69-metrics.md)", "examples/shacl-data-quality-69-metrics": "# SHACL 1.2 Data Quality Assessment \u2014 69 Metrics as Shapes\n\n**Source:** https://arxiv.org/abs/2507.22305\n**Date Added:** 2026-05-24 (Iteration 8)\n**Authors:** Carolina Cort\u00e9s, Lisa Ehrlinger, Lorena Etcheverry, Felix Naumann\n**Venue:** Proc. WOP-HAIBRIDGE 2025 (co-located with ISWC 2025)\n**Bundle Type:** SHACL Validation + Data Quality Framework\n**Confidence:** 9/10\n\n## Name & Origin\n\nThis research paper investigates the viability of using SHACL as a comprehensive tool for assessing data quality in Knowledge Graphs. The authors bridge the gap between high-level quality frameworks and technical implementation by mapping **69 data quality metrics** to SHACL shapes.\n\n## Skills Included\n\n- Automated SHACL shape instantiation from data quality metrics\n- Knowledge Graph validation against quality shapes\n- Quality score computation from validation results (violations \u2192 numerical measures)\n- Multi-dimensional quality assessment (accessibility, intrinsic, contextual, representational)\n\n## Context Elements\n\n- **SHACL Validation:** 69 data quality metrics from Zaveri et al.'s framework operationalized as SHACL shapes. Covers:\n  - **Intrinsic dimensions:** Syntactic validity, consistency\n  - **Accessibility dimensions:** Data availability, licensing\n  - **Contextual dimensions:** Relevancy, timeliness (requires external metadata)\n  - **Representational dimensions:** Conciseness, understandability\n- **Data Quality Framework:** Zaveri et al.'s comprehensive DQ dimensions mapped to constraints\n- **Prototype Code:** Open-source tool that automates shape instantiation and quality computation\n\n## How Context Elements Support Skills\n\nThe paper demonstrates that SHACL can systematically validate knowledge graph quality across multiple dimensions. An agent skill that incorporates these 69 SHACL shapes could automatically assess KG quality as part of its workflow. The prototype computes a numerical quality score from validation results, making quality assessment machine-readable.\n\n**Key finding:** SHACL excels at intrinsic dimensions (structural validation, consistency) but struggles with contextual dimensions (relevancy, timeliness) that require external metadata or complex SPARQL-based constraints beyond core SHACL features.\n\n## Composition Notes\n\nThis is a \"library of shapes\" bundle pattern: a curated collection of 69 SHACL shapes that can be composed with any agent skill that creates or modifies knowledge graph data. The shapes are a reusable artifact \u2014 an agent could check KG quality before deploying it.\n\nThe computational overhead insight is important: validating massive KGs with complex shapes has measurable performance cost. This matters for skills that need real-time quality assessment.\n\n## Reproducibility\n\nHigh \u2014 all resources (SHACL shapes, prototype code) are provided. The paper is 43 pages with appendices. Venue: ISWC 2025 workshop ensures academic rigor.\n\n## Key Insight\n\n> \"SHACL is excellent for intrinsic dimensions but some contextual or representational dimensions may require external metadata or complex SPARQL-based SHACL constraints that go beyond core SHACL features.\"\n\nThis defines the **boundary** of what SHACL validation alone can achieve for skill bundles.", "examples/skill-bundles-research-state": "# Current State of Skill Bundles Research (May 2026)\n\n**Date:** 2026-05-23\n**Iteration:** 5\n\n## Summary After 5 Iterations\n\nAfter running five daily research cycles, the following picture has emerged:\n\n### Strongest Areas\n- **Ontology + Skills**: Clear examples exist (Ontologizer, OpenClaw PKB)\n- **Rules & Governance**: Good signals from Veto and Tool-Use Firewall\n- **Declarative Context**: Most mature bundles pair skills with markdown plans and configuration files\n\n### Weakest Areas\n- **SHACL Validation**: Only one partial example (Schimatos). No clear \"skill + SHACL\" bundles found.\n- **SSSOM Mapping**: Zero relevant examples discovered.\n- **Formal Rules + Skills**: Still mostly middleware rather than integrated bundles.\n\n## Key Insight\n\nCurrent agent skill ecosystems appear to be adopting **governance and ontology layers** faster than formal semantic validation (SHACL) or mapping standards (SSSOM). This may be because rules and ontologies are easier to integrate into existing agent runtimes (Claude Code, OpenClaw, etc.) than full semantic web technologies.\n\n## Recommended Next Research Directions\n- Focus on academic papers about \"verified tool use\" or \"safe agent architectures\"\n- Investigate whether any major agent frameworks have internal validation layers that could be exposed as skills\n- Explore the intersection of skill bundles and Model Context Protocol (MCP) governance tools\n\nThis document serves as a living snapshot of the research state.", "examples/skill-os-skills-as-apps": "# Skill OS: Skills are the New Apps \u2014 Now It's Time for Skill OS\n\n**Origin:** AgenticOS 2026 Workshop (anonymous, under review)\n\n## Overview\n\nThis paper surveys nearly **100,000 skills** from public repositories and argues that skills have become a new form of application. Like traditional OS introduced deterministic abstractions (processes, virtual memory, file permissions) on complex hardware, a **Skill OS** must introduce deterministic, enforceable boundaries at the interface between LLMs and tools.\n\n## Three Fundamental Properties (Skills vs. Prompts)\n\n1. **Locality** \u2014 the presence of a skill implies repeated reuse\n2. **Determinism** \u2014 skills encode concrete scenarios with stronger verifiability than generic prompts\n3. **Environment requirements** \u2014 skills share recurring needs for tools and runtime support\n\n## Six Properties from 100K Skill Analysis\n\n1. **Phased procedures** \u2014 most skills specify multiple steps with natural boundaries\n2. **Semi-deterministic blocks** \u2014 many contain blocks suitable for caching\n3. **Semantic equivalence** \u2014 LLM plans are semantically equivalent despite surface differences (defeats exact matching)\n4. **Safety requirements without enforcement** \u2014 parallel-safety, idempotency needed but not enforced\n5. **External dependency fragility** \u2014 tools (shell, OS, MCP) fail with high token waste\n6. **Cross-session sharing without global visibility** \u2014 no optimization or management\n\n## Four Problems with Prompt-Centric Approach\n\n1. Semantic equivalence prevents caching of validated traces\n2. Token waste regenerating code/scripts/templates per run\n3. Fragility from external dependency failures \u2192 trial-and-error\n4. Missing parallel safety for concurrent skill execution\n\n## Skill OS Demands\n\n| Demand | Description |\n|--------|-------------|\n| **Locality-aware caching** | Cache skill execution results across invocations |\n| **Dynamically constructed environments** | Build execution environments on demand |\n| **Global skill management** | Cross-session visibility for optimization |\n| **Structured failure handling** | Deterministic error handling, not trial-and-error |\n| **Runtime security & auditing** | Enforce safety (parallel-safety, idempotency) |\n\n## Context Elements\n\n- **100K skill empirical analysis** \u2014 largest skill corpus study to date\n- **Six property taxonomy** \u2014 structure, execution, system requirements\n- **Skill OS abstraction** \u2014 OS-level system for skill management\n- **Progressive unfolding** \u2014 metadata at startup \u2192 instructions on selection \u2192 resources on reference\n\n## Relation to Skill Bundle Patterns\n\nSkill OS represents the **systems-level** perspective on skill bundles:\n- Relates to [orca cognitive runtime](orca-cognitive-runtime.md) \u2014 ORCA implements some Skill OS demands (policy gates, provenance, DAG scheduler)\n- Extends [skill bundle patterns](../concepts/skill-bundle-patterns.md) \u2014 adds OS-level concerns (caching, parallelism, failure handling)\n- Complements [skillreducer token efficiency](skillreducer-token-efficiency.md) \u2014 both address token waste (OS via caching, Reducer via content reduction)\n- Connects to [marketplace landscape 2026](marketplace-landscape-2026.md) \u2014 marketplace = distribution layer, Skill OS = execution layer\n\n## Key Insight\n\nSkills are a new application form that demands OS-level abstractions. The analogy to traditional OS is direct: processes \u2192 skills, virtual memory \u2192 skill caching, file permissions \u2192 skill security. Current prompt-centric systems miss optimization opportunities that a Skill OS would unlock. The 100K skill empirical analysis provides the evidence base.\n", "examples/skill-validator-cli": "# agent-ecosystem/skill-validator \u2014 CLI Validator + LLM-as-Judge\n\n**Source:** https://github.com/agent-ecosystem/skill-validator\n**Date Added:** 2026-06-01 (Iteration 13)\n**License:** MIT | **Language:** Go 100% | **Stars:** 151 | **Forks:** 25\n**Latest Release:** v1.5.6 (Apr 28, 2026)\n**Bundle Type:** Validation Tooling \u00b7 LLM-as-Judge \u00b7 Multi-Platform Pre-commit\n**Confidence:** 10/10\n\n## Name & Origin\n\nA **CLI tool that validates and scores Agent Skill packages** (per the agentskills.io SKILL.md spec) \u2014 going well beyond spec compliance to check link rot, token cost, content quality, cross-language contamination, and LLM-as-judge quality scoring.\n\n> \"Spec compliance is table stakes. `skill-validator` goes further: it checks that links actually resolve, flags files that shouldn't be in a skill directory, reports token counts so you can see how much of an agent's context window your skill will consume, analyzes content quality metrics, detects cross-language contamination, and offers LLM-as-judge scoring to evaluate skill quality across dimensions like clarity, actionability, and novelty. A spec-compliant skill that has broken links or a 60k-token reference file will technically pass the spec but perform poorly in practice.\"\n\n## Skills Included (1 tool, 7 commands)\n\n| Stage | Command | What It Answers |\n|---|---|---|\n| Scaffolding | `validate structure` | Does it conform to the spec and can agents use it? |\n| Writing content | `analyze content` | Is the instruction quality good? |\n| Adding examples | `analyze contamination` | Am I introducing cross-language contamination? |\n| Review | `validate links` | Do external links still resolve? |\n| Quality scoring | `score evaluate` | How does an LLM judge rate this skill? |\n| Comparing models | `score report` | How do scores compare across different LLM providers? |\n| Pre-publish | `check` | Run everything (except LLM scoring) |\n\n## Context Elements\n\n- **Validation rules:** Spec-compliance + custom allow/deny rules (`--allow-extra-frontmatter`, `--allow-flat-layouts`, `--allow-dirs=evals,testing`)\n- **Content quality metrics:** word count, code block count/ratio, code languages, sentence count, imperative count/ratio, strong/weak language markers, information density, instruction specificity, section count, list item count\n- **Contamination detection:** Multi-interface tools (0.3 weight), application language mismatch (0.4 weight), scope breadth (0.3 weight) \u2192 produces a contamination level\n- **LLM-as-judge:** Pluggable `LLMClient` interface \u2014 `judge.NewClient(judge.ClientOptions{...})` works with OpenAI, Azure, custom endpoints. Scores on **clarity, actionability, novelty** (and likely more)\n- **Reference checking:** Validates external (HTTP/HTTPS) links in SKILL.md separately from internal (relative) links\n- **Exit codes:** 0=clean, 1=errors, 2=warnings, 3=CLI usage error. `--strict` treats warnings as errors.\n\n## Distribution\n\n- **Homebrew:** `brew install agent-ecosystem/tap/skill-validator`\n- **Go:** `go install github.com/agent-ecosystem/skill-validator/cmd/skill-validator@latest`\n- **Pre-commit hooks:** 13 platforms \u2014 `claude`, `codex`, `copilot`, `cursor`, `gemini-cli`, `kiro`, `mistral-vibe`, `roo-code`, `trae`, `windsurf`, `amp`, `cline`, `goose`\n- **Library:** Go imports for `orchestrate`, `judge`, `evaluate` packages\n\n## How Context Elements Support Skills\n\nThis is **validation tooling for skill bundles** \u2014 analogous to SHACL for RDF data, lint for code, or a CI pipeline for typed contracts. The fact that it's shipped as a single Go binary with **pre-commit hooks for 13 different agents** is itself a composition pattern: one validator, many targets.\n\nThe 3-axis content quality scoring (imperative count/ratio, strong/weak language markers, information density) and contamination detection implement a lightweight **shape grammar** for SKILL.md content.\n\n## Composition Notes\n\nThe `validate structure` command's strict mode + per-platform hooks pattern resembles [graphguard os guardrails](graphguard-os-guardrails.md) \u2014 both apply policy-as-code to multi-platform agent surfaces.\n\n`skill-validator` is the **local / pre-commit** layer. The CI/CD layer is filled by [validate skill github action](validate-skill-github-action.md). The **registry / marketplace** layer is filled by [agentskill sh ags security scoring](agentskill-sh-ags-security-scoring.md). Together they form a three-layer validation stack:\n\n1. **Pre-commit** (this tool, local Go binary)\n2. **CI/CD** (Validate Skill GitHub Action, structural checks)\n3. **Registry** (ags security scanner, 12-threat-category scoring)\n\n## Reproducibility\n\n**Very High.** Open-source, MIT-licensed, semver releases, full Go API, 13 platform hooks, homebrew + go install + pre-commit + library use paths all supported. Latest release v1.5.6 from Apr 2026 \u2014 actively maintained.\n\n## Bundle Links\n- [graphguard os guardrails](graphguard-os-guardrails.md) \u2014 Policy-as-code for multi-platform agent surfaces\n- [owasp agentic skills top 10](owasp-agentic-skills-top-10.md) \u2014 Defines *what* a vulnerable skill is\n- [agentic trust framework csa](agentic-trust-framework-csa.md) \u2014 Defines *maturity levels* for trust\n- [validate skill github action](validate-skill-github-action.md) \u2014 CI/CD complement\n- [agentskill sh ags security scoring](agentskill-sh-ags-security-scoring.md) \u2014 Registry-level security scanner\n- [dspy agent skills bundle](dspy-agent-skills-bundle.md) \u2014 LLM-as-judge pattern precedent", "examples/skill0-skill-internalization": "# SKILL0: In-Context Agentic RL for Skill Internalization\n\n**Origin:** Zhejiang University + Meituan + Tsinghua (Lu et al.), arXiv:2604.02268, Apr 2026 (v2 May 2026)\n**GitHub:** https://github.com/ZJU-REAL/SkillZero\n\n## Overview\n\nSKILL0 asks whether agent skills must remain **external packages at inference**, or can be **internalized into model parameters**. Motto: **\"Skills at training, zero at inference.\"** It is the first RL framework that treats skill internalization as an explicit training objective via a Dynamic Curriculum that anneals skill scaffolding.\n\n## Architecture\n\n1. **Offline skill grouping** \u2014 Skills categorized and rendered with interaction history into compact **visual context**\n2. **Full-scaffold phase** \u2014 Policy trained with complete skill files for tool invocation and multi-turn completion\n3. **Dynamic Curriculum** \u2014 On-policy helpfulness scores each skill file; retain only skills that still help within a **linearly decaying** context budget\n4. **Zero-shot end state** \u2014 Agent operates without runtime skill retrieval\n\n## Key Results\n\n| Benchmark | Gain vs standard RL |\n|-----------|---------------------|\n| ALFWorld | +9.7% |\n| Search-QA | +6.6% |\n| WebShop | +10.1% |\n| Context | <0.5k tokens/step (\u22485\u00d7 vs SkillRL-class baselines) |\n\n## Context Elements\n\n- **Internalization objective** \u2014 Skills become weights, not prompt payloads\n- **On-policy helpfulness gating** \u2014 Curriculum keeps only still-useful skill files\n- **Progressive disclosure inverted** \u2014 Disclosure shrinks over training rather than expands at inference\n- **Efficiency contract** \u2014 Removes retrieval noise and token tax at deployment\n\n## Relation to Skill Bundle Patterns\n\n- Opposite pole of [skillopt trainable skill parameters](skillopt-trainable-skill-parameters.md) (skills stay external text parameters)\n- Contrasts [memento skills agent designing agent](memento-skills-agent-designing-agent.md) (skills as persistent markdown memory, no weight updates)\n- Related to [skill1 unified skill evolution rl](skill1-unified-skill-evolution-rl.md) (co-evolve selection/utilization/distillation still external)\n- Complements [coevoskills self evolving skills](coevoskills-self-evolving-skills.md) and [evoskill automated skill discovery](evoskill-automated-skill-discovery.md) (evolution of external packages)\n- Theoretical frame: [externalization llm agents unified review](externalization-llm-agents-unified-review.md) weights\u2194context trade-off\n\n## Key Insight\n\nSkill bundles can be a **training substrate**, not only a runtime product. Dynamic Curriculum internalization trades post-training adaptability for zero-shot autonomy and massive context savings \u2014 a first-class design choice in the Define\u2192Generate\u2192Serve\u2192Align lifecycle.\n", "examples/skill1-unified-skill-evolution-rl": "# Skill1: Unified Evolution of Skill-Augmented Agents via Reinforcement Learning\n\n**Origin:** AlphaLab, USTC (arXiv:2605.06130, May 2026)\n**GitHub:** https://github.com/AlphaLab-USTC/Skill1\n**Citations:** 18\n\n## Overview\n\nSkill1 is a framework that trains a **single policy** to co-evolve skill selection, utilization, and distillation toward a shared task-outcome objective. It addresses the problem that existing methods optimize these three capabilities in isolation or with separate reward sources, resulting in partial and conflicting evolution.\n\n## Three Coupled Capabilities\n\n1. **Skill selection** \u2014 agent generates a query to search the skill library and re-ranks candidates\n2. **Skill utilization** \u2014 agent solves the task conditioned on the selected skill\n3. **Skill distillation** \u2014 agent distills a new skill from the trajectory\n\n## Key Innovation: Frequency Decomposition\n\nAll learning derives from a **single task-outcome signal**. The policy's:\n- **Low-frequency trend** credits selection (long-term skill quality)\n- **High-frequency variation** credits distillation (per-task skill creation)\n\nThis frequency decomposition avoids the conflicting reward problem of separate optimization.\n\n## Results\n\n- ALFWorld and WebShop benchmarks\n- Outperforms prior skill-based and RL baselines\n- Training dynamics confirm co-evolution of all three capabilities\n- Ablations: removing any credit signal degrades evolution\n\n## Context Elements\n\n- **Persistent skill library** \u2014 reusable strategies across tasks\n- **Single task-outcome signal** \u2014 unified governance for skill lifecycle\n- **Frequency decomposition** \u2014 novel credit assignment for skill management\n- **Co-evolution** \u2014 select + use + distill evolve together\n\n## Relation to Skill Bundle Patterns\n\nSkill1 unifies the three core skill lifecycle operations under a single learning signal:\n- Select \u2192 Use \u2192 Distill = complete skill lifecycle (parallels [memento skills agent designing agent](memento-skills-agent-designing-agent.md)'s Read-Write cycle)\n- RL-based approach complements [evoskill automated skill discovery](evoskill-automated-skill-discovery.md) (failure-driven) and [aspire robotics skill discovery](aspire-robotics-skill-discovery.md) (evolutionary search)\n- Frequency decomposition is a novel governance pattern for credit assignment\n- Skill distillation = skill creation from experience (parallels [coevoskills self evolving skills](coevoskills-self-evolving-skills.md)'s co-evolutionary verification)\n\n## Key Insight\n\nSkill selection, utilization, and distillation are coupled capabilities that must co-evolve under a single reward signal. Separate optimization leads to partial and conflicting evolution. The frequency decomposition of a single task-outcome signal naturally credits selection (low-freq) and distillation (high-freq), enabling unified skill lifecycle management.\n", "examples/skillclaw-collective-skill-evolution": "# SkillClaw: Collective Skill Evolution with Agentic Evolver\n\n**Origin:** AMAP-ML (Alibaba Maps AI), arXiv:2604.08377, Apr 2026\n**GitHub:** https://github.com/AMAP-ML/SkillClaw (2.1k\u2605, 202 forks)\n**Citations:** 42\n\n## Overview\n\nSkillClaw is a framework for **collective skill evolution** in multi-user agent ecosystems. It treats cross-user and over-time interactions as the primary signal for improving skills. Unlike single-user skill refinement, SkillClaw aggregates trajectories from all users and processes them through an autonomous evolver that identifies recurring behavioral patterns and translates them into skill updates.\n\n## Architecture\n\n1. **Trajectory aggregation** \u2014 Continuously collects interaction trajectories from all users (passive, no additional user effort)\n2. **Autonomous evolver** \u2014 Identifies recurring behavioral patterns in aggregated trajectories; translates patterns into skill updates (refine existing skills or extend with new capabilities)\n3. **Shared repository** \u2014 Skills maintained in a shared repository, synchronized across users\n4. **Skill reload** \u2014 Poll loop (30s default, immediate first pull) or webhook for syncing evolved skills to running agents\n\n## Key Innovations\n\n- **Cross-user knowledge transfer** \u2014 Improvements discovered in one context propagate system-wide\n- **Cumulative capability improvement** \u2014 Skills compound experience across sessions, agents, devices, and users\n- **Multi-framework support** \u2014 OpenClaw and Hermes agent frameworks\n- **Zero additional user effort** \u2014 Trajectory collection is passive\n\n## Evaluation\n\n- Benchmark: WildClawBench\n- Model: Qwen3-Max\n- Result: Significant improvement in real-world agent scenarios with limited interaction and feedback\n\n## Context Elements\n\n- **Collective skill evolution** \u2014 Novel evolution model: cross-user + over-time (not single-user or single-session)\n- **Autonomous evolver** \u2014 Pattern recognition \u2192 skill update pipeline (self-improving skill infrastructure)\n- **Shared synchronized repository** \u2014 Distributed skill knowledge base with automatic sync\n- **Trajectory aggregation** \u2014 Cross-user interaction logging as improvement signal\n\n## Relation to Skill Bundle Patterns\n\nSkillClaw represents a **meta-skill bundle**: the bundle is the evolution system itself (trajectory collector + evolver + shared repo + sync). This extends the skill lifecycle from static deployment to continuous multi-user evolution.\n\n- Extends [memento skills agent designing agent](memento-skills-agent-designing-agent.md) (which mentioned SkillClaw for collective evolution)\n- Complements [coevoskills self evolving skills](coevoskills-self-evolving-skills.md) (co-evolutionary verification approach)\n- Related to [skill1 unified skill evolution rl](skill1-unified-skill-evolution-rl.md) (RL-based unified evolution)\n- Related to [exif automated skill discovery](exif-automated-skill-discovery.md) (self-play skill discovery)\n- Connects to [externalization llm agents unified review](externalization-llm-agents-unified-review.md) (shared agent infrastructure as emerging direction)\n\n## Key Insight\n\nSkills don't need to be static after deployment. By aggregating multi-user interaction trajectories and processing them through an autonomous evolver, skills can collectively evolve \u2014 improvements in one context benefit all users. This transforms skill bundles from static artifacts into living, self-improving infrastructure.\n", "examples/skillcraft-benchmark": "# SkillCraft: Can LLM Agents Learn to Use Tools Skillfully?\n\n## Origin\n\n- **arXiv:** 2603.00718 (submitted 28 Feb 2026, v2 10 Mar 2026)\n- **Authors:** Shiqi Chen, Jingze Gai, +15 others (Junxian He, Yee Whye Teh)\n- **Code:** https://github.com/shiqichen17/SkillCraft\n- **Cited by:** 20\n\n## Skills Included\n\nSkillCraft is a **benchmark** that stress-tests agent ability to form and reuse higher-level tool compositions (called \"Skills\").\n\n### Skill Definition\n- Skills = higher-level tool compositions\n- Auto-composed from atomic tools by the agent itself\n- Cached and reused inside and across tasks\n- Accumulates as a **persistent library** of reusable skills\n\n## Context Elements\n\n### Benchmark Design\n- Difficulty scaled along **quantitative** (number of tools) and **structural** (composition depth) dimensions\n- Realistic, highly compositional tool-use scenarios\n- Designed to elicit skill abstraction and cross-task reuse\n\n### Auto-Composition Protocol\n- Lightweight evaluation protocol\n- Agents auto-compose atomic tools into executable Skills\n- Cache and reuse across tasks\n- Accumulates persistent skill library\n\n## Composition Notes\n\nSkillCraft validates the core skill bundle thesis: **composing tools into reusable skills dramatically improves efficiency**.\n\n### Key Results\n- Token usage reduced by up to **80%** by skill saving and reuse\n- Success rate strongly correlates with tool composition ability at test time\n- Compositional skill acquisition is a **core capability** for agents\n\n### Key Insight\nThe inverse of static skill bundles: instead of humans authoring skills, agents **auto-compose** them from tools and build their own persistent library.\n\n## Reproducibility\n\n- Open-source code: https://github.com/shiqichen17/SkillCraft\n- Project page: https://skillcraft-website.github.io/page\n\n## Connections\n\n- Auto-composition pattern complements [orca cognitive runtime](orca-cognitive-runtime.md) (declarative composition) and [effiskill code efficiency optimization](effiskill-code-efficiency-optimization.md) (two-tier mining)\n- Cited by [coevoskills self evolving skills](coevoskills-self-evolving-skills.md) as foundational\n- 80% token savings quantifies efficiency benefit (cf. [skillreducer token efficiency](skillreducer-token-efficiency.md)'s 48%+39% compression)\n- Skill abstraction maps to the atomic skill decomposition pattern (see arXiv:2604.05013, withdrawn)\n", "examples/skillfortify-formal-verification-supply-chain": "# SkillFortify: Formal Analysis and Supply Chain Security for Agentic AI Skills\n\n**Origin:** Independent Research (arXiv:2603.00195, February 2026)\n**Product:** https://www.varunpratap.com/products/skillfortify\n\n## Overview\n\nSkillFortify is the **first formal analysis framework** for agent skill supply chains. Unlike the 12+ reactive security tools that emerged after ClawHavoc (Snyk agent-scan, Cisco skill-scanner, ToolShield \u2014 all heuristic), SkillFortify provides **formal guarantees** through mathematical proofs. If SkillFortify says a skill is safe, it provably cannot exceed its declared capabilities.\n\n## Six Contributions\n\n1. **DY-Skill attacker model** \u2014 Dolev-Yao adaptation to the five-phase skill lifecycle (authorship \u2192 registry \u2192 installation \u2192 execution \u2192 persistence) with maximality proof\n2. **Sound static analysis** \u2014 grounded in abstract interpretation (provable, not heuristic)\n3. **Capability-based sandboxing** \u2014 with a confinement proof\n4. **Agent Dependency Graph** \u2014 SAT-based resolution with lockfile semantics (deterministic ordering, dependency resolution, trust scores, SHA-256 integrity hash)\n5. **Trust score algebra** \u2014 formal monotonicity property\n6. **SkillFortifyBench** \u2014 540-skill benchmark\n\n## Key Results\n\n| Metric | Result |\n|--------|--------|\n| F1 score | 96.95% (95% CI: [95.1%, 98.4%]) |\n| Precision | 100% |\n| False positive rate | 0% |\n| SAT resolution (1,000-node graphs) | <100ms |\n| Agent frameworks supported | 22 |\n| Malicious tools catalogued (MalTool) | 6,487 |\n\n## Context: CVE-2026-25253\n\nOn January 27, 2026, Ethiack disclosed CVE-2026-25253 \u2014 RCE in OpenClaw skill runtime, the first CVE assigned to an agentic AI system. ClawHavoc exploited this to infiltrate 1,200+ malicious skills. 42,447 skills analyzed: 26.1% have \u22651 security vulnerability.\n\n## Lockfile Semantics\n\nThe lockfile provides:\n- Deterministic ordering (alphabetical by skill name)\n- Dependency resolution (constraint satisfaction)\n- Trust scores at lock time (temporal comparison)\n- Analysis status (critical blocks, warning recorded)\n- SHA-256 integrity hash (tamper detection)\n- Byte-identical output on repeated invocations\n\n## Context Elements\n\n- **Formal verification** \u2014 5 mathematical theorems guaranteeing soundness\n- **DY-Skill attacker model** \u2014 formal threat model for skill lifecycle\n- **Agent Dependency Graph** \u2014 dependency resolution (like npm/PyPI but for skills)\n- **Lockfile semantics** \u2014 reproducible skill installations with integrity verification\n- **Trust score algebra** \u2014 formal trust scoring with monotonicity\n- **Capability-based sandboxing** \u2014 runtime confinement with proof\n\n## Relation to Skill Bundle Patterns\n\nSkillFortify provides the **formal verification layer** for skill bundle supply chains:\n- Complements [skillguard permission framework](skillguard-permission-framework.md) (runtime permission governance) \u2014 SkillFortify governs supply chain, SkillGuard governs runtime\n- Complements [skillsieve malicious skill detection](skillsieve-malicious-skill-detection.md) (heuristic detection) \u2014 SkillFortify provides formal guarantees, SkillSieve provides probabilistic detection\n- Extends [supply chain agentic factory in toto](supply-chain-agentic-factory-in-toto.md) (SLSA/in-toto provenance) \u2014 SkillFortify adds formal analysis to provenance\n- Agent Dependency Graph parallels [orca cognitive runtime](orca-cognitive-runtime.md)'s DAG composition but for dependency resolution\n- Lockfile semantics = package management pattern adapted for skills\n\n## Key Insight\n\nThe agent skill ecosystem reproduces the trust pathologies of traditional package ecosystems (npm, PyPI) but with amplified risk \u2014 skills execute with broad system privileges in the context of a powerful LLM. Heuristic detection is necessary but insufficient: \"no findings does not mean no risk\" (Cisco). Formal analysis with mathematical proofs provides the missing guarantee layer.\n", "examples/skillgenbench-skill-generation-benchmark": "# SkillGenBench: Why Generating Skills Is Harder Than Using Them\n\n**Origin:** Zhou et al., 2026 (summarized by Vishal Mysore, Medium, May 2026)\n\n## Overview\n\nSkillGenBench is a benchmark for evaluating **skill generation pipelines** \u2014 not the skills themselves, not the agents that use them, but the process of distilling skills from raw source material. It fills the gap between \"skills are valuable when done well\" and \"harmful when done poorly.\"\n\n## Pipeline\n\n```\n[Raw Corpora] \u2192 [Generator] \u2192 [Standardized SKILL.md] \u2192 [Executor] \u2192 [Downstream Tasks]\n```\n\nThe generator-executor decoupling isolates skill distillation from planning ability and retrieval recall.\n\n## Benchmark Scope\n\n| Dimension | Value |\n|-----------|-------|\n| Tasks | 187 |\n| Domains | 8 (Audio, Image, Web, Security, BioMed, Video, Data, Reasoning) |\n| Source types | 2 (Repository-grounded, Document-grounded) |\n| Metric | Pass@3 |\n\n## Two Source Types\n\n### Repository-Grounded\n- Source: real code repository (Python, configs, READMEs)\n- Procedures: implicit in code structure, function relations, entry points\n- LLM must recover latent workflows and distill into callable skills\n- **Pass@3: 7-16%** (extremely hard)\n\n### Document-Grounded\n- Source: long-form technical document (API specs, manuals)\n- Procedures: explicit but scattered across sections\n- **Pass@3: 23-27%** (moderate)\n\n## Key Findings\n\n- Skill generation is **2-3x harder** than skill use\n- Auto-generated skills can induce **negative transfer** (agent worse with skill than without)\n- Repository-grounded generation is extremely difficult (7-16%)\n- SkillsBench showed curated skills improve performance; SkillGenBench shows generating them is the bottleneck\n\n## Context Elements\n\n- **Generator-executor decoupling** \u2014 isolates skill distillation quality\n- **Standardized SKILL.md** \u2014 Anthropic Agent Skills format as output\n- **Two source types** \u2014 repository vs. document grounded\n- **Pass@3 metric** \u2014 three attempts per task\n- **8 domain coverage** \u2014 broad, including Security and BioMed\n- **Negative transfer detection** \u2014 identifies when skills harm performance\n\n## Relation to Skill Bundle Patterns\n\nSkillGenBench represents the **skill generation evaluation** dimension:\n- Complements [skillsbench agent skills benchmark](skillsbench-agent-skills-benchmark.md) \u2014 SkillsBench evaluates skill use; SkillGenBench evaluates skill generation\n- Relates to [evoskill automated skill discovery](evoskill-automated-skill-discovery.md) \u2014 EvoSkill is a skill generator that would be evaluated by SkillGenBench\n- Connects to [skillopt trainable skill parameters](skillopt-trainable-skill-parameters.md) \u2014 SkillOpt is a skill optimizer; SkillGenBench measures the generation step that precedes optimization\n\n## Key Insight\n\nSkill generation is the bottleneck in the skill ecosystem, not skill use. Repository-grounded skill generation (7-16% pass@3) is extraordinarily difficult because procedures are implicit in code. Auto-generated skills risk negative transfer. This benchmark fills the critical gap between \"skills help when done right\" and \"skills hurt when done wrong.\"\n", "examples/skillguard-permission-framework": "# SkillGuard: A Permission Framework for Agent Skills\n\n**Origin:** CSIRO + Australian National University + UNSW (arXiv:2606.03024, June 2026)\n**GitHub:** https://github.com/Dianshu-Liao/SkilLGuard\n\n## Overview\n\nSkillGuard is a skill-centric permission framework that treats skills as **permission-bearing executable artifacts**. It introduces a **dual-plane governance model** that jointly regulates context influence (what a skill injects into an agent's reasoning) and action side effects (what a skill causes the agent to do at runtime). This addresses a fundamental gap: existing approaches secure either context OR actions, but not both.\n\n## Dual-Plane Governance\n\n- **Context plane:** skills introduce instructions, examples, retrieved documents, memory fragments, hidden assumptions that reshape agent reasoning\n- **Action plane:** skills trigger tool calls, file/secret access, code execution, network communication, delegation to other agents/skills/MCP servers\n\n## Five Core Components\n\n1. **Skill Manifest** \u2014 declares capability surface; instantiates permissions into runtime policy state\n2. **Runtime permission access control** \u2014 maps host-specific tool invocations to canonical capabilities\n3. **User-mediated authorization** \u2014 approve once, approve for session, or deny\n4. **Deny-by-default enforcement** \u2014 actions not explicitly permitted are blocked\n5. **Capability inference + behavior monitoring** \u2014 infers skill capabilities, monitors runtime behavior\n\n## Evaluation\n\n| Metric | Result |\n|--------|--------|\n| Permission taxonomy coverage | 99.76% of observed protected objects |\n| Automated manifest generation F1 | 91.0% |\n| Contextual injection attack reduction | 32.37% \u2192 23.02% |\n| Obvious injection attack reduction | 25.56% \u2192 16.67% |\n| Benign task utility | Maintained |\n\n## Context Elements\n\n- **Dual-plane governance** \u2014 novel architectural pattern recognizing skills operate across context + action planes\n- **Skill manifests** \u2014 formal declaration of capability surface (pre-execution)\n- **Permission taxonomy** \u2014 formal vocabulary for skill capabilities\n- **Deny-by-default** \u2014 security posture requiring explicit grants\n- **Behavior monitoring** \u2014 runtime verification element\n\n## Relation to Skill Bundle Patterns\n\nSkillGuard extends the skill bundle thesis to include **permission governance** as a formal context element:\n- Complements [skillfortify formal verification supply chain](skillfortify-formal-verification-supply-chain.md) (formal verification/static analysis) \u2014 SkillGuard governs runtime, SkillFortify governs supply chain\n- Complements [skillsieve malicious skill detection](skillsieve-malicious-skill-detection.md) (detection) \u2014 SkillGuard prevents, SkillSieve detects\n- Extends [veto agent authorization](veto-agent-authorization.md) and [tool use firewall](tool-use-firewall.md) patterns to skill-centric governance\n- Dual-plane model is novel: recognizes skills shape both reasoning (context) and execution (actions)\n\n## Key Insight\n\nAgent skills operate across two coupled planes \u2014 context (what a skill tells the agent to think) and action (what a skill causes the agent to do). Security frameworks that address only one plane leave the other vulnerable. SkillGuard's dual-plane governance with deny-by-default enforcement provides a practical foundation for skill ecosystem security.\n", "examples/skillject-automated-prompt-injection": "# SkillJect: Automated Skill-Based Prompt Injection for Coding Agents\n\n**Origin:** arXiv:2602.14211, Feb 2026 (v3: Jun 2026)\n**Citations:** 7\n**GitHub:** https://github.com/jiaxiaojunQAQ/SkillJect\n**Authors:** Xiaojun Jia, Jie Liao, Simeng Qin, Jindong Gu, Wenqi Ren, Xiaochun Cao, Yang Liu, Philip Torr\n\n## Overview\n\nSkillJect is the first **automated** framework for generating poisoned skills against skill-enabled agent systems. Unlike manual skill-injection attacks that are brittle and easily detected, SkillJect uses a closed-loop multi-agent process to iteratively generate and refine poisoned skills that are both effective and stealthy.\n\n## Two-Channel Attack\n\n1. **Artifact channel** \u2014 Hides the malicious payload inside an auxiliary helper script (e.g., `scripts/setup.py`, `lib/utils.js`). The payload is not in the SKILL.md itself, making it harder to detect by instruction-level scanning.\n\n2. **Instruction channel** \u2014 Rewrites SKILL.md with a **front-loaded inducement strategy**:\n   - Places injected content at the **beginning** of SKILL.md (exploiting LLM's tendency to weight early instructions more heavily)\n   - Frames the helper script as a **mandatory prerequisite** or initialization step\n   - Provides an **executable example command** referencing the helper-script path\n   - Makes the malicious helper appear to be a legitimate setup step\n\n## Closed-Loop Multi-Agent Process\n\n```\nAttack Agent \u2192 generates poisoned skill\n    \u2193\nVictim Agent \u2192 executes downstream task with poisoned skill\n    \u2193\nEvaluate Agent \u2192 inspects execution traces for payload execution\n    \u2193\nFeedback \u2192 Attack Agent diagnoses failure, rewrites SKILL.md (payload fixed)\n    \u2193 (loop)\n```\n\nThe **payload stays fixed** while the SKILL.md inducement strategy is iteratively refined based on trace feedback.\n\n## Supported Platforms\n\n- **Agents:** Claude Code, OpenClaw\n- **Methods:** direct_execution, skillject, template_injection, baseline\n- **Attack categories:** Multiple (experiments across pl
