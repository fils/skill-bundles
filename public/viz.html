> **PMID:** 40951330\n\n## Summary\n\nA comprehensive review charting the evolution of generative AI in science \u2014 from LLM-powered literature review to multimodal **agentic systems** that orchestrate cloud software and physical lab hardware. The author co-drafted the WEF 2024 \"Top 10 Emerging Technologies\" chapter on \"AI for Scientific Discovery\" and here merges that white paper with advances through mid-2025. Core thesis: research is in a **\"co-pilot to lab-pilot\" transition** where AI no longer merely interprets knowledge but increasingly **acts upon it**.\n\n### Key Domains Covered:\n\n1. **Automated Literature Synthesis** \u2014 AI-driven systems processing vast published research at speeds unachievable by humans. Platforms: SysRev (16,000+ systematic review projects), Iris.ai, Elicit.ai, Semantic Scholar, ORKG ASK, PubMed AI tools.\n\n2. **Hypothesis Generation** \u2014 LLMs integrating diverse data types, identifying subtle correlations, proposing novel hypotheses. Examples: ALS gene identification (sCCA/wPRS), cancer treatment planning via AI, AlphaFold-2 protein structure prediction.\n\n3. **Self-Driving Laboratories** \u2014 Autonomous systems executing experiments end-to-end. The \"scAInce\" paradigm (science + AI) encompasses AI hypothesis generation \u2192 experimental design \u2192 execution \u2192 analysis.\n\n4. **Organoid Intelligence** \u2014 Brain organoids as biological computing substrates.\n\n5. **Climate-Scale Forecasting** \u2014 AI models for weather/climate at unprecedented resolution.\n\n### Governance Frameworks:\n- EU AI Act\n- ISO 42001\n\n### Challenges:\n- Reproducibility & auditability\n- Safety & physical-digital divide (irreversible experiments)\n- Equitable access\n\n## Relevance to Skill Bundles\n\nThis paper is **highly relevant** as it provides:\n- A comprehensive taxonomy of AI capabilities in scientific workflows that can map to **skill categories** (literature synthesis, hypothesis generation, experimental design, execution, analysis)\n- The co-pilot\u2192lab-pilot evolution mirrors **skill bundle maturation** from helper skills to autonomous execution\n- Self-driving laboratories represent the ultimate **skill bundle** \u2014 skills for discovery, validation, execution, and iteration\n- Governance frameworks (EU AI Act, ISO 42001) inform the need for **SHACL validation** and **rule-based constraints** in skill bundles\n- The paper explicitly discusses multimodal agentic systems \u2014 systems that compose skills across text, vision, speech, and action\n\n## Tags\n#scaince #agentic-ai #self-driving-labs #lab-automation #literature-synthesis #hypothesis-generation #WEF #governance #skill-bundles", "papers/sok-agentic-skills-beyond-tool-use": "# SoK: Agentic Skills \u2014 Beyond Tool Use in LLM Agents\n\n**Source:** https://arxiv.org/abs/2602.20867 (arXiv:2602.20867v1, 24 Feb 2026)\n**Date Added:** 2026-07-11 (Iteration 36)\n**Authors:** Yanna Jiang, Delong Li, Haiyu Deng, Baihe Ma, Xu Wang, Qin Wang, Guangsheng Yu\n**License:** CC BY 4.0\n**Bundle Type:** Systematization of Knowledge (SoK) \u00b7 Formal Definition \u00b7 Lifecycle Model \u00b7 Security Analysis\n**Confidence:** 10/10\n\n## Name & Origin\n\nA comprehensive Systematization of Knowledge paper that provides the **first formal definition** of agentic skills, a complete lifecycle model, and dual taxonomies. Grounded by the **ClawHavoc case study** \u2014 a real-world supply-chain attack on a skill marketplace.\n\n## Skills Included (as conceptual framework)\n\n- **Formal skill definition:** S = (C, \u03c0, T, R) \u2014 applicability conditions, execution policy, termination criteria, reusable interface\n- **Skill lifecycle model:** 7 stages \u2014 discovery \u2192 practice \u2192 distillation \u2192 storage \u2192 composition \u2192 evaluation \u2192 update\n- **Seven design patterns** for skill packaging/execution:\n  1. Metadata-driven progressive disclosure (SKILL.md)\n  2. Executable code skills\n  3. Workflow enforcement\n  4. Self-evolving libraries\n  5. Marketplace distribution\n  6\u20137. (detailed in full paper)\n- **Representation \u00d7 Scope taxonomy:** NL/code/policy/hybrid \u00d7 web/OS/SE/robotics\n\n## Context Elements\n\n- **Formal skill definition** S=(C,\u03c0,T,R) \u2014 the canonical formal vocabulary for skill bundle analysis\n- **Lifecycle model** \u2014 7-stage framework for tracking skill bundle evolution\n- **Seven design patterns** \u2014 system-level taxonomy of how skills are packaged and executed\n- **ClawHavoc case study** \u2014 ~1,200 malicious skills infiltrated ClawHub marketplace; exfiltrated API keys, crypto wallets, browser credentials\n- **Security/governance analysis** \u2014 supply-chain risks, prompt injection via payloads, trust-tiered execution, pattern-specific risk matrix\n- **Evaluation framework** \u2014 benchmark mapping; curated skills outperform self-generated ones\n\n## How Context Elements Support Skills\n\nThe SoK provides the **theoretical foundation** for the entire skill bundle research program:\n\n1. **S=(C,\u03c0,T,R) definition** \u2014 gives precise boundary conditions: skills \u2260 tools (atomic), \u2260 plans (one-time), \u2260 memory (observations). Skills are simultaneously **executable, reusable, and governable**.\n2. **Lifecycle model** \u2014 maps the full trajectory from discovery to update, providing a framework for bundle evolution tracking.\n3. **Seven design patterns** \u2014 systematizes how skills are packaged in practice, mapping to existing wiki examples.\n4. **ClawHavoc case study** \u2014 quantifies real-world supply-chain risk (~13% malicious rate in a marketplace), validating security concerns.\n5. **\"Self-generated skills degrade performance\"** \u2014 a key empirical finding that validates the need for formal context elements (verification, validation).\n\n## Composition Notes\n\nThis SoK serves as a **meta-framework** for the wiki:\n\n| SoK Component | Wiki Mapping |\n|----------------|-------------|\n| Formal definition (S) | All wiki/examples/ entries |\n| Lifecycle model | [skill bundle patterns](../concepts/skill-bundle-patterns.md) |\n| Design patterns | [skill bundle patterns](../concepts/skill-bundle-patterns.md), individual examples |\n| Security analysis | [skill security governance](../concepts/skill-security-governance.md), [owasp agentic skills top 10](../examples/owasp-agentic-skills-top-10.md) |\n| ClawHavoc case study | [clawhavoc marketplace attack](../examples/clawhavoc-marketplace-attack.md) (new) |\n| Evaluation framework | [skillsbench agent skills benchmark](../examples/skillsbench-agent-skills-benchmark.md) |\n\n## Reproducibility\n\nHigh \u2014 open-access arXiv paper (CC BY 4.0), 192K+ characters of full text, comprehensive bibliography (76+ references).\n\n## Bundle Links\n\n- [skill bundle patterns](../concepts/skill-bundle-patterns.md) \u2014 design patterns taxonomy\n- [skill security governance](../concepts/skill-security-governance.md) \u2014 security analysis\n- [three layer validation stack](../concepts/three-layer-validation-stack.md) \u2014 trust tier model\n- [owasp agentic skills top 10](../examples/owasp-agentic-skills-top-10.md) \u2014 security threats\n- [purplebox supply chain security](../examples/purplebox-supply-chain-security.md) \u2014 supply chain\n- [coevoskills self evolving skills](../examples/coevoskills-self-evolving-skills.md) \u2014 self-evolving pattern (Pattern 4)\n- [clawhavoc marketplace attack](../examples/clawhavoc-marketplace-attack.md) \u2014 case study\n- [supply chain agentic factory in toto](../examples/supply-chain-agentic-factory-in-toto.md) \u2014 SLSA/in-toto provenance\n- [agentskills workshop 2026](agentskills-workshop-2026.md) \u2014 workshop venue\n\n## Sources\n\n- https://arxiv.org/abs/2602.20867\n- https://arxiv.org/html/2602.20867v1\n- https://www.semanticscholar.org/paper/SoK%3A-Agentic-Skills-Beyond-Tool-Use-in-LLM-Agents-Jiang-Li/ae06bb0819ec521d45909b2cbf599ff36ea025e2", "papers/survey-agent-skills-procedural-infrastructure": "# A Survey of Agent Skills: Toward Procedural Infrastructure for LLM Agents\n\n**Source:** https://www.preprints.org/manuscript/202605.1276 (19 May 2026)\n**GitHub:** https://github.com/DataArcTech/Awesome-Agent-Skill-Papers\n**Date Added:** 2026-07-11 (Iteration 36)\n**Authors:** Cehao Yang, Xiaojun Wu, Honghao Liu, Xueyuan Lin, et al. (13 authors)\n**License:** CC BY 4.0\n**Bundle Type:** Academic Survey \u00b7 Six-Layer Taxonomy \u00b7 Paper Catalog\n**Confidence:** 9/10\n\n## Name & Origin\n\nThe most comprehensive **six-layer taxonomy** of agent skills, covering ontology, representation/packaging, lifecycle, runtime integration, governance, and applications. Accompanied by a curated GitHub catalog of agent skill papers.\n\n## Skills Included (as taxonomy layers)\n\n1. **Ontology** \u2014 what a skill is; relationship to memory, cognition, compression, reusable procedural knowledge\n2. **Representation & Packaging** \u2014 natural-language guidance, executable code, decision graphs, filesystem packages (SKILL.md), structured records\n3. **Lifecycle** \u2014 acquisition, storage, retrieval, usage, maintenance, selective internalization into model behavior\n4. **Runtime Integration** \u2014 terminal interfaces, tool interfaces, multi-agent systems, agent harnesses (Claude Code, Codex, OpenClaw, Hermes Agent)\n5. **Governance** \u2014 security risks, trusted deployment, marketplace governance\n6. **Applications** \u2014 robotics, games, web agents, GUI/mobile/OS agents, software engineering\n\n## Context Elements\n\n- **Six-layer taxonomy** \u2014 the most comprehensive structural framework for skill bundle analysis\n- **Marketplace scale data** (as of April 2, 2026):\n  - SkillsMP: 425,000+ skills\n  - LobeHub Skills: 169,739 skills\n  - agentskill.sh: 110,000+ skills\n  - skills.sh: ~87,000 unique skills\n  - ClawHub: 20,000+ skills\n- **Paradigm arc:** prompt engineering \u2192 context engineering \u2192 **harness engineering**\n- **Selective internalization** \u2014 skills can be internalized into model weights (beyond runtime loading)\n- **Paper catalog** \u2014 Awesome-Agent-Skill-Papers GitHub repo with curated paper list\n\n## How Context Elements Support Skills\n\nThe six-layer taxonomy maps directly to our wiki structure:\n\n| Survey Layer | Wiki Mapping |\n|-------------|-------------|\n| Ontology | [skill bundle patterns](../concepts/skill-bundle-patterns.md) |\n| Representation/Packaging | [agent skills spec](../examples/agent-skills-spec.md), SKILL.md format |\n| Lifecycle | [skill bundle patterns](../concepts/skill-bundle-patterns.md) |\n| Runtime Integration | [agensi marketplace landscape](../tools/agensi-marketplace-landscape.md) |\n| Governance | [skill security governance](../concepts/skill-security-governance.md) |\n| Applications | Domain-specific examples (see wiki/examples/) |\n\nThe marketplace data quantifies the ecosystem at **800K+ total skills** across major marketplaces \u2014 a scale that makes governance and validation critical.\n\n## Composition Notes\n\nThis survey is complementary to [arxiv agent skills survey](../examples/arxiv-agent-skills-survey.md) (4-axis: architecture, acquisition, security, deployment) and [sok agentic skills beyond tool use](sok-agentic-skills-beyond-tool-use.md) (7 patterns + lifecycle). Together, these three surveys provide overlapping but non-redundant coverage:\n- **This survey:** 6-layer taxonomy (most comprehensive structure)\n- **arXiv survey:** 4-axis (architecture + security focus)\n- **SoK:** 7 patterns + formal definition (design patterns focus)\n\n## Reproducibility\n\nHigh \u2014 preprint on Preprints.org (CC BY 4.0), GitHub repo with paper list and taxonomy image.\n\n## Bundle Links\n\n- [arxiv agent skills survey](../examples/arxiv-agent-skills-survey.md) \u2014 complementary 4-axis survey\n- [sok agentic skills beyond tool use](sok-agentic-skills-beyond-tool-use.md) \u2014 SoK (7 patterns + lifecycle)\n- [skill bundle patterns](../concepts/skill-bundle-patterns.md) \u2014 pattern taxonomy\n- [skillsbench agent skills benchmark](../examples/skillsbench-agent-skills-benchmark.md) \u2014 benchmark\n- [coevoskills self evolving skills](../examples/coevoskills-self-evolving-skills.md) \u2014 self-evolving\n- [awesome agent skill papers catalog](../examples/awesome-agent-skill-papers-catalog.md) \u2014 paper catalog\n\n## Sources\n\n- https://www.preprints.org/manuscript/202605.1276\n- https://github.com/DataArcTech/Awesome-Agent-Skill-Papers", "qa/2026-05-24-complex-qa": "# Complex Q&A \u2014 Skill Bundles Wiki\n\n**Date:** 2026-05-24 (Iteration 8)\n\n---\n\n## Q1: Which bundles combine skills with SHACL validation AND SSSOM-style mappings?\n\n**Answer:** The closest example is [open ontologies paper](../examples/open-ontologies-paper.md) (Open Ontologies by Rovai), which combines:\n- SHACL validation (built-in `shacl` tool for RDF validation)\n- Ontology alignment via stable matching (six-signal similarity scoring)\n- While not using SSSOM TSV format directly, the alignment mechanism operates at the same semantic level \u2014 mapping terms between ontologies with confidence scores and provenance\n\nThe newly added [xpshacl explainable shacl](../examples/xpshacl-explainable-shacl.md) focuses on validation explainability but doesn't incorporate mapping. True SHACL+SSSOM bundles remain a gap \u2014 the pieces exist (SHACL validation + SSSOM standard) but no single example combines them.\n\n## Q2: What ontology patterns appear most frequently alongside agent skills?\n\n**Answer:** From 20 documented examples:\n1. **Ontology/Taxonomy** appears in 8 examples (40%) \u2014 the most common formal context element\n2. **RDF/SHACL integration** appears in 6 examples \u2014 growing strongly\n3. **OWL reasoning** appears in 3 examples (Open Ontologies)\n4. **Clinical crosswalks** (ICD-10, SNOMED, MeSH) appear in 2 examples\n\nThe dominant pattern is: skills use an ontology to provide structured domain knowledge, then validate their outputs against SHACL shapes for that ontology.\n\n## Q3: How do successful bundles handle rule integration?\n\n**Answer:** Three distinct patterns emerged:\n1. **Authorization kernel** ([veto agent authorization](../examples/veto-agent-authorization.md), [tool use firewall](../examples/tool-use-firewall.md)) \u2014 binary allow/block decisions on tool calls\n2. **Graph-based policy enforcement** ([graphguard os guardrails](../examples/graphguard-os-guardrails.md)) \u2014 SHACL shapes (structural) + Cypher policies (behavioral) validated against a knowledge graph\n3. **Framework taxonomy** ([claude skills ecosystem 1116](../examples/claude-skills-ecosystem-1116.md)) \u2014 skills organized under MITRE/NIST frameworks, inheriting rule semantics from the taxonomy\n\nGraphGuard's approach (SHACL + Cypher + Shadow Policy Manager) is the most sophisticated, enabling safe rule evolution without production risk.\n\n## Q4: What gaps remain in the catalog?\n\n**Answer:**\n- **Rules engines** beyond authorization: no examples of skills using Drools, N3 rules, or SWRL\n- **SSSOM in practice:** specification documented but no agent skill that reads/writes SSSOM files\n- **Skill composition:** how do multiple skills in a bundle coordinate? No examples of skill-to-skill protocols\n- **Performance metrics:** few examples benchmark skill execution time or context usage\n- **Skill versioning:** `gh skill` introduces pinning, but no systematic versioning schema across bundles", "qa/2026-05-24-iter9-qa": "# Q&A and Gap Analysis \u2014 2026-05-24 Iteration 9\n\n## Complex Queries Against Wiki Catalog\n\n### Q1: Which bundles combine skills with both dependency graphs AND validation?\n**A:** [graph of skills dependency retrieval](../examples/graph-of-skills-dependency-retrieval.md) provides dependency graph construction. [dspy agent skills bundle](../examples/dspy-agent-skills-bundle.md) has 80 validation tests. No single bundle yet combines both dependency-aware retrieval + programmatic skill validation. This is a gap: a bundle that validates both the correctness of individual skills AND their dependency compatibility before loading.\n\n### Q2: What benchmarking coverage exists for skill bundles?\n**A:** [skillsbench agent skills benchmark](../examples/skillsbench-agent-skills-benchmark.md) provides paired evaluation (with-skills vs without-skills delta). [awesome agent skills catalogs](../examples/awesome-agent-skills-catalogs.md) catalogs the market but doesn't benchmark it. Gap: no per-bundle benchmark \u2014 SkillsBench measures aggregate augmentation, not individual bundle effectiveness.\n\n### Q3: Which bundles encode security posture as context elements?\n**A:** [nvidia verified agent skills](../examples/nvidia-verified-agent-skills.md) (OpenSSF signing), [mondoo agent skills security](../examples/mondoo-agent-skills-security.md) (security analysis cataloging 14 attack patterns), [veto agent authorization](../examples/veto-agent-authorization.md) (authorization kernel). Mondoo's analysis identifies that 25%+ of public skills have vulnerabilities \u2014 verification bundles exist but coverage is thin for the 50k+ skills in registries.\n\n### Q4: What ontology patterns appear most frequently alongside agent skills?\n**A:**\n- Dependency graphs (DAGs): 2 examples ([graph of skills dependency retrieval](../examples/graph-of-skills-dependency-retrieval.md), [graphguard os guardrails](../examples/graphguard-os-guardrails.md))\n- Taxonomies: 3 examples ([claude skills ecosystem 1116](../examples/claude-skills-ecosystem-1116.md) MITRE/NIST mapping, [awesome agent skills catalogs](../examples/awesome-agent-skills-catalogs.md) platform matrix, [open ontologies github](../examples/open-ontologies-github.md) 32 stored ontologies)\n- Attack taxonomies: 1 example ([mondoo agent skills security](../examples/mondoo-agent-skills-security.md) 14 patterns)\n\n### Q5: How do successful bundles handle skill orchestration?\n**A:** Two patterns found:\n1. **Orchestrator skill**: [dspy agent skills bundle](../examples/dspy-agent-skills-bundle.md)'s `dspy-advanced-workflow` skill activates and sequences the other four skills\n2. **Methodology cycle**: [superpowers engineering discipline skills](../examples/superpowers-engineering-discipline-skills.md)'s 6-stage linear workflow (Brainstorming \u2192 Git Worktree \u2192 Plan \u2192 Subagent \u2192 Review \u2192 Finishing)\n\n## Linting Pass\n\n### Wikilink Verification\nChecking new entries created today:\n- `[dspy agent skills bundle](../examples/dspy-agent-skills-bundle.md)` \u2192 wiki/examples/dspy-agent-skills-bundle.md \u2705\n- `[superpowers engineering discipline skills](../examples/superpowers-engineering-discipline-skills.md)` \u2192 wiki/examples/superpowers-engineering-discipline-skills.md \u2705\n- `[mondoo agent skills security](../examples/mondoo-agent-skills-security.md)` \u2192 wiki/examples/mondoo-agent-skills-security.md \u2705\n- `[awesome agent skills catalogs](../examples/awesome-agent-skills-catalogs.md)` \u2192 wiki/examples/awesome-agent-skills-catalogs.md \u2705\n- `[graph of skills dependency retrieval](../examples/graph-of-skills-dependency-retrieval.md)` \u2192 wiki/examples/graph-of-skills-dependency-retrieval.md \u2705\n- `[skillsbench agent skills benchmark](../examples/skillsbench-agent-skills-benchmark.md)` \u2192 wiki/examples/skillsbench-agent-skills-benchmark.md \u2705\n- `[claude api skills integration](../examples/claude-api-skills-integration.md)` \u2192 wiki/examples/claude-api-skills-integration.md \u2705\n- `[anthropic official skills repo](../examples/anthropic-official-skills-repo.md)` \u2192 wiki/examples/anthropic-official-skills-repo.md \u2705\n\nReferenced existing wikilinks:\n- `[graphguard os guardrails](../examples/graphguard-os-guardrails.md)` \u2192 wiki/examples/graphguard-os-guardrails.md \u2705\n- `[nvidia verified agent skills](../examples/nvidia-verified-agent-skills.md)` \u2192 wiki/examples/nvidia-verified-agent-skills.md \u2705\n- `[veto agent authorization](../examples/veto-agent-authorization.md)` \u2192 wiki/examples/veto-agent-authorization.md \u2705\n- `[claude skills ecosystem 1116](../examples/claude-skills-ecosystem-1116.md)` \u2192 wiki/examples/claude-skills-ecosystem-1116.md \u2705\n- `[open ontologies github](../examples/open-ontologies-github.md)` \u2192 wiki/examples/open-ontologies-github.md \u2705\n- `[nemoclaw security scanner](../examples/nemoclaw-security-scanner.md)` \u2192 wiki/examples/nemoclaw-security-scanner.md \u2705\n\n### Missing Context Elements Check\n- [anthropic official skills repo](../examples/anthropic-official-skills-repo.md) has specification + template but missing: SHACL shapes, SSSOM mappings, rule-based validation \u2192 These are appropriate gaps (this is a general-purpose spec, not a domain-specific bundle)\n- Mondoo security analysis identifies ecosystem gaps in: version pinning (lockfiles), audit tooling (`npm audit` for skills), visibility/auditing \u2192 Suggests future research into supply chain security patterns\n\n## New Research Questions\n\n1. **Dependency Resolution**: How does GoS's dependency graph relate to the `allowed-tools` frontmatter field? Can constraints be inferred from the DAG?\n2. **Security-Validation Gap**: No bundle yet combines [nvidia verified agent skills](../examples/nvidia-verified-agent-skills.md) signing with [graph of skills dependency retrieval](../examples/graph-of-skills-dependency-retrieval.md) dependency checking. A bundle that verifies both authenticity and dependency compatibility before execution would address Mondoo's #1 recommendation.\n3. **Benchmark-to-Bundle Mapping**: Can SkillsBench's paired evaluation be applied to individual bundles in our catalog? This would enable quantitative bundle quality claims.\n4. **MCP vs Skills Complementarity**: Awesome-lists catalog both MCP servers and Skills. What bundles effectively combine both patterns? (Simon Willison argues Skills > MCP for simplicity, but the complementary pattern may exist.)\n\n## Gap Severity Assessment\n\n| Gap | Severity | Recommendation |\n|-----|----------|----------------|\n| No dependency + validation bundle | HIGH | Next research priority |\n| No SSSOM mapping implementation (only spec) | MEDIUM | Search for SSSOM-in-action examples |\n| No MCP + Skills dual-pattern bundles | MEDIUM | Search for skills that wrap MCP servers |\n| No quantitative per-bundle benchmark | LOW | SkillsBench is new methodology, tracking |\n| Supply chain verification only NVIDIA | MEDIUM | Search for other signing/verification platforms |", "qa/2026-06-01-iter13-qa": "# Complex Q&A \u2014 2026-06-01 (Iteration 13)\n\n## Q1: Which bundles combine skill-level validation (structure + content quality) with registry-level security scanning?\n\n**Search query:** skill bundles with both skill-validator type checks AND 12-category threat scanning\n\n**Answer:**\n\n| Bundle | Skill-Level Validation | Registry Security Scanning |\n|---|---|---|\n| [agentskill sh ags security scoring](../examples/agentskill-sh-ags-security-scoring.md) | review-skill (10 quality dimensions) | 12-category server-side scanner |\n| [skill validator cli](../examples/skill-validator-cli.md) | Full lifecycle (structure, content, contamination, link rot, LLM-as-judge) | None \u2014 local-only |\n| [validate skill github action](../examples/validate-skill-github-action.md) | Structural spec compliance | None \u2014 CI/CD only |\n\n**Three-layer coverage matrix (NEW):**\n\n- **Pre-commit layer:** skill-validator (Go binary, 13 platform hooks)\n- **CI/CD layer:** Validate Skill Action (GitHub Action, JSON outputs)\n- **Registry layer:** agentskill.sh (12-category threat scan, 100k+ skills)\n\nEach layer catches what the others miss:\n- skill-validator catches deep quality issues (contamination, LLM-as-judge) but is opt-in\n- Validate Skill catches structural regressions on every PR but doesn't run LLM\n- ags catches registry-level threats (malicious payloads, supply chain) but only at install\n\n**Cross-reference:** [three layer validation stack](../concepts/three-layer-validation-stack.md) \u2014 the architectural pattern\n\n## Q2: What ontology patterns appear most frequently alongside agent skills?\n\n**Search query:** ontology + agent skill combinations\n\n**Answer (top 6):**\n\n1. **OBO Foundry ontologies** (GO, Mondo, CL, Uberon, EFO, HPO) \u2014 4 production users of [ai4curation curation skills](../examples/ai4curation-curation-skills.md)\n2. **SKOS vocabularies** \u2014 implicit in many taxonomic skill bundles\n3. **SHACL shape libraries** \u2014 [graphguard os guardrails](../examples/graphguard-os-guardrails.md), [xpshacl explainable shacl](../examples/xpshacl-explainable-shacl.md), [schimatos shacl knowledge graph](../examples/schimatos-shacl-knowledge-graph.md), [text2shacl multi agent shacl](../examples/text2shacl-multi-agent-shacl.md)\n4. **OWL ontologies** (general) \u2014 8+ examples in catalog\n5. **MITRE ATT&CK / NIST** \u2014 [claude skills ecosystem 1116](../examples/claude-skills-ecosystem-1116.md) (754 cybersecurity skills)\n6. **Custom domain ontologies** \u2014 [onto llm mapping](../examples/onto-llm-mapping.md) for SSSOM mapping generation\n\n**Convergence:** Ontology-as-context is the *second most common* context element type (after SHACL validation). The pattern of \"skill operates on formal ontology terms\" is the key bundle shape.\n\n## Q3: How do successful bundles handle rule integration?\n\n**Search query:** how skills combine with formal rules\n\n**Answer (5 patterns):**\n\n1. **External rule engine** (e.g., [veto agent authorization](../examples/veto-agent-authorization.md) \u2014 authorization kernel separate from skills)\n2. **Embedded rules in skill body** (e.g., [superpowers engineering discipline skills](../examples/superpowers-engineering-discipline-skills.md) \u2014 Iron Laws / Red Flags in the skill text)\n3. **Rule-as-SHACL** ([graphguard os guardrails](../examples/graphguard-os-guardrails.md) \u2014 guardrails expressed as SHACL shapes)\n4. **Rule-as-LLM-as-judge** ([skill validator cli](../examples/skill-validator-cli.md) \u2014 LLM evaluates quality dimensions)\n5. **Threat taxonomy as rule schema** ([agentskill sh ags security scoring](../examples/agentskill-sh-ags-security-scoring.md) \u2014 12-category threat model defines what to scan for)\n\n**Convergence:** There is no single \"right\" way \u2014 it depends on whether rules are static (SHACL) or dynamic (LLM-judge), and whether they're declarative (Veto) or embedded (Superpowers). Five distinct patterns in the catalog.\n\n## Q4: What is the bundle density leader and what makes it dense?\n\n**Top 5 by bundle density (skills \u00d7 context elements \u00d7 distribution channels):**\n\n1. **[agentskill sh ags security scoring](../examples/agentskill-sh-ags-security-scoring.md)** \u2014 3 skills + 12-category threat taxonomy + 10-dim quality scoring + content-SHA versioning + 4 distribution channels (npm, plugin marketplace, slash command, JSON) + telemetry (auto-rate, 110k scans) = **~30 distinct elements**\n2. **[ai4curation curation skills](../examples/ai4curation-curation-skills.md)** \u2014 7 skills + 5 ontologies + OAK/ROBOT/DOSDP vocab + 4 production users + Justfile reproducibility = **~17 elements**\n3. **[skill validator cli](../examples/skill-validator-cli.md)** \u2014 1 tool with 7 commands + 13 platform hooks + LLM-as-judge + contamination detection + 4 content metrics = **~25 elements**\n4. **[text2shacl multi agent shacl](../examples/text2shacl-multi-agent-shacl.md)** \u2014 4-stage pipeline + 5 LLMs + 2 input versions + 2 merge strategies + 3 storage backends (Chroma, Redis, ontology) = **~16 elements**\n5. **[validate skill github action](../examples/validate-skill-github-action.md)** \u2014 1 action + 5 inputs + 3 outputs + 12 validation rules = **~21 elements**\n\n**Pattern:** Density leaders combine multiple *types* of context element (validation + scoring + provenance) with multiple *distribution channels* (CLI + marketplace + CI + plugin). Single-purpose tools (validate-skill Action) are less dense but more focused.\n\n## Q5: What gaps remain in the catalog?\n\n**Top 5 open gaps (from analysis):**\n\n1. **Bundle-level validation** \u2014 All three validation layers target individual skills; bundle-level interaction effects (privilege accumulation, version skew) are an open problem. No example yet.\n2. **SLSA / in-toto attestation** \u2014 The three validation layers produce independent signals; no provenance chain linking them.\n3. **A2A (Agent-to-Agent) protocol** \u2014 Listed in last week's priorities; no example found yet.\n4. **SHACL round-trip evaluation** \u2014 text \u2192 shapes \u2192 text fidelity not yet empirically tested.\n5. **Skill provenance beyond OpenSSF signing + content-SHA** \u2014 In-toto, sigstore, TUF not yet represented.\n\n**Verifiability check (3 random claims):**\n\n- \"ai4curation/curation-skills has 7 skills\" \u2192 repo README lists 7 skills (ontology-access-kit, editing-obo-ontologies, dosdp-design-patterns, robot-obo-tool, run-deep-research, ai4curation-configuration, configure-w3id) \u2705\n- \"agentskill.sh scans 110,000+ skills across 12 threat categories\" \u2192 README confirms both numbers \u2705\n- \"skill-validator has pre-commit hooks for 13 platforms\" \u2192 README lists 13 hook names \u2705\n\n**Match rate: 3/3 (100%)**\n\n## Conclusion\n\nIteration 13 is the most pattern-rich iteration to date \u2014 the three-layer validation stack + bidirectional SHACL bridge are the two architectural patterns that the catalog will likely build on for the next several iterations. The next research priority should be the gaps identified in Q5, especially bundle-level validation and SLSA-style attestation.", "qa/2026-07-06-lint": "# Q&A / Lint 2026-07-06\n\n**Wikilink audit:** No new real broken links introduced (intentional  and code examples classified as false-positives per convention).\n**New sources lint:** All 3 raw files have clear sources, no hallucinations.\n**Gap analysis:** Continued emphasis on SHACL agentInstruction and standard adoption. No contradictions found.\n**Epistemic check:** All claims trace to raw/ sources or prior wiki.\n\nRun complete. No fixes needed.", "qa/2026-07-10-qa": "# Q&A \u2014 2026-07-10\n\n## Q1. Which new bundles combine skills with formal (or formal-adjacent) context beyond SKILL.md?\n\n| Bundle | Skills | Formal / formal-adjacent context |\n|--------|--------|----------------------------------|\n| Scientific Agent Skills (K-Dense) | 148 | Domain taxonomy, 100+ scientific DBs, security CI scanners |\n| Agentic Awesome Skills | 1,943+ | schemas/, skill_categorization, security audit gates, plugins |\n| Vercel Labs Agent Skills | 5+ | Dense constraint-rule handbooks (40\u2013100+ rules), progressive disclosure |\n| OpenMontage | 500+ | Pipeline manifests, hard human approval gates, checkpoint audit trail |\n\n**None of today's new examples ships SHACL or SSSOM natively**, but all four use strong substitutes (schemas, taxonomies, gates, scientific data sources). SHACL 1.2 `sh:agentInstruction` remains a monitoring target for bridge opportunities.\n\n## Q2. How do marketplace-scale findings change catalog strategy?\n\narXiv:2602.08004 (40,285 skills) + workshop audit (37% flaws on 3,984) imply:\n- Catalog value is **curation + composition + validation**, not raw skill count\n- Intent-level redundancy \u2192 invest in mapping/taxonomy across catalogs\n- Security is not optional packaging \u2014 it is a core context element type\n\n## Q3. What ontology / mapping gaps remain?\n\n- No SSSOM-style mapping between marketplace skill IDs and agentskills.io names\n- Scientific DBs (K-Dense) are semantic but not linked via SSSOM to OBO/Mondo-style terms in skill metadata\n- OpenMontage provider quality_scores are a soft ontology without formal shapes\n\n## Q4. Bundle density leaders (today's additions)\n\n1. OpenMontage \u2014 skills \u00d7 pipelines \u00d7 gates \u00d7 tools\n2. Scientific Agent Skills \u2014 skills \u00d7 DBs \u00d7 packages \u00d7 security CI\n3. Agentic Awesome Skills \u2014 skills \u00d7 schemas \u00d7 plugins \u00d7 workflows\n4. Vercel \u2014 fewer skills, very high rule-density per skill\n\n## Epistemic samples (3 claims vs sources)\n\n1. \"40,285 public skills analyzed\" \u2192 arXiv:2602.08004 abstract (raw note) \u2705\n2. \"37% of 3,984 skills had security flaws\" \u2192 agentskills-workshop.org overview \u2705\n3. \"Scientific Agent Skills has 148 skills\" \u2192 GitHub README badge / raw note \u2705", "qa/2026-07-11-qa": "# Q&A \u2014 2026-07-11 (Iteration 36)\n\n## Complex Q&A\n\n### Q1: How do the three recent academic surveys (SoK, 4-axis, 6-layer) differ in their taxonomies?\n\n| Survey | Paper | Taxonomy | Key Contribution |\n|--------|-------|----------|-----------------|\n| SoK: Agentic Skills | arXiv:2602.20867 | 7 design patterns + representation\u00d7scope | Formal definition S=(C,\u03c0,T,R); lifecycle model; ClawHavoc case study |\n| Agent Skills Survey (4-axis) | arXiv:2602.12430 | architecture, acquisition, deployment, security | 26.1% vulnerability rate; Skill Trust Framework (4-tier gates) |\n| Survey: Procedural Infrastructure | Preprints 202605.1276 | 6 layers (ontology\u2192governance\u2192applications) | Marketplace scale (800K+ skills); selective internalization |\n\n**Convergence:** All three define skills as multi-file packages \u2260 atomic tools. All three identify security/governance as critical. All three call for lifecycle models.\n\n**Divergence:** SoK focuses on design patterns + security case study. 4-axis focuses on architecture + deployment. 6-layer focuses on comprehensive structural taxonomy + applications.\n\n### Q2: What is the \"intent \u2192 source \u2192 binary\" gap and how does it apply to skill bundles?\n\nThe supply chain is now `intent \u2192 source \u2192 binary` (per [supply chain agentic factory in toto](../examples/supply-chain-agentic-factory-in-toto.md)):\n- **source \u2192 binary:** Well-secured via SLSA, in-toto, hermetic builds, SBOMs\n- **intent \u2192 source:** Largely unexamined \u2014 AI agents generate code from human intent, but we have no provenance for this transformation\n\n**For skill bundles:** Skills are authored by humans (intent \u2192 skill) and increasingly by AI agents (prompt \u2192 skill). Without provenance for the \"prompt \u2192 skill\" step:\n- A compromised model could generate malicious skills (ClawHavoc pattern)\n- Human-machine cognitive misalignment could produce subtly broken skills (CoEvoSkills finding)\n- No attestation of which model, prompt, or review process produced a given skill\n\n**Solution direction:** Extend in-toto attestations to cover skill generation; neutral observer pattern (sign from outside the generation process); policy gates that verify skill provenance before marketplace listing.\n\n### Q3: How does CoEvoSkills' co-evolutionary verification relate to the existing three-layer validation stack?\n\nThe [three layer validation stack](../concepts/three-layer-validation-stack.md) is static:\n- Layer 1 (pre-commit): skill-validator CLI\n- Layer 2 (CI/CD): validate-skill GitHub Action\n- Layer 3 (registry): agentskill.sh security scoring\n\nCoEvoSkills introduces **dynamic** verification:\n- The Surrogate Verifier co-evolves with the Skill Generator\n- It provides feedback without ground-truth test content\n- It adapts as the generator improves\n\n**Generalization:** Co-evolutionary verification is the adaptive/dynamic counterpart to the static three-layer stack. Future validation stacks could combine both: static pre-commit/CI/registry gates + dynamic co-evolutionary verification for skill generation.\n\n### Q4: What is the marketplace risk quantification across sources?\n\n| Source | Metric | Rate |\n|--------|--------|------|\n| ClawHavoc (Koi Security) | 341 malicious / 2,632 audited | **13%** |\n| SoK (arXiv:2602.20867) | Vulnerable community skills | **26.1%** |\n| Agent Skills '26 Workshop | Security flaws in submissions | **37%** |\n| arXiv:2602.08004 | 40,285 marketplace skills analysis | homogeneity + safety concentration |\n\n**Convergent finding:** Roughly 1 in 4\u20138 marketplace skills is malicious or vulnerable. This quantification validates the need for formal context elements (validation, provenance, trust tiers).\n\n## Epistemic Sample Check\n\nThree claims sampled and verified against sources:\n\n1. **Claim:** \"CoEvoSkills surpasses human-curated skills within 5 evolution iterations\"\n   \u2192 **Source:** arXiv:2604.01687v2, Figure 2 caption: \"CoEvoSkills surpasses human-curated skills within 5 evolution iterations.\" \u2713\n\n2. **Claim:** \"ClawHavoc: ~1,200 malicious skills infiltrated ClawHub\"\n   \u2192 **Source:** arXiv:2602.20867v1 abstract: \"nearly 1,200 malicious skills infiltrated a major agent marketplace\" \u2713\n\n3. **Claim:** \"GoS v3: +25.55% reward, -56.72% tokens on SkillsBench\"\n   \u2192 **Source:** arXiv:2604.05333v3 abstract: \"peak reward increase of 25.55% while reducing total tokens by 56.72%\" \u2713\n\nAll three claims verified against primary sources.\n\n## Gap Analysis\n\n### Lifecycle Coverage Gaps\n\nThe SoK's 7-stage lifecycle model (discovery \u2192 practice \u2192 distillation \u2192 storage \u2192 composition \u2192 evaluation \u2192 update) reveals gaps:\n\n- **Practice:** Few examples document how skills are rehearsed/refined before deployment\n- **Distillation:** Limited coverage of how skills are compressed from raw experiences\n- **Update:** Most examples document initial creation, few track skill evolution over time\n\n### Context Element Gaps\n\nNewly identified but underexplored context elements:\n- **Co-evolutionary verification** \u2014 only 1 example (CoEvoSkills); needs more\n- **SLSA/in-toto provenance** \u2014 only 1 example (Agentic Factory); needs more\n- **Selective internalization** \u2014 mentioned in 6-layer survey but no wiki examples\n- **Marketplace governance models** \u2014 SkillsMP/LobeHub at scale (425K/170K) not yet documented\n\n### Future Research Questions\n\n1. How many documented bundles explicitly pair SKILL.md with formal provenance (in-toto)?\n2. What governance models do the largest marketplaces (SkillsMP, LobeHub) use?\n3. How does the S=(C,\u03c0,T,R) formal definition map to existing wiki examples?\n4. Can the co-evolutionary verification pattern be applied to non-skill domains?", "qa/2026-07-12-qa": "# Q&A \u2014 2026-07-12 (Iteration 37)\n\n## Q1: How do the three skill optimization approaches (SkillMOO, CoEvoSkills, SkillReducer) compare and could they compose?\n\n**Analysis:**\n\n| Dimension | SkillMOO | CoEvoSkills | SkillReducer |\n|---|---|---|---|\n| **Optimization Target** | Skill bundle configuration (which skills, how arranged) | Skill content + verifier (co-evolution) | Skill content (token reduction) |\n| **Method** | NSGA-II Pareto search | Evolutionary co-optimization (generator + verifier) | Delta debugging + taxonomy classification |\n| **Objectives** | Multi-objective (pass rate + cost) | Single (pass rate via SkillsBench) | Multi-objective (compression + quality) |\n| **Edit Operations** | Pruning + substitution (LLM-proposed) | Mutation + crossover (evolutionary) | Compression + restructuring (delta) |\n| **Evaluation** | SkillsBench (16 tasks) | SkillsBench | 600 skills + SkillsBench |\n| **Key Result** | Top rank 11/12 tasks, -31.7% cost | Surpasses human skills in 5 iterations | 48%+39% compression, +2.8% quality |\n\n**Composability:** Yes \u2014 they address orthogonal axes:\n1. SkillReducer first (reduce content bloat, fix missing routing)\n2. SkillMOO second (optimize which reduced skills to include)\n3. CoEvoSkills third (co-evolve the optimized bundle with its verifier)\n\nThis is a natural pipeline: **reduce \u2192 select \u2192 evolve**.\n\n## Q2: What does the \"less-is-more\" effect mean for skill bundle design?\n\n**Finding:** SkillReducer discovered that removing non-essential content from skills *improved* functional quality by 2.8%, not just preserved it.\n\n**Implications:**\n1. **Attention dilution is real** \u2014 every token in the context window competes for attention; non-actionable content (60%+ of body) actively degrades performance\n2. **Progressive disclosure is the pattern** \u2014 load supplementary content on demand, not always\n3. **Routing descriptions are critical** \u2014 26.4% of skills lack them entirely, causing wrong-skill selection\n4. **Cross-model transfer** \u2014 the less-is-more effect holds across 5 models from 4 families (mean retention 0.965)\n\n**Design principle:** A skill bundle should contain the *minimum actionable content* by default, with supplementary context loaded on demand. This inverts the current \"include everything\" approach.\n\n## Q3: How does SkillSieve's LLM jury mechanism compare to existing security validation patterns?\n\n**Comparison:**\n\n| Approach | Layer | Method | Cost | Coverage |\n|---|---|---|---|---|\n| agentskill.sh/ags | Registry | 12-category threat taxonomy + content-SHA | \u2014 | 100K+ skills |\n| SkillSieve Layer 1 | Pre-filter | Regex/AST/metadata | ~$0 | 86% volume filtered |\n| SkillSieve Layer 2 | LLM Analysis | 4 parallel sub-tasks | ~$0.006/skill | Semantic threats |\n| SkillSieve Layer 3 | LLM Jury | 3-LLM voting + debate | Higher | High-risk skills |\n| ClawHavoc detection | Forensic | Koi Security/Antiy/Unit 42 analysis | Manual | 1,184 malicious skills |\n\n**Novel contribution:** The LLM jury (Layer 3) is the first **multi-LLM voting + debate** mechanism for skill security. Three LLMs independently assess high-risk skills and debate disagreements, providing a form of democratic governance for security decisions. This is analogous to ensemble methods in ML but applied to security analysis.\n\n## Q4: What new context element types emerged from today's 8 sources?\n\n1. **Multi-Objective Optimization** (SkillMOO) \u2014 skill bundles as Pareto search objects, not static assets\n2. **Delta Debugging** (SkillReducer) \u2014 adversarial delta debugging for routing optimization\n3. **Progressive Disclosure** (SkillReducer) \u2014 load supplementary content on demand\n4. **DAG Scheduler + Policy Gates** (ORCA) \u2014 runtime-level governance at each composition step\n5. **Canonical Capability Taxonomy** (ORCA) \u2014 184/184 strict taxonomy coverage with no aliases\n6. **Closed-Loop Knowledge\u2194Skills** (AI-KM) \u2014 knowledge \u2192 ontology \u2192 skills \u2192 knowledge feedback\n7. **LLM Jury Voting** (SkillSieve) \u2014 3-LLM democratic governance for high-stakes decisions\n8. **Two-Tier Skill Hierarchy** (EffiSkill) \u2014 Operator Skills (mechanism) + Meta Skills (strategy)\n9. **Auto-Composition Protocol** (SkillCraft) \u2014 agents self-authoring skills from tool composition\n10. **Marketplace Security Scanning** (Marketplace Landscape) \u2014 8-point automated security scan (Agensi)\n\n## Epistemic Sample Checks\n\n1. **SkillMOO \"top pass rate rank on 11 of 12 non-zero-pass tasks\"** \u2014 Verified from arXiv abstract: \"SkillMOO achieves the top pass rate rank on 11 of 12 non-zero-pass tasks while achieving cost reductions of up to 31.7% over static bundles\" \u2713\n2. **SkillSieve \"F1 = 0.920\"** \u2014 Verified from arXiv abstract: \"SkillSieve achieves F1 = 0.920 (precision 0.912, recall 0.929) at 0.006 USD per skill\" \u2713\n3. **SkillReducer \"26.4% lack routing descriptions\"** \u2014 Verified from arXiv abstract: \"26.4% lack routing descriptions entirely, over 60% of body content is non-actionable\" \u2713\n4. **SkillCraft \"80% token savings\"** \u2014 Verified from arXiv abstract: \"token usage reduced by up to 80% by skill saving and reuse\" \u2713\n5. **ORCA \"122 capabilities\"** \u2014 Verified from dev.to blog post: \"122 capabilities with deterministic Python baselines\" \u2713", "qa/2026-07-13-qa": "# Q&A \u2014 2026-07-13 (Skill Bundles, Iteration 38)\n\n## Q1: Which skill optimization approaches now exist, and how do they relate?\n\n**Five distinct approaches are now mapped:**\n\n| Approach | Method | Key Metric | Transfer |\n|----------|--------|------------|----------|\n| **SkillMOO** | NSGA-II Pareto search (pass rate + cost) | Top rank 11/12 SkillsBench | Not tested |\n| **CoEvoSkills** | Evolutionary (generator + surrogate verifier) | Surpasses human-curated in 5 iterations | 8-LLM generalization |\n| **SkillReducer** | Content reduction (delta debugging + progressive disclosure) | 48%+39% compression, +2.8% quality | 5 models, 4 families |\n| **SkillOpt** | Training-style (forward-backward-update, textual LR, validation gating) | Best/tied-best on 52/52 cells, +23.5 on GPT-5.5 | Cross-model-scale, cross-harness, cross-task |\n| **EvoSkill** | Failure-driven discovery (3-agent: Executor\u2192Proposer\u2192Skill-Builder) | +7.3% OfficeQA, +12.1% SealQA | Zero-shot to BrowseComp (+5.3%) |\n\n**Relationship:** SkillOpt explicitly outperforms EvoSkill, GEPA, TextGrad, and others on all 52 cells. EvoSkill focuses on *discovery* (creating new skills), while SkillOpt focuses on *optimization* (improving existing skills). SkillReducer reduces content, CoEvoSkills co-evolves, SkillMOO searches configuration space. They address different axes and could potentially compose.\n\n## Q2: What evidence exists that skills transfer across domains/models/tasks?\n\nThree independent lines of evidence from today's sources:\n1. **EvoSkill:** Skills evolved on SealQA transfer zero-shot to BrowseComp (+5.3%) without modification \u2014 proving skill-level optimization produces transferable capabilities beyond the training task.\n2. **SkillOpt:** Cross-harness transfer (spreadsheet skill trained in Codex \u2192 used in Claude Code: 22.1 \u2192 81.8, +59.7) outperforms direct training (80.4). This suggests skills capture general workflow logic, not harness-specific recipes. Also transfers across model scales (GPT-5.4-mini+skill > GPT-5.4 no-skill).\n3. **SkillMigrator:** Cross-domain web skill reuse rate of 35.4% (vs PolySkill's 31%) on Mind2Web. Uses structural layout matching (accessibility-tree skeletons) rather than element references.\n\n## Q3: Why is skill generation harder than skill use?\n\nSkillGenBench provides the first systematic evidence:\n- Repository-grounded skill generation: 7-16% pass@3 (procedures are implicit in code structure)\n- Document-grounded skill generation: 23-27% pass@3 (procedures explicit but scattered)\n- SkillsBench showed curated skills substantially improve performance\n- But auto-generated skills can induce **negative transfer** (agent performs worse with the skill than without)\n- The generator-executor decoupling isolates skill distillation quality from planning and retrieval confounds\n\nThe gap is 2-3x: using a well-crafted skill is relatively easy; distilling one from raw corpora is the bottleneck.\n\n## Q4: What would a Skill OS need to provide?\n\nBased on the 100K skill analysis (Skill OS paper), five demands:\n1. **Locality-aware caching** \u2014 cache skill execution results across invocations (skills imply repeated reuse)\n2. **Dynamically constructed environments** \u2014 build execution environments on demand (skills share runtime requirements)\n3. **Global skill management** \u2014 cross-session visibility for optimization (currently skills shared without global management)\n4. **Structured failure handling** \u2014 deterministic error handling, not trial-and-error (dependency failures cause token waste)\n5. **Runtime security & auditing** \u2014 enforce parallel-safety, idempotency (currently prompt-level instructions inadequate)\n\nORCA (122 capabilities, 36 DAG skills, policy gates, provenance) is an early partial implementation of these demands.\n\n## Q5: How does provenance apply to skill bundles?\n\nPROV-AGENT extends W3C PROV + MCP to capture:\n- Agent decisions, prompts, and responses as first-class provenance components\n- End-to-end workflow provenance graphs (agent actions = first-class, like traditional workflow tasks)\n- Cross-facility (edge, cloud, HPC) near real-time capture\n\nThis complements:\n- SLSA/in-toto (supply chain provenance for skill generation)\n- W3C Agent Protocol Community Group (interoperable agent protocols)\n- The provenance tracking in ORCA (policy gates + provenance per execution)\n\nTogether, provenance is becoming a standard context element for skill bundles \u2014 tracing from skill definition through execution to downstream impact.\n\n## Gap Analysis\n\n### Covered well\n- Skill optimization (5 approaches, taxonomy complete)\n- Skill transfer (3 independent evidence streams)\n- Skill generation difficulty (SkillGenBench quantitative)\n- OS-level management (Skill OS theoretical, ORCA practical)\n- Provenance (W3C PROV + MCP + SLSA/in-toto)\n\n### Still missing\n- **SkillVerifier/SkillGuard** \u2014 runtime verification for skill execution safety (not found in 2 consecutive days)\n- **OpenClaw/ClawHub ecosystem** \u2014 post-ClawHavoc governance changes (not found)\n- **Memento-Skills** \u2014 RL-based skill self-evolution (identified as search target)\n- **ASPIRE** (NVIDIA) \u2014 robotics-focused skill discovery\n- **EXIF** \u2014 automated skill discovery through exploration\n- **Skill OS implementations** \u2014 beyond ORCA, are there systems implementing the full Skill OS demands?", "qa/2026-07-14-qa": "# Q&A \u2014 2026-07-14 (Iteration 39)\n\n## Q1: How does the security governance stack now cover the skill lifecycle?\n\nThe skill lifecycle security governance now has four layers:\n1. **Publication** \u2014 NVIDIA-verified skills (catalog \u2192 scan \u2192 sign \u2192 document \u2192 distribute)\n2. **Supply chain** \u2014 SkillFortify (formal verification: DY-Skill attacker model, static analysis, lockfile, trust scores)\n3. **Runtime** \u2014 SkillGuard (dual-plane permission governance: context + action, deny-by-default)\n4. **Detection** \u2014 SkillSieve (three-layer malicious skill triage, F1=0.920)\n\nThis is a complete security stack: from publication through supply chain through runtime to detection. SkillFortify and SkillGuard are the two key new additions that provide **formal guarantees** (not just heuristics) \u2014 SkillFortify via mathematical proofs (abstract interpretation, capability confinement), SkillGuard via systematic permission enforcement.\n\n## Q2: How does the skill discovery taxonomy now look across domains?\n\nSkill discovery approaches by domain:\n- **Robotics** \u2014 ASPIRE (code-as-policy + evolutionary search + multimodal traces)\n- **General agents** \u2014 Memento-Skills (Read-Write Reflective Learning, skills as markdown memory)\n- **Multi-agent systems** \u2014 EvoSkill (failure-driven discovery, three-agent architecture)\n- **RL-based** \u2014 Skill1 (unified co-evolution of select/use/distill via frequency decomposition)\n- **Self-play** \u2014 EXIF (Alice-Bob dual-agent, retrospective skill generation)\n- **Evolutionary** \u2014 CoEvoSkills (co-evolutionary verification)\n- **Search-based** \u2014 SkillMOO (NSGA-II Pareto selection)\n\nThe discovery taxonomy now spans 7 distinct approaches across 4 domains. Each addresses a different axis: generation mechanism (failure, exploration, evolution, search, self-play), domain (robotics, web, general), and learning signal (RL, heuristic, evolutionary).\n\n## Q3: What is the relationship between Memento-Skills' Read-Write cycle and Skill1's select-use-distill?\n\nBoth are skill lifecycle models but at different abstraction levels:\n- **Memento-Skills (Read-Write):** Read = skill router selects relevant skill; Write = agent updates/expands skill library. This is a **two-phase** model focused on skill access and creation.\n- **Skill1 (Select-Use-Distill):** Select = query + re-rank; Use = task solving; Distill = new skill from trajectory. This is a **three-phase** model that separates utilization from creation.\n\nSkill1's key insight is that these three capabilities must co-evolve under a single reward signal (frequency decomposition). Memento-Skills achieves continual learning without RL (via memory-based adaptation). Both prove that skills can serve as the sole adaptation mechanism (no LLM parameter updates needed).\n\n## Q4: What evidence now exists for cross-domain skill transfer?\n\n| Source | Transfer Type | Evidence |\n|--------|--------------|----------|\n| ASPIRE | Sim-to-real + cross-embodiment | Simulation skills reduce real-robot programming effort; skills persist across robot APIs |\n| Memento-Skills | Task-to-task | +26.2% on General AI Assistants, +116.2% on Humanity's Last Exam (agent designs agents) |\n| Skill1 | Task-to-task (within env) | ALFWorld + WebShop improvements via skill library reuse |\n| EXIF | Agent-to-agent (Alice\u2192Bob) | Self-play (Alice=Bob) notably improves performance |\n| EvoSkill | Task-to-task (zero-shot) | SealQA skills \u2192 BrowseComp (+5.3%) |\n| SkillOpt | Cross-model + cross-harness | Codex\u2192Claude Code (+59.7), cross-model-scale |\n\nTransfer evidence is now multi-domain (robotics, web, coding) and multi-type (task\u2192task, sim\u2192real, cross-model, cross-harness, cross-embodiment).\n\n## Q5: How does SkillFortify's lockfile compare to traditional package management?\n\nSkillFortify adapts npm/PyPI lockfile patterns to agent skills:\n- **Deterministic ordering** (alphabetical, byte-identical output)\n- **Dependency resolution** (constraint satisfaction via SAT solver)\n- **Trust scores at lock time** (temporal comparison for degraded confidence)\n- **Analysis status** (critical blocks, warning recorded)\n- **SHA-256 integrity hash** (tamper detection)\n- **Agent Dependency Graph** (SAT-based resolution for 1,000-node graphs in <100ms)\n\nThis is the first package-management-style approach for agent skills. The key difference from npm/PyPI: skills are semi-structured (natural language + code + data), so static analysis is more complex. SkillFortify uses abstract interpretation (formal method) rather than AST parsing.", "qa/2026-07-15-qa": "# Q&A \u2014 2026-07-15 (Iteration 40)\n\n## Q1: What is the complete attack taxonomy for the agent skill supply chain?\n\nBased on today's ingestion of MalTool, BadSkill, and SkillJect (plus prior ClawHavoc), the attack taxonomy now spans four distinct threat surfaces:\n\n| Attack | Threat Surface | Mechanism | Defense |\n|--------|---------------|-----------|---------|\n| **MalTool** (arXiv:2602.12194) | Tool code implementation | Coding LLM generates malicious tool code (standalone or embedded) | SkillSpector (YARA + semantic scanning) |\n| **BadSkill** (arXiv:2604.09378) | Model weights in skills | Backdoor-fine-tuned model embedded in skill; semantic compositional triggers | Behavioral vetting, model provenance (SkillFortify) |\n| **SkillJect** (arXiv:2602.14211) | SKILL.md + helper scripts | Two-channel: payload in helper script + front-loaded inducement in SKILL.md | SkillSpector (scan helper scripts), SkillGuard (runtime) |\n| **ClawHavoc** (prior) | Marketplace distribution | ~1,184 malicious skills uploaded to ClawHub; dual-vector (prompt injection + shell) | Marketplace scanning (SkillSieve, agentskill.sh) |\n\nEach attack targets a different layer of the skill bundle (code, model, instructions, distribution) and requires a different defense mechanism. No single defense covers all four.\n\n## Q2: Does the defense stack now achieve full lifecycle coverage?\n\nYes, as of today's ingestion:\n\n| Lifecycle Stage | Defense Framework | Coverage |\n|----------------|-------------------|----------|\n| Pre-installation scanning | SkillSpector (NVIDIA) | YARA + LLM semantic + OWASP/MITRE |\n| Supply chain verification | SkillFortify | Formal (Dolev-Yao, abstract interpretation, lockfile) |\n| Runtime permission | SkillGuard | Dual-plane (context + action), deny-by-default |\n| MCP server access control | AgentBound | Declarative policy (Android model), enforcement engine |\n| Marketplace detection | SkillSieve | Three-layer triage (heuristic\u2192LLM\u2192jury) |\n| Publication governance | NVIDIA-Verified | Catalog \u2192 scan \u2192 sign \u2192 document \u2192 distribute |\n\nThe gap: **model-in-skill verification** (BadSkill's threat surface) is not yet covered by any defense framework. SkillSpector scans code, SkillFortify verifies supply chain, SkillGuard governs runtime \u2014 but none verifies that model weights embedded in skills are not backdoor-fine-tuned.\n\n## Q3: What does SWE-Skills-Bench tell us about skill utility?\n\nThe finding is sobering: **80% of SWE skills (39/49) yield zero pass-rate improvement**, and the average gain is only +1.2%. Three skills actually degrade performance (up to -10%) due to version-mismatched guidance. Token overhead can reach +451% with no benefit.\n\nThis means:\n- Skills are a **narrow intervention**, not a universal booster\n- Utility depends on **domain fit, abstraction level, and contextual compatibility**\n- The field needs **rigorous evaluation** before adoption, not just enthusiasm\n- The **less-is-more effect** (SkillReducer) is validated: many skills are actively wasteful\n\nCombined with SkillReducer's finding (55K skills studied, 60%+ non-actionable), the evidence increasingly suggests that skill quality matters far more than skill quantity.\n\n## Q4: How does the Externalization framework connect to existing wiki concepts?\n\nThe Externalization paper provides the **theoretical foundation** for the entire skill bundles knowledge base:\n\n- **Skills = externalized procedural expertise** \u2014 formal definition of what skills are\n- **Harness engineering = governed execution** \u2014 connects to SkillGuard, SkillFortify, AgentBound\n- **Self-evolving harnesses** \u2014 connects to SkillClaw, CoEvoSkills, Skill1\n- **Shared agent infrastructure** \u2014 connects to SkillClaw's shared repository\n- **Parametric/externalized trade-off** \u2014 explains why SkillReducer's less-is-more works (some capabilities are better left parametric)\n- **Weights\u2192Context\u2192Harness progression** \u2014 historical framework for understanding the field's evolution\n\nThe four-form taxonomy (memory, skills, protocols, harness) provides a unified classification system that the wiki can use to organize its examples.\n\n## Q5: What are the gaps identified by today's research?\n\n1. **Model-in-skill verification gap** \u2014 No defense framework addresses BadSkill's threat surface (backdoor models in skills)\n2. **Skill utility evaluation gap** \u2014 SWE-Skills-Bench covers SWE; no equivalent for other domains (research, creative, data science)\n3. **Skill versioning gap** \u2014 SWE-Skills-Bench's version-mismatch finding shows skills need explicit version compatibility declarations\n4. **MCP security beyond AgentBound** \u2014 AgentBound covers access control; what about MCP server code verification, MCP protocol-level attacks?\n5. **MalTool defense gap** \u2014 MalTool explicitly shows existing detection methods are insufficient; new approaches needed\n6. **Collective evolution governance** \u2014 SkillClaw enables collective evolution, but who governs what gets propagated? (security implications of shared skill repositories)", "qa/2026-07-16-qa": "# Q&A \u2014 2026-07-16 (Iteration 41)\n\n## Q1: Do skill bundles help more when kept external, or when internalized into weights?\n\n**A:** Both are now rigorously defined poles.\n\n- **External (runtime packages):** SkillOpt treats SKILL.md as trainable text; Memento uses markdown skills as evolving memory; marketplace skills load on demand (agentskills.io).\n- **Internalized (weights):** SKILL0's Dynamic Curriculum starts with full skill context and anneals to zero-shot, gaining +9.7% ALFWorld / +10.1% WebShop with <0.5k tokens/step.\n\n**Trade-off:** External skills remain inspectable, versionable, and swappable (supply-chain + governance friendly; see ASSCs, NVIDIA-verified). Internalized skills remove retrieval noise and token tax but shift the sovereignty/adaptability boundary to training time. Epistemic check: SKILL0 abstract + Externalization four-form taxonomy + SkillOpt 52/52 cells \u2014 three independent lines.\n\n**Confidence:** High (direct paper results).\n\n## Q2: Why can \"more skills\" hurt agent performance?\n\n**A:** Three complementary mechanisms now cataloged:\n\n1. **Utility** \u2014 SWE-Skills-Bench: 39/49 skills zero gain; SkillsBench: 16/84 tasks negative delta.\n2. **Compatibility** \u2014 R3-Skill: top-K fails when co-retrieved skills conflict under the query; independent relevance is insufficient.\n3. **Supply-chain opacity** \u2014 ASSCs: most packages and many security signals are transitive-only; bloated graphs raise install and attack surface.\n\n**Implication:** Bundle design needs retrieval with Set-Compat objectives, SkillBOM/lockfiles, and empirical paired evaluation (SkillsBench / WildClawBench skill ablations).\n\n**Confidence:** High.\n\n## Q3: What is the minimum governance stack for marketplace skill bundles in mid-2026?\n\n**A:** Lifecycle-aligned stack from this catalog:\n\n| Phase | Mechanism | Example |\n|-------|-----------|---------|\n| Pre-install | Scan | SkillSpector, SkillSieve, ToxicSkills |\n| Supply chain | Manifest + lockfile + SBOM | ASSC SkillBOM, SkillFortify lockfile |\n| Publish | Sign + skill cards | NVIDIA-verified skill.oms.sig |\n| Runtime | Dual-plane permissions | SkillGuard |\n| Protocol | MCP access control | AgentBound |\n| Evaluate | Native multi-harness | WildClawBench + SkillsBench |\n\nMissing still: model-in-skill weight provenance (BadSkill) and automated SkillBOM exporters at registry scale.\n\n**Confidence:** Medium-high (synthesis; no single paper defines the full stack).\n\n## Epistemic coherence sample\n\n| Claim | Source check |\n|-------|--------------|\n| WildClawBench best 62.2% Opus 4.7 OpenClaw | arXiv:2605.10912 abstract |\n| SKILL0 +9.7% ALFWorld | arXiv:2604.02268 abstract |\n| ASSC 1.43M skills, F1 0.95 SDA | arXiv:2607.01136 abstract/body |\n| R3 Hit@1 0.7521 | arXiv:2606.03565 abstract |\n| Registry\u2192Repo 53% never modified | arXiv:2607.00911 abstract |\n\nAll five claims trace to primary abstracts/bodies ingested today.", "skill-bundles": "# Skill Bundles: A Living Catalog\n\n**Primary Publication** \u2014 Last major update: 2026-07-16 (Iteration 41)\n\n## TL;DR\n\nSkill bundles are reusable packages that combine agent skills with formal context artifacts (validation, mapping, rules, vocabularies, taxonomies, and ontologies). This catalog tracks 97 documented examples across 41 iterations of daily research.\n\n## Documented Examples (97 Total + 7 Paper Notes)\n\n### Research & Workflow\n- [NORA](examples/nora-gis-research-agent.md) \u2014 Autonomous research agent with orchestrated skills\n- [Agentic Engineering Workflow Skills](examples/agentic-engineering-workflow-skills.md) \u2014 Multi-skill workflow patterns\n- [NemoClaw](examples/nemoclaw-security-scanner.md) \u2014 Secure agent sandboxing and policy management (23 skills)\n- [**Superpowers**](examples/superpowers-engineering-discipline-skills.md) \u2014 Engineering discipline as skills: Iron Laws, Red Flags, methodology cycle (14 skills)\n- [**NORA Paper**](examples/nora-gis-research-agent.md) \u2014 Harness-engineered autonomous research agent (21 skills + 9 sub-agents, arXiv 2605.02092)\n- [**ai4curation/curation-skills**](examples/ai4curation-curation-skills.md) \u2014 Chris Mungall's ontology/biocuration bundle (7 skills: OAK, ROBOT, DOSDP, OBO editing). Production users: Mondo, Cell Ontology, Uberon, EFO\n- [**ClawBio**](examples/clawbio-bioinformatics-skills.md) \u2014 Bioinformatics-native library: 88 skills (29 production), 8,000+ Galaxy tools, reproducibility bundles, Corpasome reference genome (DOI: 10.5281/zenodo.19297389), 92.3% validation pass rate\n- [**Addy Osmani Agent Skills**](examples/addyosmani-engineering-skills.md) \u2014 23 production-grade engineering workflow skills across full SDLC, 3 specialist personas, 7 slash commands, Iron Laws/Red Flags constraint rules, Google engineering culture\n- [**Scientific Agent Skills (K-Dense)**](examples/scientific-agent-skills-kdense.md) (NEW Iteration 35) \u2014 148 science skills, 100+ databases, package skills, security CI, agentskills.io (~30.6k\u2605)\n- [**OpenMontage**](examples/openmontage-video-production-skills.md) (NEW Iteration 35) \u2014 Agentic video production: 500+ skills, 12 pipelines, hard human approval gates + checkpoint audit trail (~36.3k\u2605)\n- [**CoEvoSkills**](examples/coevoskills-self-evolving-skills.md) (NEW Iteration 36) \u2014 First self-evolving multi-file skill package framework: co-evolutionary verification (generator + surrogate verifier), surpasses human-curated skills within 5 iterations on SkillsBench (arXiv:2604.01687)\n- [**SkillMOO**](examples/skillmoo-multi-objective-optimization.md) (NEW Iteration 37) \u2014 First multi-objective skill bundle optimization: NSGA-II Pareto selection on pass rate + cost; pruning and substitution dominate successful edits; top rank on 11/12 SkillsBench tasks (arXiv:2604.09297)\n- [**EffiSkill**](examples/effiskill-code-efficiency-optimization.md) (NEW Iteration 37) \u2014 Two-tier skill hierarchy: Operator Skills (concrete transformations) + Meta Skills (strategic patterns); execution-free diagnosis; +3.69\u201312.52pp on EffiBench-X (arXiv:2603.27850)\n- [**SkillCraft**](examples/skillcraft-benchmark.md) (NEW Iteration 37) \u2014 Benchmark for skill composition and reuse: agents auto-compose atomic tools into executable Skills; 80% token savings from caching; cited by 20 (arXiv:2603.00718)\n- [**EvoSkill**](examples/evoskill-automated-skill-discovery.md) (NEW Iteration 38) \u2014 Self-evolving framework for auto-discovering agent skills via failure analysis; three-agent architecture (Executor\u2192Proposer\u2192Skill-Builder); Pareto frontier K=3; git-backed lineage; +7.3% OfficeQA, +12.1% SealQA; zero-shot transfer to BrowseComp (+5.3%); open-sourced (1k\u2605) (arXiv:2603.02766)\n- [**SkillOpt**](examples/skillopt-trainable-skill-parameters.md) (NEW Iteration 38) \u2014 Treats skill files as trainable parameters; forward-backward-update in text space; frozen model + optimizer; textual learning rate + validation gating; best/tied-best on all 52 evaluation cells (6 benchmarks \u00d7 7 models \u00d7 3 modes); +23.5 points on GPT-5.5; skills transfer across model scales, harnesses, and tasks (Microsoft Research, June 2026)\n- [**ASPIRE**](examples/aspire-robotics-skill-discovery.md) (NEW Iteration 39) \u2014 NVIDIA GEAR Lab; continual learning for robotics via code-as-policy; three components (execution engine + multimodal traces, skill library, evolutionary search); +77% LIBERO-Pro, +72% Robosuite, +32% BEHAVIOR-1K; 31% zero-shot vs 4%; sim-to-real transfer evidence; authors include Linxi \"Jim\" Fan, Ken Goldberg (arXiv:2607.00272)\n- [**Memento-Skills**](examples/memento-skills-agent-designing-agent.md) (NEW Iteration 39) \u2014 Agent-designing agent; memory-based RL with stateful prompts; skills as structured markdown files = persistent evolving memory; Read-Write Reflective Learning (read = skill router, write = update library); continual learning without LLM parameter updates; +26.2% General AI Assistants, +116.2% Humanity's Last Exam; 27 citations (arXiv:2603.18743)\n- [**Skill1**](examples/skill1-unified-skill-evolution-rl.md) (NEW Iteration 39) \u2014 Unified evolution of skill-augmented agents via RL; single policy co-evolves skill selection, utilization, distillation; frequency decomposition credit assignment (low-freq = selection, high-freq = distillation); ALFWorld + WebShop; outperforms baselines; 18 citations (arXiv:2605.06130)\n- [**EXIF**](examples/exif-automated-skill-discovery.md) (NEW Iteration 39) \u2014 Alice-Bob dual-agent for automated skill discovery; exploration-first strategy; retrospective skill dataset from environment interaction; iterative feedback loop; self-play (Alice=Bob) enables self-evolution; Webshop + Crafter; precursor to 2026 skill discovery wave; 11 citations (arXiv:2506.04287)\n- [**SkillClaw**](examples/skillclaw-collective-skill-evolution.md) (NEW Iteration 40) \u2014 Collective skill evolution in multi-user agent ecosystems; cross-user + over-time trajectory aggregation; autonomous evolver (pattern recognition \u2192 skill update); shared synchronized repository; supports OpenClaw + Hermes; WildClawBench + Qwen3-Max; 42 citations; GitHub: AMAP-ML/SkillClaw (2.1k\u2605) (arXiv:2604.08377)\n- [**SKILL0**](examples/skill0-skill-internalization.md) (NEW Iteration 41) \u2014 First RL framework for skill internalization (\"skills at training, zero at inference\"); Dynamic Curriculum anneals skill scaffolding by on-policy helpfulness; +9.7% ALFWorld, +6.6% Search-QA, +10.1% WebShop; <0.5k tokens/step; GitHub: ZJU-REAL/SkillZero (arXiv:2604.02268)\n- [**OpenClaw-Skill / CSTS**](examples/openclaw-skill-csts-tree-search.md) (NEW Iteration 41) \u2014 Collective Skill Tree Search: multi-model candidate generation + quality/transferability assessment; builds structured transferable skill trees; Collective Skill RL multi-skill selection; addresses fragmentation, single-model bias, poor transfer (arXiv:2606.16774)\n\n### Ontology & Knowledge\n- [Ontologizer](examples/ontologizer-openclaw-ontology-skill.md) \u2014 OpenClaw ontology skill\n- [OpenClaw PKB Skill](examples/openclaw-pkb-skill.md) \u2014 Personal knowledge base\n- [Genesis Skills Repository (OSTI)](examples/genesis-skills-osti.md) \u2014 Large curated collection of Claude Code skills (OSTI/GitLab)\n- [RDF Ontologies](examples/rdf-ontologies-skill.md) \u2014 SHACL + SPARQL integration\n- [Open Ontologies MCP](examples/open-ontologies-github.md) \u2014 Full ontology lifecycle (43 tools, SHACL validation, 32 stored ontologies)\n- [Open Ontologies Paper](examples/open-ontologies-paper.md) \u2014 Stable matching alignment algorithm (OAEI F1=0.832, P=0.963)\n- [Open Ontologies GitHub](examples/open-ontologies-github.md) \u2014 Production Rust MCP server with onto_align tool, 32 standard ontologies\n- Going Meta: Agent Skills for Ontologies \u2014 Video series on skills for ontology work *(no local wiki page yet)*\n- [**OxO2 Mapping Service**](examples/oxo2-sssom-mapping-service.md) \u2014 SSSOM-compliant service with CLAUDE.md agent context (EBISPOT)\n- [**Onto-LLM-Mapping**](examples/onto-llm-mapping.md) \u2014 SSSOM mapping generation via LLM+RAG pipeline\n\n### Validation & Rules\n- [Veto](examples/veto-agent-authorization.md) \u2014 Authorization Kernel\n- [Tool-Use Firewall](examples/tool-use-firewall.md) \u2014 \n- [Schimatos](examples/schimatos-shacl-knowledge-graph.md) \u2014 SHACL knowledge graph validation\n- Agent Audit \u2014 Security scanning *(no local wiki page yet)*\n- [GraphGuard OS](examples/graphguard-os-guardrails.md) \u2014 SHACL + Cypher guardrails + Shadow Policy Manager\n- [xpSHACL](examples/xpshacl-explainable-shacl.md) \u2014 Explainable SHACL validation with RAG + Violation Knowledge Graph (99.48% cache hit)\n- [SHACL Data Quality](examples/shacl-data-quality-69-metrics.md) \u2014 69 data quality metrics mapped to SHACL shapes\n- [**NemoClaw Security Scanner**](examples/nemoclaw-security-scanner.md) \u2014 LLM-assisted vulnerability detection for skill definitions\n- [**text2shacl**](examples/text2shacl-multi-agent-shacl.md) \u2014 Multi-agent LangGraph pipeline for SHACL generation from text; 5 LLMs evaluated, two merge strategies (priority-llm, restrictive)\n- [**skill-validator CLI**](examples/skill-validator-cli.md) \u2014 Go-based lifecycle-mapped validator: 7 commands, 13 platform pre-commit hooks, LLM-as-judge, contamination detection (151 stars)\n- [**Validate Skill GitHub Action**](examples/validate-skill-github-action.md) \u2014 Lightweight CI/CD layer: structural spec compliance, JSON outputs, 4 inputs/2 outputs\n\n### Governance & Verification\n- [NVIDIA Verified Agent Skills](examples/nvidia-verified-agent-skills.md) \u2014 OpenSSF signing, SkillSpector scanning, SKILLCARD.yaml\n- [NVIDIA Skills Repository](examples/nvidia-skills-repo.md) \u2014 140+ skills across 13 product areas with governance pipeline\n- [**PurpleBox Security Analysis**](examples/purplebox-supply-chain-security.md) \u2014 Supply chain risk: 12% infection rate, 6-vector attack taxonomy, CVE-2026-25253\n- [GitHub CLI Skill Management](examples/github-cli-skill-management.md) \u2014 Supply chain integrity (immutability, pinning, provenance)\n- [**Mondoo Security Analysis**](examples/mondoo-agent-skills-security.md) \u2014 14 attack patterns, 25%+ vulnerable skills, ClawHavoc campaign\n- [**agentskill.sh / ags**](examples/agentskill-sh-ags-security-scoring.md) \u2014 Registry-level security scoring: 12-category threat taxonomy, 100k+ skills scanned, 0-100 security score, content-SHA versioning, 10-dim quality scoring\n- [**ClawHavoc Campaign**](examples/clawhavoc-marketplace-attack.md) (NEW Iteration 36) \u2014 ~1,184 malicious skills on ClawHub; 13% malicious rate; dual-vector attack (prompt injection + shell access); canonical marketplace supply-chain case study\n- [**Supply Chain Agentic Factory**](examples/supply-chain-agentic-factory-in-toto.md) (NEW Iteration 36) \u2014 First proposal to extend SLSA/in-toto provenance to agentic code generation; \"intent \u2192 source \u2192 binary\" trust gap; Konflux/fullsend project (Red Hat)\n- [**SkillSieve**](examples/skillsieve-malicious-skill-detection.md) (NEW Iteration 37) \u2014 Three-layer triage for malicious skill detection: heuristic filter (86% volume) \u2192 LLM analysis (4 sub-tasks) \u2192 LLM jury (3-LLM voting+debate); F1=0.920 at $0.006/skill; 49K ClawHub skills evaluated; cross-ecosystem (ClawHub\u2192Feishu); open-sourced (arXiv:2604.06550)\n- [**PROV-AGENT**](examples/prov-agent-unified-provenance.md) (NEW Iteration 38) \u2014 Provenance model extending W3C PROV + MCP for tracking AI agent interactions in agentic workflows; agent decisions/prompts/responses as first-class provenance; near real-time capture system; cross-facility (edge/cloud/HPC); Oak Ridge + Argonne National Labs (arXiv:2508.02866)\n- [**SkillGuard**](examples/skillguard-permission-framework.md) (NEW Iteration 39) \u2014 Permission framework for agent skills; dual-plane governance (context plane + action plane); five components (skill manifests, runtime access control, user-mediated authorization, deny-by-default, behavior monitoring); 315 real-world skills; 99.76% taxonomy coverage; 91% F1 manifest generation; attack success reduced 32%\u219223%; CSIRO+ANU (arXiv:2606.03024)\n- [**SkillFortify**](examples/skillfortify-formal-verification-supply-chain.md) (NEW Iteration 39) \u2014 First formal analysis framework for agent skill supply chains; six contributions: DY-Skill attacker model (Dolev-Yao for 5-phase lifecycle), sound static analysis (abstract interpretation), capability-based sandboxing with confinement proof, Agent Dependency Graph with SAT resolution + lockfile semantics, trust score algebra, SkillFortifyBench (540 skills); 96.95% F1, 100% precision, 0% FP; 22 frameworks; 6,487 malicious tools catalogued (arXiv:2603.00195)\n- [**NVIDIA-Verified Agent Skills**](examples/nvidia-verified-agent-skills-governance.md) (NEW Iteration 39) \u2014 Industry productionization of skill governance: verified = cataloged, scanned (SkillSpector), signed (cryptographic skill.oms.sig), documented (skill cards); built on agentskills.io spec; cross-platform SKILL.md (Claude Code, Codex, Cursor); daily catalog sync; evaluation layer planned (NVIDIA, May 2026)\n- [**SkillSpector**](examples/skillspector-nvidia-security-scanner.md) (NEW Iteration 40) \u2014 NVIDIA's security scanner for AI agent skills; YARA rules + LLM semantic analysis; OWASP/MITRE alignment; batch scanning; CI/CD integration; Docker; MCP least-privilege; 1312 unit tests; v2.3.13; 13.2k\u2605; 38 contributors; Apache 2.0; scanning step of NVIDIA-Verified ecosystem (GitHub: nvidia/skillspector)\n- [**AgentBound**](examples/agentbound-mcp-access-control.md) (NEW Iteration 40) \u2014 First access control framework for MCP servers; Android permission model inspired; declarative policy + enforcement engine; 296 most popular MCP servers; 80.9% automated policy generation from source code; blocks majority of threats; negligible overhead; no server modifications; ACM FSE 2026 (arXiv:2510.21236)\n\n### Security Governance Frameworks\n- [**OWASP Agentic Skills Top 10 (AST10)**](examples/owasp-agentic-skills-top-10.md) \u2014 First dedicated security risk framework: 10-class vulnerability taxonomy, Lethal Trifecta, Universal Skill Format\n- [**Agentic Trust Framework (CSA)**](examples/agentic-trust-framework-csa.md) \u2014 Zero Trust governance: 4-level maturity model (Intern\u2192Principal), 5 promotion gates, compliance mapping\n- [**arXiv Agent Skills Survey**](examples/arxiv-agent-skills-survey.md) \u2014 First comprehensive academic survey: 26.1% vulnerability rate, 4-axis analysis (architecture, acquisition, deployment, security)\n- [**SoK: Agentic Skills**](papers/sok-agentic-skills-beyond-tool-use.md) (NEW Iteration 36) \u2014 Formal skill definition S=(C,\u03c0,T,R); 7-stage lifecycle; 7 design patterns; ClawHavoc case study; 73 citations (arXiv:2602.20867)\n- [**SkillReducer**](examples/skillreducer-token-efficiency.md) (NEW Iteration 37) \u2014 Empirical study of 55,315 skills: 26.4% lack routing, 60%+ non-actionable; two-stage optimization (delta debugging + taxonomy + progressive disclosure); 48%+39% compression with +2.8% quality (less-is-more effect); cross-model transfer (5 models, 4 families) (arXiv:2603.29919)\n- [**MalTool**](examples/maltool-malicious-tool-attacks.md) (NEW Iteration 40) \u2014 First systematic study of malicious tool code implementations; CIA triad taxonomy for agent tools; coding-LLM-based synthesis (standalone + embedded); automated verifier (functional + diversity); 1,300 standalone + 5,727 embedded malicious tools; existing detection insufficient; UC Berkeley (Dawn Song) + Duke (arXiv:2602.12194)\n- [**BadSkill**](examples/badskill-backdoor-model-in-skill.md) (NEW Iteration 40) \u2014 Backdoor attacks via model-in-skill poisoning; semantic compositional triggers; composite training objective (classification + margin + poison); 99.5% ASR; 3% poison rate \u2192 91.7% ASR; 8 architectures (494M\u20137.1B), 5 model families; 13 skills; identifies model-bearing skills as distinct supply-chain risk (arXiv:2604.09378)\n- [**SkillJect**](examples/skillject-automated-prompt-injection.md) (NEW Iteration 40) \u2014 First automated framework for generating poisoned skills; two-channel attack (artifact: helper script payload + instruction: front-loaded SKILL.md inducement); closed-loop multi-agent (Attack\u2192Victim\u2192Evaluate\u2192refine); supports Claude Code + OpenClaw; trace-driven refinement; GitHub: jiaxiaojunQAQ/SkillJect (arXiv:2602.14211)\n\n### Research Meta\n- [Current State of Skill Bundles Research (May 2026)](examples/skill-bundles-research-state.md) \u2014 Snapshot note on research coverage and gaps\n\n### Platform Skill Systems\n- [**Anthropic Official Skills**](examples/anthropic-official-skills-repo.md) \u2014 Canonical reference: spec, templates, production document skills (140k stars)\n- [**Ylang Labs Agent Skills**](examples/ylang-labs-agent-skills-overview.md) \u2014 Definitive overview: \"recipes vs kitchen\" metaphor, 3-level progressive disclosure\n- [**Claude API Integration**](examples/claude-api-skills-integration.md) \u2014 Container parameter, version pinning, 8 skills/request, 30MB limit\n- [OpenAI Codex Agent Skills](examples/openai-codex-skills.md) \u2014 Progressive disclosure, MCP dependency declarations\n- [VS Code Copilot Agent Skills](examples/vscode-copilot-skills.md) \u2014 Cross-platfo
